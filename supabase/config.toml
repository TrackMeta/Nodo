# Configuración del proyecto Supabase — Nodo
project_id = "nodo"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
# En producción, poner la URL del panel (GitHub Pages).
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = false   # uso interno: los usuarios los crea el admin

[auth.email]
enable_signup = false
enable_confirmations = false

[realtime]
enabled = true

# ── Edge Functions ──
# whatsapp-webhook es PÚBLICA: Meta la llama sin JWT.
# La seguridad la da la validación de firma X-Hub-Signature-256.
[functions.whatsapp-webhook]
verify_jwt = false

# whatsapp-send requiere usuario autenticado (JWT del panel).
[functions.whatsapp-send]
verify_jwt = true

# webchat (banco de pruebas) también requiere usuario autenticado.
[functions.webchat]
verify_jwt = true

# ai-config gestiona las API keys de IA por canal desde el panel.
[functions.ai-config]
verify_jwt = true

# channel-config gestiona datos y secretos del canal (WhatsApp/Meta + Telegram).
[functions.channel-config]
verify_jwt = true
