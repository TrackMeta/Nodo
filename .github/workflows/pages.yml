name: Desplegar panel a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Despliegue DIRECTO a Pages (source = GitHub Actions). No depende de una
# rama gh-pages ni de que GitHub reconstruya solo — publica el artefacto.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configurar Pages
        uses: actions/configure-pages@v5
      - name: Subir artefacto (sitio estático, sin Jekyll)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4
