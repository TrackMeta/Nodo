name: Desplegar panel a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Publicar a la rama gh-pages requiere permiso de escritura de contenido.
permissions:
  contents: write

concurrency:
  group: "pages-deploy"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Publica todo el repo (el panel se sirve desde /panel/) a la rama
      # gh-pages. Método clásico y estable, sin depender de la API de
      # deploy-pages que venía fallando intermitentemente.
      - name: Publicar a gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          keep_files: false
          enable_jekyll: false
          commit_message: "Deploy panel ${{ github.sha }}"
