<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script>try{document.documentElement.dataset.theme=localStorage.getItem("nodo.theme")||"dark"}catch(e){}</script>
<title>Nodo · Aprobación de pagos</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png" />
<link rel="stylesheet" href="shell.css" />
<style>
  :root{
    --bg:#0e1116; --surface:#151a21; --surface-2:#1b222c; --border:#232b36;
    --text:#e7ecf2; --muted:#8a97a8; --faint:#5c6675;
    --brand:#2b7fff; --brand-2:#1e6ff0; --brand-bg:#12233f;
    --green:#22c079; --green-bg:#10281d; --amber:#f0a92b; --amber-bg:#2c2311; --red:#e2564a; --red-bg:#2c1615;
    --font:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box} html,body{height:100%;margin:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px}
  button{font-family:inherit;cursor:pointer}
  .btn{height:38px;padding:0 15px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px}
  .btn.ok{background:var(--green);border:none;color:#04140c}.btn.ok:hover{filter:brightness(1.06)}
  .btn.danger{color:var(--red);border-color:transparent}.btn.danger:hover{background:var(--red-bg)}
  .btn svg{width:15px;height:15px}
  .pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;border:1px solid transparent}
  .pill.adel{background:var(--amber-bg);color:var(--amber)} .pill.saldo{background:var(--brand-bg);color:var(--brand)}
  .acard{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px 18px;display:flex;gap:16px;align-items:flex-start;margin-bottom:12px}
  .thumb{width:96px;height:96px;border-radius:12px;object-fit:cover;flex:none;background:var(--surface-2);border:1px solid var(--border);cursor:zoom-in}
  .thumb.none{display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:11px;text-align:center;padding:6px;cursor:default}
  .amt{font-size:20px;font-weight:800;letter-spacing:-.5px}
  .klbl{font-size:11px;color:var(--faint);font-weight:600}
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.82);display:none;align-items:center;justify-content:center;z-index:100;padding:24px}
  .lightbox.show{display:flex} .lightbox img{max-width:92vw;max-height:92vh;border-radius:12px}
</style>
</head>
<body>
<div class="nodo-page">
  <div class="nodo-wrap">
    <div class="nodo-head">
      <div class="grow">
        <h1 class="nodo-title">Aprobación de pagos</h1>
        <p class="nodo-lead">Comprobantes de <b>adelanto</b> y de <b>saldo</b> pendientes de tu visto bueno. Al aprobar, el pedido avanza y el bot notifica al cliente (y suelta la <b>clave de recojo</b> cuando corresponde).</p>
      </div>
      <div class="nodo-actions"><button class="btn" id="reloadBtn">↻ Actualizar</button></div>
    </div>
    <div id="list"></div>
  </div>
</div>
<div class="lightbox" id="lightbox"><img id="lightImg" src=""/></div>

<script type="module">
import { supa, mountShell, toast, icon, confirmDialog } from "./shell.js";
const $=(id)=>document.getElementById(id);
const st={ channelId:null, list:[], imgs:{} };
function esc(s){return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
const money=(o)=>{ const sym=o.currency==="USD"?"$":"S/"; return sym; };

async function boot(){
  const { data:{session} }=await supa.auth.getSession(); if(!session){ location.href="index.html"; return; }
  const shell=await mountShell({ active:"aprobaciones" });
  st.channelId=shell.channelId;
  shell.onChannel(id=>{ st.channelId=id; load(); });
  $("reloadBtn").onclick=load;
  $("lightbox").onclick=()=>$("lightbox").classList.remove("show");
  await load();
}

// Pedidos en un punto de pago pendiente: esperando_adelanto (aprobar adelanto)
// y en_agencia (aprobar saldo → soltar clave). Es el mismo flujo que el Kanban,
// pero enfocado en la decisión de aprobar/rechazar el pago.
async function load(){
  const sel="id,amount,currency,estado,shipping,contact_id,product_id,created_at,contact:contact_id(nombre,wa_id),product:product_id(nombre,emoji)";
  let { data, error }=await supa.from("orders").select(sel)
    .eq("channel_id",st.channelId).in("estado",["esperando_adelanto","en_agencia"]).order("created_at",{ascending:true});
  if(error){ ({ data }=await supa.from("orders").select("id,amount,currency,estado,shipping,contact_id,product_id,created_at").eq("channel_id",st.channelId).in("estado",["esperando_adelanto","en_agencia"]).order("created_at",{ascending:true})); }
  st.list=data||[];
  // Últimos comprobantes (imágenes entrantes) por contacto, para previsualizar.
  st.imgs={};
  const ids=[...new Set(st.list.map(o=>o.contact_id).filter(Boolean))];
  if(ids.length){
    const { data:msgs }=await supa.from("messages").select("contact_id,content,ts")
      .eq("channel_id",st.channelId).in("contact_id",ids).eq("direction","in").eq("type","image").order("ts",{ascending:false}).limit(400);
    (msgs||[]).forEach(m=>{ const u=m.content&&m.content.media_url; if(u&&!st.imgs[m.contact_id]) st.imgs[m.contact_id]=u; });
  }
  render();
}

function render(){
  const box=$("list");
  if(!st.list.length){
    box.innerHTML=`<div class="nodo-empty"><div class="e-ic">${icon("check")}</div><h3>Nada por aprobar</h3><p>Cuando un cliente envíe un comprobante de adelanto o de saldo, aparecerá aquí para tu visto bueno.</p></div>`;
    return;
  }
  box.innerHTML="";
  st.list.forEach(o=>{
    const c=o.contact||{}; const p=o.product||{}; const s=o.shipping||{};
    const esAdel=o.estado==="esperando_adelanto";
    const sym=money(o);
    const monto=esAdel ? (s.adelanto ?? "") : (s.saldo ?? "");
    const img=s.saldo_comprobante || st.imgs[o.contact_id];
    const revisar=s.saldo_revisar; // motivo por el que la IA no validó sola (modo auto)
    const el=document.createElement("div"); el.className="acard";
    el.innerHTML=`
      ${img?`<img class="thumb" src="${esc(img)}" data-full="${esc(img)}"/>`:`<div class="thumb none">Sin comprobante recibido</div>`}
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:9px;flex-wrap:wrap">
          <span class="pill ${esAdel?'adel':'saldo'}">${esAdel?'Adelanto':'Saldo'}</span>
          <span style="font-weight:700;font-size:15px">${p.emoji?esc(p.emoji)+" ":""}${esc(c.nombre||"Cliente")}</span>
          <span style="font-size:12px;color:var(--faint)">${esc(c.wa_id||"")}</span>
        </div>
        <div style="display:flex;gap:22px;margin-top:11px;flex-wrap:wrap">
          <div><div class="klbl">${esAdel?'Adelanto a validar':'Saldo a validar'}</div><div class="amt">${monto!==""?`${sym} ${esc(monto)}`:'<span style="color:var(--faint);font-size:14px;font-weight:600">no definido</span>'}</div></div>
          <div><div class="klbl">Total del pedido</div><div class="amt" style="font-weight:700;color:var(--muted)">${o.amount!=null?`${sym} ${esc(o.amount)}`:'—'}</div></div>
          ${p.nombre?`<div><div class="klbl">Producto</div><div style="font-weight:600;padding-top:3px">${esc(p.nombre)}</div></div>`:""}
          ${(!esAdel&&s.clave_recojo)?`<div><div class="klbl">Clave de recojo</div><div style="font-weight:800;padding-top:3px;color:var(--green)">${esc(s.clave_recojo)}</div></div>`:""}
        </div>
        ${revisar?`<div style="margin-top:9px;font-size:12px;color:var(--amber);background:var(--amber-bg);border-radius:9px;padding:8px 11px">🕵️ La IA no validó el pago sola: <b>${esc(revisar)}</b>. Revísalo tú.</div>`:""}
        ${(!esAdel&&!s.clave_recojo)?`<div style="margin-top:9px;font-size:11.5px;color:var(--amber)">⚠ Este pedido aún no tiene clave de recojo cargada (edítala en Pedidos antes de aprobar).</div>`:""}
        <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
          <button class="btn ok" data-ok="${o.id}">${icon("check")} Aprobar ${esAdel?'adelanto':'saldo y soltar clave'}</button>
          <button class="btn danger" data-no="${o.id}">Rechazar</button>
          <a class="btn" href="pedidos.html">Ver en Pedidos</a>
        </div>
      </div>`;
    const t=el.querySelector(".thumb[data-full]"); if(t) t.onclick=()=>{ $("lightImg").src=t.dataset.full; $("lightbox").classList.add("show"); };
    el.querySelector("[data-ok]").onclick=()=>approve(o);
    el.querySelector("[data-no]").onclick=()=>reject(o);
    box.appendChild(el);
  });
}

async function updateOrder(body){
  const { data,error }=await supa.functions.invoke("order-update",{ body });
  if(error){ toast(error.message||"No se pudo actualizar",true); return null; }
  if(data&&data.error){ toast(data.error,true); return null; }
  return data;
}
async function approve(o){
  const esAdel=o.estado==="esperando_adelanto";
  const nuevo=esAdel?"adelanto_validado":"saldo_pagado";
  const c=o.contact||{};
  if(!await confirmDialog({ title:esAdel?"Aprobar adelanto":"Aprobar saldo",
    message:`${c.nombre||"Cliente"} — dar por válido el ${esAdel?'adelanto':'saldo'} y avanzar el pedido${esAdel?"":" (el bot enviará la clave de recojo)"}.`,
    confirmText:"Aprobar" })) return;
  const r=await updateOrder({ order_id:o.id, estado:nuevo });
  if(r){ toast(r.flow_started?"Aprobado ✓ · el bot está notificando al cliente":"Aprobado ✓"); await load(); }
}
async function reject(o){
  const c=o.contact||{};
  if(!await confirmDialog({ title:"Rechazar comprobante",
    message:`${c.nombre||"Cliente"} — marcar el comprobante como no válido. El pedido queda igual; escríbele para pedir un pago correcto.`,
    confirmText:"Rechazar", danger:true })) return;
  const r=await updateOrder({ order_id:o.id, shipping:{ pago_rechazado_at:new Date().toISOString() } });
  if(r){ toast("Marcado como rechazado"); await load(); }
}
boot();
</script>
</body>
</html>
