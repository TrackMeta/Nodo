<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script>try{document.documentElement.dataset.theme=localStorage.getItem("nodo.theme")||"dark"}catch(e){}</script>
<title>Nodo В· Probar flujos</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png" />
<link rel="stylesheet" href="shell.css" />
<style>
  :root{
    --bg:#0e1116; --surface:#151a21; --surface-2:#1b222c; --border:#232b36;
    --text:#e7ecf2; --muted:#8a97a8; --faint:#5c6675;
    --brand:#2b7fff; --brand-2:#1e6ff0; --brand-bg:#12233f; --brand-border:#254774;
    --green:#22c079; --green-bg:#10281d; --amber:#f0a92b; --amber-bg:#2c2311; --red:#e2564a; --red-bg:#2c1615;
    --font:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box} html,body{height:100%;margin:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px}
  button{font-family:inherit;cursor:pointer}
  .hidden{display:none!important}
  .ico{width:16px;height:16px;flex:none}
  .emptyIc .ico{width:34px;height:34px}
  .ttl .ico{width:17px;height:17px;vertical-align:-3px;margin-right:2px}
  .av .ico,.bigav .ico{width:22px;height:22px}
  .segbtn .ico{width:14px;height:14px}
  .actline .ai .ico{width:13px;height:13px}
  .nodo-page{height:100%}

  #app{height:100%;display:flex;min-height:0}
  /* Columna principal (chat) */
  .chat{flex:1;min-width:0;display:flex;flex-direction:column;position:relative}
  .topbar{display:flex;gap:8px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap}
  .topbar .ttl{font-size:15px;font-weight:700;margin-right:auto;letter-spacing:-.2px}
  .sel{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);height:38px;padding:0 10px;font-size:13px;outline:none;min-width:190px}
  .sel:focus{border-color:var(--brand)}
  .testbtn{display:inline-flex;align-items:center;gap:7px;background:var(--brand-bg);color:var(--brand);border:1px solid var(--border);border-radius:10px;height:38px;padding:0 14px;font-size:13px;font-weight:600;white-space:nowrap}
  .testbtn:hover{border-color:var(--brand)}

  .chat .hd{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
  .av{width:40px;height:40px;flex:none;border-radius:50%;background:var(--brand-bg);color:var(--brand);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px}
  .chat .hd .nm{font-weight:600}
  .chat .hd .ph{font-size:12px;color:var(--muted)}
  .testtag{font-size:11px;background:var(--amber-bg);color:var(--amber);padding:2px 8px;border-radius:20px;margin-left:8px}
  .pill{font-size:11px;padding:4px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;user-select:none;margin-left:auto}
  .pill.on{background:var(--green-bg);color:var(--green)}
  .pill.off{background:var(--amber-bg);color:var(--amber)}
  .hbtn{display:inline-flex;align-items:center;gap:5px;height:32px;padding:0 12px;border-radius:9px;border:1px solid var(--border);background:var(--surface-2);color:var(--muted);font-size:12.5px;font-weight:600;margin-left:8px}
  .hbtn:hover{color:var(--text);border-color:var(--faint)}
  .hbtn.active{background:var(--brand);border-color:var(--brand);color:#fff}

  .thread{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:8px}
  .msg{max-width:70%;padding:8px 12px;border-radius:14px;font-size:13.5px;word-wrap:break-word;white-space:pre-wrap}
  .msg .meta{font-size:10px;color:var(--faint);margin-top:3px}
  .in-m{align-self:flex-start;background:var(--surface-2);border-top-left-radius:4px}
  .out-m{align-self:flex-end;background:var(--brand-bg);border-top-right-radius:4px}
  .out-m .meta{text-align:right;color:#6f92c8}
  .msg img,.msg video{max-width:230px;border-radius:10px;display:block} .msg audio{max-width:230px}
  .msg .transcript{margin-top:6px;font-size:12.5px;font-style:italic;opacity:.9;border-left:2px solid var(--brand);padding-left:8px;line-height:1.45}
  .msg a.file{color:inherit;text-decoration:underline;display:inline-flex;gap:6px;align-items:center}
  /* Los botones cuelgan de la burbuja que los enviГі: mismo lado que ella (los
     manda el bot, asГӯ que van a la DERECHA) y apilados justo debajo, como en
     WhatsApp. Antes quedaban sueltos a la izquierda, como si los hubiera
     mandado el cliente. */
  .btns{align-self:flex-end;width:230px;max-width:70%;display:flex;flex-direction:column;gap:3px;margin:3px 0 4px}
  .btnchip{font-size:12.5px;padding:7px 12px;border:1px solid var(--brand);border-radius:10px;color:var(--brand);background:transparent;width:100%;text-align:center;cursor:pointer}
  .btnchip:hover{background:var(--brand-bg)}
  .empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--faint);flex-direction:column;gap:8px;text-align:center;padding:20px}

  /* Barra Cliente/Bot */
  .testbar{display:flex;align-items:center;gap:8px;padding:8px 16px;border-top:1px solid var(--border);background:var(--surface)}
  .testbar .lb{font-size:12px;color:var(--muted)}
  .seg2{display:flex;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:2px}
  .segbtn{display:inline-flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12.5px;font-weight:600;padding:6px 14px;border-radius:8px}
  .segbtn.active{background:var(--brand);color:#fff}

  /* Compositor */
  .composer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;position:relative}
  .composer input#msgInput{flex:1;height:42px;background:var(--surface-2);border:1px solid var(--border);border-radius:22px;color:var(--text);padding:0 16px;outline:none}
  .composer input#msgInput:focus{border-color:var(--brand)}
  .send{width:42px;height:42px;flex:none;border-radius:50%;background:var(--brand);border:none;color:#fff;display:flex;align-items:center;justify-content:center}
  .send svg{width:19px;height:19px} .send:disabled{opacity:.4}
  .ctool{width:38px;height:42px;flex:none;border:none;background:transparent;color:var(--muted);font-size:19px;display:flex;align-items:center;justify-content:center;border-radius:10px}
  .ctool:hover{color:var(--brand);background:var(--surface-2)} .ctool svg{width:20px;height:20px}
  .ctool-ia{width:42px;background:linear-gradient(135deg,#a855f7,#ec4899);color:#fff!important;box-shadow:0 3px 10px rgba(168,85,247,.35)}
  .ctool-ia:hover{background:linear-gradient(135deg,#9333ea,#db2777);color:#fff!important}
  .ctool-ia svg{filter:drop-shadow(0 1px 1px rgba(0,0,0,.15))}
  .sgpop{overflow-y:auto}
  .sg-hd{padding:11px 13px;font-size:11.5px;font-weight:800;letter-spacing:.2px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;background:linear-gradient(90deg,rgba(168,85,247,.10),rgba(236,72,153,.06))}
  .sg-hd .sgt{background:linear-gradient(90deg,#a855f7,#ec4899);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .sg-hd svg{width:15px;height:15px;color:#c084fc;flex:none}
  .sg-hd .sg-sub{font-weight:500;color:var(--muted);font-size:10.5px;margin-left:auto;letter-spacing:0}
  .sg-load{padding:20px 14px;font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:9px}
  .sg-spin{width:15px;height:15px;border:2px solid var(--border);border-top-color:#c084fc;border-radius:50%;animation:sgspin .7s linear infinite;flex:none}
  @keyframes sgspin{to{transform:rotate(360deg)}}
  .sg-item{display:block;width:100%;text-align:left;padding:11px 13px;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-size:13px;line-height:1.5;cursor:pointer;font-family:inherit}
  .sg-item:last-child{border-bottom:none}
  .sg-item:hover{background:linear-gradient(90deg,rgba(168,85,247,.12),rgba(236,72,153,.07))}
  .sg-empty{padding:16px 14px;font-size:12.5px;color:var(--muted);line-height:1.5}
  .pop{position:absolute;bottom:60px;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:0 16px 44px rgba(0,0,0,.45);z-index:40;overflow:hidden}
  .pop.hidden{display:none}
  .qrpop{left:16px;width:330px;max-height:360px;display:flex;flex-direction:column}
  .qrpop .qs{padding:10px;border-bottom:1px solid var(--border)}
  .qrpop .qs input{width:100%;height:36px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:0 12px;outline:none;font-family:inherit;font-size:13px}
  .qrpop .qlist{overflow-y:auto;padding:6px}
  .qrfold{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--faint);font-weight:700;padding:8px 8px 4px}
  .qritem{padding:9px 10px;border-radius:9px;cursor:pointer}
  .qritem:hover{background:var(--surface-2)}
  .qritem .qt{font-weight:600;font-size:13px;display:flex;align-items:center;gap:8px}
  .qritem .qt .atajo{font-size:10.5px;font-family:monospace;background:var(--brand-bg);color:var(--brand);padding:1px 6px;border-radius:5px;font-weight:700}
  .qritem .qp{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .qempty{padding:24px;text-align:center;color:var(--faint);font-size:12.5px} .qempty a{color:var(--brand)}
  .emojipop{left:56px;width:322px;max-height:340px;overflow-y:auto;padding:6px 8px}
  .emcat{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--faint);font-weight:700;padding:9px 4px 4px;position:sticky;top:0;background:var(--surface);z-index:1}
  .emgrid{display:flex;flex-wrap:wrap;gap:1px}
  .emgrid button{width:32px;height:32px;border:none;background:transparent;font-size:19px;border-radius:8px;cursor:pointer;line-height:1}
  .emgrid button:hover{background:var(--surface-2)}

  /* Actividad intercalada en el chat (lГӯnea de sistema entre burbujas) */
  .actline{align-self:center;max-width:88%;display:flex;align-items:center;gap:7px;background:var(--surface-2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11.5px;color:var(--muted);margin:1px 0}
  .actline .ai{display:inline-flex;align-items:center;color:var(--muted)}
  .actline .at{font-weight:600;color:var(--text)}
  .actline .ad{color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px}
  .actline .atm{color:var(--faint);font-size:10.5px;margin-left:2px}

  /* Panel de debug (derecha) */
  .cpanel{width:290px;flex:none;border-left:1px solid var(--border);background:var(--surface);overflow-y:auto;padding:16px 16px 28px}
  .cpanel.hidden{display:none}
  .cpanel h4{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin:20px 0 8px}
  .cpanel .chd{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;padding-bottom:14px;border-bottom:1px solid var(--border)}
  .cpanel .bigav{width:60px;height:60px;border-radius:50%;background:var(--brand-bg);color:var(--brand);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px}
  .cpanel .cnm{font-weight:600;font-size:15px}
  .cpanel .cph{font-size:12px;color:var(--muted)}
  .tagrow{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .tagchip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:20px;padding:4px 7px 4px 10px;font-size:12px;font-weight:600;line-height:1}
  .tagchip .tdot{width:7px;height:7px;border-radius:50%;flex:none}
  .tagchip button{background:none;border:none;color:inherit;opacity:.5;font-size:14px;line-height:1;padding:0 1px;cursor:pointer;border-radius:50%} .tagchip:hover button{opacity:.85} .tagchip button:hover{opacity:1;color:var(--red)}
  .tagadd{position:relative;display:inline-flex;align-items:center;gap:5px;border:1px dashed var(--border);border-radius:20px;padding:4px 11px 4px 9px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:border-color .15s,color .15s} .tagadd:hover{border-color:var(--brand);color:var(--brand)}
  .tagadd svg{width:13px;height:13px}
  .tagadd-wrap{position:relative;display:inline-flex}
  .tagpop{position:absolute;top:calc(100% + 6px);left:0;z-index:40;min-width:172px;max-height:236px;overflow:auto;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:5px;box-shadow:0 12px 32px rgba(0,0,0,.4);display:flex;flex-direction:column;gap:2px}
  .tagpop[hidden]{display:none}
  .tagpop-item{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:none;border:none;color:var(--text);font-size:12.5px;font-weight:600;padding:7px 9px;border-radius:7px;cursor:pointer}
  .tagpop-item:hover{background:var(--surface-2)}
  .tagpop-item .tdot{width:8px;height:8px;border-radius:50%;flex:none}
  .cfield{margin-bottom:9px}
  .cfield label{font-size:11px;color:var(--muted);display:block;margin-bottom:3px}
  .cinput,.cselect{width:100%;height:34px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:0 9px;font-size:13px;outline:none;font-family:inherit}
  .cinput:focus,.cselect:focus{border-color:var(--brand)}
  .cmuted{font-size:12px;color:var(--faint)}
  .cempty{font-size:12px;color:var(--faint);padding:6px 0}
  .kv{display:flex;justify-content:space-between;gap:10px;font-size:12.5px;padding:6px 0;border-bottom:1px solid var(--border)}
  .kv .k{color:var(--muted);flex:none} .kv .v{color:var(--text);text-align:right;word-break:break-word;min-width:0}
  .media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .media-grid a{aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(--surface-2);display:flex;align-items:center;justify-content:center;border:1px solid var(--border);color:var(--muted);font-size:20px;text-decoration:none}
  .media-grid img,.media-grid video{width:100%;height:100%;object-fit:cover}
  .runrow{display:flex;align-items:center;gap:9px;font-size:12.5px;padding:8px 0;border-bottom:1px solid var(--border)}
  .runrow .rdot{width:8px;height:8px;border-radius:50%;background:var(--green);flex:none} .runrow .rdot.wait{background:var(--amber)}
  .runrow .rt{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .runrow .rs{font-size:10.5px;color:var(--faint)}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--red-bg);color:var(--red);border:1px solid var(--red);padding:10px 18px;border-radius:12px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:100}
  .toast.show{opacity:1}
  @media(max-width:920px){ .cpanel{display:none} }
</style>
</head>
<body>
<div class="nodo-page">
  <div id="app">
    <div class="chat">
      <div class="topbar">
        <span class="ttl" id="pageTtl">Probar flujos</span>
        <select class="sel" id="flowSel"><option value="">Auto (por disparador)</option></select>
        <button class="testbtn" id="startBtn">Iniciar / Reiniciar</button>
      </div>

      <div id="chatEmpty" class="empty">
        <div class="emptyIc" style="color:var(--faint)"></div>
        <div>Pulsa вҖңIniciar / ReiniciarвҖқ para empezar una prueba</div>
        <div style="font-size:12px;color:var(--faint);max-width:340px">Escribe como el cliente para disparar tus flujos, o como el bot para ensayar. Nada llega a un nГәmero real.</div>
      </div>

      <div id="chatView" class="hidden" style="flex:1;display:flex;flex-direction:column;min-height:0">
        <div class="hd">
          <div class="av" id="chAv"></div>
          <div style="min-width:0">
            <div class="nm" id="chName">Prueba (webchat)<span class="testtag">modo prueba</span></div>
            <div class="ph" id="chPhone">Escribes como el cliente</div>
          </div>
          <span class="pill on" id="chBot" title="Pausar / activar el bot">в—Ҹ Bot activo</span>
          <button class="hbtn" id="actToggle" title="Ver / ocultar la actividad del motor">Actividad</button>
          <button class="hbtn" id="exportBtn" title="Exportar mensajes">Exportar</button>
        </div>
        <div class="thread" id="thread"></div>
        <div class="testbar" id="testBar">
          <span class="lb">Escribir como:</span>
          <div class="seg2">
            <button class="segbtn active" data-as="cliente">Cliente</button>
            <button class="segbtn" data-as="bot">Bot</button>
          </div>
          <span class="lb" id="testHint">вҖ” dispara el flujo automГЎticamente</span>
        </div>
        <div class="composer">
          <button class="ctool" id="qrBtn" title="Respuestas rГЎpidas">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><path d="M8 9h8M8 13h5"/></svg>
          </button>
          <button class="ctool" id="emojiBtn" title="Emojis">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
          </button>
          <button class="ctool" id="attachBtn" title="Adjuntar imagen, audio, video o archivo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <button class="ctool ctool-ia" id="suggestBtn" title="Sugerencias de respuesta (IA)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3Z"/></svg>
          </button>
          <input type="file" id="fileInput" accept="image/*,audio/*,video/*,application/pdf" hidden />
          <input id="msgInput" placeholder="Escribe como el clienteвҖҰ" autocomplete="off" />
          <button class="send" id="sendBtn" title="Enviar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4z"/></svg></button>
          <div class="pop qrpop hidden" id="qrPop"></div>
          <div class="pop emojipop hidden" id="emojiPop"></div>
          <div class="pop qrpop hidden" id="suggestPop" style="left:96px;width:344px"></div>
        </div>
      </div>
    </div>

    <aside class="cpanel hidden" id="cpanel"></aside>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { supa, mountShell, toast, icon, confirmDialog, askChoice, askText, SUPABASE_URL, SUPABASE_ANON_KEY } from "./shell.js";
import * as O from "./orders.js";
import { esCampoInterno, origenLabel, latestOrder, remitenteDe, pedidoResumenHtml, printRotulo, injectExtrasCss, sec, copilotoEtapa, copilotoCardHtml, wireCopiloto, stagePickerHtml } from "./contact-extras.js";
injectExtrasCss();
const $=(id)=>document.getElementById(id);
const fmtTime=new Intl.DateTimeFormat("es-PE",{timeZone:"America/Lima",hour:"2-digit",minute:"2-digit"});

function splitEmojis(str){ try{ return [...new Intl.Segmenter("es",{granularity:"grapheme"}).segment(str)].map(s=>s.segment); }catch(_){ return Array.from(str); } }

function esc(s){ return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function initials(name, wa){ const s=(name||wa||"?").trim(); const p=s.split(/\s+/); return ((p[0]?.[0]||"")+(p[1]?.[0]||"")).toUpperCase()||s.slice(0,2).toUpperCase(); }
function tagHex(c){ const N={blue:"#2b7fff",green:"#22c079",amber:"#f0a92b",red:"#e2564a",purple:"#9b6cf0",teal:"#18b7be",pink:"#e264a8",gray:"#8a97a8"}; if(!c) return "#2b7fff"; return c[0]==="#"?c:(N[c]||"#2b7fff"); }
function fmtDate(ts){ if(!ts) return "вҖ”"; try{ return new Intl.DateTimeFormat("es-PE",{day:"2-digit",month:"short",year:"numeric"}).format(new Date(ts)); }catch(_){ return "вҖ”"; } }
function fmtFull(ts){ try{ return new Intl.DateTimeFormat("es-PE",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}).format(new Date(ts)); }catch(_){ return ""; } }
function mediaThumb(m){ const u=esc(m.content.media_url);
  if(m.type==="image") return `<a href="${u}" target="_blank"><img src="${u}" loading="lazy"/></a>`;
  if(m.type==="video") return `<a href="${u}" target="_blank"><video src="${u}"></video></a>`;
  if(m.type==="audio") return `<a href="${u}" target="_blank" title="Audio">рҹҺө</a>`;
  return `<a href="${u}" target="_blank" title="Archivo">рҹ“Һ</a>`; }

const FN=(n)=>`${SUPABASE_URL}/functions/v1/${n}`;
async function callFn(name, body){
  const { data:{ session } }=await supa.auth.getSession();
  const token=session?.access_token||SUPABASE_ANON_KEY;
  return fetch(FN(name),{ method:"POST", headers:{ "Content-Type":"application/json", apikey:SUPABASE_ANON_KEY, Authorization:`Bearer ${token}` }, body:JSON.stringify(body) });
}

async function boot(){
  const { data:{ session } }=await supa.auth.getSession(); if(!session){ location.href="index.html"; return; }
  const shell=await mountShell({ active:"probar" });
  shell.onLeave?.(()=>{ if(st.rt) supa.removeChannel(st.rt); });
  st.channelId=shell.channelId;
  // Iconos del sistema (reemplazan emojis de interfaz).
  $("pageTtl").innerHTML=icon("probar")+" Probar flujos";
  $("startBtn").innerHTML=icon("refresh")+" Iniciar / Reiniciar";
  $("actToggle").innerHTML=icon("activity")+" Actividad";
  $("exportBtn").innerHTML=icon("download")+" Exportar";
  $("chAv").innerHTML=icon("probar");
  document.querySelector(".emptyIc").innerHTML=icon("probar");
  document.querySelector('.segbtn[data-as="cliente"]').innerHTML=icon("user")+" Cliente";
  document.querySelector('.segbtn[data-as="bot"]').innerHTML=icon("robot")+" Bot";
  shell.onChannel(id=>{ st.channelId=id; st.contactId=null; reset(); reloadAll(); });
  $("startBtn").onclick=startTest;
  $("sendBtn").onclick=sendMsg;
  $("msgInput").addEventListener("keydown",e=>{ if(e.key==="Enter") sendMsg(); });
  $("attachBtn").onclick=()=>{ if(st.contactId) $("fileInput").click(); };
  $("fileInput").onchange=e=>{ const f=e.target.files[0]; e.target.value=""; if(f) sendAttachment(f); };
  document.querySelectorAll(".segbtn").forEach(b=> b.onclick=()=>{ st.testAs=b.dataset.as; updateComposerMode(); });
  $("qrBtn").addEventListener("click",(e)=>{ e.stopPropagation(); if(st.contactId) toggleQrPop(); });
  $("emojiBtn").addEventListener("click",(e)=>{ e.stopPropagation(); if(st.contactId) toggleEmojiPop(); });
  $("suggestBtn").addEventListener("click",(e)=>{ e.stopPropagation(); if(st.contactId) openSuggest(); });
  $("chBot").onclick=()=>{ if(st.contactId) toggleBot(); };
  $("actToggle").onclick=()=>{ if(st.contactId) toggleActivity(); };
  $("exportBtn").onclick=()=>{ if(st.contactId) exportMessages(); };

// в”Җв”Җ Hilo в”Җв”Җ
// Con "Actividad" encendido, intercala en el chat los eventos del motor
// (nodos ejecutados, etiquetas, flujos, erroresвҖҰ) en su posiciГіn cronolГіgica
// junto a los mensajes. Apagado, muestra solo los mensajes.
async function loadThread(){
  const [{ data:msgs }, evRes]=await Promise.all([
    supa.from("messages").select("*").eq("contact_id",st.contactId).order("ts").limit(300),
    st.showActivity ? supa.from("contact_events").select("*").eq("contact_id",st.contactId).order("created_at").limit(300) : Promise.resolve({ data:[] }),
  ]);
  const items=[
    ...(msgs||[]).map(m=>({ kind:"msg", ts:m.ts, data:m })),
    ...((evRes.data||[]).map(e=>({ kind:"ev", ts:e.created_at, data:e }))),
  ].sort((a,b)=> new Date(a.ts)-new Date(b.ts));
  const t=$("thread"); t.innerHTML="";
  items.forEach(it=> it.kind==="msg" ? renderMsg(it.data) : renderEvent(it.data));
  t.scrollTop=t.scrollHeight;
}
function renderEvent(e){
  const t=$("thread"); const el=document.createElement("div"); el.className="actline";
  el.innerHTML=`<span class="ai">${icon(ACT_ICON[e.tipo]||"node")}</span><span class="at">${esc(e.titulo)}</span>${e.detalle?`<span class="ad">${esc(e.detalle)}</span>`:""}<span class="atm">${fmtTime.format(new Date(e.created_at))}</span>`;
  t.appendChild(el);
}
function toggleActivity(){
  st.showActivity=!st.showActivity;
  $("actToggle").classList.toggle("active", st.showActivity);
  loadThread();
}
function renderMsg(m){
  const t=$("thread"); const el=document.createElement("div");
  el.className="msg "+(m.direction==="in"?"in-m":"out-m"); el.dataset.id=m.id;
  const mh=mediaHtml(m);
  const txt=m.content?.text||m.content?.caption||m.content?.title||`[${m.type}]`;
  const tr=m.content?.transcription?`<div class="transcript" title="TranscripciГіn automГЎtica">рҹҺҷпёҸ ${esc(m.content.transcription)}</div>`:"";
  el.innerHTML=`${mh||esc(txt)}${tr}<div class="meta">${fmtTime.format(new Date(m.ts))}${m.direction==="out"?" В· "+statusLabel(m.status):""}</div>`;
  t.appendChild(el);
  if(m.direction==="out" && m.content?.buttons?.length){
    const bd=document.createElement("div"); bd.className="btns";
    m.content.buttons.forEach(b=>{ const chip=document.createElement("button"); chip.className="btnchip"; chip.textContent=b.title; chip.onclick=()=>sendButton(b.id,b.title); bd.appendChild(chip); });
    t.appendChild(bd);
  }
  t.scrollTop=t.scrollHeight;
}
function statusLabel(s){ return {sent:"вң“",delivered:"вң“вң“",read:"вң“вң“ leГӯdo",failed:"вҡ  fallГі",pending:"вҖҰ"}[s]||s; }
function mediaHtml(m){ const url=m.content?.media_url; if(!url) return null; const u=esc(url);
  const cap=m.content?.caption?`<div style="margin-top:5px">${esc(m.content.caption)}</div>`:"";
  if(m.type==="image") return `<a href="${u}" target="_blank"><img src="${u}"/></a>${cap}`;
  if(m.type==="audio") return `<audio controls src="${u}"></audio>${cap}`;
  if(m.type==="video") return `<video controls src="${u}"></video>${cap}`;
  return `<a class="file" href="${u}" target="_blank">рҹ“Һ ${esc(m.content?.filename||"archivo")}</a>${cap}`; }

// в”Җв”Җ Enviar в”Җв”Җ
async function sendMsg(){
  const inp=$("msgInput"); const text=inp.value.trim(); if(!text||!st.contactId) return;
  $("sendBtn").disabled=true;
  try{
    if(st.testAs==="bot"){ const { error }=await supa.from("messages").insert({ channel_id:st.channelId, contact_id:st.contactId, direction:"out", type:"text", content:{ text }, status:"sent" }); if(error) toast(error.message,true); else inp.value=""; }
    else { await callFn("webchat",{ channel_id:st.channelId, text }); inp.value=""; }
  }catch{ toast("Error de red",true); }
  $("sendBtn").disabled=false;
}
async function sendButton(id,title){ await callFn("webchat",{ channel_id:st.channelId, buttonId:id, text:title }); }
function fileToDataURL(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); }); }
async function sendAttachment(file){
  if(!st.contactId) return; if(file.size>16*1024*1024){ toast("Archivo muy grande (mГЎx 16 MB)",true); return; }
  $("attachBtn").disabled=true; toast("SubiendoвҖҰ");
  try{
    const dataUrl=await fileToDataURL(file);
    const up=await (await callFn("media-upload",{ channel_id:st.channelId, filename:file.name, content_type:file.type, data:dataUrl })).json();
    if(!up.url){ toast(up.detalle||up.error||"No se pudo subir",true); return; }
    const media={ kind:up.kind, url:up.url, mime:file.type, filename:file.name };
    if(st.testAs==="bot"){ await supa.from("messages").insert({ channel_id:st.channelId, contact_id:st.contactId, direction:"out", type:media.kind, content:{ media_url:media.url, caption:"", mime:media.mime, filename:media.filename }, status:"sent" }); }
    else await callFn("webchat",{ channel_id:st.channelId, media });
  }catch{ toast("Error al adjuntar",true); }
  finally{ $("attachBtn").disabled=false; }
}

function insertAtCursor(text){ const inp=$("msgInput"); const s=inp.selectionStart??inp.value.length, e=inp.selectionEnd??inp.value.length; inp.value=inp.value.slice(0,s)+text+inp.value.slice(e); const pos=s+text.length; inp.focus(); try{ inp.setSelectionRange(pos,pos); }catch(_){}}
function applyVars(text){ return (text||"").replace(/\{\{\s*nombre\s*\}\}/gi, st.contactName||""); }
function toggleQrPop(){
  const pop=$("qrPop"); const willOpen=pop.classList.contains("hidden"); $("emojiPop").classList.add("hidden"); $("suggestPop").classList.add("hidden");
  if(!willOpen){ pop.classList.add("hidden"); return; }
  pop.innerHTML=`<div class="qs"><input id="qrSearch" placeholder="Buscar respuestaвҖҰ" autocomplete="off"/></div><div class="qlist" id="qrList"></div>`;
  renderQrList(""); $("qrSearch").oninput=(e)=>renderQrList(e.target.value); pop.classList.remove("hidden"); $("qrSearch").focus();
}
function renderQrList(q){
  const box=$("qrList"); if(!box) return;
  const list=st.quickReplies.filter(r=> !q || (r.titulo+" "+(r.atajo||"")+" "+r.cuerpo).toLowerCase().includes(q.toLowerCase()));
  if(!st.quickReplies.length){ box.innerHTML=`<div class="qempty">AГәn no hay respuestas rГЎpidas.<br><a href="respuestas.html">Crear en вҖңRespuestas rГЎpidasвҖқ вҶ’</a></div>`; return; }
  if(!list.length){ box.innerHTML=`<div class="qempty">Sin coincidencias.</div>`; return; }
  const folders={}; list.forEach(r=>{ const f=r.folder||"__none"; (folders[f]=folders[f]||[]).push(r); });
  let body="";
  Object.keys(folders).sort((a,b)=>a==="__none"?1:(b==="__none"?-1:a.localeCompare(b))).forEach(f=>{
    body+=`<div class="qrfold">${f==="__none"?"Sin carpeta":esc(f)}</div>`;
    folders[f].forEach(r=>{
      const col=r.color&&/^#/.test(r.color)?r.color:null;
      const nM=Array.isArray(r.media)?r.media.length:0;
      body+=`<div class="qritem" data-id="${r.id}" style="${col?`border-left:3px solid ${col};padding-left:9px`:""}"><div class="qt">${col?`<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${col};margin-right:6px;vertical-align:1px"></span>`:""}${esc(r.titulo)}${r.atajo?`<span class="atajo">${esc(r.atajo)}</span>`:""}${nM?`<span class="atajo" style="background:transparent;border:1px solid var(--border);color:var(--muted)">рҹ“Һ ${nM}</span>`:""}</div><div class="qp">${esc(r.cuerpo||"")}</div></div>`;
    });
  });
  box.innerHTML=body;
  box.querySelectorAll(".qritem").forEach(it=> it.onclick=()=>{ const r=st.quickReplies.find(x=>x.id===it.dataset.id); if(!r) return; insertAtCursor(applyVars(r.cuerpo)); $("qrPop").classList.add("hidden"); });
}

    ${order&&O.zonaDe(order)!=="digital"?`<div class="cx-actions"><button class="cx-btn" id="pRotulo" title="Imprimir rГіtulo del pedido">${icon("printer")} Imprimir rГіtulo</button></div>`:""}
    ${cet?copilotoCardHtml(order, cet, compFallback):""}
    ${sec("Datos del cliente", datosBody, {open:true})}
    ${order?sec("Pedido", pedidoResumenHtml(order), {open:true}):""}
    ${sec("Etapa del embudo", stageBody, {open:true})}
    ${sec("Etiquetas", tagsBody, {count:assigned.size})}
    ${sec("Campos capturados", fieldsBody, {count:userFields.length})}
    ${sec("Medios enviados", mediaBody, {count:media.length})}
    ${sec("Flujos en ejecuciГіn", runsBody, {count:runsA.length})}
    ${sec("Secuencias suscritas", subsBody, {count:subsA.length})}
    ${sec("Nodos ejecutados", nodosBody, {count:nodos.length})}
    ${sec("Registro de errores", errsBody, {count:errs.length})}`;
  p.querySelectorAll("[data-stagepick]").forEach(b=> b.onclick=async()=>{ const k=b.dataset.stagepick; if(k===(contact.stage||"nuevo")) return; await supa.from("contacts").update({ stage:k }).eq("id",contact.id); contact.stage=k; logEvent(contact.id,"nota","Etapa cambiada a "+k); toast("Etapa actualizada вң“"); renderContactPanel(); });
  p.querySelectorAll("#pTags button[data-tag]").forEach(b=> b.onclick=async()=>{ await supa.from("contact_tags").delete().eq("contact_id",contact.id).eq("tag_id",b.dataset.tag); const t=allTags.find(x=>x.id===b.dataset.tag); logEvent(contact.id,"etiqueta_del","Etiqueta quitada",t?.nombre); assigned.delete(b.dataset.tag); renderContactPanel(); });
  const addBtn=$("pAddBtn"), pop=$("pTagPop");
  if(addBtn && pop){
    addBtn.onclick=(e)=>{ e.stopPropagation(); pop.hidden=!pop.hidden; };
    pop.querySelectorAll("[data-add]").forEach(b=> b.onclick=async(e)=>{ e.stopPropagation(); await supa.from("contact_tags").upsert({ contact_id:contact.id, tag_id:b.dataset.add },{ onConflict:"contact_id,tag_id" }); const t=allTags.find(x=>x.id===b.dataset.add); logEvent(contact.id,"etiqueta_add","Etiqueta aГұadida",t?.nombre); assigned.add(b.dataset.add); renderContactPanel(); });
  }
  if(!window.__tagPopWired){ window.__tagPopWired=true; document.addEventListener("click",(e)=>{ if(!e.target.closest(".tagadd-wrap")) document.querySelectorAll(".tagpop").forEach(x=>{ x.hidden=true; }); }); }
  p.querySelectorAll("#pFields input[data-field]").forEach(inp=> inp.onchange=async()=>{ await supa.from("contact_field_values").upsert({ contact_id:contact.id, field_id:inp.dataset.field, value:inp.value, updated_at:new Date().toISOString() },{ onConflict:"contact_id,field_id" }); vals[inp.dataset.field]=inp.value; toast("Campo guardado вң“"); });
  const rot=$("pRotulo"); if(rot) rot.onclick=async()=>{ rot.disabled=true; const rem=await remitenteDe(supa,st.channelId); printRotulo({...order,contact}, rem); rot.disabled=false; };
  if(cet) wireCopiloto(p, {...order,contact,contact_id:contact.id}, cet, { supa, toast, confirmDialog, askChoice, askText, channelId:st.channelId, reload:refreshPanel });
}
async function logEvent(contactId,tipo,titulo,detalle){ try{ await supa.from("contact_events").insert({ channel_id:st.channelId, contact_id:contactId, tipo, titulo, detalle:detalle||null }); }catch(_){} }
// в”Җв”Җ Acciones в”Җв”Җ
function setBotPill(on){ const p=$("chBot"); p.className="pill "+(on?"on":"off"); p.textContent=(on?"в—Ҹ Bot activo":"в—Ҹ Bot en pausa"); }
async function toggleBot(){
  const on=panelData.contact ? panelData.contact.bot_activo!==false : true;
  await supa.from("contacts").update({ bot_activo:!on }).eq("id",st.contactId);
  if(panelData.contact) panelData.contact.bot_activo=!on;
  setBotPill(!on); logEvent(st.contactId, on?"bot_pausa":"bot_reactiva", on?"Bot pausado":"Bot reactivado");
  toast(on?"Bot pausado вң“":"Bot reactivado вң“");
}
async function exportMessages(){
  const { data }=await supa.from("messages").select("direction,type,content,ts").eq("contact_id",st.contactId).order("ts");
  const lines=(data||[]).map(m=>{ const who=m.direction==="in"?"Cliente":"Bot"; const txt=m.content?.text||m.content?.caption||m.content?.title||(m.content?.media_url?`[${m.type}] ${m.content.media_url}`:`[${m.type}]`); return `[${new Date(m.ts).toLocaleString("es-PE")}] ${who}: ${txt}`; });
  const blob=new Blob([`Prueba de flujo\n\n`+lines.join("\n")],{type:"text/plain;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="prueba_flujo.txt"; a.click(); URL.revokeObjectURL(a.href);
  toast("Mensajes exportados вң“");
}

// в”Җв”Җ Realtime в”Җв”Җ
let panelTimer=null, threadTimer=null;
function subscribe(){
  if(st.rt) supa.removeChannel(st.rt);
  st.rt=supa.channel("nodo-probar").on("postgres_changes",{ event:"INSERT", schema:"public", table:"messages" },(p)=>{
    if(p.new.contact_id!==st.contactId) return;
    // Con actividad ON hay que recargar el hilo (para intercalar los eventos
    // que el motor acaba de registrar); con OFF basta con pintar el mensaje.
    if(st.showActivity){ clearTimeout(threadTimer); threadTimer=setTimeout(loadThread,350); }
    else renderMsg(p.new);
    clearTimeout(panelTimer); panelTimer=setTimeout(refreshPanel,600);
  }).subscribe();
}
boot();
</script>
