<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script>try{document.documentElement.dataset.theme=localStorage.getItem("nodo.theme")||"dark"}catch(e){}</script>
<title>Nodo · Bandeja</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon-16x16.png" />
<link rel="apple-touch-icon" sizes="180x180" href="../assets/apple-touch-icon.png" />
<link rel="stylesheet" href="shell.css" />
<style>
  :root{
    --bg:#0e1116; --surface:#151a21; --surface-2:#1b222c; --border:#232b36;
    --text:#e7ecf2; --muted:#8a97a8; --faint:#5c6675;
    --brand:#2b7fff; --brand-2:#1e6ff0; --brand-bg:#12233f;
    --green:#22c079; --green-bg:#10281d; --amber:#f0a92b; --amber-bg:#2c2311;
    --red:#e2564a; --red-bg:#2c1615; --radius:14px;
    --font:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
  button{font-family:inherit;cursor:pointer}
  input{font-family:inherit}
  .hidden{display:none!important}

  /* ── Login ── */
  #login{height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;width:100%;max-width:360px}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:24px}
  .brand img{width:44px;height:44px;border-radius:12px}
  .brand h1{font-size:20px;font-weight:600;margin:0}
  .brand span{color:var(--muted);font-size:13px}
  label{display:block;font-size:12px;color:var(--muted);margin:14px 0 6px}
  .in{width:100%;height:44px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:0 14px;font-size:14px;outline:none;transition:border .15s}
  .in:focus{border-color:var(--brand)}
  .btn{width:100%;height:44px;background:var(--brand);color:#fff;border:none;border-radius:12px;font-weight:600;font-size:14px;margin-top:20px;transition:background .15s}
  .btn:hover{background:var(--brand-2)}
  .btn:disabled{opacity:.5;cursor:default}
  .err{color:var(--red);font-size:13px;margin-top:14px;min-height:18px}

  /* ── App shell ── */
  #app{height:100%;display:flex}
  .rail{width:60px;flex:none;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:8px}
  .rail img{width:36px;height:36px;border-radius:10px;margin-bottom:10px}
  .rail .icn{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:20px}
  .rail .icn.active{background:var(--brand-bg);color:var(--brand)}
  .rail .bottom{margin-top:auto;display:flex;flex-direction:column;gap:8px;align-items:center}

  /* Panel de filtros (izquierda) */
  .filters{width:216px;flex:none;border-right:1px solid var(--border);background:var(--surface);overflow-y:auto;padding:14px 10px 24px}
  .filters .ft{font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--brand);display:flex;align-items:center;gap:8px;margin:2px 6px 12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
  .filters .ft svg{width:15px;height:15px}
  .filters h4{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);margin:16px 8px 5px;font-weight:700}
  .fchk{display:flex;align-items:center;gap:10px;font-size:13px;padding:7px 8px;cursor:pointer;color:var(--text);border-radius:8px;transition:background .12s}
  .fchk:hover{background:var(--surface-2)}
  .fchk input{accent-color:var(--brand);width:16px;height:16px;flex:none;cursor:pointer}
  .fsel{width:100%;height:36px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:0 10px;font-size:13px;outline:none;font-family:inherit;cursor:pointer;transition:border-color .12s,box-shadow .12s}
  .fsel:hover{border-color:var(--faint)}
  .fsel:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-bg)}
  .tagf{display:flex;flex-direction:column;gap:1px;max-height:210px;overflow-y:auto;margin-top:1px}
  .tagf .cmuted{font-size:12px;color:var(--faint);padding:4px 8px;display:block}
  .tagdot{width:10px;height:10px;border-radius:50%;flex:none;box-shadow:0 0 0 1px rgba(0,0,0,.12) inset}
  .fclear{margin:20px 6px 0;width:calc(100% - 12px);height:38px;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:background .12s,color .12s,border-color .12s}
  .fclear:hover{border-color:var(--brand-border);color:var(--brand);background:var(--brand-bg)}

  /* Lista de conversaciones */
  .list{width:300px;flex:none;border-right:1px solid var(--border);display:flex;flex-direction:column}
  .list .top{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .sel{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);height:36px;padding:0 10px;font-size:13px;outline:none}
  .conv{display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;position:relative}
  .conv:hover{background:var(--surface)}
  .conv.active{background:var(--surface-2)}
  /* Compra destacada — tono dorado elegante */
  .conv.bought{background:linear-gradient(90deg,rgba(240,169,43,.10),transparent 70%)}
  .conv.bought::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(#f0a92b,#d98a15)}
  .conv.bought .av{box-shadow:0 0 0 2px #f0a92b}
  .avwrap{position:relative;flex:none}
  .av{width:40px;height:40px;flex:none;border-radius:50%;background:var(--brand-bg);color:var(--brand);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px}
  .av-emoji{position:absolute;right:-3px;bottom:-3px;font-size:14px;line-height:1;background:var(--surface);border-radius:50%;padding:1px}
  .conv .dots{display:flex;gap:5px;margin-top:4px;align-items:center;flex-wrap:wrap}
  .idot{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:20px;display:inline-flex;align-items:center;gap:4px}
  .idot.bot{background:var(--green-bg);color:var(--green)}
  .idot.paused{background:var(--amber-bg);color:var(--amber)}
  .idot.human{background:var(--brand-bg);color:var(--brand)}
  .idot.bought{background:rgba(240,169,43,.16);color:#f0a92b}
  .modewrap{display:flex;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:2px;flex:1}
  .modebtn{flex:1;background:transparent;border:none;color:var(--muted);font-size:12.5px;font-weight:700;padding:7px 0;border-radius:8px}
  .modebtn.active{background:var(--brand);color:#fff}
  .modebtn.active[data-mode="bot"]{background:var(--green)}
  .conv .body{min-width:0;flex:1}
  .conv .r1{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .conv .nm{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .conv .tm{font-size:11px;color:var(--faint);flex:none}
  .conv .pv{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .badge{background:var(--green);color:#04120b;font-size:11px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px}

  /* Chat */
  .chat{flex:1;min-width:0;display:flex;flex-direction:column}
  .chat .hd{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
  .chat .hd .nm{font-weight:600}
  .chat .hd .ph{font-size:12px;color:var(--muted)}
  .pill{font-size:11px;padding:4px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:6px}
  .pill.on{background:var(--green-bg);color:var(--green)}
  .pill.off{background:var(--amber-bg);color:var(--amber)}
  .win{margin-left:auto;font-size:11px;color:var(--muted)}
  .thread{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:8px}
  .msg{max-width:70%;padding:8px 12px;border-radius:14px;font-size:13.5px;word-wrap:break-word;white-space:pre-wrap}
  .msg .meta{font-size:10px;color:var(--faint);margin-top:3px}
  .in-m{align-self:flex-start;background:var(--surface-2);border-top-left-radius:4px}
  .out-m{align-self:flex-end;background:var(--brand-bg);border-top-right-radius:4px}
  .out-m .meta{text-align:right;color:#6f92c8}
  .composer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;position:relative}
  .composer input#msgInput{flex:1;height:42px;background:var(--surface-2);border:1px solid var(--border);border-radius:22px;color:var(--text);padding:0 16px;outline:none}
  .composer input#msgInput:focus{border-color:var(--brand)}
  .send{width:42px;height:42px;flex:none;border-radius:50%;background:var(--brand);border:none;color:#fff;display:flex;align-items:center;justify-content:center}
  .send svg{width:19px;height:19px} .send:disabled{opacity:.4}
  .ctool{width:38px;height:42px;flex:none;border:none;background:transparent;color:var(--muted);font-size:19px;display:flex;align-items:center;justify-content:center;border-radius:10px}
  .ctool:hover{color:var(--brand);background:var(--surface-2)} .ctool svg{width:20px;height:20px}
  /* Popovers del compositor */
  .pop{position:absolute;bottom:60px;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:0 16px 44px rgba(0,0,0,.45);z-index:40;overflow:hidden}
  .pop.hidden{display:none}
  .qrpop{left:16px;width:330px;max-height:360px;display:flex;flex-direction:column}
  .qrpop .qs{padding:10px;border-bottom:1px solid var(--border)}
  .qrpop .qs input{width:100%;height:36px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:0 12px;outline:none;font-family:inherit;font-size:13px}
  .qrpop .qlist{overflow-y:auto;padding:6px}
  .qrfold{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--faint);font-weight:700;padding:8px 8px 4px}
  .qritem{padding:9px 10px;border-radius:9px;cursor:pointer}
  .qritem:hover{background:var(--surface-2)}
  .qritem .qt{font-weight:600;font-size:13px;display:flex;align-items:center;gap:8px}
  .qritem .qt .atajo{font-size:10.5px;font-family:monospace;background:var(--brand-bg);color:var(--brand);padding:1px 6px;border-radius:5px;font-weight:700}
  .qritem .qp{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .qempty{padding:24px;text-align:center;color:var(--faint);font-size:12.5px}
  .qempty a{color:var(--brand)}
  .emojipop{left:56px;width:290px;padding:8px;display:flex;flex-wrap:wrap;gap:2px}
  .emojipop button{width:34px;height:34px;border:none;background:transparent;font-size:20px;border-radius:8px;cursor:pointer}
  .emojipop button:hover{background:var(--surface-2)}
  .msg img,.msg video{max-width:230px;border-radius:10px;display:block}
  .msg audio{max-width:230px}
  .msg a.file{color:inherit;text-decoration:underline;display:inline-flex;gap:6px;align-items:center}
  .empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--faint);flex-direction:column;gap:8px}
  .testbtn{background:var(--brand-bg);color:var(--brand);border:1px solid var(--border);border-radius:10px;height:36px;padding:0 12px;font-size:13px;font-weight:600;white-space:nowrap}
  .testbtn:hover{border-color:var(--brand)}
  .btns{align-self:flex-start;display:flex;flex-wrap:wrap;gap:6px;margin:2px 0 4px}
  .btnchip{font-size:12px;padding:6px 14px;border:1px solid var(--brand);border-radius:20px;color:var(--brand);background:transparent}
  .btnchip:hover{background:var(--brand-bg)}
  .testtag{font-size:11px;background:var(--amber-bg);color:var(--amber);padding:2px 8px;border-radius:20px;margin-left:8px}

  /* Panel de contacto (derecha) */
  .cpanel{width:290px;flex:none;border-left:1px solid var(--border);background:var(--surface);overflow-y:auto;padding:16px 16px 28px}
  .cpanel h4{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin:20px 0 8px}
  .cpanel .chd{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;padding-bottom:14px;border-bottom:1px solid var(--border)}
  .cpanel .bigav{width:60px;height:60px;border-radius:50%;background:var(--brand-bg);color:var(--brand);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px}
  .cpanel .cnm{font-weight:600;font-size:15px}
  .cpanel .cph{font-size:12px;color:var(--muted)}
  .tagchip{display:inline-flex;align-items:center;gap:6px;background:var(--surface-2);border:1px solid var(--border);border-radius:20px;padding:3px 8px 3px 11px;font-size:12px;margin:0 5px 5px 0}
  .tagchip button{background:none;border:none;color:var(--faint);font-size:14px;line-height:1;padding:0;cursor:pointer}
  .tagchip button:hover{color:var(--red)}
  .cfield{margin-bottom:9px}
  .cfield label{font-size:11px;color:var(--muted);display:block;margin-bottom:3px}
  .cinput,.cselect{width:100%;height:34px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:0 9px;font-size:13px;outline:none;font-family:inherit}
  .cinput:focus,.cselect:focus{border-color:var(--brand)}
  .cmuted{font-size:12px;color:var(--faint)}

  /* Selector de modo del Web Chat (Cliente / Bot) */
  .testbar{display:flex;align-items:center;gap:8px;padding:8px 16px;border-top:1px solid var(--border);background:var(--surface)}
  .testbar .lb{font-size:12px;color:var(--muted)}
  .seg2{display:flex;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:2px}
  .segbtn{background:transparent;border:none;color:var(--muted);font-size:12.5px;font-weight:600;padding:6px 14px;border-radius:8px}
  .segbtn.active{background:var(--brand);color:#fff}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--red-bg);color:var(--red);border:1px solid var(--red);padding:10px 18px;border-radius:12px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}

  /* Cabecera del chat: toggle Chat/Actividad + menú de acciones */
  .chat{position:relative}
  .hdtoggle{display:flex;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:2px;margin-left:12px}
  .htb{background:transparent;border:none;color:var(--muted);font-size:12.5px;font-weight:600;padding:5px 12px;border-radius:7px}
  .htb.active{background:var(--brand);color:#fff}
  .hdmenu{width:34px;height:34px;border:none;background:transparent;color:var(--muted);font-size:20px;border-radius:9px;display:flex;align-items:center;justify-content:center}
  .hdmenu:hover{background:var(--surface-2);color:var(--text)}
  .actmenu{position:absolute;top:54px;right:12px;z-index:50;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 16px 44px rgba(0,0,0,.45);padding:6px;min-width:230px}
  .actmenu.hidden{display:none}
  .actitem{display:flex;align-items:center;gap:11px;width:100%;padding:9px 11px;border:none;background:transparent;color:var(--text);font-size:13px;border-radius:8px;text-align:left;cursor:pointer;font-family:inherit}
  .actitem:hover{background:var(--surface-2)}
  .actitem.danger{color:var(--red)} .actitem svg{width:16px;height:16px;flex:none;color:var(--muted)} .actitem.danger svg{color:var(--red)}
  .actsep{height:1px;background:var(--border);margin:5px 4px}

  /* Timeline (vista Actividad dentro del chat) */
  .tlview{flex:1;overflow-y:auto;padding:22px 24px}
  .tlitem{display:flex;gap:13px;padding-bottom:16px;position:relative}
  .tlitem::before{content:"";position:absolute;left:16px;top:34px;bottom:-2px;width:2px;background:var(--border)}
  .tlitem:last-child::before{display:none}
  .tldot{width:34px;height:34px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--surface-2);border:1px solid var(--border);z-index:1}
  .tlbody{flex:1;min-width:0;padding-top:3px}
  .tltitle{font-size:13.5px;font-weight:600}
  .tldet{font-size:12.5px;color:var(--muted);margin-top:2px;white-space:pre-wrap;word-break:break-word}
  .tltime{font-size:11px;color:var(--faint);margin-top:3px}

  /* Panel derecho: secciones ricas */
  .cpanel .kv{display:flex;justify-content:space-between;gap:10px;font-size:12.5px;padding:6px 0;border-bottom:1px solid var(--border)}
  .cpanel .kv .k{color:var(--muted);flex:none} .cpanel .kv .v{color:var(--text);text-align:right;word-break:break-word;min-width:0}
  .media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .media-grid a{aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(--surface-2);display:flex;align-items:center;justify-content:center;border:1px solid var(--border);color:var(--muted);font-size:20px;text-decoration:none}
  .media-grid img,.media-grid video{width:100%;height:100%;object-fit:cover}
  .runrow{display:flex;align-items:center;gap:9px;font-size:12.5px;padding:8px 0;border-bottom:1px solid var(--border)}
  .runrow .rdot{width:8px;height:8px;border-radius:50%;background:var(--green);flex:none} .runrow .rdot.wait{background:var(--amber)}
  .runrow .rt{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .runrow .rs{font-size:10.5px;color:var(--faint)}
  .cempty{font-size:12px;color:var(--faint);padding:6px 0}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login" class="hidden">
  <form class="card" id="loginForm">
    <div class="brand">
      <img src="../assets/logo-rounded.png" alt="Nodo" />
      <div><h1>Nodo</h1><span>Bandeja de WhatsApp</span></div>
    </div>
    <label>Correo</label>
    <input class="in" type="email" id="email" autocomplete="username" required />
    <label>Contraseña</label>
    <input class="in" type="password" id="password" autocomplete="current-password" required />
    <button class="btn" id="loginBtn" type="submit">Ingresar</button>
    <div class="err" id="loginErr"></div>
  </form>
</div>

<!-- ── APP ── -->
<div id="app" class="hidden">
  <aside class="filters" id="filters"></aside>
  <div class="list">
    <div class="top" style="gap:8px;flex-wrap:wrap">
      <div class="modewrap" id="modeToggle">
        <button class="modebtn" data-mode="humano">👤 Humano</button>
        <button class="modebtn active" data-mode="bot">🤖 Bot</button>
      </div>
    </div>
    <!-- El Web Chat de prueba se movió a la sección "Probar Flujos" -->
    <div class="top hidden" style="gap:8px;flex-wrap:wrap;padding-top:8px;padding-bottom:8px">
      <select class="sel" id="flowTestSel" style="flex:1;max-width:none"></select>
      <button class="testbtn" id="testBtn">🗑 Borrar chat</button>
    </div>
    <div id="convList" style="overflow-y:auto;flex:1"></div>
  </div>

  <div class="chat">
    <div id="chatEmpty" class="empty">
      <div style="font-size:30px">💬</div>
      <div>Elige una conversación</div>
    </div>
    <div id="chatView" class="hidden" style="flex:1;display:flex;flex-direction:column;min-height:0">
      <div class="hd">
        <div class="av" id="chAv"></div>
        <div style="min-width:0">
          <div class="nm" id="chName"></div>
          <div class="ph" id="chPhone"></div>
        </div>
        <span class="pill on" id="chBot">● Bot activo</span>
        <span class="win" id="chWin"></span>
        <div class="hdtoggle" id="viewToggle">
          <button class="htb active" data-v="chat">Chat</button>
          <button class="htb" data-v="timeline">Actividad</button>
        </div>
        <button class="hdmenu" id="actionsBtn" title="Acciones del contacto">⋮</button>
        <div class="actmenu hidden" id="actionsMenu"></div>
      </div>
      <div class="thread" id="thread"></div>
      <div class="tlview hidden" id="timeline"></div>
      <div class="testbar hidden" id="testBar">
        <span class="lb">Escribir como:</span>
        <div class="seg2">
          <button class="segbtn active" data-as="cliente">🧑 Cliente</button>
          <button class="segbtn" data-as="bot">🤖 Bot</button>
        </div>
        <span class="lb" id="testHint">— dispara el flujo automáticamente</span>
      </div>
      <div class="composer">
        <button class="ctool" id="qrBtn" title="Respuestas rápidas">

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" x2="6" y1="3" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg>

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4z"/></svg>

</div>

<div class="toast" id="toast"></div>

<script type="module">
import { supa, mountShell, toast, SUPABASE_URL, SUPABASE_ANON_KEY } from "./shell.js";

const fmtTime = new Intl.DateTimeFormat("es-PE", { timeZone: "America/Lima", hour: "2-digit", minute: "2-digit" });

const state = { channelId: null, contactId: null, rt: null, testAs: "cliente", mode: "bot", convs: [],
  filters: { sinResponder:false, compro:false, producto:"", tags:new Set() }, products:[], tags:[], quickReplies:[], inboxFlows:[] };
const $ = (id) => document.getElementById(id);

function initials(name, wa){ const s=(name||wa||"?").trim(); const p=s.split(/\s+/); return ((p[0]?.[0]||"")+(p[1]?.[0]||"")).toUpperCase()||s.slice(0,2).toUpperCase(); }
function tagHex(c){ const N={blue:"#2b7fff",green:"#22c079",amber:"#f0a92b",red:"#e2564a",purple:"#9b6cf0",teal:"#18b7be",pink:"#e264a8",gray:"#8a97a8"}; if(!c) return "#2b7fff"; return c[0]==="#"?c:(N[c]||"#2b7fff"); }

// ── Auth ──
$("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  $("loginErr").textContent = ""; $("loginBtn").disabled = true;
  const { error } = await supa.auth.signInWithPassword({ email: $("email").value, password: $("password").value });
  $("loginBtn").disabled = false;
  if (error) { $("loginErr").textContent = "Credenciales inválidas"; return; }
  boot();
});
async function boot() {
  const { data: { session } } = await supa.auth.getSession();
  if (!session) { $("login").classList.remove("hidden"); $("app").classList.add("hidden"); return; }
  $("login").classList.add("hidden"); $("app").classList.remove("hidden");
  const shell = await mountShell({ active: "inbox" });
  state.channelId = shell.channelId;
  // Al entrar a la Bandeja el sidebar se colapsa; al salir (SPA) se limpia todo.
  shell.onLeave?.(() => {
    if (state.rt) { supa.removeChannel(state.rt); state.rt = null; }
    clearInterval(winTimer);
    document.removeEventListener("click", onDocClickComposer);
    document.removeEventListener("click", onDocClickActions);
  });
  // Selector de bot propio de la Bandeja (el rail minimal no lo incluye).
  // El cambio de bot lo maneja el selector del sidebar (shell); aquí solo reaccionamos.
  shell.onChannel((id) => { state.channelId = id; state.contactId = null; $("chatView").classList.add("hidden"); $("chatEmpty").classList.remove("hidden"); $("cpanel").classList.add("hidden"); loadTestFlows(); loadFilters(); loadQuickReplies(); loadInboxFlows(); loadConversations(); });
  await loadTestFlows();
  await loadFilters();
  await loadQuickReplies();
  await loadInboxFlows();
  await loadConversations();
  subscribeRealtime();
}
async function loadInboxFlows(){
  const { data }=await supa.from("flows").select("id,nombre,estado,kind").eq("channel_id",state.channelId).eq("kind","flow").order("nombre");
  state.inboxFlows=(data||[]).filter(f=>f.estado==="activo");
}

// ── Conversaciones ──
async function loadConversations() {
  const sel = (p)=> `contact_id,no_leidos,updated_at,expira_at,requiere_humano,archivada,contact:contacts(id,nombre,wa_id,last_input,bot_activo,stage${p?",product_id,product:products(emoji),contact_tags(tag_id),bloqueado":""})`;
  let { data, error } = await supa.from("conversations").select(sel(true))
    .eq("channel_id", state.channelId).order("updated_at", { ascending: false }).limit(200);
  if (error) { ({ data } = await supa.from("conversations").select(sel(false))
    .eq("channel_id", state.channelId).order("updated_at", { ascending: false }).limit(200)); }
  state.convs = (data||[]).filter(cv=>cv.contact && !cv.archivada && !cv.contact.bloqueado && cv.contact.wa_id!=="webchat-test");
  renderConversations();
}

// ── Panel de filtros ──
async function loadFilters(){
  const [pr, tg] = await Promise.all([
    supa.from("products").select("id,nombre,emoji").eq("channel_id", state.channelId).order("nombre"),
    supa.from("tags").select("id,nombre,color").eq("channel_id", state.channelId).order("nombre"),
  ]);
  state.products = pr.error ? [] : (pr.data||[]);
  state.tags = tg.data||[];
  renderFilters();
}
function renderFilters(){
  const f = state.filters;
  const box = $("filters");
  box.innerHTML = `
    <div class="ft">${svgFilter()} FILTROS</div>
    <h4>Estado</h4>
    <label class="fchk"><input type="checkbox" id="fSin" ${f.sinResponder?"checked":""}/> Sin responder</label>
    <label class="fchk"><input type="checkbox" id="fComp" ${f.compro?"checked":""}/> Compró producto</label>
    <h4>Producto</h4>
    <select class="fsel" id="fProd"><option value="">Todos</option>${state.products.map(p=>`<option value="${p.id}" ${f.producto===p.id?"selected":""}>${p.emoji?p.emoji+" ":""}${esc(p.nombre)}</option>`).join("")}</select>
    <h4>Etiquetas</h4>
    <div class="tagf" id="fTags">${
      state.tags.length ? state.tags.map(t=>{ const c=tagHex(t.color); return `<label class="fchk"><input type="checkbox" data-tag="${t.id}" ${f.tags.has(t.id)?"checked":""}/><span class="tagdot" style="background:${c}"></span>${esc(t.nombre)}</label>`; }).join("")
        : '<span class="cmuted">Sin etiquetas en este canal</span>'
    }</div>
    <button class="fclear" id="fClear">Limpiar filtros</button>`;
  $("fSin").onchange=(e)=>{ f.sinResponder=e.target.checked; renderConversations(); };
  $("fComp").onchange=(e)=>{ f.compro=e.target.checked; renderConversations(); };
  $("fProd").onchange=(e)=>{ f.producto=e.target.value; renderConversations(); };
  box.querySelectorAll("#fTags input[data-tag]").forEach(inp=> inp.onchange=()=>{ inp.checked?f.tags.add(inp.dataset.tag):f.tags.delete(inp.dataset.tag); renderConversations(); });
  $("fClear").onclick=()=>{ state.filters={ sinResponder:false, compro:false, producto:"", tags:new Set() }; renderFilters(); renderConversations(); };
}
function svgFilter(){ return '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>'; }

// ── Respuestas rápidas + emojis (compositor) ──
async function loadQuickReplies(){
  const { data, error } = await supa.from("quick_replies").select("*").eq("channel_id", state.channelId).order("orden");
  state.quickReplies = error ? [] : (data||[]);
}
function insertAtCursor(text){
  const inp = $("msgInput");
  const s = inp.selectionStart ?? inp.value.length, e = inp.selectionEnd ?? inp.value.length;
  inp.value = inp.value.slice(0,s) + text + inp.value.slice(e);
  const pos = s + text.length; inp.focus(); try{ inp.setSelectionRange(pos,pos); }catch(_){}
}
function applyVars(text){ return (text||"").replace(/\{\{\s*nombre\s*\}\}/gi, state.contactName||""); }
function toggleQrPop(){
  const pop=$("qrPop"); const willOpen=pop.classList.contains("hidden");
  $("emojiPop").classList.add("hidden");
  if(!willOpen){ pop.classList.add("hidden"); return; }
  pop.innerHTML=`<div class="qs"><input id="qrSearch" placeholder="Buscar respuesta…" autocomplete="off"/></div><div class="qlist" id="qrList"></div>`;
  renderQrList(""); $("qrSearch").oninput=(e)=>renderQrList(e.target.value);
  pop.classList.remove("hidden"); $("qrSearch").focus();
}
function renderQrList(q){
  const box=$("qrList"); if(!box) return;
  const list = state.quickReplies.filter(r=> !q || (r.titulo+" "+(r.atajo||"")+" "+r.cuerpo).toLowerCase().includes(q.toLowerCase()));
  if(!state.quickReplies.length){ box.innerHTML=`<div class="qempty">Aún no hay respuestas rápidas.<br><a href="respuestas.html">Crear en “Respuestas rápidas” →</a></div>`; return; }
  if(!list.length){ box.innerHTML=`<div class="qempty">Sin coincidencias.</div>`; return; }
  const folders={}; list.forEach(r=>{ const f=r.folder||"__none"; (folders[f]=folders[f]||[]).push(r); });
  let body="";
  Object.keys(folders).sort((a,b)=>a==="__none"?1:(b==="__none"?-1:a.localeCompare(b))).forEach(f=>{
    body+=`<div class="qrfold">${f==="__none"?"Sin carpeta":esc(f)}</div>`;
    folders[f].forEach(r=>{ body+=`<div class="qritem" data-id="${r.id}"><div class="qt">${esc(r.titulo)}${r.atajo?`<span class="atajo">${esc(r.atajo)}</span>`:""}</div><div class="qp">${esc(r.cuerpo||"")}</div></div>`; });
  });
  box.innerHTML=body;
  box.querySelectorAll(".qritem").forEach(it=> it.onclick=()=>{
    const r=state.quickReplies.find(x=>x.id===it.dataset.id); if(!r) return;
    insertAtCursor(applyVars(r.cuerpo)); $("qrPop").classList.add("hidden");
  });
}
const EMOJI_SET=["😀","😁","😂","🤣","😊","😍","😘","😎","🤩","🥳","😉","🙂","🙌","👏","👍","👎","🙏","💪","🔥","✨","⭐","🎉","❤️","💚","💙","💛","🧡","💜","✅","❌","⚠️","💰","💵","📦","🎁","📌","📞","📲","🕒","🚀","👀","🤝","🫶","😅","😢","😡","🤔"];
function toggleEmojiPop(){
  const pop=$("emojiPop"); $("qrPop").classList.add("hidden");
  if(!pop.classList.contains("hidden")){ pop.classList.add("hidden"); return; }
  pop.innerHTML=EMOJI_SET.map(e=>`<button type="button">${e}</button>`).join("");
  pop.querySelectorAll("button").forEach(b=> b.onclick=()=>insertAtCursor(b.textContent));
  pop.classList.remove("hidden");
}
// ── Enviar flujo a este contacto ──
function toggleFlowPop(){
  const pop=$("flowPop"); const willOpen=pop.classList.contains("hidden");
  $("qrPop").classList.add("hidden"); $("emojiPop").classList.add("hidden");
  if(!willOpen){ pop.classList.add("hidden"); return; }
  if(!state.inboxFlows.length){ pop.innerHTML=`<div class="qempty">No hay flujos activos.<br><a href="editor.html">Publica un flujo →</a></div>`; }
  else { pop.innerHTML=`<div class="qrfold">Iniciar un flujo</div>`+state.inboxFlows.map(f=>`<div class="qritem" data-id="${f.id}"><div class="qt">🕸️ ${esc(f.nombre)}</div></div>`).join(""); }
  pop.classList.remove("hidden");
  pop.querySelectorAll(".qritem").forEach(it=> it.onclick=()=>{ pop.classList.add("hidden"); startFlowForContact(it.dataset.id); });
}
async function startFlowForContact(flowId){
  const f=state.inboxFlows.find(x=>x.id===flowId); if(!f||!state.contactId) return;
  if(!confirm(`¿Iniciar el flujo "${f.nombre}" para este contacto? El bot tomará la conversación.`)) return;
  try{
    const res=await callFn("flow-start",{ channel_id:state.channelId, contact_id:state.contactId, flow_id:flowId });
    const out=await res.json().catch(()=>({}));
    if(!res.ok){ toast(out.detalle||out.error||"No se pudo iniciar el flujo",true); return; }
    setBotPill(true); if(panelData.contact) panelData.contact.bot_activo=true;
    toast("Flujo iniciado ✓"); loadThread(); loadConversations();
  }catch{ toast("Error de red",true); }
}
$("qrBtn").addEventListener("click",(e)=>{ e.stopPropagation(); if(state.contactId) toggleQrPop(); });
$("emojiBtn").addEventListener("click",(e)=>{ e.stopPropagation(); if(state.contactId) toggleEmojiPop(); });
$("flowBtn").addEventListener("click",(e)=>{ e.stopPropagation(); if(state.contactId) toggleFlowPop(); });
function onDocClickComposer(e){ if(!e.target.closest(".composer")){ $("qrPop")?.classList.add("hidden"); $("emojiPop")?.classList.add("hidden"); $("flowPop")?.classList.add("hidden"); } }
document.addEventListener("click",onDocClickComposer);
function applyFilters(cv){
  const f = state.filters, c = cv.contact;
  if (f.sinResponder && !(cv.no_leidos>0)) return false;
  if (f.compro && c.stage !== "comprado") return false;
  if (f.producto && c.product_id !== f.producto) return false;
  if (f.tags.size){ const ids=(c.contact_tags||[]).map(t=>t.tag_id); if(![...f.tags].some(t=>ids.includes(t))) return false; }
  return true;
}
function renderConversations(){
  const box = $("convList"); box.innerHTML = "";
  const isBot = (cv)=> cv.contact.bot_activo !== false;
  const list = state.convs.filter(cv => (state.mode==="bot" ? isBot(cv) : !isBot(cv)) && applyFilters(cv));
  // contador en las pestañas (sobre el total del canal, sin el filtro de modo)
  const byFilter = state.convs.filter(applyFilters);
  const nBot = byFilter.filter(isBot).length, nHum = byFilter.length - nBot;
  const mt=$("modeToggle"); if(mt){ mt.querySelector('[data-mode="bot"]').textContent=`🤖 Bot (${nBot})`; mt.querySelector('[data-mode="humano"]').textContent=`👤 Humano (${nHum})`; }
  const anyFilter = state.filters.sinResponder||state.filters.compro||state.filters.producto||state.filters.tags.size;
  if(!list.length){ box.innerHTML=`<div class="empty" style="padding:40px 20px;font-size:13px">${anyFilter?"Ninguna conversación coincide con los filtros":(state.mode==="bot"?"Sin chats gestionados por el bot":"Sin chats atendidos por un humano")}</div>`; return; }
  list.forEach(cv => {
    const c = cv.contact;
    const bot = c.bot_activo !== false;
    const bought = c.stage === "comprado";
    const el = document.createElement("div");
    el.className = "conv" + (state.contactId === c.id ? " active" : "") + (bought ? " bought" : "");
    const dots = `${bot?'<span class="idot bot">● Bot activo</span>':'<span class="idot human">● Humano</span>'}`
      + (cv.requiere_humano?'<span class="idot paused">⏳ Seguimiento</span>':'')
      + (bought?'<span class="idot bought">★ Compró</span>':'');
    const pEmoji = c.product && c.product.emoji ? `<span class="av-emoji">${esc(c.product.emoji)}</span>` : "";
    el.innerHTML = `
      <div class="avwrap"><div class="av">${initials(c.nombre, c.wa_id)}</div>${pEmoji}</div>
      <div class="body">
        <div class="r1"><span class="nm">${esc(c.nombre||c.wa_id)}</span><span class="tm">${rel(cv.updated_at)}</span></div>
        <div class="r1"><span class="pv">${esc(c.last_input||"")}</span>${cv.no_leidos>0?`<span class="badge">${cv.no_leidos}</span>`:""}</div>
        <div class="dots">${dots}</div>
      </div>`;
    el.onclick = () => openChat(c);
    box.appendChild(el);
  });
}

// ── Chat ──
async function openChat(c) {
  state.contactId = c.id;
  state.contactName = c.nombre || c.wa_id;
  state.isTest = (c.wa_id === "webchat-test");
  $("chatEmpty").classList.add("hidden"); $("chatView").classList.remove("hidden");
  $("chAv").textContent = initials(c.nombre, c.wa_id);
  $("chName").innerHTML = esc(c.nombre || c.wa_id) + (state.isTest ? '<span class="testtag">modo prueba</span>' : "");
  $("chPhone").textContent = state.isTest ? "Escribes como el cliente" : "+" + c.wa_id;
  setBotPill(c.bot_activo);
  $("testBar").classList.toggle("hidden", !state.isTest);
  updateComposerMode();
  setChatView("chat");
  renderActionsMenu();
  await loadThread();
  await markRead();
  loadConversations();
  updateWindow();
  loadContactPanel(c);
}

// ── Toggle Chat / Actividad (timeline) ──
function setChatView(v){
  state.chatView = v;
  $("thread").classList.toggle("hidden", v!=="chat");
  $("timeline").classList.toggle("hidden", v!=="timeline");
  document.querySelectorAll("#viewToggle .htb").forEach(b=> b.classList.toggle("active", b.dataset.v===v));
  if(v==="timeline") renderTimeline();
}
document.querySelectorAll("#viewToggle .htb").forEach(b=> b.onclick=()=>{ if(state.contactId) setChatView(b.dataset.v); });

// ── Panel de contacto: datos, medios, flujos, secuencias, timeline ──
const STAGES = ["nuevo","interesado","p1","p2","p3","p4","comprado","perdido"];
let panelData = {};
const TZ_BY_PREFIX={ "593":"America/Guayaquil","591":"America/La_Paz","502":"America/Guatemala","503":"America/El_Salvador","506":"America/Costa_Rica","507":"America/Panama","51":"America/Lima","52":"America/Mexico_City","57":"America/Bogota","56":"America/Santiago","54":"America/Argentina/Buenos_Aires","58":"America/Caracas","34":"Europe/Madrid","1":"America/New_York" };
const COUNTRY_BY_PREFIX={ "593":"🇪🇨 Ecuador","591":"🇧🇴 Bolivia","502":"🇬🇹 Guatemala","503":"🇸🇻 El Salvador","506":"🇨🇷 Costa Rica","507":"🇵🇦 Panamá","51":"🇵🇪 Perú","52":"🇲🇽 México","57":"🇨🇴 Colombia","56":"🇨🇱 Chile","54":"🇦🇷 Argentina","58":"🇻🇪 Venezuela","34":"🇪🇸 España","1":"🇺🇸 / 🇨🇦" };
function prefixLook(wa, map, def){ const w=(wa||"").replace(/\D/g,""); for(const len of [3,2,1]){ const p=w.slice(0,len); if(map[p]) return map[p]; } return def; }
function localTime(wa){ try{ return new Intl.DateTimeFormat("es",{timeZone:prefixLook(wa,TZ_BY_PREFIX,"America/Lima"),hour:"2-digit",minute:"2-digit"}).format(new Date()); }catch(_){ return "—"; } }
function fmtDate(ts){ if(!ts) return "—"; try{ return new Intl.DateTimeFormat("es-PE",{day:"2-digit",month:"short",year:"numeric"}).format(new Date(ts)); }catch(_){ return "—"; } }
function mediaThumb(m){ const u=esc(m.content.media_url);
  if(m.type==="image") return `<a href="${u}" target="_blank"><img src="${u}" loading="lazy"/></a>`;
  if(m.type==="video") return `<a href="${u}" target="_blank"><video src="${u}"></video></a>`;
  if(m.type==="audio") return `<a href="${u}" target="_blank" title="Audio">🎵</a>`;
  return `<a href="${u}" target="_blank" title="Archivo">📎</a>`; }

async function loadContactPanel(c){
  const p = $("cpanel"); p.classList.remove("hidden");
  p.innerHTML = `<div class="cmuted" style="padding:20px 0;text-align:center">Cargando…</div>`;
  const cSel=(prod)=>`id,nombre,wa_id,stage,bot_activo,source,primera_interaccion,created_at${prod?",product_id,product:products(nombre,emoji)":""}`;
  const [ctRes, tagsRes, ctagsRes, fieldsRes, valsRes, msgRes, runsRes, subsRes, evRes] = await Promise.all([
    supa.from("contacts").select(cSel(true)).eq("id",c.id).maybeSingle().then(r=> r.error ? supa.from("contacts").select(cSel(false)).eq("id",c.id).maybeSingle() : r),
    supa.from("tags").select("id,nombre,color").eq("channel_id", state.channelId).order("nombre"),
    supa.from("contact_tags").select("tag_id").eq("contact_id", c.id),
    supa.from("custom_fields").select("id,nombre,key,tipo").eq("channel_id", state.channelId).order("nombre"),
    supa.from("contact_field_values").select("field_id,value").eq("contact_id", c.id),
    supa.from("messages").select("id,type,content,ts,direction").eq("contact_id", c.id).order("ts",{ascending:false}).limit(120),
    supa.from("flow_runs").select("id,estado,created_at,flow:flows(nombre)").eq("contact_id", c.id).order("created_at",{ascending:false}),
    supa.from("sequence_subscriptions").select("id,estado,paso_actual,suscrito_at,sequence:sequences(nombre)").eq("contact_id", c.id).order("suscrito_at",{ascending:false}),
    supa.from("contact_events").select("*").eq("contact_id", c.id).order("created_at",{ascending:false}).limit(100),
  ]);
  if (state.contactId !== c.id) return; // cambió de chat mientras cargaba
  panelData = {
    contact: ctRes.data || c,
    allTags: tagsRes.data || [],
    assigned: new Set((ctagsRes.data||[]).map(r=>r.tag_id)),
    fields: fieldsRes.data || [],
    vals: Object.fromEntries((valsRes.data||[]).map(v=>[v.field_id, v.value])),
    media: (msgRes.data||[]).filter(m=> m.content && m.content.media_url),
    runs: runsRes.error ? [] : (runsRes.data||[]),
    subs: subsRes.error ? [] : (subsRes.data||[]),
    events: evRes.error ? [] : (evRes.data||[]),
  };
  renderContactPanel();
  if(state.chatView==="timeline") renderTimeline();
}
function renderContactPanel(){

async function actionHandler(a){
  const cid=state.contactId; if(!cid) return;
  const conv=()=>supa.from("conversations");
  if(a==="tag"){ const sel=$("pAddTag"); if(sel){ sel.scrollIntoView({block:"center"}); setTimeout(()=>sel.focus(),150); } else toast("Crea etiquetas en la sección Etiquetas",true); return; }
  if(a==="rebot"){ await supa.from("contacts").update({ bot_activo:true }).eq("id",cid); setBotPill(true); if(panelData.contact) panelData.contact.bot_activo=true; logEvent(cid,"bot_reactiva","Bot reactivado"); toast("Bot reactivado ✓"); loadConversations(); return; }
  if(a==="follow"){ await conv().update({ requiere_humano:true }).eq("contact_id",cid); logEvent(cid,"nota","Marcado para seguimiento"); toast("Marcado para seguimiento ✓"); loadConversations(); return; }
  if(a==="unread"){ await conv().update({ no_leidos:1 }).eq("contact_id",cid); toast("Marcado como no leído ✓"); backToList(); loadConversations(); return; }
  if(a==="archive"){ await conv().update({ archivada:true }).eq("contact_id",cid); logEvent(cid,"nota","Conversación archivada"); toast("Archivado ✓"); backToList(); loadConversations(); return; }
  if(a==="export"){ return exportMessages(); }
  if(a==="block"){ if(!confirm("¿Bloquear este contacto? El bot dejará de responderle y saldrá de la bandeja.")) return;
    let { error }=await supa.from("contacts").update({ bloqueado:true }).eq("id",cid);
    if(error && /bloqueado|column/.test(error.message)){ toast("Aplica la migración 0021 para bloquear",true); return; }
    logEvent(cid,"nota","Contacto bloqueado"); toast("Contacto bloqueado ✓"); backToList(); loadConversations(); return; }
  if(a==="clearinfo"){ if(!confirm("¿Borrar todos los campos personalizados de este contacto?")) return;
    await supa.from("contact_field_values").delete().eq("contact_id",cid); logEvent(cid,"nota","Información del contacto borrada"); toast("Información borrada ✓");
    loadContactPanel({ id:cid, nombre:state.contactName, wa_id:panelData.contact?.wa_id }); return; }
  if(a==="delchat"){ if(!confirm("¿Eliminar esta conversación y todos sus mensajes? No se puede deshacer.")) return;
    await supa.from("messages").delete().eq("contact_id",cid); await conv().delete().eq("contact_id",cid);
    toast("Chat eliminado ✓"); backToList(); loadConversations(); return; }
}
async function exportMessages(){
  const { data }=await supa.from("messages").select("direction,type,content,ts").eq("contact_id",state.contactId).order("ts");

function renderMsg(m) {
  const t = $("thread");
  const el = document.createElement("div");
  el.className = "msg " + (m.direction === "in" ? "in-m" : "out-m");
  el.dataset.id = m.id;
  const mh = mediaHtml(m);
  const txt = m.content?.text || m.content?.caption || m.content?.title || `[${m.type}]`;
  el.innerHTML = `${mh || esc(txt)}<div class="meta">${fmtTime.format(new Date(m.ts))}${m.direction==="out"?" · "+statusLabel(m.status):""}</div>`;
  t.appendChild(el);
  // En modo prueba, los botones del bot se pueden tocar (como el cliente).
  if (m.direction === "out" && m.content?.buttons?.length && state.isTest) {
    const bd = document.createElement("div"); bd.className = "btns";
    m.content.buttons.forEach((b) => {
      const chip = document.createElement("button");
      chip.className = "btnchip"; chip.textContent = b.title;
      chip.onclick = () => sendButton(b.id, b.title);
      bd.appendChild(chip);
    });
    t.appendChild(bd);
  }
  t.scrollTop = t.scrollHeight;
}
function statusLabel(s){ return {sent:"✓",delivered:"✓✓",read:"✓✓ leído",failed:"⚠ falló",pending:"…"}[s]||s; }
function mediaHtml(m){
  const url = m.content?.media_url; if(!url) return null;
  const cap = m.content?.caption ? `<div style="margin-top:5px">${esc(m.content.caption)}</div>` : "";
  const u = esc(url);
  if(m.type==="image") return `<a href="${u}" target="_blank"><img src="${u}" alt=""/></a>${cap}`;
  if(m.type==="audio") return `<audio controls src="${u}"></audio>${cap}`;
  if(m.type==="video") return `<video controls src="${u}"></video>${cap}`;
  return `<a class="file" href="${u}" target="_blank">📎 ${esc(m.content?.filename||"archivo")}</a>${cap}`;
}

const FN = (n) => `${SUPABASE_URL}/functions/v1/${n}`;
async function callFn(name, body) {
  const { data: { session } } = await supa.auth.getSession();
  const token = session?.access_token || SUPABASE_ANON_KEY;
  return fetch(FN(name), {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${token}`,
    },
    body: JSON.stringify(body),
  });
}

async function sendMsg() {
  const input = $("msgInput"); const text = input.value.trim();
  if (!text || !state.contactId) return;
  $("sendBtn").disabled = true;
  try {
    if (state.isTest) {
      if (state.testAs === "bot") {
        // Simular respuesta del bot: mensaje saliente directo (RLS admin).
        const { error } = await supa.from("messages").insert({
          channel_id: state.channelId, contact_id: state.contactId,
          direction: "out", type: "text", content: { text }, status: "sent",
        });
        if (error) { toast(error.message, true); } else { input.value = ""; }
      } else {
        await callFn("webchat", { channel_id: state.channelId, text });
        input.value = "";
      }
    } else {
      const res = await callFn("whatsapp-send", { channel_id: state.channelId, contact_id: state.contactId, text });
      const out = await res.json();
      if (!res.ok) { toast(out.detalle?.message || out.detalle || out.error || "Error al enviar", true); }
      else { input.value = ""; setBotPill(false); }
    }
  } catch { toast("Error de red", true); }
  $("sendBtn").disabled = false;
}

function fileToDataURL(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); }); }
async function sendAttachment(file){
  if (!state.contactId) return;
  if (file.size > 16*1024*1024) { toast("Archivo muy grande (máx 16 MB)", true); return; }
  $("attachBtn").disabled = true; toast("Subiendo…");
  try {
    const dataUrl = await fileToDataURL(file);
    const up = await (await callFn("media-upload", { channel_id: state.channelId, filename: file.name, content_type: file.type, data: dataUrl })).json();
    if (!up.url) { toast(up.detalle || up.error || "No se pudo subir", true); return; }
    const media = { kind: up.kind, url: up.url, mime: file.type, filename: file.name };
    if (state.isTest) {
      if (state.testAs === "bot") {
        const { error } = await supa.from("messages").insert({
          channel_id: state.channelId, contact_id: state.contactId, direction: "out",
          type: media.kind, content: { media_url: media.url, caption: "", mime: media.mime, filename: media.filename }, status: "sent",
        });
        if (error) toast(error.message, true);
      } else {
        await callFn("webchat", { channel_id: state.channelId, media });
      }
    } else {
      const r = await callFn("whatsapp-send", { channel_id: state.channelId, contact_id: state.contactId, media });
      const o = await r.json().catch(() => ({}));
      if (!r.ok) { toast(o.detalle?.message || o.detalle || o.error || "Error al enviar", true); }
      else setBotPill(false);
    }
  } catch { toast("Error al adjuntar", true); }
  finally { $("attachBtn").disabled = false; }
}

function subscribeRealtime() {
  if (state.rt) supa.removeChannel(state.rt);
  state.rt = supa.channel("nodo-inbox")
    .on("postgres_changes", { event: "INSERT", schema: "public", table: "messages" }, (p) => {
      const m = p.new;
      if (m.contact_id === state.contactId) renderMsg(m);
      loadConversations();
    })
    .on("postgres_changes", { event: "UPDATE", schema: "public", table: "messages" }, (p) => {
      const m = p.new;
      if (m.contact_id === state.contactId) {
        const el = document.querySelector(`.msg[data-id="${m.id}"] .meta`);
        if (el && m.direction === "out") el.textContent = `${fmtTime.format(new Date(m.ts))} · ${statusLabel(m.status)}`;
      }
    })
    .on("postgres_changes", { event: "*", schema: "public", table: "conversations" }, () => loadConversations())
    .subscribe();
}

// ── util ──
function esc(s){ return (s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function rel(ts){ const d=(Date.now()-new Date(ts))/1000; if(d<60)return"ahora"; if(d<3600)return Math.floor(d/60)+"m"; if(d<86400)return Math.floor(d/3600)+"h"; return Math.floor(d/86400)+"d"; }

const winTimer = setInterval(() => { if (state.contactId) updateWindow(); }, 60000);
boot();
</script>
