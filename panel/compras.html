<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script>try{document.documentElement.dataset.theme=localStorage.getItem("nodo.theme")||"dark"}catch(e){}</script>
<title>Nodo · Compras</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png" />
<link rel="stylesheet" href="shell.css" />
<style>
  :root{
    --bg:#0e1116; --surface:#151a21; --surface-2:#1b222c; --border:#232b36;
    --text:#e7ecf2; --muted:#8a97a8; --faint:#5c6675;
    --brand:#2b7fff; --brand-2:#1e6ff0; --brand-bg:#12233f;
    --green:#22c079; --green-bg:#10281d; --amber:#f0a92b; --amber-bg:#2c2311; --red:#e2564a; --red-bg:#2c1615;
    --violet:#8b5cf6; --violet-bg:#1e1633;
    --font:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box} html,body{height:100%;margin:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px}
  button{font-family:inherit;cursor:pointer}
  /* Resumen compacto */
  .stats{display:flex;gap:22px;flex-wrap:wrap;margin:4px 0 20px}
  .stat .s-v{font-size:22px;font-weight:800;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
  .stat .s-l{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:1px}
  /* Toolbar */
  .bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
  .search{flex:1;min-width:220px;position:relative}
  .search input{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);height:40px;padding:0 12px 0 36px;font-size:13.5px;outline:none;font-family:var(--font)}
  .search input:focus{border-color:var(--brand)}
  .search svg{position:absolute;left:11px;top:11px;width:17px;height:17px;color:var(--faint)}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12.5px;font-weight:700;padding:7px 13px;border-radius:20px}
  .chip.on{background:var(--brand);border-color:var(--brand);color:#fff}
  /* Galería */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
  .pcard{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:15px 16px;display:flex;flex-direction:column;gap:11px}
  .pc-top{display:flex;align-items:flex-start;gap:10px}
  .pc-em{font-size:22px;flex:none;line-height:1}
  .pc-id{flex:1;min-width:0}
  .pc-nm{font-weight:700;font-size:14.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pc-ph{font-size:12px;color:var(--faint);margin-top:1px}
  .ttag{font-size:10px;font-weight:800;letter-spacing:.3px;padding:3px 8px;border-radius:12px;white-space:nowrap;flex:none}
  .ttag.digital{background:var(--violet-bg);color:var(--violet)}
  .ttag.lima{background:var(--brand-bg);color:var(--brand)}
  .ttag.provincia{background:var(--amber-bg);color:var(--amber)}
  .pc-row{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .pc-prod{font-size:13px;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pc-prod .vv{color:var(--muted);font-size:12px}
  .pc-amt{font-weight:800;font-size:16px;font-variant-numeric:tabular-nums;flex:none}
  .pc-amt .bump{display:block;font-size:10.5px;color:var(--faint);font-weight:600;text-align:right}
  .pc-meta{font-size:11.5px;color:var(--faint);line-height:1.55;word-break:break-word}
  .pc-meta b{color:var(--muted);font-weight:600}
  .pc-vuelto{font-size:12px;color:var(--amber);background:var(--amber-bg);border:1px solid var(--amber);border-radius:9px;padding:7px 10px;font-weight:700;display:flex;align-items:center;gap:6px}
  .pc-vuelto b{font-variant-numeric:tabular-nums}
  .shots{display:flex;gap:8px}
  .shot{flex:1;min-width:0;position:relative}
  .shot img{width:100%;height:96px;object-fit:cover;border-radius:10px;border:1px solid var(--border);background:var(--surface-2);cursor:zoom-in;display:block}
  .shot .cap{position:absolute;left:6px;bottom:6px;font-size:9.5px;font-weight:800;letter-spacing:.3px;padding:2px 6px;border-radius:8px;background:rgba(0,0,0,.62);color:#fff}
  .noshot{font-size:11.5px;color:var(--faint);background:var(--surface-2);border:1px dashed var(--border);border-radius:10px;padding:9px 11px;display:flex;align-items:center;gap:7px}
  .pc-foot{display:flex;gap:8px;align-items:center;margin-top:1px}
  .gobtn{flex:1;height:36px;border-radius:10px;border:none;background:var(--brand);color:#fff;font-size:12.5px;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:7px}
  .gobtn:hover{background:var(--brand-2)}
  .gobtn svg{width:15px;height:15px}
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.82);display:none;align-items:center;justify-content:center;z-index:100;padding:24px}
  .lightbox.show{display:flex} .lightbox img{max-width:92vw;max-height:92vh;border-radius:12px}
</style>
</head>
<body>
<div class="nodo-page">
  <div class="nodo-wrap">
    <div class="nodo-head">
      <div class="grow">
        <h1 class="nodo-title">Compras</h1>
        <p class="nodo-lead">Tus ventas cerradas al 100% — el cliente ya pagó todo. Cada tarjeta trae el comprobante y un botón para volver a su chat. Lo que todavía está en camino vive en <a href="pedidos.html" style="color:var(--brand)">Pedidos</a>.</p>
      </div>
      <div class="nodo-actions"><button class="nodo-btn" id="reloadBtn">↻ Actualizar</button></div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="bar">
      <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="q" placeholder="Buscar por cliente o teléfono…" /></div>
      <div class="chips" id="tipoChips"></div>
      <div class="chips" id="rangeChips"></div>
    </div>

    <div class="grid" id="grid"></div>
  </div>
</div>
<div class="lightbox" id="lightbox"><img id="lightImg" src=""/></div>

<script type="module">
import { supa, mountShell, toast, icon } from "./shell.js";
import * as O from "./orders.js";
const $=(id)=>document.getElementById(id);
const st={ channelId:null, list:[], imgs:{}, q:"", tipo:"all", range:"all" };
function esc(s){return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function money(v,cur){ try{ return new Intl.NumberFormat("es-PE",{style:"currency",currency:cur||"PEN"}).format(Number(v||0)); }catch{ return (cur||"PEN")+" "+Number(v||0).toFixed(2); } }
function fecha(iso){ if(!iso) return "—"; const d=new Date(iso); return d.toLocaleDateString("es-PE",{day:"2-digit",month:"short"})+" · "+d.toLocaleTimeString("es-PE",{hour:"2-digit",minute:"2-digit"}); }
const cap=(s)=>{ s=String(s||""); return s.charAt(0).toUpperCase()+s.slice(1); };

// Una compra "cerrada al 100%" = el estado cobró TODO (misma fuente que el
// Dashboard: orders.js). Digital confirmada, Lima entregado_cobrado, Provincia
// saldo_pagado/recogido. Ni más ni menos.
const esCerrada=(o)=> O.EST[o.estado] && O.EST[o.estado].cobro==="todo";
const cuando=(o)=> o.confirmed_at || o.updated_at || o.created_at;

// De qué operación es (mismo criterio que Pedidos): digital si no es físico;
// físico → zona real (shipping.zona) con respaldo por estado.
function tipoDe(o){
  if(!O.esFisico(o)) return "digital";
  const z=String((o.shipping||{}).zona||"").toLowerCase();
  if(z==="lima"||z==="provincia") return z;
  const cod=["confirmado","en_reparto","entregado_cobrado","reprogramado","rechazado"];
  return cod.includes(String(o.estado||"").toLowerCase()) ? "lima" : "provincia";
}

async function boot(){
  const { data:{session} }=await supa.auth.getSession(); if(!session){ location.href="index.html"; return; }
  const shell=await mountShell({ active:"compras" });
  st.channelId=shell.channelId;
  shell.onChannel(id=>{ st.channelId=id; load(); });
  $("q").oninput=(e)=>{ st.q=e.target.value.trim().toLowerCase(); render(); };
  $("reloadBtn").onclick=load;
  $("lightbox").onclick=()=>$("lightbox").classList.remove("show");
  renderChips();
  await load();
}

async function load(){
  if(!st.channelId){ st.list=[]; render(); return; }
  const sel="id,amount,currency,order_bumps,estado,created_at,updated_at,confirmed_at,shipping,contact_id,product_id,version_id,contact:contact_id(nombre,wa_id),product:product_id(nombre,emoji,tipo),version:version_id(nombre)";
  let { data, error }=await supa.from("orders").select(sel)
    .eq("channel_id",st.channelId).order("created_at",{ascending:false}).limit(1000);
  if(error){ ({ data }=await supa.from("orders").select("id,amount,currency,order_bumps,estado,created_at,shipping,contact_id,product_id,contact:contact_id(nombre,wa_id),product:product_id(nombre,emoji)")
    .eq("channel_id",st.channelId).order("created_at",{ascending:false}).limit(1000)); }
  st.list=(data||[]).filter(esCerrada);

  // Último comprobante entrante por contacto — respaldo cuando el pedido no lo
  // guardó en shipping (típico en digital, donde el pago valida y sigue).
  const ids=[...new Set(st.list.map(o=>o.contact_id).filter(Boolean))];
  st.imgs={};
  if(ids.length){
    const { data:msgs }=await supa.from("messages").select("contact_id,content,ts")
      .eq("channel_id",st.channelId).in("contact_id",ids).eq("direction","in").eq("type","image")
      .order("ts",{ascending:false}).limit(600);
    (msgs||[]).forEach(m=>{ const u=m.content&&m.content.media_url; if(u&&!st.imgs[m.contact_id]) st.imgs[m.contact_id]=u; });
  }
  render();
}

const TIPOS=[["all","Todas"],["digital","💻 Digital"],["lima","📦 Lima"],["provincia","📦 Provincia"]];
const RANGOS=[["all","Todo"],["hoy","Hoy"],["semana","7 días"],["mes","30 días"]];
function renderChips(){
  $("tipoChips").innerHTML=TIPOS.map(([v,l])=>`<button class="chip ${st.tipo===v?'on':''}" data-t="${v}">${l}</button>`).join("");
  $("tipoChips").querySelectorAll("[data-t]").forEach(b=>b.onclick=()=>{ st.tipo=b.dataset.t; renderChips(); render(); });
  $("rangeChips").innerHTML=RANGOS.map(([v,l])=>`<button class="chip ${st.range===v?'on':''}" data-r="${v}">${l}</button>`).join("");
  $("rangeChips").querySelectorAll("[data-r]").forEach(b=>b.onclick=()=>{ st.range=b.dataset.r; renderChips(); render(); });
}

function enRango(o){
  if(st.range==="all") return true;
  const t=new Date(cuando(o)).getTime(); if(!t) return true;
  const dias=st.range==="hoy"?1:st.range==="semana"?7:30;
  return (Date.now()-t) <= dias*86400000;
}

function filtered(){
  return st.list.filter(o=>{
    if(st.tipo!=="all" && tipoDe(o)!==st.tipo) return false;
    if(!enRango(o)) return false;
    if(st.q){ const c=o.contact||{}; if(!(c.nombre||"").toLowerCase().includes(st.q) && !(c.wa_id||"").includes(st.q)) return false; }
    return true;
  });
}

function render(){
  renderStats();
  const list=filtered();
  const box=$("grid");
  if(!st.list.length){
    box.innerHTML=`<div class="nodo-empty" style="grid-column:1/-1;border:none"><div class="e-ic">${icon("pedidos")}</div>
      <h3>Aún no hay compras cerradas</h3><p>Cuando una venta se complete al 100% —un digital pagado, un pedido de Lima entregado y cobrado, o un saldo de provincia pagado— aparece acá con su comprobante.</p></div>`;
    return;
  }
  if(!list.length){ box.innerHTML=`<div class="nodo-empty" style="grid-column:1/-1;border:none"><p>Ninguna compra coincide con el filtro.</p></div>`; return; }
  box.innerHTML="";
  list.forEach(o=>box.appendChild(card(o)));
}

function renderStats(){
  const list=filtered();
  const cur=(list[0]&&list[0].currency)||(st.list[0]&&st.list[0].currency)||"PEN";
  const cobrado=list.reduce((a,o)=>a+O.cobrado(o),0);
  const porTipo=(t)=>list.filter(o=>tipoDe(o)===t).length;
  const S=[
    [String(list.length),"compras cerradas"],
    [money(cobrado,cur),"cobrado en total"],
    [String(porTipo("digital")),"digitales"],
    [String(porTipo("lima")+porTipo("provincia")),"físicas"],
  ];
  $("stats").innerHTML=S.map(([v,l])=>`<div class="stat"><div class="s-v">${v}</div><div class="s-l">${l}</div></div>`).join("");
}

// Comprobantes por tipo: provincia = adelanto + saldo (2); digital = 1 (el que
// guardó el pedido, o el último que mandó el cliente); Lima = ninguno (es
// contraentrega, no hay transferencia que mostrar).
function shots(o,tipo){
  const s=o.shipping||{};
  if(tipo==="lima") return [];
  if(tipo==="provincia"){
    const out=[];
    if(s.adelanto_comprobante) out.push([s.adelanto_comprobante,"ADELANTO"]);
    if(s.saldo_comprobante)    out.push([s.saldo_comprobante,"SALDO"]);
    if(!out.length && st.imgs[o.contact_id]) out.push([st.imgs[o.contact_id],"PAGO"]);
    return out;
  }
  const img = s.digital_comprobante || st.imgs[o.contact_id];
  return img ? [[img,"PAGO"]] : [];
}

function card(o){
  const c=o.contact||{}, p=o.product||{}, v=o.version||{}, s=o.shipping||{};
  const tipo=tipoDe(o);
  const el=document.createElement("div"); el.className="pcard";
  const bumps=(o.order_bumps||[]).length;

  // Detalle chico según el tipo.
  const meta=[];
  if(tipo==="provincia"){
    if(s.cliente||s.dni) meta.push(`<b>${esc(s.cliente||c.nombre||"")}</b>${s.dni?" · DNI "+esc(s.dni):""}`);
    if(s.sede||s.ciudad) meta.push(`Agencia: ${esc([s.ciudad&&("Shalom "+cap(s.ciudad)),s.sede].filter(Boolean).join(" · ")||"—")}`);
  } else if(tipo==="lima"){
    if(s.direccion||s.distrito) meta.push(esc([s.distrito,s.direccion].filter(Boolean).join(" · ")));
    if(s.referencia) meta.push("Ref: "+esc(s.referencia));
  }
  const sh=shots(o,tipo);
  const shotsHtml = sh.length
    ? `<div class="shots">${sh.map(([u,cap_])=>`<div class="shot"><img src="${esc(u)}" data-full="${esc(u)}"/><span class="cap">${cap_}</span></div>`).join("")}</div>`
    : tipo==="lima"
      ? `<div class="noshot">${icon("truck")} Contraentrega — cobrado al recibir</div>`
      : `<div class="noshot">${icon("image")} Sin comprobante guardado</div>`;

  el.innerHTML=`
    <div class="pc-top">
      <span class="pc-em">${p.emoji?esc(p.emoji):icon("box")}</span>
      <div class="pc-id"><div class="pc-nm">${esc(c.nombre||s.cliente||"Sin nombre")}</div>
        <div class="pc-ph">${c.wa_id?"+"+esc(c.wa_id):"—"} · ${fecha(cuando(o))}</div></div>
      <span class="ttag ${tipo}">${tipo==="digital"?"DIGITAL":tipo==="lima"?"LIMA":"PROVINCIA"}</span>
    </div>
    <div class="pc-row">
      <div class="pc-prod">${esc(p.nombre||"—")}${v.nombre?` <span class="vv">· ${esc(v.nombre)}</span>`:""}</div>
      <div class="pc-amt">${money(O.total(o),o.currency)}${bumps?`<span class="bump">+${bumps} extra${bumps>1?"s":""}</span>`:""}</div>
    </div>
    ${meta.length?`<div class="pc-meta">${meta.join("<br>")}</div>`:""}
    ${Number(s.vuelto)>0?`<div class="pc-vuelto">💸 Pagó de más · vuelto <b>${money(s.vuelto,o.currency)}</b> a favor del cliente</div>`:""}
    ${shotsHtml}
    <div class="pc-foot">
      <a class="gobtn" href="index.html?c=${encodeURIComponent(o.contact_id||"")}">${icon("inbox")} Abrir chat</a>
    </div>`;
  el.querySelectorAll(".shot img[data-full]").forEach(t=>t.onclick=()=>{ $("lightImg").src=t.dataset.full; $("lightbox").classList.add("show"); });
  return el;
}

boot();
</script>
</body>
</html>
