<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script>try{document.documentElement.dataset.theme=localStorage.getItem("nodo.theme")||"dark"}catch(e){}</script>
<title>Nodo · Compras / Pedidos</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png" />
<link rel="stylesheet" href="shell.css" />
<style>
  :root{
    --bg:#0e1116; --surface:#151a21; --surface-2:#1b222c; --border:#232b36;
    --text:#e7ecf2; --muted:#8a97a8; --faint:#5c6675;
    --brand:#2b7fff; --brand-2:#1e6ff0; --brand-bg:#12233f;
    --green:#22c079; --green-bg:#10281d; --amber:#f0a92b; --amber-bg:#2c2311; --red:#e2564a; --red-bg:#2c1615;
    --font:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box} html,body{height:100%;margin:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px}
  button{font-family:inherit;cursor:pointer}
  /* KPIs */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(178px,1fr));gap:14px;margin:6px 0 22px}
  @media(max-width:820px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px}
  .kpi .k-l{font-size:12px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:6px}
  .kpi .k-v{font-size:26px;font-weight:800;letter-spacing:-.6px;margin-top:6px}
  .kpi .k-s{font-size:11.5px;color:var(--faint);margin-top:2px}
  /* Toolbar */
  .bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  .search{flex:1;min-width:220px;position:relative}
  .search input{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);height:40px;padding:0 12px 0 36px;font-size:13.5px;outline:none;font-family:var(--font)}
  .search input:focus{border-color:var(--brand)}
  .search svg{position:absolute;left:11px;top:11px;width:17px;height:17px;color:var(--faint)}
  /* Tabla */
  .tbl{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
  .trow{display:grid;grid-template-columns:1.6fr 1.5fr .9fr 1fr auto;gap:14px;align-items:center;padding:13px 18px;border-top:1px solid var(--border)}
  .trow.head{color:var(--muted);font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;border-top:none;background:var(--surface-2)}
  .trow:not(.head):hover{background:var(--surface-2)}
  .cust{min-width:0}
  .cust .nm{font-weight:650;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cust .ph{font-size:12px;color:var(--faint);margin-top:1px}
  .prod{display:flex;align-items:center;gap:8px;min-width:0}
  .prod .em{font-size:18px;flex:none}
  .prod .pn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .prod .vv{font-size:11.5px;color:var(--muted);margin-top:1px}
  .amt{font-weight:750;font-size:14.5px;text-align:right;font-variant-numeric:tabular-nums}
  .amt .bump{display:block;font-size:11px;color:var(--faint);font-weight:600}
  .when{font-size:12.5px;color:var(--muted)}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;display:inline-block}
  .badge.confirmada{background:var(--green-bg);color:var(--green)}
  .badge.pendiente{background:var(--amber-bg);color:var(--amber)}
  .badge.anulada{background:var(--red-bg);color:var(--red)}
  @media(max-width:820px){
    .trow{grid-template-columns:1fr auto;gap:6px}
    .trow.head,.trow .prod,.trow .when{display:none}
    .trow .amt{text-align:left}
  }
</style>
</head>
<body>
<div class="nodo-page">
  <div class="nodo-wrap">
    <div class="nodo-head">
      <div class="grow">
        <h1 class="nodo-title">Compras / Pedidos</h1>
        <p class="nodo-lead">Todas las compras y adelantos registrados en este bot — confirmadas por el motor de flujos (OCR de comprobante) o cargadas por un operador desde la Bandeja.</p>
      </div>
    </div>

    <div class="kpis" id="kpis"></div>

    <div class="bar">
      <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="q" placeholder="Buscar por cliente o teléfono…" /></div>
      <div class="nodo-folders" id="estados" style="margin:0"></div>
    </div>

    <div class="tbl" id="tbl"></div>
  </div>
</div>

<script type="module">
import { supa, mountShell } from "./shell.js";
const $=(id)=>document.getElementById(id);
const st={ channelId:null, list:[], estado:"all", q:"" };
function esc(s){return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
const ESTADOS=[["all","Todas"],["confirmada","Confirmadas"],["pendiente","Adelantos / Pendientes"],["anulada","Anuladas"]];

function money(v,cur){ try{ return new Intl.NumberFormat("es-PE",{style:"currency",currency:cur||"PEN"}).format(Number(v||0)); }catch{ return (cur||"PEN")+" "+Number(v||0).toFixed(2); } }
function total(o){ let v=Number(o.amount||0); (o.order_bumps||[]).forEach(b=>v+=Number(b.precio||0)); return v; }
function fecha(iso){ if(!iso) return "—"; const d=new Date(iso); return d.toLocaleDateString("es-PE",{day:"2-digit",month:"short"})+" · "+d.toLocaleTimeString("es-PE",{hour:"2-digit",minute:"2-digit"}); }

async function boot(){
  const { data:{session} }=await supa.auth.getSession(); if(!session){ location.href="index.html"; return; }
  const shell=await mountShell({ active:"pedidos" });
  st.channelId=shell.channelId;
  shell.onChannel(id=>{ st.channelId=id; load(); });
  $("q").oninput=(e)=>{ st.q=e.target.value.trim().toLowerCase(); render(); };
  renderEstados();
  await load();
}

async function load(){
  if(!st.channelId){ st.list=[]; render(); return; }
  const sel="id,amount,currency,order_bumps,estado,order_id,created_at,contact_id,product_id,version_id,contact:contact_id(nombre,wa_id),product:product_id(nombre,emoji),version:version_id(nombre)";
  let { data, error }=await supa.from("orders").select(sel).eq("channel_id",st.channelId).order("created_at",{ascending:false}).limit(1000);
  if(error){ // resiliente: sin joins (o tabla 0017 sin aplicar)
    const r=await supa.from("orders").select("id,amount,currency,order_bumps,estado,order_id,created_at,contact_id,product_id").eq("channel_id",st.channelId).order("created_at",{ascending:false}).limit(1000);
    if(r.error){ st.list=[]; renderKpis(); $("tbl").innerHTML=`<div class="nodo-empty" style="border:none"><h3>No se pudo cargar</h3><p>Aplica la migración <b>0017_orders.sql</b> en el SQL Editor para habilitar Compras / Pedidos.</p></div>`; return; }
    data=r.data;
  }
  st.list=data||[]; render();
}

function renderEstados(){
  $("estados").innerHTML=ESTADOS.map(([v,l])=>`<button class="nodo-folder ${st.estado===v?'on':''}" data-e="${v}">${l}</button>`).join("");
  $("estados").querySelectorAll("[data-e]").forEach(b=>b.onclick=()=>{ st.estado=b.dataset.e; renderEstados(); render(); });
}

function renderKpis(){
  const conf=st.list.filter(o=>o.estado==="confirmada");
  const ing=conf.reduce((a,o)=>a+total(o),0);
  const pend=st.list.filter(o=>o.estado==="pendiente").length;
  const ticket=conf.length?ing/conf.length:0;
  const cur=(st.list[0]&&st.list[0].currency)||"PEN";
  let extraUnits=0, extraIng=0;
  conf.forEach(o=>(o.order_bumps||[]).forEach(b=>{ extraUnits++; extraIng+=Number(b.precio||0); }));
  const K=[
    ["Compras confirmadas",String(conf.length),"pedidos cerrados"],
    ["Ingresos confirmados",money(ing,cur),"base + compras extra"],
    ["Compras extra",String(extraUnits),`${money(extraIng,cur)} en ingresos`],
    ["Adelantos / pendientes",String(pend),"por confirmar"],
    ["Ticket promedio",money(ticket,cur),"por compra confirmada"],
  ];
  $("kpis").innerHTML=K.map(([l,v,s])=>`<div class="kpi"><div class="k-l">${l}</div><div class="k-v">${v}</div><div class="k-s">${s}</div></div>`).join("");
}

function render(){
  renderKpis();
  let list=st.list;
  if(st.estado!=="all") list=list.filter(o=>o.estado===st.estado);
  if(st.q) list=list.filter(o=>{ const c=o.contact||{}; return (c.nombre||"").toLowerCase().includes(st.q)||(c.wa_id||"").includes(st.q); });
  const box=$("tbl");
  if(!st.list.length){
    box.innerHTML=`<div class="nodo-empty" style="border:none"><div class="e-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg></div><h3>Aún no hay compras registradas</h3><p>Cuando el bot confirme un comprobante o un operador registre una venta desde la Bandeja, aparecerá aquí.</p></div>`;
    return;
  }
  if(!list.length){ box.innerHTML=`<div class="nodo-empty" style="border:none"><p>Sin compras que coincidan con el filtro.</p></div>`; return; }
  const head=`<div class="trow head"><div>Cliente</div><div>Producto</div><div>Estado</div><div>Fecha</div><div style="text-align:right">Monto</div></div>`;
  box.innerHTML=head+list.map(o=>{
    const c=o.contact||{}, p=o.product||{}, v=o.version||{};
    const bumps=(o.order_bumps||[]).length;
    return `<div class="trow">
      <div class="cust"><div class="nm">${esc(c.nombre||"Sin nombre")}</div><div class="ph">${c.wa_id?"+"+esc(c.wa_id):"—"}</div></div>
      <div class="prod"><span class="em">${esc(p.emoji||"📦")}</span><div style="min-width:0"><div class="pn">${esc(p.nombre||"—")}</div>${v.nombre?`<div class="vv">${esc(v.nombre)}</div>`:""}</div></div>
      <div><span class="badge ${esc(o.estado||"confirmada")}">${esc(o.estado||"confirmada")}</span></div>
      <div class="when">${fecha(o.created_at)}</div>
      <div class="amt">${money(total(o),o.currency)}${bumps?`<span class="bump">+${bumps} compra${bumps>1?"s":""} extra</span>`:""}</div>
    </div>`;
  }).join("");
}
boot();
</script>
</body>
</html>
