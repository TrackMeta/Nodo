<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script>try{document.documentElement.dataset.theme=localStorage.getItem("nodo.theme")||"dark"}catch(e){}</script>
<title>Nodo · Editor de flujos</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/drawflow@0.0.59/dist/drawflow.min.css" />
<link rel="stylesheet" href="shell.css" />
<link rel="stylesheet" href="flow-canvas.css" />
<style>
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px}
  button{font-family:inherit;cursor:pointer}
  .app{height:100%;display:flex;flex-direction:column}
  .top{height:52px;flex:none;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px;background:var(--surface)}
  .top a{color:var(--muted);text-decoration:none;font-size:20px}
  .sel{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);height:36px;padding:0 10px;font-size:13px;outline:none}
  .fname{font-weight:600}
  .badge{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--surface-2);border:1px solid var(--border);color:var(--muted)}
  .badge.on{background:var(--green-bg);color:var(--green);border-color:transparent}
  .spacer{margin-left:auto}
  .btn{height:36px;padding:0 14px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:13px;font-weight:600}
  .btn.primary{background:var(--brand);border:none;color:#fff}
  .btn.primary:hover{background:var(--brand-2)}
  .main{flex:1;display:flex;min-height:0}
  .canvaswrap{flex:1;position:relative;min-width:0}
  /* Vista general de flujos (tarjetas) */
  #overview{flex:1;min-width:0;overflow-y:auto}
  .fcard .c-tt{font-size:16px;font-weight:700;letter-spacing:-.2px;line-height:1.25}
  .back{display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 12px 0 9px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:600}
  .back:hover{color:var(--text);border-color:var(--brand)} .back svg{width:16px;height:16px}
  #drawflow{position:absolute;inset:0}
  .cfg{width:308px;flex:none;border-left:1px solid var(--border);background:var(--surface);overflow-y:auto;padding:16px;transition:width .2s ease}
  .cfg.collapsed{width:0;padding:0;border-left:none;overflow:hidden}
  .cfg h3{font-size:15px;margin:0 0 14px;display:flex;align-items:center;gap:9px;--nd-color:var(--brand)}
  .cfg .h3-x{margin-left:auto;width:26px;height:26px;border:none;background:transparent;color:var(--faint);border-radius:8px;display:flex;align-items:center;justify-content:center}
  .cfg .h3-x:hover{background:var(--surface-2);color:var(--text)}
  .cfg .h3-x svg{width:15px;height:15px}
  .cfg-ic{width:28px;height:28px;border-radius:8px;flex:none;background:var(--nd-color,var(--brand));color:#fff;
    display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px color-mix(in srgb,var(--nd-color,var(--brand)) 45%, transparent)}
  .cfg-ic svg{width:15px;height:15px}
  .cfg-ic.sm{width:20px;height:20px;border-radius:6px}
  .cfg-ic.sm svg{width:11px;height:11px}
  .cfg label{display:block;font-size:11.5px;font-weight:600;color:var(--muted);margin:14px 0 6px}
  /* Tarjeta de sección dentro del panel de config */
  .fcard{background:var(--surface-2);border:1px solid var(--border);border-radius:11px;padding:11px 12px;margin-bottom:10px}
  .fcard>label:first-child{margin-top:0}
  .fhint{font-size:11px;color:var(--faint);margin:5px 0 0;line-height:1.45}
  .frow{display:flex;gap:6px;align-items:center}
  .frow .in{min-width:0}
  .fbtn{width:100%;background:var(--surface-2);border:1px dashed var(--border-strong,var(--border));color:var(--muted);border-radius:9px;height:36px;font-weight:600;font-size:12.5px;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px}
  .fbtn:hover{color:var(--brand);border-color:var(--brand)}
  .fbtn svg{width:15px;height:15px}
  .xbtn{flex:none;width:32px;height:32px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--faint);display:flex;align-items:center;justify-content:center}
  .xbtn:hover{color:var(--red);border-color:var(--red)}
  .xbtn svg{width:14px;height:14px}
  /* Selector desplegable de acciones (nodo Acción) */
  .apick{position:relative}
  .apick-menu{position:absolute;left:0;right:0;top:calc(100% + 4px);z-index:20;background:var(--surface);border:1px solid var(--border-strong,var(--border));border-radius:12px;box-shadow:var(--shadow-3,0 16px 48px rgba(0,0,0,.45));padding:6px;max-height:320px;overflow-y:auto}
  .apick-grp{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--faint);padding:8px 8px 4px}
  .apick-item{display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:transparent;border:none;color:var(--text);border-radius:8px;padding:7px 8px;font-size:12.5px;font-weight:500}
  .apick-item:hover{background:var(--surface-2)}
  .apick-item .ai-ic{width:24px;height:24px;border-radius:6px;flex:none;display:flex;align-items:center;justify-content:center;background:color-mix(in srgb,var(--ac,var(--brand)) 18%,transparent);color:var(--ac,var(--brand))}
  .apick-item .ai-ic svg{width:13px;height:13px}
  /* Item de acción ya añadida */
  .acc-item{border:1px solid var(--border);border-radius:11px;margin-bottom:8px;overflow:hidden;background:var(--surface-2)}
  .acc-head{display:flex;align-items:center;gap:8px;padding:9px 10px;background:color-mix(in srgb,var(--ac,var(--brand)) 12%,transparent);border-bottom:1px solid var(--border)}
  .acc-head .ah-ic{width:22px;height:22px;border-radius:6px;flex:none;display:flex;align-items:center;justify-content:center;background:var(--ac,var(--brand));color:#fff}
  .acc-head .ah-ic svg{width:12px;height:12px}
  .acc-head .ah-tt{font-size:12.5px;font-weight:650;flex:1;min-width:0}
  .acc-head .ah-mv{background:transparent;border:none;color:var(--faint);width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:6px}
  .acc-head .ah-mv:hover{color:var(--text);background:var(--surface)}
  .acc-head .ah-mv svg{width:14px;height:14px}
  .acc-body{padding:10px}
  .acc-body:empty{display:none}
  .acc-body label:first-child{margin-top:0}
  .seg2{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:2px}
  .seg2 button{flex:1;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;padding:7px 6px;border-radius:7px}
  .seg2 button.on{background:var(--brand);color:#fff}
  /* Colapsable avanzado */
  .adv{margin-top:14px;border-top:1px solid var(--border);padding-top:6px}
  .adv>summary{list-style:none;cursor:pointer;font-size:11.5px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:6px;padding:8px 2px}
  .adv>summary::-webkit-details-marker{display:none}
  .adv>summary .chev{width:14px;height:14px;transition:transform .15s}
  .adv[open]>summary .chev{transform:rotate(90deg)}
  .adv>summary:hover{color:var(--text)}
  .in,.ta{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 10px;font-size:13px;outline:none;font-family:var(--font)}
  .ta{min-height:120px;font-family:var(--font-mono,monospace);font-size:12px;resize:vertical}
  .in:focus,.ta:focus{border-color:var(--brand)}
  .handle-row{display:flex;gap:6px;margin-bottom:6px}
  .handle-row .in{flex:1}
  .hbtn{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--muted);width:32px;flex:none}
  .row{display:flex;gap:8px;align-items:center}
  .chk{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:13px}
  .del{margin-top:16px;width:100%;background:var(--red-bg);color:var(--red);border:1px solid var(--red);border-radius:8px;height:38px;font-weight:600}
  .empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--faint);flex-direction:column;gap:8px}
  .seg{display:flex;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:2px}
  .segb{background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px}
  .segb.active{background:var(--brand);color:#fff}
  .contentview{position:absolute;inset:0;background:var(--bg);overflow-y:auto;padding:20px;z-index:6}
  .cnode{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin:0 auto 12px;max-width:620px}
  .cnode .ch{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .cnode .ci{font-size:14px;font-weight:600}
  .cnode .ctag{margin-left:auto;font-size:10px;color:var(--muted);background:var(--surface-2);padding:2px 9px;border-radius:20px}
  .bubble{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:8px;margin-bottom:8px}
  .btnrow{display:flex;gap:6px;align-items:center;margin-top:6px}
  .btnrow .in{flex:1}
  .chint{font-size:11px;color:var(--faint);margin-top:6px}
  .cempty{text-align:center;color:var(--faint);padding:50px;max-width:520px;margin:0 auto}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#10281d;color:var(--green);border:1px solid var(--green);padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;transition:.2s;pointer-events:none;z-index:20}
  .toast.show{opacity:1}
  .toast.err{background:#2c1615;color:var(--red);border-color:var(--red)}
  /* Modal de disparadores del flujo */
  .tg-overlay{position:fixed;inset:0;z-index:70;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:18px}
  .tg-modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;max-width:560px;max-height:88vh;overflow:auto}
  .tg-modal h3{margin:0 0 4px;font-size:16.5px}
  .tg-sub{font-size:12.5px;color:var(--muted);margin-bottom:14px}
  .tg-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:11px;margin-bottom:8px;background:var(--surface-2)}
  .tg-row .tt{flex:1;min-width:0;font-size:13px}
  .tg-row .tt .k{font-weight:700}
  .tg-row .tt .d{font-size:11.5px;color:var(--faint);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tg-row button{border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:8px;height:30px;padding:0 10px;font-size:12px;font-weight:600}
  .tg-row button.on{color:var(--green);border-color:var(--green)}
  .tg-row button.del{color:var(--red)}
  .tg-new{border-top:1px solid var(--border);margin-top:14px;padding-top:14px}
  .tg-new label{display:block;font-size:11.5px;color:var(--muted);margin:10px 0 5px;font-weight:700}
  .tg-new input,.tg-new select{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);height:38px;padding:0 11px;font-size:13px;outline:none;font-family:inherit}
  .tg-new .chkline{display:flex;align-items:center;gap:8px;font-size:12.5px;margin-top:10px;color:var(--muted)}
  .tg-chips{display:flex;flex-wrap:wrap;gap:6px}
  .tg-chips button{border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:20px;padding:5px 11px;font-size:12px;font-weight:600}
  .tg-chips button.on{background:var(--brand);border-color:var(--brand);color:#fff}
</style>
</head>
<body>
<div class="app">
  <!-- VISTA GENERAL: tarjetas de flujos -->
  <div id="overview">
    <div class="nodo-wrap">
      <div class="nodo-head">
        <div class="grow">
          <h1 class="nodo-title">Flujos</h1>
          <p class="nodo-lead">Conversaciones automáticas con nodos visuales. Los <b>esqueletos</b> son plantillas reutilizables; los <b>flujos de producto</b> son copias ligadas a un producto.</p>
        </div>
        <div class="nodo-actions">
          <button class="nodo-btn primary" id="addFlow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg> Nuevo flujo</button>
        </div>
      </div>
      <div class="nodo-folders" id="folders"></div>
      <div class="nodo-cards" id="flowCards"></div>
    </div>
  </div>
  <!-- EDITOR (canvas) -->
  <div class="top" id="editorTop" style="display:none">
    <button class="back" id="backBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Flujos</button>
    <span class="fname" id="fname">—</span>
    <span class="badge" id="fstate">—</span>
    <span class="badge" id="fprod" style="display:none"></span>
    <div class="seg" id="viewToggle">
      <button class="segb active" data-v="estructura"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.15em"><line x1="6" x2="6" y1="3" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg> Estructura</button>
      <button class="segb" data-v="contenido"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.15em"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg> Contenido</button>
    </div>
    <div class="spacer"></div>
    <button class="btn" id="trigBtn" title="Cuándo arranca este flujo"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.15em"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg> Disparadores</button>
    <button class="btn" id="delFlowBtn" style="color:var(--red);border-color:transparent" title="Eliminar flujo"><svg width="1.15em" height="1.15em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.2em"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>
    <button class="btn" id="saveBtn">Guardar</button>
    <button class="btn primary" id="pubBtn">Publicar</button>
  </div>
  <div class="main" id="editorMain" style="display:none">
    <div class="canvaswrap">
      <div id="drawflow"></div>
      <div class="flow-palette" id="palette"></div>
      <div id="contentView" class="contentview" style="display:none"></div>
    </div>
    <div class="cfg" id="cfg">
      <div class="empty" style="height:100%"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="6" x2="6" y1="3" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg><div>Elige o crea un flujo</div></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/drawflow@0.0.59/dist/drawflow.min.js"></script>
<script type="module">
import { supa, mountShell, toast, icon, askText, confirmDialog } from "./shell.js";
import { NODE_TYPES, nodeHtml, nodeIcon, decorateNode, installCanvas, mountZoomControls, autoLayout, ACCION_LABELS } from "./flow-canvas.js";
const $ = (id) => document.getElementById(id);

// Salidas (handles) por defecto de cada tipo de nodo. El aspecto visual
// (color, icono, etiqueta, resumen) vive en flow-canvas.js (NODE_TYPES).
const NODE_DEFS = {
  mensaje:      { handles:["continuar"] },
  pregunta:     { handles:["continuar"] },
  condicion:    { handles:["ruta:1","si_no_cumple"] },
  accion:       { handles:["continuar"] },
  ia:           { handles:["exito","fallo"] },
  rotador:      { handles:["continuar"] },
  esperar:      { handles:["continuar"] },
  iniciar_flujo:{ handles:["continuar"] },
  evento_fb:    { handles:["exito","fallo"] },
  plantilla:    { handles:["exito","fallo"] },
  google_sheets:{ handles:["exito","fallo"] },
  nota:         { handles:[], inputs:0 },   // anotación libre, sin conexiones
  fin:          { handles:[] },
};

const st = { channelId:null, flowId:null, flow:null, model:{}, dfToUuid:{}, selected:null, view:"estructura", flows:[], filter:"__all", localFolders:new Set() };
let editor, canvas, zoomCtl, shell;
const CONTENT_TYPES = new Set(["mensaje","pregunta","ia","evento_fb"]);

function esc(s){ return (s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

async function boot(){
  const { data:{ session } } = await supa.auth.getSession();
  if(!session){ location.href="index.html"; return; }
  editor = new Drawflow($("drawflow"));
  editor.start();
  canvas = installCanvas(editor);
  zoomCtl = mountZoomControls(editor, document.querySelector(".canvaswrap"), {
    fitView: canvas.fitView,
    organize: ()=>{ autoLayout(editor); canvas.fitView(); pushHistory(); },
    undo, redo,
  });
  editor.on("nodeSelected", (id)=> selectNode(id));
  editor.on("nodeUnselected", ()=> { st.selected=null; renderCfg(); });
  // Historial: capturar tras crear/borrar/mover nodos y conexiones.
  ["nodeCreated","nodeRemoved","connectionCreated","connectionRemoved","nodeMoved"].forEach(ev=>editor.on(ev, ()=>{ if(!histLock) pushHistory(); }));
  document.addEventListener("keydown",(e)=>{
    if($("editorMain").style.display==="none") return;
    const mod=e.ctrlKey||e.metaKey; if(!mod) return;
    const k=e.key.toLowerCase();
    if(k==="z" && !e.shiftKey){ e.preventDefault(); undo(); }
    else if((k==="y")||(k==="z"&&e.shiftKey)){ e.preventDefault(); redo(); }
  });
  buildPalette();
  // Cierra el menú de acciones al hacer clic fuera (un solo listener global).
  document.addEventListener("click",(e)=>{ document.querySelectorAll(".apick-menu").forEach(mn=>{ if(!mn.parentElement.contains(e.target)) mn.style.display="none"; }); });
  await loadChannels();
  $("addFlow").onclick = createFlow;
  $("saveBtn").onclick = save;
  $("pubBtn").onclick = publish;
  $("trigBtn").onclick = openTriggers;
  $("backBtn").onclick = ()=>{ st.flowId=null; showOverview(); loadFlows(); };
  $("delFlowBtn").onclick = deleteFlow;
  $("viewToggle").querySelectorAll(".segb").forEach((b)=> b.onclick=()=>setView(b.dataset.v));
}

// ── Paleta de nodos (comprimible con botón) ──
function buildPalette(){
  const pal=$("palette");
  pal.innerHTML=`<div class="pl-head">
      <span class="pl-title">Añadir nodo</span>
      <button class="pl-toggle" id="palToggle" title="Comprimir / expandir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>
    </div><div class="pl-grid"></div>`;
  const grid=pal.querySelector(".pl-grid");
  for(const t of Object.keys(NODE_DEFS)){
    if(NODE_DEFS[t].hidden) continue;
    const b=document.createElement("button"); b.className="pbtn"; b.dataset.tipo=t;
    b.title=NODE_TYPES[t]?.desc||"";
    b.innerHTML=`<span class="pb-ic">${nodeIcon(t)}</span>${NODE_TYPES[t]?.label||t}`;
    b.onclick=()=>addNode(t); grid.appendChild(b);
  }
  $("palToggle").onclick=(e)=>{ e.stopPropagation(); pal.classList.toggle("collapsed"); };
  // Al hacer clic fuera de la paleta (en el lienzo), se comprime.
  $("drawflow").addEventListener("mousedown", ()=>{ pal.classList.add("collapsed"); });
}
function showOverview(){
  $("overview").style.display=""; $("editorTop").style.display="none"; $("editorMain").style.display="none";
  if(shell) shell.setCollapsed(shell.isCollapsedPref()); // restaura preferencia del usuario
}
function showEditor(){
  $("overview").style.display="none"; $("editorTop").style.display="flex"; $("editorMain").style.display="flex";
  if(shell) shell.setCollapsed(true); // comprime el sidebar para dar aire al lienzo
}

// ── Toggle Estructura ⇄ Contenido ──
function setView(v){
  st.view = v;
  $("viewToggle").querySelectorAll(".segb").forEach((b)=> b.classList.toggle("active", b.dataset.v===v));
  const content = v==="contenido";
  $("contentView").style.display = content ? "block" : "none";
  $("palette").style.display = content ? "none" : "";
  $("cfg").style.display = content ? "none" : "block";
  if(content) renderContent();
}

// La Vista Contenido: formulario autogenerado del esqueleto (solo nodos con cuerpo).
function renderContent(){
  const box=$("contentView");
  if(!st.flowId){ box.innerHTML=`<div class="cempty">Abre un flujo para editar su contenido.</div>`; return; }
  const exp=editor.export().drawflow.Home.data;
  const nodes=Object.values(st.model).filter((m)=>CONTENT_TYPES.has(m.tipo));
  nodes.sort((a,b)=>((exp[a.dfId]?.pos_y||0)-(exp[b.dfId]?.pos_y||0)));
  if(!nodes.length){ box.innerHTML=`<div class="cempty">Este flujo aún no tiene nodos de contenido.<br>Añade Mensaje / Pregunta / IA desde la vista Estructura.</div>`; return; }
  box.innerHTML="";
  let i=1;
  for(const m of nodes) box.appendChild(contentCard(m, i++));
}
function contentCard(m, i){
  const el=document.createElement("div"); el.className="cnode";
  el.innerHTML=`<div class="ch"><span class="ci">${i}.</span><span class="cfg-ic sm" data-tipo="${m.tipo}">${nodeIcon(m.tipo)}</span><input class="in nm" value="${esc(m.nombre)}" style="max-width:240px"/><span class="ctag">${NODE_TYPES[m.tipo]?.label||m.tipo}</span></div>`;
  el.querySelector(".nm").oninput=(e)=>{ m.nombre=e.target.value; updateNodeDom(m); };
  const body=document.createElement("div");
  if(m.tipo==="mensaje") buildMensaje(m, body);
  else if(m.tipo==="pregunta") buildPregunta(m, body);
  else if(m.tipo==="ia") buildIA(m, body);
  else if(m.tipo==="evento_fb") buildEvento(m, body);
  el.appendChild(body);
  return el;
}
function mkLabel(t){ const l=document.createElement("label"); l.textContent=t; l.style.cssText="font-size:11px;color:var(--muted);display:block;margin:12px 0 5px"; return l; }
function mkTextarea(v, oninput, min){ const t=document.createElement("textarea"); t.className="ta"; if(min)t.style.minHeight=min; t.value=v||""; t.oninput=()=>oninput(t.value); return t; }
function mkInput(v, oninput){ const i=document.createElement("input"); i.className="in"; i.value=v||""; i.oninput=()=>oninput(i.value); return i; }

function buildMensaje(m, body){
  if(!m.config.bubbles) m.config.bubbles=[{text:""}];

async function openFlow(flowId){
  st.flowId=flowId;
  showEditor();
  const { data:flow } = await supa.from("flows").select("*").eq("id",flowId).maybeSingle();
  st.flow=flow;
  $("fname").textContent=flow.nombre;
  setStateBadge(flow.estado);
  await paintProductChip(flow);
  clearCanvas();
  // Cargar nodos.
  const { data:nodes } = await supa.from("flow_nodes").select("*").eq("flow_id",flowId);
  const { data:edges } = await supa.from("flow_edges").select("*").eq("flow_id",flowId);
  for(const n of nodes||[]) addExisting(n);
  // Conexiones (mapear handle → output index).
  for(const e of edges||[]){
    const src=st.model[e.source_node], tgt=st.model[e.target_node];
    if(!src||!tgt) continue;
    const idx=(src.handles.indexOf(e.source_handle)); if(idx<0) continue;
    try{ editor.addConnection(src.dfId, tgt.dfId, "output_"+(idx+1), "input_1"); }catch(_){}
  }
  renderCfg();
  canvas.routeAll();
  canvas.fitView();
  resetHistory();
  if(st.view==="contenido") renderContent();
}

function clearCanvas(){ if(editor){ editor.clear(); } st.model={}; st.dfToUuid={}; st.selected=null; renderCfg(); }

// Añadir un nodo existente (de la BD) al canvas.
function addExisting(n){
  const def=NODE_DEFS[n.tipo]||{handles:["continuar"]};
  const handles = handlesFor(n.tipo, n.config, def);
  const ins = def.inputs===0 ? 0 : 1;
  const m = { uuid:n.id, tipo:n.tipo, nombre:n.nombre, config:n.config||{}, handles, es_inicial:n.es_inicial };
  m.dfId = editor.addNode(n.tipo, ins, handles.length, n.pos_x||100, n.pos_y||100, n.tipo, {}, nodeHtml(m));
  st.model[n.id]=m;
  st.dfToUuid[m.dfId]=n.id;
  decorateNode(editor, m);
}

// Añadir un nodo nuevo (aparece en el centro de la vista actual).
function addNode(tipo){
  if(!st.flowId){ toast("Abre o crea un flujo primero", true); return; }
  const def=NODE_DEFS[tipo];
  const uuid=crypto.randomUUID();
  const handles=[...def.handles];
  const ins = def.inputs===0 ? 0 : 1;
  const wrap=$("drawflow"), z=editor.zoom||1;
  const jitter=(Object.keys(st.model).length%5)*26;
  const x=((wrap.clientWidth/2)-(editor.canvas_x||0))/z - 110 + jitter;
  const y=((wrap.clientHeight/2)-(editor.canvas_y||0))/z - 50 + jitter;
  // nota/fin nunca son el paso inicial; el resto sí si es el primero.
  const canInit = tipo!=="nota" && tipo!=="fin";
  const m={ uuid, tipo, nombre:NODE_TYPES[tipo]?.label||tipo, config:defaultConfig(tipo), handles, es_inicial:canInit && Object.keys(st.model).length===0 };
  m.dfId=editor.addNode(tipo, ins, handles.length, x, y, tipo, {}, nodeHtml(m));
  st.model[uuid]=m;
  st.dfToUuid[m.dfId]=uuid;
  decorateNode(editor, m);
  selectNode(m.dfId);
  editor.dispatch && editor.dispatch("nodeCreated", m.dfId);
}

// ── Historial (deshacer / rehacer) ──
let histStack=[], histIdx=-1, histLock=false;
function serializeFlow(){
  const exp=editor.export().drawflow.Home.data;
  const nodes=[]; for(const uuid in st.model){ const m=st.model[uuid], d=exp[m.dfId];
    nodes.push({ uuid:m.uuid, tipo:m.tipo, nombre:m.nombre, config:JSON.parse(JSON.stringify(m.config||{})), handles:[...m.handles], es_inicial:!!m.es_inicial, pos_x:d?d.pos_x:0, pos_y:d?d.pos_y:0 }); }
  const edges=[];
  for(const dfId in exp){ const node=exp[dfId], m=st.model[st.dfToUuid[dfId]]; if(!m) continue;
    const outs=node.outputs||{};
    for(const okey in outs){ const idx=parseInt(okey.split("_")[1],10)-1; const handle=m.handles[idx]||"continuar";
      for(const conn of outs[okey].connections||[]){ const tgt=st.dfToUuid[conn.node]; if(tgt) edges.push({ s:m.uuid, h:handle, t:tgt }); } } }
  return { nodes, edges };
}
function restoreFlow(snap){
  histLock=true;
  if(editor) editor.clear(); st.model={}; st.dfToUuid={}; st.selected=null;
  for(const n of snap.nodes) addExisting({ id:n.uuid, tipo:n.tipo, nombre:n.nombre, config:n.config, es_inicial:n.es_inicial, pos_x:n.pos_x, pos_y:n.pos_y });
  for(const e of snap.edges){ const src=st.model[e.s], tgt=st.model[e.t]; if(!src||!tgt) continue;
    const idx=src.handles.indexOf(e.h); if(idx<0) continue;
    try{ editor.addConnection(src.dfId, tgt.dfId, "output_"+(idx+1), "input_1"); }catch(_){}
  }
  canvas.routeAll(); renderCfg();
  histLock=false;
}
function pushHistory(){
  if(histLock||!st.flowId) return;
  const snap=serializeFlow();
  histStack=histStack.slice(0, histIdx+1);
  histStack.push(snap); if(histStack.length>60) histStack.shift();
  histIdx=histStack.length-1; paintHistory();
}
function resetHistory(){ histStack=[]; histIdx=-1; pushHistory(); }
function undo(){ if(histIdx<=0) return; histIdx--; restoreFlow(histStack[histIdx]); paintHistory(); }
function redo(){ if(histIdx>=histStack.length-1) return; histIdx++; restoreFlow(histStack[histIdx]); paintHistory(); }
function paintHistory(){ zoomCtl?._setHistory?.(histIdx>0, histIdx<histStack.length-1); }

function defaultConfig(tipo){
  switch(tipo){
    case "mensaje": return { bubbles:[{ text:"Escribe el mensaje…" }] };
    case "pregunta": return { text:"¿Tu pregunta?", guardar_en:"" };
    case "condicion": return { rutas:[{ handle:"ruta:1", nombre:"Ruta 1", match:"todas", condiciones:[] }] };
    case "accion": return { acciones:[] };
    case "ia": return { operacion:"generar_texto", prompt:"", proveedor:"auto", modelo:"" };
    case "evento_fb": return { event_name:"Lead", currency:"PEN", value:"", order_id:"" };
    case "plantilla": return { template_name:"", template_lang:"es", params:[] };
    case "google_sheets": return { accion:"append", hoja:"Ventas", columnas:[
      { col:"Fecha", valor:"{{fecha_compra}}" },
      { col:"Cliente", valor:"{{nombre}}" },
      { col:"Teléfono", valor:"{{telefono}}" },
      { col:"Producto", valor:"{{producto_nombre}}" },
      { col:"Monto", valor:"{{valor}}" },
      { col:"Ad ID", valor:"{{ad_id}}" },
      { col:"Comprobante", valor:"{{ultima_imagen}}" },
    ],
    // Para registrar una compra extra en la MISMA fila, usa accion:"update"
    // y define "buscar" (columnas que identifican la fila), p.ej.:
    //   accion:"update", buscar:[{col:"Teléfono",valor:"{{telefono}}"}],
    //   columnas:[{col:"Compra extra",valor:"{{order_bump}}"}]
    buscar:[] };
    case "esperar": return { segundos:4 };
    case "iniciar_flujo": return { target_flow_id:"", target_role:"" };
    case "rotador": return { activo:true, variantes:[
      { nombre:"Variante A", peso:1, activo:true, bubbles:[{ text:"¡Hola! 👋 Gracias por escribirnos." }] },
      { nombre:"Variante B", peso:1, activo:true, bubbles:[{ text:"¡Hola! 😃 Qué bueno tenerte por aquí." }] },
    ] };
    case "nota": return { text:"" };
    default: return {};
  }
}
function handlesFor(tipo, config, def){
  if(tipo==="condicion" && config?.rutas) return [...config.rutas.map(r=>r.handle||("ruta:"+r.nombre)), "si_no_cumple"];
  if(tipo==="mensaje"){ const b=(config?.bubbles||[]).find(x=>x.buttons?.length); if(b) return b.buttons.map(x=>"boton:"+x.id); }
  return [...(def.handles||["continuar"])];
}

function renderCfg(){
  const cfg=$("cfg");
  // Sin nodo seleccionado → la columna se comprime (pedido de Rodrigo).
  if(!st.selected){ cfg.classList.add("collapsed"); cfg.innerHTML=""; return; }
  cfg.classList.remove("collapsed");
  const m=st.model[st.selected];
  cfg.innerHTML=`
    <h3 data-tipo="${m.tipo}"><span class="cfg-ic">${nodeIcon(m.tipo)}</span> ${NODE_TYPES[m.tipo]?.label||m.tipo}
      <button class="h3-x" id="cfgClose" title="Cerrar">${XSVG}</button></h3>
    ${m.tipo==="nota"?"":`<label>Nombre del bloque</label><input class="in" id="cfgNombre" value="${esc(m.nombre)}" />`}
    <div id="cfgForm"></div>`;
  $("cfgClose").onclick=deselectNode;
  const nn=$("cfgNombre"); if(nn) nn.oninput=(e)=>{ m.nombre=e.target.value; updateNodeDom(m); };
  buildCfgForm(m, $("cfgForm"));
}

// Enruta al constructor amigable de cada tipo + secciones comunes.
function buildCfgForm(m, form){
  form.innerHTML="";
  const body=document.createElement("div");
  switch(m.tipo){
    case "mensaje":       buildMensajeCfg(m, body); break;
    case "pregunta":      buildPregunta(m, body); break;
    case "ia":            buildIA(m, body); break;
    case "evento_fb":     buildEvento(m, body); break;
    case "condicion":     buildCondicionCfg(m, body); break;
    case "accion":        buildAccionCfg(m, body); break;
    case "esperar":       buildEsperarCfg(m, body); break;
    case "iniciar_flujo": buildIniciarFlujoCfg(m, body); break;
    case "plantilla":     buildPlantillaCfg(m, body); break;
    case "rotador":       buildRotadorCfg(m, body); break;
    case "google_sheets": { const gd=document.createElement("div"); gd.id="sheetsForm"; body.appendChild(gd); buildSheetsForm(m); break; }
    case "nota":          buildNotaCfg(m, body); break;
    case "fin":           { const p=document.createElement("p"); p.className="fhint"; p.textContent="Este nodo termina la conversación. No tiene salidas."; body.appendChild(p); break; }
  }
  form.appendChild(body);
  appendCommon(m, form);
}

// Secciones comunes: paso inicial, salidas avanzadas, JSON y eliminar.
const DERIVED_HANDLES=new Set(["condicion","rotador","mensaje"]); // gestionan sus salidas en el form
function appendCommon(m, form){
  if(m.tipo!=="nota" && m.tipo!=="fin"){
    const lab=document.createElement("label"); lab.className="chk";
    const cb=document.createElement("input"); cb.type="checkbox"; cb.checked=!!m.es_inicial;
    cb.onchange=()=>{ if(cb.checked){ for(const k in st.model) st.model[k].es_inicial=false; m.es_inicial=true; } else m.es_inicial=false; for(const k in st.model) updateNodeDom(st.model[k]); };
    lab.appendChild(cb); lab.appendChild(document.createTextNode(" Marcar como paso inicial del flujo"));
    form.appendChild(lab);
  }
  // Avanzado (colapsado): salidas manuales + JSON.
  const adv=document.createElement("details"); adv.className="adv";
  adv.innerHTML=`<summary><svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>Ajustes avanzados</summary>`;
  const advBody=document.createElement("div");
  if(m.tipo!=="nota" && m.tipo!=="fin" && !DERIVED_HANDLES.has(m.tipo)){
    advBody.appendChild(mkLabel("Salidas (deben coincidir con las conexiones)"));
    const hbox=document.createElement("div"); hbox.id="handles"; advBody.appendChild(hbox);
    const addh=document.createElement("button"); addh.className="fbtn"; addh.textContent="+ salida";
    addh.onclick=()=>{ m.handles.push("salida_"+(m.handles.length+1)); editor.addNodeOutput(m.dfId); renderHandles(m); decorateNode(editor, m); canvas.schedule(); pushHistory(); };
    advBody.appendChild(addh);
  }
  advBody.appendChild(mkLabel("Config (JSON)"));
  const ta=document.createElement("textarea"); ta.className="ta"; ta.id="cfgJson"; ta.value=JSON.stringify(m.config,null,2);
  ta.onchange=()=>{ try{ m.config=JSON.parse(ta.value); toast("Config OK"); updateNodeDom(m); renderCfg(); }catch(_){ toast("JSON inválido", true); } };
  advBody.appendChild(ta);
  adv.appendChild(advBody); form.appendChild(adv);
  if($("handles")) renderHandles(m);
  // Eliminar
  const del=document.createElement("button"); del.className="del"; del.textContent="Eliminar nodo";
  del.onclick=()=>{ editor.removeNodeId("node-"+m.dfId); delete st.model[m.uuid]; delete st.dfToUuid[m.dfId]; deselectNode(); pushHistory(); };
  form.appendChild(del);
}

// ── Helpers de formulario ──
const PLUS='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>';
function hint(t){ const p=document.createElement("p"); p.className="fhint"; p.innerHTML=t; return p; }
function mkNum(v, oninput, opt={}){ const i=document.createElement("input"); i.type="number"; i.className="in"; if(opt.min!=null)i.min=opt.min; if(opt.max!=null)i.max=opt.max; if(opt.step!=null)i.step=opt.step; i.value=v??""; i.oninput=()=>oninput(i.value); return i; }
function ensureVarsDatalist(){
  if(document.getElementById("cfgVars")) return;
  const dl=document.createElement("datalist"); dl.id="cfgVars";
  dl.innerHTML=GS_VARS.map(v=>`<option value="${v}">`).join("");
  document.body.appendChild(dl);
}
function mkVarInput(v, oninput, ph){ ensureVarsDatalist(); const i=document.createElement("input"); i.className="in"; i.setAttribute("list","cfgVars"); i.value=v||""; if(ph)i.placeholder=ph; i.oninput=()=>oninput(i.value); return i; }
// Sincroniza los outputs reales del nodo Drawflow con m.handles.
function rebuildOutputs(m){
  const el=document.getElementById("node-"+m.dfId); if(!el) return;
  let cur=el.querySelectorAll(".outputs .output").length;
  while(cur<m.handles.length){ editor.addNodeOutput(m.dfId); cur++; }
  while(cur>m.handles.length){ editor.removeNodeOutput(m.dfId,"output_"+cur); cur--; }
}

// ── Mensaje (burbujas + botones que crean ramas) ──
function buildMensajeCfg(m, body){
  const c=m.config; c.bubbles=c.bubbles||[{text:""}];
  body.appendChild(mkLabel("Mensajes (burbujas)"));
  const bubs=document.createElement("div");
  const paintBubs=()=>{
    bubs.innerHTML="";
    c.bubbles.forEach((b,i)=>{
      const w=document.createElement("div"); w.className="bubble"; w.style.position="relative";
      w.appendChild(mkTextarea(b.text,(v)=>{ b.text=v; updateNodeDom(m); },"56px"));
      if(c.bubbles.length>1){ const x=document.createElement("button"); x.className="xbtn"; x.innerHTML=XSVG; x.style.cssText="position:absolute;top:6px;right:6px;width:24px;height:24px"; x.onclick=()=>{ c.bubbles.splice(i,1); paintBubs(); updateNodeDom(m); }; w.appendChild(x); }
      bubs.appendChild(w);
    });
  };
  paintBubs(); body.appendChild(bubs);
  const addB=document.createElement("button"); addB.className="fbtn"; addB.innerHTML=PLUS+" burbuja";
  addB.onclick=()=>{ c.bubbles.push({text:""}); paintBubs(); updateNodeDom(m); };
  body.appendChild(addB);
  const last=c.bubbles[c.bubbles.length-1]; last.buttons=last.buttons||[];
  body.appendChild(mkLabel("Botones de respuesta (cada uno crea una rama)"));
  const box=document.createElement("div");
  const paint=()=>{
    box.innerHTML="";
    last.buttons.forEach((btn,i)=>{
      const row=document.createElement("div"); row.className="frow"; row.style.marginBottom="6px";
      const t=document.createElement("input"); t.className="in"; t.value=btn.title||""; t.placeholder="Texto del botón";
      t.oninput=()=>{ btn.title=t.value; updateNodeDom(m); };
      const x=document.createElement("button"); x.className="xbtn"; x.innerHTML=XSVG;
      x.onclick=()=>{ last.buttons.splice(i,1); syncMensajeHandles(m); paint(); };
      row.append(t,x); box.appendChild(row);
    });
  };
  paint(); body.appendChild(box);
  const add=document.createElement("button"); add.className="fbtn"; add.innerHTML=PLUS+" botón";
  add.onclick=()=>{ last.buttons.push({ id:"b"+Date.now().toString(36).slice(-4), title:"Opción "+(last.buttons.length+1) }); syncMensajeHandles(m); paint(); };
  body.appendChild(add);
}
function syncMensajeHandles(m){
  const b=(m.config.bubbles||[]).find(x=>x.buttons?.length);
  m.handles = b ? b.buttons.map(x=>"boton:"+x.id) : ["continuar"];
  rebuildOutputs(m); decorateNode(editor,m); updateNodeDom(m); canvas.schedule();
}

// ── Condición (rutas con reglas) ──
const COND_OPS=[["tiene_tag","Tiene la etiqueta"],["no_tiene_tag","No tiene la etiqueta"],["campo_igual","Campo es igual a"],["campo_contiene","Campo contiene"],["campo_existe","Campo tiene valor"]];
function buildCondicionCfg(m, body){
  const c=m.config; c.rutas=c.rutas||[];
  body.appendChild(hint("Toma la <b>primera</b> ruta que se cumpla. Si ninguna, sale por «si no cumple»."));
  const list=document.createElement("div");
  const paint=()=>{
    list.innerHTML="";
    c.rutas.forEach((r,ri)=>{
      r.condiciones=r.condiciones||[];
      const card=document.createElement("div"); card.className="fcard";
      const head=document.createElement("div"); head.className="frow"; head.style.marginBottom="8px";
      const nm=document.createElement("input"); nm.className="in"; nm.value=r.nombre||("Ruta "+(ri+1)); nm.oninput=()=>{ r.nombre=nm.value; updateNodeDom(m); };
      const del=document.createElement("button"); del.className="xbtn"; del.innerHTML=XSVG; del.onclick=()=>{ c.rutas.splice(ri,1); syncCondHandles(m); paint(); };
      head.append(nm,del); card.appendChild(head);
      // Modo (todas / cualquiera)
      const seg=document.createElement("div"); seg.className="seg2"; seg.style.marginBottom="8px";
      [["todas","Todas se cumplen"],["cualquiera","Alguna se cumple"]].forEach(([v,l])=>{
        const b=document.createElement("button"); b.textContent=l; if((r.match||"todas")===v)b.classList.add("on");
        b.onclick=()=>{ r.match=v; seg.querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); };
        seg.appendChild(b);
      });
      card.appendChild(seg);
      // Condiciones
      r.condiciones.forEach((cond,ci)=>{
        const wrap=document.createElement("div"); wrap.style.marginBottom="8px";
        wrap.appendChild(mkSelect(COND_OPS, cond.op||"tiene_tag", (v)=>{ cond.op=v; paint(); }));
        const row=document.createElement("div"); row.className="frow"; row.style.marginTop="6px";
        if(/campo/.test(cond.op||"tiene_tag")){ const f=document.createElement("input"); f.className="in"; f.placeholder="campo"; f.value=cond.campo||""; f.oninput=()=>cond.campo=f.value; row.appendChild(f); }
        if(cond.op!=="campo_existe"){ const val=document.createElement("input"); val.className="in"; val.placeholder=(cond.op==="tiene_tag"||cond.op==="no_tiene_tag")?"etiqueta":"valor"; val.value=cond.valor||""; val.oninput=()=>cond.valor=val.value; row.appendChild(val); }
        const x=document.createElement("button"); x.className="xbtn"; x.innerHTML=XSVG; x.onclick=()=>{ r.condiciones.splice(ci,1); paint(); };
        row.appendChild(x); wrap.appendChild(row); card.appendChild(wrap);
      });
      const addc=document.createElement("button"); addc.className="fbtn"; addc.innerHTML=PLUS+" condición";
      addc.onclick=()=>{ r.condiciones.push({op:"tiene_tag",valor:""}); paint(); };
      card.appendChild(addc); list.appendChild(card);
    });
  };
  paint(); body.appendChild(list);
  const add=document.createElement("button"); add.className="fbtn"; add.innerHTML=PLUS+" ruta";
  add.onclick=()=>{ c.rutas.push({handle:"ruta:"+(c.rutas.length+1),nombre:"Ruta "+(c.rutas.length+1),match:"todas",condiciones:[]}); syncCondHandles(m); paint(); };
  body.appendChild(add);
}
function syncCondHandles(m){
  const c=m.config; c.rutas.forEach((r,i)=>{ if(!r.handle) r.handle="ruta:"+(i+1); });
  m.handles=[...c.rutas.map(r=>r.handle), "si_no_cumple"];
  rebuildOutputs(m); decorateNode(editor,m); updateNodeDom(m); canvas.schedule();
}

// ── Dado / reparto por peso (rotador de variantes) ──
function buildRotadorCfg(m, body){
  const c=m.config; c.variantes=c.variantes||[];
  const onoff=document.createElement("label"); onoff.className="chk"; onoff.style.margin="0 0 10px";
  const cb=document.createElement("input"); cb.type="checkbox"; cb.checked=c.activo!==false; cb.onchange=()=>{ c.activo=cb.checked; updateNodeDom(m); };
  onoff.append(cb, document.createTextNode(" Reparto activo (si se apaga, usa siempre la 1ª)"));
  body.appendChild(onoff);
  body.appendChild(hint("Cada mensaje entrante recibe una variante elegida al azar según su <b>peso</b>. Evita baneos por repetir el mismo saludo."));
  const totalPeso=()=> c.variantes.filter(v=>v.activo!==false).reduce((s,v)=>s+(Number(v.peso)||0),0)||1;
  const list=document.createElement("div");
  const paint=()=>{
    list.innerHTML=""; const tot=totalPeso();
    c.variantes.forEach((v,i)=>{
      v.bubbles=v.bubbles||[{text:""}];
      const card=document.createElement("div"); card.className="fcard";
      const head=document.createElement("div"); head.className="frow"; head.style.marginBottom="8px";
      const on=document.createElement("input"); on.type="checkbox"; on.checked=v.activo!==false; on.title="Activa"; on.onchange=()=>{ v.activo=on.checked; paint(); updateNodeDom(m); };
      const nm=document.createElement("input"); nm.className="in"; nm.value=v.nombre||("Variante "+(i+1)); nm.oninput=()=>{ v.nombre=nm.value; };
      const del=document.createElement("button"); del.className="xbtn"; del.innerHTML=XSVG; del.onclick=()=>{ c.variantes.splice(i,1); paint(); updateNodeDom(m); };
      head.append(on,nm,del); card.appendChild(head);
      card.appendChild(mkTextarea(v.bubbles[0]?.text, (val)=>{ v.bubbles[0]=v.bubbles[0]||{}; v.bubbles[0].text=val; }, "60px"));
      const pr=document.createElement("div"); pr.className="frow"; pr.style.marginTop="8px";
      const pl=document.createElement("span"); pl.style.cssText="font-size:11.5px;color:var(--muted);white-space:nowrap"; pl.textContent="Peso";
      const pw=mkNum(v.peso??1,(val)=>{ v.peso=Number(val)||0; pct.textContent=prob(v); }, {min:0,step:1}); pw.style.maxWidth="80px";
      const pct=document.createElement("span"); pct.style.cssText="font-size:11.5px;color:var(--faint)"; const prob=(vv)=> vv.activo!==false?`≈ ${Math.round((Number(vv.peso)||0)/tot*100)}%`:"apagada"; pct.textContent=prob(v);
      pr.append(pl,pw,pct); card.appendChild(pr);
      list.appendChild(card);
    });
  };
  paint(); body.appendChild(list);
  const add=document.createElement("button"); add.className="fbtn"; add.innerHTML=PLUS+" variante";
  add.onclick=()=>{ c.variantes.push({nombre:"Variante "+(c.variantes.length+1),peso:1,activo:true,bubbles:[{text:""}]}); paint(); updateNodeDom(m); };
  body.appendChild(add);
}

    { tipo:"seguimiento_off",label:"Quitar seguimiento",       icon:"flag" },

  ]},
];
const ACCION_META={}; ACCIONES_DEFS.forEach(g=>g.items.forEach(it=>ACCION_META[it.tipo]=it));

function buildAccionCfg(m, body){
  const c=m.config; c.acciones=c.acciones||[];
  const list=document.createElement("div"); body.appendChild(list);
  const paint=()=>{
    list.innerHTML="";
    if(!c.acciones.length){ list.appendChild(hint("Aún sin acciones. Añade una o varias; se ejecutan en orden.")); }
    c.acciones.forEach((a,i)=>list.appendChild(accionItem(m, a, i, paint)));
  };
  paint();
  // Botón + selector de acción
  const picker=document.createElement("div"); picker.className="apick";
  const add=document.createElement("button"); add.className="fbtn"; add.innerHTML=PLUS+" añadir acción";
  const menu=document.createElement("div"); menu.className="apick-menu"; menu.style.display="none";
  menu.innerHTML=ACCIONES_DEFS.map(g=>`<div class="apick-grp">${g.grupo}</div>`+g.items.map(it=>`<button class="apick-item" data-t="${it.tipo}"><span class="ai-ic">${icon(it.icon)}</span>${it.label}</button>`).join("")).join("");
  add.onclick=(e)=>{ e.stopPropagation(); menu.style.display=menu.style.display==="none"?"block":"none"; };
  menu.querySelectorAll(".apick-item").forEach(b=> b.onclick=()=>{ c.acciones.push({tipo:b.dataset.t}); menu.style.display="none"; paint(); updateNodeDom(m); pushHistory(); });
  picker.append(add, menu); body.appendChild(picker);
}
function accionItem(m, a, i, repaint){
  const meta=ACCION_META[a.tipo]||{label:a.tipo, icon:"node"};
  const el=document.createElement("div"); el.className="acc-item"; el.style.setProperty("--ac", NODE_TYPES.accion.color);
  const acc=m.config.acciones;
  el.innerHTML=`<div class="acc-head">
      <span class="ah-ic">${icon(meta.icon)}</span>
      <span class="ah-tt">${esc(meta.label)}</span>
      <button class="ah-mv" data-mv="up" title="Subir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg></button>
      <button class="ah-mv" data-mv="down" title="Bajar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></button>
      <button class="ah-mv" data-mv="del" title="Quitar">${XSVG}</button>
    </div><div class="acc-body"></div>`;
  const b=el.querySelector(".acc-body"); buildAccionBody(a, b);
  el.querySelector('[data-mv="up"]').onclick=()=>{ if(i>0){ [acc[i-1],acc[i]]=[acc[i],acc[i-1]]; repaint(); updateNodeDom(m); } };
  el.querySelector('[data-mv="down"]').onclick=()=>{ if(i<acc.length-1){ [acc[i+1],acc[i]]=[acc[i],acc[i+1]]; repaint(); updateNodeDom(m); } };
  el.querySelector('[data-mv="del"]').onclick=()=>{ acc.splice(i,1); repaint(); updateNodeDom(m); };
  return el;
}
// Formulario específico de cada tipo de acción.
function buildAccionBody(a, b){
  const L=(t)=>b.appendChild(mkLabel(t));
  const V=(k,ph)=>b.appendChild(mkVarInput(a[k], (v)=>a[k]=v, ph));
  switch(a.tipo){
    case "add_tag": case "remove_tag": L("Etiqueta"); V("valor","nombre de la etiqueta"); break;
    case "set_field": L("Campo"); b.appendChild(mkInput(a.key,(v)=>a.key=v)); L("Valor"); V("valor","texto o {{variable}}"); break;
    case "clear_field": L("Campo a limpiar"); b.appendChild(mkInput(a.key,(v)=>a.key=v)); break;
    case "nota": L("Texto de la nota (queda en el Timeline)"); b.appendChild(mkTextarea(a.valor,(v)=>a.valor=v,"56px")); break;
    case "transfer_human": L("Mensaje al equipo (opcional)"); V("mensaje","{{nombre}} necesita ayuda"); break;
    case "notify_admin": L("Mensaje para administradores"); V("mensaje","texto o {{variable}}"); L("Foto adjunta (opcional)"); V("foto","{{ultima_imagen}}"); break;
    case "subscribe_seq": case "unsubscribe_seq": L("Secuencia"); buildSeqSelect(a, b); break;
    case "fecha_formato": {
      L("Formato");
      b.appendChild(mkSelect([["dd/mm/yyyy","31/12/2026"],["dd/mm/yyyy hh:mm","31/12/2026 14:30"],["yyyy-mm-dd","2026-12-31"],["hh:mm","14:30"],["dia_semana","martes"]], a.formato||"dd/mm/yyyy", (v)=>a.formato=v));
      L("Guardar en (campo)"); b.appendChild(mkInput(a.guardar_en,(v)=>a.guardar_en=v)); break;
    }
    case "aleatorio": {
      L("Tipo");
      const seg=document.createElement("div"); seg.className="seg2";
      [["numero","Número"],["texto","Texto"]].forEach(([v,l])=>{ const btn=document.createElement("button"); btn.textContent=l; if((a.modo||"numero")===v)btn.classList.add("on"); btn.onclick=()=>{ a.modo=v; buildAccionBody(a, b); }; seg.appendChild(btn); });
      b.appendChild(seg);
      if((a.modo||"numero")==="numero"){ L("Mínimo"); b.appendChild(mkNum(a.min??1,(v)=>a.min=Number(v))); L("Máximo"); b.appendChild(mkNum(a.max??100,(v)=>a.max=Number(v))); }
      else { L("Longitud"); b.appendChild(mkNum(a.longitud??6,(v)=>a.longitud=Number(v),{min:1})); }
      L("Guardar en (campo)"); b.appendChild(mkInput(a.guardar_en,(v)=>a.guardar_en=v)); break;
    }
    case "contar_caracteres": L("Texto o variable a contar"); V("origen","{{respuesta}}"); L("Guardar en (campo)"); b.appendChild(mkInput(a.guardar_en,(v)=>a.guardar_en=v)); break;
    // seguimiento_on/off, archivar, desarchivar, bloquear, borrar_info, return_bot: sin parámetros
  }
}
let _seqCache=null;
async function loadSeqs(){ if(_seqCache) return _seqCache; const { data } = await supa.from("sequences").select("id,nombre").eq("channel_id",st.channelId).order("nombre"); _seqCache=data||[]; return _seqCache; }
function buildSeqSelect(a, b){
  const sel=document.createElement("select"); sel.className="in"; sel.innerHTML=`<option value="">— Cargando… —</option>`;
  sel.onchange=()=>{ a.sequence_id=sel.value; a.nombre=sel.selectedOptions[0]?.textContent; };
  b.appendChild(sel);
  loadSeqs().then(seqs=>{
    sel.innerHTML=`<option value="">— Elegir secuencia —</option>`+seqs.map(s=>`<option value="${s.id}" ${a.sequence_id===s.id?"selected":""}>${esc(s.nombre)}</option>`).join("");
  });
}
// Formulario amigable del nodo Google Sheets (mantiene el JSON en sync).
const GS_VARS=["{{nombre}}","{{telefono}}","{{producto_nombre}}","{{valor}}","{{ad_id}}","{{origen}}","{{fecha}}","{{fecha_compra}}","{{fecha_hora}}","{{ultima_imagen}}","{{order_bump}}","{{stage}}"];
function buildSheetsForm(m){
  const box=$("sheetsForm"); if(!box) return;
  const c=m.config||(m.config={});
  if(!Array.isArray(c.columnas)) c.columnas=[];
  if(!Array.isArray(c.buscar)) c.buscar=[];
  if(c.accion!=="update") c.accion="append";
  const isUpd=c.accion==="update";
  const sync=()=>{ const t=$("cfgJson"); if(t) t.value=JSON.stringify(m.config,null,2); updateNodeDom(m); };
  box.innerHTML=`
    <label style="margin-top:12px">¿Qué hace?</label>
    <select class="sel" id="gsAccion" style="width:100%">
      <option value="append" ${!isUpd?"selected":""}>➕ Agregar una fila nueva (registrar venta)</option>
      <option value="update" ${isUpd?"selected":""}>✏️ Actualizar una fila (ej. compra extra en la misma fila)</option>
    </select>
    <label style="margin-top:12px">Pestaña de la hoja (opcional)</label>
    <input class="in" id="gsHoja" value="${esc(c.hoja||'')}" placeholder="Ventas"/>
    ${isUpd?`<label style="margin-top:14px">Buscar la fila donde…</label>
      <div style="font-size:11px;color:var(--faint);margin:-2px 0 6px">Columnas que identifican la fila a actualizar (ej. Teléfono = {{telefono}}).</div>
      <div id="gsBuscar"></div><button class="btn" id="gsAddBuscar" style="width:100%;margin-top:6px">+ criterio</button>`:""}
    <label style="margin-top:14px">${isUpd?"Celdas a actualizar":"Columnas de la fila"}</label>
    <div id="gsCols"></div>
    <button class="btn" id="gsAddCol" style="width:100%;margin-top:6px">+ columna</button>
    <datalist id="gsVars">${GS_VARS.map(v=>`<option value="${v}">`).join("")}</datalist>
    <div style="font-size:11px;color:var(--faint);margin-top:8px">En “valor” escribe texto fijo o variables: {{nombre}}, {{valor}}, {{ultima_imagen}}…</div>`;
  function renderRows(listKey, containerId){
    const cont=$(containerId); if(!cont) return; cont.innerHTML="";
    c[listKey].forEach((row,i)=>{
      const el=document.createElement("div");
      el.style.cssText="display:flex;gap:6px;margin-bottom:6px;align-items:center";
      el.innerHTML=`<input class="in gcol" placeholder="Columna en tu hoja" value="${esc(row.col||'')}" style="flex:1;min-width:0"/>
        <span style="color:var(--faint)">→</span>
        <input class="in gval" placeholder="Valor / {{variable}}" list="gsVars" value="${esc(row.valor||'')}" style="flex:1.2;min-width:0"/>
        <button class="btn gdel" style="flex:0 0 auto;padding:0 10px;color:var(--red)">✕</button>`;
      el.querySelector(".gcol").oninput=(e)=>{ row.col=e.target.value; sync(); };
      el.querySelector(".gval").oninput=(e)=>{ row.valor=e.target.value; sync(); };
      el.querySelector(".gdel").onclick=()=>{ c[listKey].splice(i,1); renderRows(listKey,containerId); sync(); };
      cont.appendChild(el);
    });
  }
  renderRows("columnas","gsCols");
  if(isUpd) renderRows("buscar","gsBuscar");
  $("gsAccion").onchange=(e)=>{ c.accion=e.target.value; sync(); buildSheetsForm(m); };
  $("gsHoja").oninput=(e)=>{ c.hoja=e.target.value||undefined; sync(); };
  $("gsAddCol").onclick=()=>{ c.columnas.push({col:"",valor:""}); renderRows("columnas","gsCols"); sync(); };
  const ab=$("gsAddBuscar"); if(ab) ab.onclick=()=>{ c.buscar.push({col:"",valor:""}); renderRows("buscar","gsBuscar"); sync(); };
}
function renderHandles(m){
  const box=$("handles"); if(!box) return; box.innerHTML="";
  m.handles.forEach((h,i)=>{
    const row=document.createElement("div"); row.className="handle-row";
    row.innerHTML=`<input class="in" value="${esc(h)}"/><button class="hbtn">✕</button>`;
    row.querySelector("input").onchange=(e)=>{ m.handles[i]=e.target.value; decorateNode(editor, m); };
    row.querySelector("button").onclick=()=>{ m.handles.splice(i,1); editor.removeNodeOutput(m.dfId,"output_"+(i+1)); renderHandles(m); decorateNode(editor, m); canvas.schedule(); };
    box.appendChild(row);
  });
}
// Redibuja la tarjeta del nodo (nombre, resumen, chip de inicio) y
// re-enruta por si cambió el tamaño.
function updateNodeDom(m){
  const el=document.querySelector(`#node-${m.dfId} .drawflow_content_node`);
  if(el){ el.innerHTML=nodeHtml(m); canvas.schedule(); }
}

// ── Disparadores del flujo (flow_triggers) ──
// Cuándo arranca este flujo: palabra clave, flujo de entrada (fallback),
// estado de pedido (el Kanban lo dispara al mover la tarjeta) o anuncio CTWA.
const TRIG_LABEL={
  entrada: icon("star")+" Flujo de entrada",
  keyword: icon("key")+" Palabra clave",
  pedido_estado: icon("box")+" Estado de pedido",
  pedido_recordatorio: icon("clock")+" Recordatorio de pedido",
  referral: icon("campanas")+" Anuncio (referral)",
  boton: icon("dot")+" Botón",
  ia: icon("sparkles")+" Disparador IA",
  api: icon("link")+" API",
};
const PEDIDO_ESTADOS=["confirmado","en_reparto","entregado_cobrado","esperando_adelanto","adelanto_validado","por_despachar","despachado","en_agencia","saldo_pagado","recogido","reprogramado","rechazado","no_recogido","cancelado"];
function trigDesc(t){
  const c=t.config||{};
  if(t.tipo==="keyword") return (c.keywords||[]).join(", ")+" · coincidencia: "+(c.match||"contiene")+(t.interrumpe?" · interrumpe":"");
  if(t.tipo==="pedido_estado") return "al pasar a: "+(c.estados||[]).join(", ")+(t.interrumpe?" · interrumpe la conversación":"");
  if(t.tipo==="pedido_recordatorio") return "si lleva ≥ "+(c.horas||24)+" h en "+(c.estado||"?")+(t.interrumpe?" · interrumpe":"")+" (una vez)";
  if(t.tipo==="referral") return "Ad IDs: "+(c.ad_ids||[]).join(", ");
  if(t.tipo==="entrada") return "recibe todo mensaje que no coincida con otro disparador";
  return JSON.stringify(c);
}
async function openTriggers(){
  if(!st.flowId){ toast("Abre un flujo primero",true); return; }
  const ov=document.createElement("div"); ov.className="tg-overlay";
  ov.innerHTML=`<div class="tg-modal">
    <h3>${icon("disparadores")} Disparadores — ${esc(st.flow?.nombre||"")}</h3>
    <div class="tg-sub">Definen cuándo arranca este flujo. Un pedido dispara desde el Kanban de Pedidos; una keyword, desde el mensaje del cliente.</div>
    <div id="tgList"><div style="color:var(--faint);font-size:12.5px">Cargando…</div></div>
    <div class="tg-new">
      <label>Añadir disparador</label>
      <select id="tgTipo">
        <option value="keyword">🔑 Palabra clave</option>
        <option value="pedido_estado">📦 Estado de pedido (Kanban)</option>
        <option value="pedido_recordatorio">⏰ Recordatorio de pedido (horas en un estado)</option>
        <option value="referral">📣 Anuncio CTWA (Ad ID)</option>
        <option value="entrada">★ Flujo de entrada (fallback del canal)</option>
      </select>
      <div id="tgCfg"></div>
      <button class="btn primary" id="tgAdd" style="width:100%;margin-top:14px;height:38px">Añadir</button>
    </div>
    <div style="text-align:right;margin-top:12px"><button class="btn" id="tgClose">Cerrar</button></div>
  </div>`;
  document.body.appendChild(ov);
  ov.onclick=(e)=>{ if(e.target===ov) ov.remove(); };
  ov.querySelector("#tgClose").onclick=()=>ov.remove();
  const tipoSel=ov.querySelector("#tgTipo");
  tipoSel.onchange=()=>renderTgCfg(ov);
  renderTgCfg(ov);
  ov.querySelector("#tgAdd").onclick=()=>addTrigger(ov);
  await loadTriggers(ov);
}
async function loadTriggers(ov){
  const { data, error }=await supa.from("flow_triggers").select("*").eq("flow_id",st.flowId).order("created_at");
  const box=ov.querySelector("#tgList"); if(!box) return;
  if(error){ box.innerHTML=`<div style="color:var(--red);font-size:12.5px">${esc(error.message)}</div>`; return; }
  if(!data||!data.length){ box.innerHTML=`<div style="color:var(--faint);font-size:12.5px;padding:6px 2px">Este flujo no tiene disparadores — solo puede iniciarse desde otro flujo (Iniciar flujo) o manualmente.</div>`; return; }
  box.innerHTML="";
  data.forEach(t=>{
    const row=document.createElement("div"); row.className="tg-row";
    row.innerHTML=`<div class="tt"><div class="k">${TRIG_LABEL[t.tipo]||t.tipo}</div><div class="d">${esc(trigDesc(t))}</div></div>
      <button class="${t.activo?'on':''}">${t.activo?"Activo":"Apagado"}</button>
      <button class="del">✕</button>`;
    const [tog,del]=row.querySelectorAll("button");
    tog.onclick=async()=>{ const { error }=await supa.from("flow_triggers").update({ activo:!t.activo }).eq("id",t.id); if(error){ toast(error.message,true); return; } loadTriggers(ov); };
    del.onclick=async()=>{ if(!await confirmDialog({title:"Eliminar disparador",message:"¿Eliminar este disparador?",confirmText:"Eliminar",danger:true})) return; const { error }=await supa.from("flow_triggers").delete().eq("id",t.id); if(error){ toast(error.message,true); return; } loadTriggers(ov); };
    box.appendChild(row);
  });
}
function renderTgCfg(ov){
  const tipo=ov.querySelector("#tgTipo").value;
  const box=ov.querySelector("#tgCfg");
  if(tipo==="keyword"){
    box.innerHTML=`
      <label>Palabras clave (separadas por coma)</label>
      <input id="tgKw" placeholder="Ej. activa 3, quiero info, precio"/>
      <label>Coincidencia</label>
      <select id="tgMatch"><option value="contiene">Contiene</option><option value="exacta">Exacta</option><option value="empieza">Empieza con</option></select>
      <label class="chkline"><input type="checkbox" id="tgInt"/> Interrumpe una conversación activa</label>`;
  } else if(tipo==="pedido_estado"){
    box.innerHTML=`
      <label>Arranca cuando el pedido pasa a…</label>
      <div class="tg-chips" id="tgEstados">${PEDIDO_ESTADOS.map(e=>`<button type="button" data-e="${e}">${e.replace(/_/g," ")}</button>`).join("")}</div>
      <label class="chkline"><input type="checkbox" id="tgInt" checked/> Interrumpe la conversación activa (recomendado para notificar ya)</label>`;
    box.querySelectorAll("#tgEstados button").forEach(b=>b.onclick=()=>b.classList.toggle("on"));
  } else if(tipo==="pedido_recordatorio"){
    box.innerHTML=`
      <label>Cuando el pedido lleve demasiado tiempo en…</label>
      <select id="tgEstadoR">${PEDIDO_ESTADOS.map(e=>`<option value="${e}">${e.replace(/_/g," ")}</option>`).join("")}</select>
      <label>Horas de espera antes de recordar</label>
      <input id="tgHoras" type="number" min="1" value="24"/>
      <label class="chkline"><input type="checkbox" id="tgInt"/> Interrumpe una conversación activa</label>
      <div style="font-size:11.5px;color:var(--faint);margin-top:6px">Se dispara UNA sola vez por pedido. Típico: esperando_adelanto ≥ 12 h → recordar el pago; en_agencia ≥ 24 h → avisar que la agencia devuelve el paquete.</div>`;
  } else if(tipo==="referral"){
    box.innerHTML=`
      <label>Ad IDs del anuncio (separados por coma)</label>
      <input id="tgAds" placeholder="Ej. 120212345678901234"/>
      <div style="font-size:11.5px;color:var(--faint);margin-top:6px">El primer mensaje desde ese anuncio (Click-to-WhatsApp) arranca este flujo, sin depender del texto.</div>`;
  } else {
    box.innerHTML=`<div style="font-size:11.5px;color:var(--faint);margin-top:8px">Recibe TODO lo entrante que no coincida con otro disparador. Solo debe haber uno por canal.</div>`;
  }
}
async function addTrigger(ov){
  const tipo=ov.querySelector("#tgTipo").value;
  let config={}, interrumpe=false;
  if(tipo==="keyword"){
    const kws=(ov.querySelector("#tgKw").value||"").split(",").map(s=>s.trim()).filter(Boolean);
    if(!kws.length){ toast("Escribe al menos una palabra clave",true); return; }
    config={ keywords:kws, match:ov.querySelector("#tgMatch").value };
    interrumpe=ov.querySelector("#tgInt").checked;
  } else if(tipo==="pedido_estado"){
    const estados=[...ov.querySelectorAll("#tgEstados button.on")].map(b=>b.dataset.e);
    if(!estados.length){ toast("Elige al menos un estado",true); return; }
    config={ estados };
    interrumpe=ov.querySelector("#tgInt").checked;
  } else if(tipo==="pedido_recordatorio"){
    const horas=parseFloat(ov.querySelector("#tgHoras").value)||0;
    if(!(horas>0)){ toast("Indica las horas de espera",true); return; }
    config={ estado:ov.querySelector("#tgEstadoR").value, horas };
    interrumpe=ov.querySelector("#tgInt").checked;
  } else if(tipo==="referral"){
    const ads=(ov.querySelector("#tgAds").value||"").split(",").map(s=>s.trim()).filter(Boolean);
    if(!ads.length){ toast("Escribe al menos un Ad ID",true); return; }
    config={ ad_ids:ads };
  }
  const { error }=await supa.from("flow_triggers").insert({ flow_id:st.flowId, channel_id:st.channelId, tipo, config, interrumpe, activo:true });
  if(error){ toast(error.message,true); return; }
  toast("Disparador añadido ✓");
  renderTgCfg(ov); loadTriggers(ov);
}

// ── Crear flujo ──
async function createFlow(){
  const nombre=await askText({title:"Nuevo flujo",message:"Un esqueleto es una plantilla base reutilizable que luego clonas en tus productos.",label:"Nombre del esqueleto",placeholder:"Ej. Venta con OCR",confirmText:"Crear flujo"}); if(!nombre) return;
  const folder=(st.filter!=="__all"&&st.filter!=="__none"&&st.filter!=="__skeleton")?st.filter:null;
  let { data, error } = await supa.from("flows").insert({ channel_id:st.channelId, kind:"skeleton", nombre, estado:"borrador", folder }).select("id").single();
  if(error && /folder|column/.test(error.message)){ ({ data, error } = await supa.from("flows").insert({ channel_id:st.channelId, kind:"skeleton", nombre, estado:"borrador" }).select("id").single()); }
  if(error){ toast(error.message,true); return; }
  await loadFlows(); openFlow(data.id);
}
async function deleteFlow(){
  if(!st.flowId||!st.flow){ toast("No hay flujo abierto",true); return; }
  if(!await confirmDialog({title:"Eliminar flujo",message:`¿Eliminar "${st.flow.nombre}"? Se borrarán sus nodos y conexiones. Esta acción no se puede deshacer.`,confirmText:"Eliminar",danger:true})) return;
  await supa.from("flow_edges").delete().eq("flow_id",st.flowId);
  await supa.from("flow_nodes").delete().eq("flow_id",st.flowId);
  const { error }=await supa.from("flows").delete().eq("id",st.flowId);
  if(error){ toast(error.message,true); return; }
  st.flowId=null; st.flow=null; toast("Flujo eliminado ✓"); showOverview(); await loadFlows();
}

// ── Guardar ──
async function save(){
  if(!st.flowId){ toast("No hay flujo abierto",true); return; }
  const exp=editor.export().drawflow.Home.data;
  // 1) Upsert nodos.
  const rows=[];
  for(const uuid in st.model){
    const m=st.model[uuid]; const dfNode=exp[m.dfId];
    rows.push({ id:uuid, flow_id:st.flowId, tipo:m.tipo, nombre:m.nombre, config:m.config,
      es_inicial:!!m.es_inicial, pos_x:dfNode?dfNode.pos_x:0, pos_y:dfNode?dfNode.pos_y:0 });
  }
  // Borrar nodos que ya no están + reemplazar aristas.
  const { data:oldNodes } = await supa.from("flow_nodes").select("id").eq("flow_id",st.flowId);
  const keep=new Set(rows.map(r=>r.id));
  const toDel=(oldNodes||[]).map(n=>n.id).filter(id=>!keep.has(id));
  if(toDel.length) await supa.from("flow_nodes").delete().in("id",toDel);
  if(rows.length){ const { error } = await supa.from("flow_nodes").upsert(rows); if(error){ toast(error.message,true); return; } }
  // 2) Reconstruir aristas.
  await supa.from("flow_edges").delete().eq("flow_id",st.flowId);
  const edges=[];
  for(const dfId in exp){
    const node=exp[dfId]; const srcUuid=st.dfToUuid[dfId]; const m=st.model[srcUuid]; if(!m) continue;
    const outs=node.outputs||{};
    for(const okey in outs){
      const idx=parseInt(okey.split("_")[1],10)-1;
      const handle=m.handles[idx]||"continuar";
      for(const conn of outs[okey].connections||[]){
        const tgtUuid=st.dfToUuid[conn.node]; if(!tgtUuid) continue;
        edges.push({ flow_id:st.flowId, source_node:srcUuid, source_handle:handle, target_node:tgtUuid });
      }
    }
  }
  if(edges.length){ const { error } = await supa.from("flow_edges").insert(edges); if(error){ toast(error.message,true); return; } }
  toast("Guardado ✓");
}

async function publish(){
  if(!st.flowId) return;
  await save();
  const nuevo = st.flow.estado==="activo" ? "borrador" : "activo";
  const { error } = await supa.from("flows").update({ estado:nuevo }).eq("id",st.flowId);
  if(error){ toast(error.message,true); return; }
  st.flow.estado=nuevo; setStateBadge(nuevo); loadFlows();
  toast(nuevo==="activo"?"Publicado ✓":"Vuelto a borrador");
}

boot();
