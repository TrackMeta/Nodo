<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script>try{document.documentElement.dataset.theme=localStorage.getItem("nodo.theme")||"dark"}catch(e){}</script>
<title>Nodo · IA</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png" />
<link rel="stylesheet" href="shell.css" />
<style>
  :root{
    --bg:#0e1116; --surface:#151a21; --surface-2:#1b222c; --border:#232b36;
    --text:#e7ecf2; --muted:#8a97a8; --faint:#5c6675;
    --brand:#2b7fff; --brand-2:#1e6ff0; --brand-bg:#12233f;
    --green:#22c079; --green-bg:#10281d; --amber:#f0a92b; --red:#e2564a; --red-bg:#2c1615;
    /* Acento IA (violeta/fucsia robot) */
    --ia:#a855f7; --ia-2:#ec4899; --ia-bg:rgba(168,85,247,.12); --ia-border:rgba(168,85,247,.4);
    --font:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box} html,body{height:100%;margin:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px}
  button{font-family:inherit;cursor:pointer}
  /* Hero distintivo de la sección IA */
  .ia-hero{position:relative;overflow:hidden;border:1px solid var(--ia-border);border-radius:18px;
    padding:22px 24px;margin:6px 0 26px;background:
      radial-gradient(120% 140% at 0% 0%,rgba(168,85,247,.18),transparent 55%),
      radial-gradient(120% 140% at 100% 100%,rgba(236,72,153,.14),transparent 55%),
      var(--surface)}
  .ia-hero .ia-badge{display:inline-flex;align-items:center;gap:8px;font-size:11.5px;font-weight:700;
    letter-spacing:.02em;text-transform:uppercase;color:var(--ia);background:var(--ia-bg);
    border:1px solid var(--ia-border);border-radius:999px;padding:5px 12px;margin-bottom:12px}
  .ia-hero .ia-badge svg{width:15px;height:15px}
  .ia-hero h1{margin:0 0 6px;font-size:27px;font-weight:800;letter-spacing:-.5px;
    background:linear-gradient(90deg,var(--ia),var(--ia-2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .ia-hero p{margin:0;color:var(--muted);font-size:13.5px;line-height:1.55;max-width:680px}
  .ia-hero .glow{position:absolute;right:-40px;top:-40px;width:180px;height:180px;border-radius:50%;
    background:radial-gradient(circle,rgba(168,85,247,.35),transparent 70%);filter:blur(20px);pointer-events:none}

  /* Una sola fila con scroll horizontal (7 pestañas no entran en 2 filas sin que
     "Proveedores" quede descolgada). Mismo patrón que config.html. */
  .tabs{display:flex;gap:2px;margin:0 0 22px;border-bottom:1px solid var(--border);flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{background:transparent;border:none;color:var(--muted);font-size:13px;font-weight:600;padding:10px 11px;border-bottom:2px solid transparent;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;flex:none}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--ia);border-bottom-color:var(--ia)}
  .tab svg{width:17px;height:17px}
  .tab img{width:18px;height:18px;border-radius:5px;object-fit:cover}

  h2{font-size:18px;margin:0 0 4px;font-weight:700;letter-spacing:-.2px}
  .sub{color:var(--muted);font-size:13.5px;margin:0 0 20px;line-height:1.55;max-width:640px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 22px;margin-bottom:16px}
  .card.on{border-color:var(--green)}
  .card.ia{border-color:var(--ia-border);background:linear-gradient(180deg,var(--ia-bg),transparent 40%),var(--surface)}
  .chd{display:flex;align-items:center;gap:13px;margin-bottom:4px}
  .chd .ico{width:46px;height:46px;border-radius:13px;background:var(--brand-bg);color:var(--brand);display:flex;align-items:center;justify-content:center;overflow:hidden;flex:none}
  .chd .ico.iaic{background:var(--ia-bg);color:var(--ia)}
  .chd .ico svg{width:22px;height:22px}
  .chd .ico img{width:100%;height:100%;object-fit:cover}
  .chd .nm{font-weight:700;font-size:16px;letter-spacing:-.1px}
  .badge{font-size:10.5px;padding:3px 10px;border-radius:20px;background:var(--surface-2);border:1px solid var(--border);color:var(--muted);font-weight:700}
  .badge.on{background:var(--green-bg);color:var(--green);border-color:transparent}
  .badge.def{background:var(--ia-bg);color:var(--ia);border-color:transparent}
  .desc{color:var(--muted);font-size:12.5px;margin:12px 0 4px;line-height:1.55}
  label{display:block;font-size:11.5px;color:var(--muted);margin:14px 0 6px;font-weight:700}
  .in{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:11px 13px;font-size:13.5px;outline:none;font-family:var(--font)}
  .in:focus{border-color:var(--ia)}
  .row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
  .row>.f{flex:1;min-width:170px}
  .acts{display:flex;gap:8px;margin-top:18px;align-items:center;flex-wrap:wrap}
  .btn{height:40px;padding:0 16px;border-radius:11px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:7px}
  .btn svg{width:16px;height:16px;flex:none}
  .btn.primary{background:var(--brand);border:none;color:#fff}
  .btn.primary:hover{background:var(--brand-2)}
  .btn.ia{background:linear-gradient(90deg,var(--ia),var(--ia-2));border:none;color:#fff}
  .btn.ia:hover{filter:brightness(1.07)}
  .btn.ghost{color:var(--muted)} .btn.danger{color:var(--red);border-color:transparent}
  /* Métodos de pago por país (picker) */
  .paysearch input{margin-bottom:10px}
  .paylist{display:flex;flex-direction:column;gap:8px;max-height:340px;overflow-y:auto}
  .paycard{border:1px solid var(--border);border-radius:11px;overflow:hidden;background:var(--surface-2)}
  .payhead{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;background:none;border:none;color:var(--text);font-size:13.5px;font-weight:600;padding:11px 13px;cursor:pointer;font-family:inherit}
  .payhead:hover{background:var(--surface)}
  .payhead .paycnt{font-size:11px;font-weight:700;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:1px 8px}
  .paybody{padding:2px 13px 13px;display:flex;flex-direction:column;gap:7px}
  .paylbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--faint);margin-top:6px}
  .paychips{display:flex;flex-wrap:wrap;gap:6px}
  .paychip{height:30px;padding:0 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:border-color .12s,color .12s}
  .paychip:hover{border-color:var(--ia);color:var(--ia)}
  .paychip.custom{border-style:dashed;color:var(--muted);align-self:flex-start;margin-top:4px}
  .paygrouphd{font-size:12px;font-weight:700;color:var(--muted);margin:10px 0 6px;display:flex;align-items:center;gap:6px}
  /* Validador de comprobantes */
  .ia-hero2{border:1px solid var(--ia-border);border-radius:14px;padding:14px 16px;margin:0 0 18px;
    background:radial-gradient(120% 140% at 0% 0%,rgba(168,85,247,.14),transparent 60%),var(--surface)}
  .ia-badge2{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;text-transform:uppercase;
    letter-spacing:.02em;color:var(--ia);background:var(--ia-bg);border:1px solid var(--ia-border);border-radius:999px;padding:4px 11px;margin-bottom:9px}
  .ia-badge2 svg{width:14px;height:14px}
  .ia-hero2 p{margin:0;color:var(--muted);font-size:12.5px;line-height:1.55}
  .ocrgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
  @media(max-width:640px){.ocrgrid{grid-template-columns:1fr}}
  .ocrchk{display:flex;align-items:flex-start;gap:9px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer}
  .ocrchk input{margin-top:2px;accent-color:var(--ia);width:16px;height:16px;flex:none}
  .ocrchk span{display:flex;flex-direction:column;gap:2px}
  .ocrchk b{font-size:13px;font-weight:650} .ocrchk small{font-size:11.5px;color:var(--muted);line-height:1.4}
  /* Campos del Bot — cuadrícula alineada */
  .campgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start}
  .campgrid .cf{display:flex;flex-direction:column;gap:6px;min-width:0}
  .campgrid .cf label{margin:0}
  .campvalrow{grid-column:1/-1;display:grid;grid-template-columns:2fr 1fr 40px;gap:12px;align-items:end}
  .camdel{height:40px;width:40px;padding:0;border:1px solid var(--border)!important;flex:none;align-self:flex-end}
  @media(max-width:640px){.campgrid,.campvalrow{grid-template-columns:1fr}}
  .sw{width:44px;height:25px;border-radius:20px;background:var(--surface-2);border:1px solid var(--border);position:relative;transition:.15s;flex:none;cursor:pointer}
  .sw::after{content:"";position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:var(--muted);transition:.15s}
  .sw.on{background:var(--ia-bg);border-color:var(--ia-border)} .sw.on::after{left:20px;background:var(--ia)}
  /* Selector de modelo (abre el picker nativo) */
  .modelpick{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--surface-2);
    border:1px solid var(--border);border-radius:11px;padding:11px 14px;color:var(--text);cursor:pointer;transition:border-color .12s}
  .modelpick:hover{border-color:var(--ia)}
  .modelpick .mp-tx{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
  .modelpick .mp-tx b{font-size:14px;font-weight:650}
  .modelpick .mp-tx small{font-size:11.5px;color:var(--faint);font-family:monospace}
  .modelpick svg{width:18px;height:18px;color:var(--muted);flex:none}
</style>
</head>
<body>
<div class="nodo-page">
  <div class="nodo-wrap" style="--nodo-max:820px">
    <div class="ia-hero">
      <span class="glow"></span>
      <span class="ia-badge" id="iaBadge"></span>
      <h1>Inteligencia Artificial</h1>
      <p>Cómo <b>actúa</b> tu bot: la personalidad del <b>Vendedor IA</b>, qué <b>modelo</b> resuelve cada tarea, cómo <b>valida los comprobantes</b> y las <b>cuentas de IA</b> conectadas. (Lo que el bot <b>sabe</b> de tu negocio va en la sección <b>Negocio</b>.)</p>
    </div>
    <div class="tabs">
      <button class="tab active" data-t="vendedor" id="tabVend"></button>
      <button class="tab" data-t="campos" id="tabCampos"></button>
      <button class="tab" data-t="perfiles" id="tabPerf"></button>
      <button class="tab" data-t="validador" id="tabVal"></button>
      <button class="tab" data-t="proveedores" id="tabProv"></button>
    </div>
    <div id="body"></div>
  </div>
</div>

<script type="module">
import { supa, mountShell, toast, icon, confirmDialog, askChoice, askText } from "./shell.js";
const $ = (id) => document.getElementById(id);
// ── Catálogo de modelos (nombre bonito → ID exacto y FUNCIONAL) ─────
// Claude: IDs vigentes de la Messages API (el backend no manda temperature
// ni budget_tokens, así que todos responden). OpenAI: solo modelos de Chat
// Completions compatibles con max_tokens (los o1/o3 usan otro parámetro y se
// omiten para no romper). El botón "Probar" verifica la conexión real.
const MODELS = {
  anthropic: [
    { id:"claude-opus-4-8",   nm:"Claude Opus 4.8",   tag:"El más capaz · recomendado" },
    { id:"claude-sonnet-5",   nm:"Claude Sonnet 5",   tag:"Equilibrio calidad/costo" },
    { id:"claude-haiku-4-5",  nm:"Claude Haiku 4.5",  tag:"El más rápido y económico" },
    { id:"claude-opus-4-7",   nm:"Claude Opus 4.7",   tag:"Generación anterior de Opus" },
    { id:"claude-opus-4-6",   nm:"Claude Opus 4.6",   tag:"" },
    { id:"claude-sonnet-4-6", nm:"Claude Sonnet 4.6", tag:"" },
    { id:"claude-fable-5",    nm:"Claude Fable 5",    tag:"El más potente (premium)" },
  ],
  openai: [
    { id:"gpt-4o",       nm:"GPT-4o",       tag:"Multimodal · recomendado" },
    { id:"gpt-4o-mini",  nm:"GPT-4o mini",  tag:"Rápido y económico" },
    { id:"gpt-4.1",      nm:"GPT-4.1",      tag:"" },
    { id:"gpt-4.1-mini", nm:"GPT-4.1 mini", tag:"" },
    { id:"gpt-4-turbo",  nm:"GPT-4 Turbo",  tag:"" },
  ],
};
const PROV_LABEL = { anthropic:"Claude", openai:"ChatGPT" };
function modelName(provider, id){
  if(!id) return "";
  const m=(MODELS[provider]||[]).find(x=>x.id===id); if(m) return m.nm;
  for(const p of Object.keys(MODELS)){ const h=MODELS[p].find(x=>x.id===id); if(h) return h.nm; }
  return id; // ID personalizado escrito a mano
}
// Selector nativo de modelo (por proveedor). Devuelve el ID elegido o null si cancela.
async function pickModel(provider, current){
  const opts=(MODELS[provider]||[]).map(m=>({ value:m.id, label:m.nm, desc:m.id+(m.tag?" · "+m.tag:""), icon:"sparkles" }));
  opts.push({ value:"__custom__", label:"Otro modelo…", desc:"Escribir un ID exacto del proveedor", icon:"edit" });
  const chosen=await askChoice({ title:"Elegir modelo de IA", message:"Se guarda el ID exacto tal como lo publica el proveedor.", options:opts, value:current });
  if(!chosen) return null;
  if(chosen==="__custom__"){
    const custom=current&&!(MODELS[provider]||[]).some(m=>m.id===current)?current:"";
    const v=await askText({ title:"ID del modelo", message:"Respeta mayúsculas, minúsculas y guiones.", label:"Identificador del modelo", placeholder:(MODELS[provider]||[])[0]?.id||"", value:custom, confirmText:"Usar modelo" });
    return v||null;
  }
  return chosen;
}
// Selector de modelo para un perfil (permite "por defecto" y ambos proveedores).
async function pickPerfilModel(current){
  const opts=[{ value:"__default__", label:"Por defecto del proveedor", desc:"Usa el modelo configurado del proveedor", icon:"sliders" }];
  for(const p of Object.keys(MODELS)) for(const m of MODELS[p]) opts.push({ value:m.id, label:m.nm, desc:PROV_LABEL[p]+" · "+m.id, icon:"sparkles" });
  opts.push({ value:"__custom__", label:"Otro modelo…", desc:"Escribir un ID manualmente", icon:"edit" });
  const chosen=await askChoice({ title:"Modelo para esta tarea", options:opts, value:current||"__default__" });
  if(chosen==null) return undefined; // cancelado → sin cambios
  if(chosen==="__default__") return "";
  if(chosen==="__custom__"){ const v=await askText({ title:"ID del modelo", label:"Identificador exacto", value:current||"", confirmText:"Usar modelo" }); return v==null?undefined:(v||""); }
  return chosen;
}
const IC={
  robot:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2M20 14h2M15 13v2M9 13v2"/><path d="M12 4v4"/><circle cx="12" cy="4" r="1"/></svg>',
  spark:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.9 4.2 12 2l2.1 2.2L17 5l-1 3 1 3-2.9.8L12 14l-2.1-2.2L7 11l1-3-1-3z"/><path d="M18 16l.7 2.3L21 19l-2.3.7L18 22l-.7-2.3L15 19l2.3-.7z"/></svg>',
  book:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',
  sliders:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>',
  bot:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="12" x="3" y="8" rx="2"/><path d="M12 2v6M9 14h.01M15 14h.01M8 8V6M16 8V6"/></svg>',
  shield:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg>',
  truck:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M15 18H9"/><path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.62l-3.48-4.35A1 1 0 0 0 17.52 8H14"/><circle cx="17" cy="18" r="2"/><circle cx="7" cy="18" r="2"/></svg>',
  doc:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7z"/><path d="M14 2v5h5M9 13h6M9 17h6"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>',
  clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>',
};
const LOGO={ claude:"../assets/apps/claude.png", chatgpt:"../assets/apps/chatgpt.png" };
const PROVIDERS = [
  { id:"anthropic", nm:"Claude (Anthropic)", logo:LOGO.claude, desc:"Muy bueno en razonamiento, redacción y lectura de comprobantes (OCR).",
    keyHint:"sk-ant-...", models:["claude-opus-4-8","claude-sonnet-5","claude-haiku-4-5"] },
  { id:"openai", nm:"ChatGPT (OpenAI)", logo:LOGO.chatgpt, desc:"Modelos GPT de OpenAI.",
    keyHint:"sk-...", models:["gpt-4o","gpt-4o-mini"] },
];
// Las 3 tareas corresponden 1:1 a las 3 operaciones del nodo IA del motor
// (generar_texto / analizar_imagen / extraer). Son las necesarias y suficientes.
const PERFILES=[
  ["ventas","Conversación y ventas","La IA que asesora, responde dudas y cierra ventas por chat (operación “generar texto”). Es la que más se usa."],
  ["ocr","Validar comprobantes (OCR)","La IA que lee las capturas de pago (Yape, Plin, transferencias) y valida el pago (operación “analizar imagen”). Se apoya en la pestaña Validador de comprobantes."],
  ["extraccion","Extraer datos","La IA que saca datos ordenados de un texto: nombre, dirección, distrito, etc. (operación “extraer”). También la usa el Router de intención de Palabras clave."],
];
const st = { channelId:null, tab:"vendedor", iaProvider:null, cfg:{}, channel:{}, pick:{}, perfMod:{}, form:{}, ocr:null, campos:{ fields:[], deleted:[], loaded:false } };
function esc(s){ return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function slug(s){ return (s||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"").slice(0,40); }
const CAMPO_SUGERIDOS=[
  ["nombre_negocio","Nombre del negocio"],["datos_pago","Datos de pago (Yape/Plin)"],
  ["transferencia_bancaria","Transferencia bancaria (CCI)"],["cuenta_bancaria","Cuenta bancaria (nº)"],
  ["whatsapp_contacto","WhatsApp de contacto"],["horario_atencion","Horario de atención"],
  ["direccion","Dirección / local"],["web","Página web"],["instagram","Instagram"],
  ["tiempo_entrega","Tiempo de entrega"],["politica_devolucion","Política de devolución"],
];

async function boot(){
  const { data:{ session } } = await supa.auth.getSession();
  if(!session){ location.href="index.html"; return; }
  $("iaBadge").innerHTML=IC.robot+"<span>Centro de IA</span>";
  $("tabVend").innerHTML=IC.robot+"<span>Vendedor IA</span>";
  $("tabCampos").innerHTML=IC.bot+"<span>Campos del Bot</span>";
  $("tabPerf").innerHTML=IC.sliders+"<span>Perfiles</span>";
  $("tabVal").innerHTML=IC.shield+"<span>Validador</span>";
  $("tabProv").innerHTML=IC.spark+"<span>Proveedores</span>";
  document.querySelectorAll(".tab").forEach(b=> b.onclick=()=>{ st.tab=b.dataset.t; document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x===b)); render(); });
  const shell=await mountShell({ active:"ia" });
  st.channelId=shell.channelId;
  shell.onChannel(id=>{ st.channelId=id; loadCfg(); });
  if(st.channelId) await loadCfg();
}
async function loadCfg(){
  let { data:ch, error:chErr } = await supa.from("channels")
    .select("nombre,ia_provider,negocio,negocio_form,ia_perfiles,ocr_config,buffer_default_seg,pedidos_config").eq("id",st.channelId).maybeSingle();
  if(chErr){ ({ data:ch, error:chErr } = await supa.from("channels").select("nombre,ia_provider,negocio,negocio_form,ia_perfiles,ocr_config,buffer_default_seg").eq("id",st.channelId).maybeSingle()); }
  if(chErr){ ({ data:ch, error:chErr } = await supa.from("channels").select("nombre,ia_provider,negocio,ia_perfiles").eq("id",st.channelId).maybeSingle()); }
  if(chErr){ ({ data:ch } = await supa.from("channels").select("nombre,ia_provider").eq("id",st.channelId).maybeSingle()); }
  st.iaProvider = ch?.ia_provider ?? null; st.channel = ch || {}; st.perfMod={};
  const { data:rows } = await supa.from("channel_ai").select("provider,model,updated_at").eq("channel_id",st.channelId);
  st.cfg = {}; (rows||[]).forEach(r=> st.cfg[r.provider] = { model:r.model, updated_at:r.updated_at });
  render();
}
function render(){
  const b=$("body");
  if(st.tab==="vendedor") renderVendedor(b);
  else if(st.tab==="campos") renderCampos(b);
  else if(st.tab==="perfiles") renderPerfiles(b);
  else if(st.tab==="validador") renderValidador(b);
  else renderProveedores(b);
}
function goTab(name){ st.tab=name; document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x.dataset.t===name)); render(); }

async function saveCampos(e){
  const btn=e.target; for(const f of st.campos.fields){ if(!f.nombre.trim()||!f.key.trim()){ toast("Cada campo necesita nombre y clave",true); return; } }

  if(st.campos.deleted.length){ const { error }=await supa.from("custom_fields").delete().in("id",st.campos.deleted); if(error){ btn.disabled=false; btn.textContent=old; toast(error.message,true); return; } st.campos.deleted=[]; }
  const rows=st.campos.fields.map(f=>{ const r={ channel_id:st.channelId, nombre:f.nombre.trim(), key:f.key.trim(), tipo:f.tipo||"text", modo:"fijo", valor:f.valor||null, descripcion:f.descripcion||null }; if(f.id) r.id=f.id; return r; });
  if(rows.length){ const { error }=await supa.from("custom_fields").upsert(rows);
    if(error){ btn.disabled=false; btn.textContent=old; toast(/valor|descripcion|column/.test(error.message)?"Falta aplicar la migración 0013 (valor/descripcion)":error.message.includes("duplicate")?"Hay claves repetidas":error.message,true); return; } }
  btn.disabled=false; btn.textContent=old; st.campos.loaded=false; toast("Campos guardados ✓"); renderCampos($("body"));
}

// ── Conocimiento del negocio — FORMULARIO estructurado ──────────────
// El usuario llena un formulario ordenado; al guardar se compila a un texto
// bien estructurado (Markdown) en channels.negocio (lo que lee el motor) y se
// conserva el formulario en channels.negocio_form para poder re-editarlo.
const NEG_FIELDS=[
  ["nombre","Nombre del negocio","input","Ej. Mi Negocio",""],
  ["rubro","¿Qué vendes? (productos o servicios)","ta","Ej. Cursos y guías digitales de fitness; también asesorías 1 a 1…",""],
  ["publico","¿A quién le vendes? (cliente ideal)","ta","Ej. Personas de 25-45 en Perú que quieren bajar de peso sin gimnasio",""],
  ["propuesta","Propuesta de valor / diferencial","ta","¿Por qué te compran a ti y no a la competencia?",""],
  ["horario","Horario de atención","input","Ej. Lun-Sáb 9:00-20:00 (hora Perú)",""],
  ["transferir","¿Cuándo pasar a una persona? (humano)","ta","Ej. Reclamos, facturación, o si el bot no está seguro de algo",""],
  ["pagos","¿Cómo se paga? (general)","ta","Ej. contraentrega en Lima; adelanto para provincia. Los métodos exactos (Yape/Plin/cuentas) se ponen en la pestaña Validador de comprobantes y se sincronizan solos.",""],
  ["entrega","Envíos y entrega","ta","Ej. Digital: enlace de Drive al confirmar el pago. Físico: Lima 24h contraentrega, provincia por Shalom/Olva con adelanto.",""],
  ["politicas","Políticas (cambios, devoluciones, garantía)","ta","Ej. Cambios dentro de 7 días con boleta; sin devolución de digitales.",""],
  ["no_hacer","Nunca hacer / no prometer","ta","Ej. No prometer resultados médicos; no dar descuentos no autorizados; no pedir datos de tarjeta.",""],
];
const TONOS={ cercano:"Cercano y amigable, con tuteo", formal:"Formal y profesional, trato de usted", directo:"Directo y breve, sin rodeos", divertido:"Divertido y relajado, con buena onda", ventas:"Persuasivo y orientado a cerrar la venta" };
// Sección "cómo debe comportarse" (persona del bot) al inicio del contexto.
function compilePersona(form){
  const p=[];
  if(form.nombre_ia&&form.nombre_ia.trim()) p.push(`Te llamas ${form.nombre_ia.trim()}${form.nombre?`, asesor(a) de ventas de ${form.nombre.trim()}`:""}. Si te preguntan tu nombre, preséntate así.`);
  const t=[]; if(form.tono&&TONOS[form.tono]) t.push(TONOS[form.tono]); if(form.tono_detalle&&form.tono_detalle.trim()) t.push(form.tono_detalle.trim());
  if(t.length) p.push("Tono: "+t.join(". ")+".");
  p.push(form.negritas?"Puedes usar *negritas* de WhatsApp (un asterisco a cada lado) para resaltar lo importante, con moderación.":"No uses formato de negritas.");
  const mx=Number(form.emoji_max); const mn=Number(form.emoji_min)||0;
  if(!isNaN(mx)){ p.push(mx<=0?"No uses emojis.":`Usa emojis con moderación: entre ${mn} y ${mx} por mensaje, solo cuando aporten.`); }
  return p.length?p.join(" "):"";
}
function compileNegocio(form){
  const L=[]; const add=(t,v)=>{ if(v&&String(v).trim()) L.push(`## ${t}\n${String(v).trim()}`); };
  if(form.nombre&&form.nombre.trim()) L.push(`# ${form.nombre.trim()}`);
  const persona=compilePersona(form); if(persona) L.push("## Cómo debes comportarte\n"+persona);
  add("Qué vendemos",form.rubro); add("Cliente ideal",form.publico); add("Propuesta de valor",form.propuesta);
  add("Horario de atención",form.horario);
  add("Cuándo transferir a una persona",form.transferir); add("Cómo se paga",form.pagos);
  add("Envíos y entrega",form.entrega); add("Políticas",form.politicas); add("Nunca hacer / no prometer",form.no_hacer);
  const faq=(form.faq||[]).filter(x=>x&&(x.q||x.a));
  if(faq.length) L.push("## Preguntas frecuentes\n"+faq.map(x=>`- P: ${(x.q||"").trim()}\n  R: ${(x.a||"").trim()}`).join("\n"));
  if(form.extra&&form.extra.trim()) L.push("## Información adicional\n"+form.extra.trim());
  return L.join("\n\n");
}
// Semilla común del formulario del negocio, compartida por las pestañas
// "Vendedor IA" (personalidad + retraso) y "Conocimiento" (identidad/negocio).
// Ambas guardan el formulario COMPLETO, así que editar una preserva la otra.
function seedForm(){
  const c=st.channel||{};
  let form=c.negocio_form && typeof c.negocio_form==="object" ? {...c.negocio_form} : {};
  if(!c.negocio_form && c.negocio) form.extra=c.negocio; // migra el texto libre anterior
  if(!Array.isArray(form.faq)) form.faq=[];
  if(form.negritas===undefined) form.negritas=true;
  if(form.emoji_min===undefined) form.emoji_min=0;
  if(form.emoji_max===undefined) form.emoji_max=2;
  if(form.tono===undefined) form.tono="cercano";
  st.retraso = c.buffer_default_seg ?? 4;
  st.form=form;
  return form;
}
// Guarda el formulario completo + retraso (la única fuente de ambos es st).
async function saveForm(btn){
  const old=btn.textContent; btn.disabled=true; btn.textContent="Guardando…";
  const form=st.form;
  const negocio=compileNegocio(form).trim()||null;
  let { error }=await supa.from("channels").update({ negocio, negocio_form:form, buffer_default_seg:st.retraso }).eq("id",st.channelId);
  if(error && /negocio_form|column/.test(error.message)){ ({ error }=await supa.from("channels").update({ negocio, buffer_default_seg:st.retraso }).eq("id",st.channelId)); }
  if(error && /buffer_default_seg|column/.test(error.message)){ ({ error }=await supa.from("channels").update({ negocio }).eq("id",st.channelId)); }
  btn.disabled=false; btn.textContent=old;
  if(error){ toast(/negocio|column/.test(error.message)?"Falta aplicar la migración 0023":error.message,true); return false; }
  st.channel.negocio=negocio; st.channel.negocio_form=form; st.channel.buffer_default_seg=st.retraso;
  return true;
}

// ── Validador de comprobantes (OCR) ────────────────────────────────
// Sube una imagen (referencia de comprobante) al bucket media y la agrega.
function pickImg(arr, after){
  const inp=document.createElement("input"); inp.type="file"; inp.accept="image/*";
  inp.onchange=async()=>{
    const file=inp.files&&inp.files[0]; if(!file) return; toast("Subiendo…");
    try{
      const dataURL=await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
      const { data,error }=await supa.functions.invoke("media-upload",{ body:{ channel_id:st.channelId, filename:file.name, content_type:file.type, data:dataURL } });
      if(error||!data?.url){ toast("No se pudo subir la imagen",true); return; }
      arr.push({ url:data.url, mime:file.type, filename:file.name }); toast("Imagen agregada ✓"); after&&after();
    }catch(e){ toast("Error al subir",true); }
  };
  inp.click();
}

  L.push("## Consideraciones\n- Pagos interoperables: un Yape puede llegar a Plin y viceversa; las transferencias cruzan bancos. No invalides por app/banco distinto si el dinero llega a una cuenta válida.\n- El destinatario puede salir parcial/enmascarado (PER FLO, P*** F****, iniciales); vale si coincide razonablemente.\n- Un «pago programado/en proceso» no ejecutado NO es válido.");

        ${isDef?'<span class="badge def">Por defecto</span>':''}</div>
      <div class="desc">${esc(p.desc)}</div>
      <label>API key ${cfg?'<span style="color:var(--faint)">(vacía para conservar la actual)</span>':''}</label>
      <input class="in" type="password" id="key_${p.id}" autocomplete="off" placeholder="${cfg?'•••••••• guardada':p.keyHint}"/>
      <label>Modelo por defecto</label>
      <button class="modelpick" data-mp="${p.id}">
        <span class="mp-tx"><b>${esc(modelName(p.id,curModel))}</b><small>${esc(curModel)}</small></span>
        ${icon("chevron")}
      </button>
      <div class="acts">
        <button class="btn ia" data-a="save" data-p="${p.id}">Guardar</button>
        <button class="btn" data-a="test" data-p="${p.id}" ${cfg?'':'disabled'}>Probar</button>
        ${!isDef&&cfg?`<button class="btn ghost" data-a="default" data-p="${p.id}">Usar por defecto</button>`:''}
        ${cfg?`<button class="btn danger" data-a="delete" data-p="${p.id}">Eliminar</button>`:''}
      </div>`;
    cont.appendChild(card);
  });
  cont.querySelectorAll("button[data-a]").forEach(b=> b.onclick=()=>onAction(b.dataset.a,b.dataset.p,b));
  cont.querySelectorAll("[data-mp]").forEach(b=> b.onclick=async()=>{
    const p=b.dataset.mp; const def=(MODELS[p]||[])[0]?.id||"";
    const cur=st.pick[p] ?? st.cfg[p]?.model ?? def;
    const chosen=await pickModel(p,cur);
    if(chosen){ st.pick[p]=chosen; renderProveedores(box); }
  });
}
async function call(body){
  const { data, error } = await supa.functions.invoke("ai-config", { body });
  if(error){ let d=""; try{ d=(await error.context?.json?.())?.detalle||""; }catch{} throw new Error(d||error.message||"error"); }
  return data;
}
async function onAction(action, provider, btn){
  const key=$("key_"+provider)?.value?.trim()||null;
  const def=(MODELS[provider]||[])[0]?.id||null;
  const model=st.pick[provider] ?? st.cfg[provider]?.model ?? def;
  btn.disabled=true; const old=btn.textContent;
  try{
    if(action==="save"){
      if(!key && !st.cfg[provider]){ toast("Pega la API key primero",true); return; }
      await call({ action:"save", channel_id:st.channelId, provider, api_key:key, model, make_default:!st.iaProvider });
      toast("Guardado ✓");
    } else if(action==="test"){
      btn.textContent="Probando…";
      const r=await call({ action:"test", channel_id:st.channelId, provider });
      if(r?.ok) toast("IA responde ✓"); else toast("Falló: "+(r?.detalle||r?.error||""),true); return;
    } else if(action==="default"){ await call({ action:"default", channel_id:st.channelId, provider }); toast("Proveedor por defecto ✓"); }
    else if(action==="delete"){ if(!await confirmDialog({title:"Eliminar configuración",message:"¿Eliminar la configuración de "+provider+"?",confirmText:"Eliminar",danger:true})) return; await call({ action:"delete", channel_id:st.channelId, provider }); toast("Eliminado ✓"); }
    await loadCfg();
  }catch(e){ toast(e.message||"error",true); }
  finally{ btn.disabled=false; btn.textContent=old; }
}
boot();
</script>
</body>
</html>
