<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script>try{document.documentElement.dataset.theme=localStorage.getItem("nodo.theme")||"dark"}catch(e){}</script>
<title>Nodo · Productos</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png" />
<link rel="stylesheet" href="shell.css" />
<style>
  :root{
    --bg:#0e1116; --surface:#151a21; --surface-2:#1b222c; --border:#232b36;
    --text:#e7ecf2; --muted:#8a97a8; --faint:#5c6675;
    --brand:#2b7fff; --brand-2:#1e6ff0; --brand-bg:#12233f;
    --green:#22c079; --green-bg:#10281d; --amber:#f0a92b; --red:#e2564a;
    --font:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box} html,body{height:100%;margin:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px}
  button{font-family:inherit;cursor:pointer}
  .pcard .c-tt{font-size:16.5px;font-weight:700;letter-spacing:-.2px}
  .tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border);flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{background:transparent;border:none;color:var(--muted);font-size:14px;font-weight:600;padding:10px 16px;border-bottom:2px solid transparent;white-space:nowrap;flex:none;cursor:pointer}
  .tab.active{color:var(--brand);border-bottom-color:var(--brand)}
  /* Pestañas avanzadas (Receta, Flujos): existen pero se ven secundarias. */
  .tab-adv{opacity:.6;font-size:13px}
  .tab-adv.active{opacity:1}
  .hint{color:var(--muted);font-size:12.5px;line-height:1.55}
  label{display:block;font-size:11.5px;color:var(--muted);margin:16px 0 6px;font-weight:700}
  .in,.ta{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:10px 12px;font-size:13.5px;outline:none;font-family:var(--font)}
  .ta{min-height:90px;font-family:monospace;font-size:12px}
  .sel{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);height:40px;padding:0 12px;font-size:13.5px;outline:none}
  .in:focus,.ta:focus{border-color:var(--brand)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
  .card h4{margin:0 0 4px;font-size:14px;font-weight:700}
  .row{display:flex;gap:12px;align-items:center} .row>*{flex:1}
  .chk{display:flex;align-items:center;gap:8px;font-size:13.5px;margin-top:14px}
  .flowrow{display:flex;align-items:center;gap:10px;padding:13px 0;border-bottom:1px solid var(--border)}
  .badge{font-size:10px;padding:3px 10px;border-radius:20px;background:var(--surface-2);border:1px solid var(--border);color:var(--muted);font-weight:700}
  .badge.on{background:var(--green-bg);color:var(--green);border-color:transparent}
  .linkbtn{font-size:12.5px;padding:6px 12px;border:1px solid var(--border);border-radius:9px;color:var(--text);text-decoration:none;font-weight:600;display:inline-flex;align-items:center;gap:5px}
  .ico{width:16px;height:16px;flex:none}
  .linkbtn .ico{width:14px;height:14px}
  #emojiBtn .ico{width:20px;height:20px}
  .nodo-pill .ico{width:12px;height:12px;vertical-align:-1px;margin-right:3px}
  .nodo-folder .ico{width:13px;height:13px;vertical-align:-2px;margin-right:4px}
  h4 .ico{width:15px;height:15px;vertical-align:-2px;margin-right:5px}
  .empty{color:var(--faint);text-align:center;padding:40px}
  .sw{position:relative;width:38px;height:22px;border-radius:20px;background:var(--surface-2);border:1px solid var(--border);flex:none;cursor:pointer;transition:.15s}
  .sw.on{background:var(--green,#22c079);border-color:var(--green,#22c079)}
  .sw::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.15s}
  .sw.on::after{transform:translateX(16px)}
  .iconbtn{width:30px;height:30px;flex:none;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
  .iconbtn:hover{color:var(--text);border-color:var(--brand)}
  .btn{height:40px;padding:0 16px;border-radius:11px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:13.5px;font-weight:600}
  .btn.primary{background:var(--brand);border:none;color:#fff} .btn.primary:hover{background:var(--brand-2)}

  /* ══ Identidad de la sección IA (violeta/fucsia) — pestaña "Cómo lo vende la IA" ══
     Mismo sello que la sección IA y el IA Router (gradiente a855f7→ec4899 + robot). */
  :root{ --ia1:#a855f7; --ia2:#ec4899; --ia-bg:rgba(168,85,247,.14); --ia-brd:rgba(168,85,247,.42); }
  /* Pestaña IA: chispa violeta siempre; activa → texto en gradiente + subrayado fucsia */
  .tab[data-t="ia"]{display:inline-flex;align-items:center;gap:7px}
  .tab[data-t="ia"] svg{width:15px;height:15px;flex:none;color:var(--ia1)}
  .tab[data-t="ia"].active{
    color:transparent;border-bottom-color:var(--ia2);
    background:linear-gradient(90deg,var(--ia1),var(--ia2));-webkit-background-clip:text;background-clip:text;
  }
  .tab[data-t="ia"].active svg{color:var(--ia1)}
  /* Cabecera de identidad del panel (glyph robot en gradiente) */
  .ia-hd{display:flex;align-items:flex-start;gap:12px;margin:2px 0 16px}
  .ia-hd .glyph{width:36px;height:36px;flex:none;border-radius:11px;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--ia1),var(--ia2));color:#fff;
    box-shadow:0 8px 20px -6px rgba(168,85,247,.6),inset 0 1px 0 rgba(255,255,255,.25)}
  .ia-hd .glyph svg{width:19px;height:19px}
  .ia-hd .tt{font-size:15px;font-weight:750;letter-spacing:-.01em;
    background:linear-gradient(90deg,var(--ia1),var(--ia2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .ia-hd .ds{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5}
  .ia-hd .ds a{color:var(--ia1)}
  /* Tarjeta del pane IA: borde + nebulosa sutil violeta sobre el glass (ID gana al glass !important) */
  #tabBody .ia-card{
    border-color:var(--ia-brd)!important;
    background:
      radial-gradient(130% 130% at 0% 0%, rgba(168,85,247,.12), transparent 55%),
      radial-gradient(130% 130% at 100% 100%, rgba(236,72,153,.08), transparent 55%),
      var(--glass,var(--surface))!important;
    box-shadow:0 10px 34px -14px rgba(168,85,247,.4);
  }
  .ia-card .in:focus,.ia-card .ta:focus,.ia-card textarea:focus,.ia-card .sel:focus{
    border-color:var(--ia1);box-shadow:0 0 0 3px var(--ia-bg)}
</style>
</head>
<body>
<div class="nodo-page">
  <div class="nodo-wrap">
    <!-- VISTA TARJETAS -->
    <div id="gridView">
      <div class="nodo-head">
        <div class="grow">
          <h1 class="nodo-title">Productos</h1>
          <p class="nodo-lead">Tu catálogo de productos digitales y físicos. Cada producto define sus versiones, precios, entrega o envío, y los flujos que lo venden.</p>
        </div>
        <div class="nodo-actions">
          <button class="nodo-btn primary" id="addProduct"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg> Nuevo producto</button>
        </div>
      </div>
      <div class="nodo-folders" id="folders"></div>
      <div class="nodo-cards" id="cards"></div>
    </div>
    <!-- VISTA DETALLE -->
    <div id="detailView" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
        <button class="nodo-back" id="backBtn" style="margin-bottom:0"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Volver a productos</button>
        <div style="display:flex;gap:8px">
          <button class="nodo-btn danger" id="delBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg> Eliminar</button>
          <button class="btn primary" id="saveBtn">Guardar cambios</button>
        </div>
      </div>
      <div id="detail" style="margin-top:18px"></div>
    </div>
  </div>
</div>

<script type="module">
import { supa, mountShell, toast, icon, askText, confirmDialog } from "./shell.js";
import { botonesHtml, wireBotones, limpiaBotones } from "./bubble-buttons.js";
const $ = (id) => document.getElementById(id);
const st = { channelId:null, prod:null, versions:[], tab:"datos", list:[], folder:"__all", localFolders:new Set() };
function esc(s){ return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
// Emojis para IDENTIFICAR el producto (se muestran sobre el avatar en la
// Bandeja). El emoji del producto se conserva; el picker ofrece TODOS.
const EMOJI_CATS=[
  { n:"Populares", e:"📕💪🏋️🥊🎯🧠💰📈🚀🔥⚡🎓🍳🌱❤️✨📱🎸🎨🐶⚽🧘💊🛠️📷👟👕👗👠👜🧴🎁📦" },
  { n:"Caras", e:"😀😃😄😁😆😅😂🤣🥲☺️😊😇🙂🙃😉😌😍🥰😘😋😎🥸🤩🥳😏🤔🤗🤭🥺😴🤤🤠🤑🤖😺" },
  { n:"Animales y naturaleza", e:"🐶🐱🐭🐹🐰🦊🐻🐼🐨🐯🦁🐮🐷🐸🐵🐔🐧🐦🦆🦅🦉🐺🐗🐴🦄🐝🦋🐢🐍🐙🦐🦀🐠🐬🐳🦈🐊🐅🦓🦍🐘🐪🦒🐕🐈🌵🌲🌴🌱🌿☘️🍀🎋🍁🍄🌾💐🌷🌹🌺🌸🌼🌻🌞⭐🌟✨⚡🔥🌈☀️❄️💧" },
  { n:"Comida y bebida", e:"🍏🍎🍐🍊🍋🍌🍉🍇🍓🫐🍈🍒🍑🥭🍍🥥🥝🍅🥑🥦🥬🥒🌶️🌽🥕🧄🧅🥔🍠🥐🍞🥨🧀🥚🍳🥞🧇🥓🥩🍗🍖🌭🍔🍟🍕🥪🌮🌯🥗🍝🍜🍲🍣🍱🍙🍚🍤🍢🍡🍧🍨🍦🥧🧁🍰🎂🍮🍭🍬🍫🍿🍩🍪🍯🥛☕🍵🧃🥤🧋🍶🍺🍻🥂🍷🥃🍸🍹" },
  { n:"Actividades y objetos", e:"⚽🏀🏈⚾🎾🏐🏉🎱🏓🏸🏒🏑⛳🏹🎣🥊🥋🎽⛸️🎿🏂🏋️🏄🏊🚴🏆🥇🥈🥉🏅🎖️🎫🎪🤹🎭🎨🎬🎤🎧🎼🎹🥁🎷🎺🎸🎻🎲🎯🎳🎮🕹️🧩♟️📱💻⌨️🖥️🖨️📷📸📹🎥📞☎️📺📻🎙️⏰🔋🔌💡🔦🕯️💸💵💴💶💷💰💳💎⚖️🧰🔧🔨🛠️⚙️🧲🔫💣🔪🗡️🛡️🚬🔮📿🧿⚗️🔭🔬💊💉🩸🩺🌡️🧹🧺🧻🚽🚿🛁🧼🪒🧽🧴🔑🗝️🚪🛋️🛏️🧸🖼️🛍️🛒🎁🎈🎀🎊🎉✉️📩📦📝✏️📏📐✂️📌📍" },
  { n:"Viajes y símbolos", e:"🚗🚕🚙🚌🚎🏎️🚓🚑🚒🚚🚛🚜🛴🚲🛵🏍️🚨✈️🚀🛸🚁⛵🚤🚢⚓⛽🚦🗺️🗿🗽🏰🏯🎡🎢🎠⛲🏖️🏝️🏜️🌋⛰️🏔️🏕️🏠🏡🏢🏬🏥🏦🏨🏪🏫⛪🕌✅❌⭕❗❓💯🔴🟠🟡🟢🔵🟣⚫⚪🟤🔶🔷🔸🔹⭐❤️🧡💛💚💙💜🖤🤍💔♻️⚜️🔱" },
];
function splitEmojis(str){ try{ return [...new Intl.Segmenter("es",{granularity:"grapheme"}).segment(str)].map(s=>s.segment); }catch(_){ return Array.from(str); } }

async function boot(){
  const { data:{ session } } = await supa.auth.getSession();
  if(!session){ location.href="index.html"; return; }
  const shell=await mountShell({ active:"productos" });
  st.channelId=shell.channelId;
  shell.onChannel(id=>{ st.channelId=id; st.prod=null; showGrid(); loadProducts(); });
  $("addProduct").onclick = createProduct;
  $("saveBtn").onclick = saveProduct;
  $("delBtn").onclick = deleteProduct;
  $("backBtn").onclick = ()=>{ st.prod=null; showGrid(); loadProducts(); };
  await loadProducts();
}
function showGrid(){ $("gridView").style.display=""; $("detailView").style.display="none"; }
function showDetail(){ $("gridView").style.display="none"; $("detailView").style.display=""; window.scrollTo(0,0); }

async function loadProducts(){
  // Las opciones de compra son la verdad: si un producto tiene más de una, ES
  // multi-opción. Ya no hace falta un checkbox aparte que lo declare.
  const full="id,nombre,config,folder,emoji,tipo,product_versions(id,precio,activo)";
  let { data, error } = await supa.from("products").select(full).eq("channel_id",st.channelId).order("created_at");
  if(error){ ({ data, error } = await supa.from("products").select("id,nombre,config,folder,emoji,tipo").eq("channel_id",st.channelId).order("created_at")); }
  if(error){ ({ data } = await supa.from("products").select("id,nombre,config").eq("channel_id",st.channelId).order("created_at")); }
  st.list=data||[]; renderFolders(); renderCards();
}
// Opciones activas de un producto (para las tarjetas del grid).
function opcionesDe(p){ return (p.product_versions||[]).filter(v=>v.activo!==false); }
function allFolders(){ const s=new Set(st.localFolders); st.list.forEach(x=>{ if(x.folder) s.add(x.folder); }); return [...s].sort(); }
function countIn(v){ if(v==="__all") return st.list.length; if(v==="__none") return st.list.filter(p=>!p.folder).length; return st.list.filter(p=>p.folder===v).length; }
function renderFolders(){
  const isReal=st.folder!=="__all"&&st.folder!=="__none";
  const tabs=[["__all","Todos"],["__none","Sin carpeta"],...allFolders().map(f=>[f,f])];
  $("folders").innerHTML=tabs.map(([v,l])=>`<button class="nodo-folder ${st.folder===v?'on':''}" data-f="${esc(v)}">${v==="__all"||v==="__none"?"":icon("folder")}${esc(l)}<span class="cnt">${countIn(v)}</span></button>`).join("")
    +`<button class="nodo-folder add" id="newFolder">+ Carpeta</button>`
    +(isReal?`<button class="nodo-folder" id="delFolder" style="color:var(--red);border-color:transparent">${icon("trash")} Eliminar carpeta</button>`:"");
  $("folders").querySelectorAll(".nodo-folder[data-f]").forEach(b=> b.onclick=()=>{ st.folder=b.dataset.f; renderFolders(); renderCards(); });
  $("newFolder").onclick=async()=>{ const n=await askText({title:"Nueva carpeta",label:"Nombre de la carpeta",placeholder:"Ej. Cursos",confirmText:"Crear"}); if(n){ st.localFolders.add(n); st.folder=n; renderFolders(); renderCards(); } };
  const df=$("delFolder"); if(df) df.onclick=deleteFolder;
}
async function deleteFolder(){
  const f=st.folder; if(f==="__all"||f==="__none") return;
  const n=countIn(f);
  if(!await confirmDialog(n?{title:"Eliminar carpeta",message:`La carpeta "${f}" tiene ${n} producto(s). Se moverán a "Sin carpeta".`,confirmText:"Continuar"}:{title:"Eliminar carpeta",message:`¿Eliminar la carpeta vacía "${f}"?`,confirmText:"Eliminar",danger:true})) return;
  if(n){ const { error }=await supa.from("products").update({ folder:null }).eq("channel_id",st.channelId).eq("folder",f); if(error){ toast(error.message,true); return; } }
  st.localFolders.delete(f); st.folder="__all"; toast("Carpeta eliminada ✓"); await loadProducts();
}
function renderCards(){
  let list=st.list;
  if(st.folder==="__none") list=list.filter(p=>!p.folder); else if(st.folder!=="__all") list=list.filter(p=>p.folder===st.folder);
  const box=$("cards");
  if(!st.list.length){
    box.innerHTML=`<div class="nodo-empty" style="grid-column:1/-1"><div class="e-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5M12 22V12"/></svg></div><h3>Aún no hay productos</h3><p>Crea tu primer producto para configurar sus versiones, precios y flujos de venta.</p></div>`;
    return;
  }
  box.innerHTML="";
  list.forEach(p=>{
    const el=document.createElement("div"); el.className="nodo-card pcard";
    // El precio y el nº de opciones salen de las Opciones de compra reales.
    const ops=opcionesDe(p);
    const precios=ops.map(o=>o.precio).filter(x=>x!=null&&x!=="");
    const precio = precios.length>1
      ? `S/ ${Math.min(...precios.map(Number))} – ${Math.max(...precios.map(Number))}`
      : precios.length===1 ? `S/ ${esc(precios[0])}`
      : (p.config&&p.config.precio?`S/ ${esc(p.config.precio)}`:"");
    const multi=ops.length>1;
    const emIc = p.emoji ? `<span style="font-size:24px;line-height:1">${esc(p.emoji)}</span>` : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5M12 22V12"/></svg>`;
    el.innerHTML=`
      <div class="c-ic">${emIc}</div>
      <div class="c-tt">${esc(p.nombre)}</div>
      <div class="c-sub">${p.tipo==="fisico"?"Producto físico · envíos":"Producto digital"}</div>
      <div class="c-foot"><span class="nodo-pill neutral">${p.tipo==="fisico"?icon("box")+"Físico":icon("download")+"Digital"}</span><span class="nodo-pill neutral">${multi?`${ops.length} opciones`:'1 opción'}</span>${precio?`<span class="nodo-pill neutral">${precio}</span>`:''}${p.folder?`<span class="nodo-pill neutral">${icon("folder")}${esc(p.folder)}</span>`:''}</div>`;
    el.onclick=()=>openProduct(p.id); box.appendChild(el);
  });
  const add=document.createElement("div"); add.className="nodo-card new";
  add.innerHTML=`<div class="c-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></div><div class="c-tt" style="font-size:14px;font-weight:700">Nuevo producto</div>`;
  add.onclick=createProduct; box.appendChild(add);
}
// Modal de creación: primero ELIGES qué vendes (físico o digital) — es lo que
// decide cómo se ve toda la ficha —, luego el nombre. Devuelve {tipo,nombre} o null.
function nuevoProductoModal(){
  return new Promise((resolve)=>{
    let tipo=null;
    const ov=document.createElement("div");
    ov.style.cssText="position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:18px";
    const card=(t,ic,tt,d)=>`<button class="npt" data-t="${t}" style="flex:1;min-width:180px;text-align:left;border:1.5px solid var(--border);background:var(--surface-2);border-radius:14px;padding:16px;cursor:pointer;transition:border-color .15s,background .15s;display:flex;flex-direction:column;gap:8px">
      <span style="font-size:30px">${ic}</span>
      <span style="font-weight:800;font-size:15px;color:var(--text)">${tt}</span>
      <span style="font-size:12px;color:var(--muted);line-height:1.5">${d}</span></button>`;
    ov.innerHTML=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:24px;width:100%;max-width:560px">

    const refresh=()=>{ const name=ov.querySelector("#nptName").value.trim(); const ready=!!tipo&&!!name; okBtn().disabled=!ready; okBtn().style.opacity=ready?"1":".5"; };
    ov.querySelectorAll(".npt").forEach(btn=> btn.onclick=()=>{

async function createProduct(){
  const r=await nuevoProductoModal(); if(!r) return;
  const { tipo, nombre }=r;
  const folder=(st.folder!=="__all"&&st.folder!=="__none")?st.folder:null;
  let { data,error } = await supa.from("products").insert({ channel_id:st.channelId, nombre, tipo, folder }).select("id").single();
  if(error && /tipo|folder|column/.test(error.message)){ ({ data,error } = await supa.from("products").insert({ channel_id:st.channelId, nombre, tipo }).select("id").single()); }
  if(error && /tipo|column/.test(error.message)){ ({ data,error } = await supa.from("products").insert({ channel_id:st.channelId, nombre }).select("id").single()); }
  if(error){ toast(error.message,true); return; }
  // Todo producto nace con al menos UNA opción de compra: así el modelo no
  // tiene casos especiales (la migración 0029 hizo lo mismo con los viejos) y
  // un producto simple no obliga a configurar nada extra.
  await supa.from("product_versions")
    .insert({ product_id:data.id, nombre:"Única", orden:0, activo:true, cantidad:1, entrega:[] })
    .then(r=>{ if(r.error) console.warn("[productos] sin opción inicial:", r.error.message); });
  await loadProducts(); openProduct(data.id);
}
async function openProduct(id){
  const { data:p } = await supa.from("products").select("*").eq("id",id).maybeSingle();
  const { data:vs } = await supa.from("product_versions").select("*").eq("product_id",id).order("orden");
  st.prod=p; st.versions=vs||[]; st.delVersions=[]; st.tab="producto";
  // Con qué tipo se abrió: si lo cambia, el flujo YA GENERADO sigue vendiendo
  // como el tipo viejo (un digital pediría dirección, un físico entregaría un
  // link) y eso no se nota hasta que un cliente lo sufre.
  st.tipoGuardado=p?.tipo||"digital";
  renderDetail(); showDetail();
}
async function deleteProduct(){
  if(!st.prod) return;
  if(!await confirmDialog({title:"Eliminar producto",message:`¿Eliminar "${esc(st.prod.nombre)}"? Se eliminarán también sus versiones. Esta acción no se puede deshacer.`,confirmText:"Eliminar",danger:true})) return;
  await supa.from("product_versions").delete().eq("product_id",st.prod.id);
  const { error }=await supa.from("products").delete().eq("id",st.prod.id);
  if(error){ toast(error.message,true); return; }
  st.prod=null; toast("Producto eliminado ✓"); showGrid(); await loadProducts();
}

// FAQ del producto: editor de pares P/R que compila a config.faq (texto que
// lee el motor). Se conserva config.faq_items para poder re-editarlo.
function parseFaq(txt){
  if(!txt||!txt.trim()) return [];
  const items=[]; const re=/P(?:regunta)?\s*:?\s*([\s\S]*?)\s*R(?:espuesta)?\s*:?\s*([\s\S]*?)(?=(?:\n\s*P(?:regunta)?\s*:)|$)/gi;
  let m; while((m=re.exec(txt))){ const q=(m[1]||"").trim(), a=(m[2]||"").trim(); if(q||a) items.push({q,a}); }
  if(!items.length) items.push({q:"", a:txt.trim()});
  return items;
}
function compileFaq(items){ return (items||[]).filter(x=>x&&(x.q||x.a)).map(x=>`P: ${(x.q||"").trim()}\nR: ${(x.a||"").trim()}`).join("\n\n"); }

// ── Conocimiento del producto para la IA ────────────────────────────
// Igual que negocio_form→negocio en ia.html: los campos guiados viven en
// config.ia y se COMPILAN a config.contexto_producto, que es lo que el motor
// ya inyecta en el prompt. Así casi todo el rediseño es solo frontend.
const ESTILOS_VENTA={ consultivo:"Consultivo (entiende antes de ofrecer)", directo:"Directo (va al grano y cierra)", educativo:"Educativo (enseña y genera confianza)", urgencia:"Urgencia / Escasez (motiva a decidir ya)", objeciones:"Basado en objeciones (rebate dudas)" };
const AGENCIAS=[["shalom","Shalom"],["olva","Olva"]];
// Monedas frecuentes en LatAm/US/Europa (código ISO + símbolo + país).
const CURRENCIES=[
  ["PEN","S/","Perú — Sol"],["USD","$","EE. UU. — Dólar"],["MXN","$","México — Peso"],
  ["COP","$","Colombia — Peso"],["ARS","$","Argentina — Peso"],["CLP","$","Chile — Peso"],
  ["BOB","Bs","Bolivia — Boliviano"],["EUR","€","Europa — Euro"],["BRL","R$","Brasil — Real"],
  ["UYU","$U","Uruguay — Peso"],["PYG","₲","Paraguay — Guaraní"],["VES","Bs","Venezuela — Bolívar"],
  ["GTQ","Q","Guatemala — Quetzal"],["CRC","₡","Costa Rica — Colón"],["DOP","RD$","Rep. Dominicana — Peso"],
  ["HNL","L","Honduras — Lempira"],["NIO","C$","Nicaragua — Córdoba"],["PAB","B/.","Panamá — Balboa"],
  ["GBP","£","Reino Unido — Libra"],["CAD","$","Canadá — Dólar"],
];
const MODOS_ENVIO=[
  ["cliente","Envío lo paga el cliente al recibir (según la agencia)"],
  ["gratis","Envío gratis en todos los envíos"],
  ["gratis_desde","Envío gratis desde un monto mínimo"],
  ["fijo","Cobro un monto fijo de envío"],
];
const CONFIRM_COD=[["referencia","Referencia de envío"],["mapa","Mapa de ubicación enviado por el cliente"],["rango_fecha","Confirmación de rango de entrega y fecha"]];
const CONFIRM_AG=[["agencia_def","Agencia de envío definida"],["adelanto","Adelanto de pago"],["dni","DNI / Carné de extranjería"]];

function compileConfirmaciones(c,tipo){
  if(tipo!=="fisico") return "";
  const cf=(c.envio&&c.envio.confirmaciones)||{};
  const on=(arr)=>arr.filter(([k])=>cf[k]).map(([,l])=>"- "+l);
  const cod=on(CONFIRM_COD), ag=on(CONFIRM_AG);
  if(!cod.length&&!ag.length) return "";
  // "Verifica antes de confirmar" se leía como "pídele que te lo confirme": con
  // el DNI ya capturado y válido, la IA respondía "confírmame cuál es el DNI
  // correcto" — repreguntaba un dato bueno justo cuando el pedido ya estaba
  // creado. Es una lista de lo que NO puede faltar, no un pedido de confirmación.
  const L=["## Requisitos para confirmar el pedido",
    "Es lo que no puede FALTAR para cerrar el pedido. Si el cliente ya te lo dio, dalo por bueno: no se lo vuelvas a pedir ni le pidas que lo confirme."];
  if(cod.length) L.push("Para pedidos contraentrega, no cierres el pedido sin tener:\n"+cod.join("\n"));
  if(ag.length) L.push("Para pedidos por agencia, no cierres el pedido sin tener:\n"+ag.join("\n"));
  return L.join("\n\n");
}
function compileProductoIA(c,tipo){
  const ia=c.ia||{}; const L=[];
  const add=(t,v)=>{ if(v&&String(v).trim()) L.push(`## ${t}\n${String(v).trim()}`); };
  const cv=[];
  if(ia.estilo_venta&&ESTILOS_VENTA[ia.estilo_venta]) cv.push("Estilo de venta: "+ESTILOS_VENTA[ia.estilo_venta]+".");
  if(ia.proceso&&ia.proceso.trim()) cv.push("Proceso de venta:\n"+ia.proceso.trim());
  if(ia.tecnicas&&ia.tecnicas.trim()) cv.push("Técnicas de venta:\n"+ia.tecnicas.trim());
  if(cv.length) L.push("## Cómo vender este producto\n"+cv.join("\n\n"));
  add("Resumen del producto",ia.resumen);
  add("Descripción / detalle",ia.detalle);
  add("Reglas del producto",ia.reglas_producto);
  add("Límites (nunca hacer / no prometer)",ia.limites);
  add("Reglas del precio",ia.reglas_precio);
  // Las ofertas por cantidad ya NO se compilan acá: son Opciones de compra
  // reales (migración 0029) y el motor le inyecta a la IA el catálogo con sus
  // precios de verdad. Tenerlas en dos lados se contradecía.
  add("Precios con descuento",ia.descuentos);
  add("Formas de pago de este producto (tienen PRIORIDAD sobre las generales)",ia.metodos_pago);
  const ej=(ia.ejemplos||[]).filter(e=>e&&(e.sit||e.resp));
  if(ej.length) L.push("## Ejemplos de respuesta\n"+ej.map(e=>`- Si el cliente ${(e.sit||"").trim()} → responde: ${(e.resp||"").trim()}`).join("\n"));
  if(ia.emojis_prohibidos&&ia.emojis_prohibidos.trim()) L.push("## Emojis prohibidos\nNunca uses estos emojis ni de ese estilo: "+ia.emojis_prohibidos.trim());
  const mm=(c.ia_multimedia||[]).filter(m=>m&&m.media_url);
  if(mm.length) L.push("## Archivos que puedes enviar\nCuando la situación lo pida, envía el archivo escribiendo `[[media:TAG]]` en una línea aparte.\n"+mm.map(m=>`- [[media:${m.tag||"archivo"}]] — ${m.descripcion||m.filename||"archivo"}`).join("\n"));
  const req=compileConfirmaciones(c,tipo); if(req) L.push(req);
  return L.join("\n\n");
}
// Asegura la forma nueva de config.envio (tabs por agencia + confirmaciones),
// migrando desde la forma vieja (checkboxes) sin perder el adelanto anterior.
function normalizeEnvio(c){
  let e=c.envio;
  const blankAg=(over)=>Object.assign({ modo:"cliente", precio_min:"", precio_max:"", monto_fijo:"", gratis_desde:"", adelanto_valor:"", adelanto_moneda:"PEN", adelanto_cond:false, rangos:[] }, over||{});
  if(!e || typeof e!=="object") e={};
  if(!e.agencias || Array.isArray(e.agencias) || !e.agencias.shalom){
    const oldVal=e.adelanto_valor ?? 20;
    const oldModo=e.gratis===false?"cliente":"gratis";
    e={ agencia_activa:"shalom",
        agencias:{ shalom:blankAg({adelanto_valor:oldVal,modo:oldModo}), olva:blankAg({adelanto_valor:oldVal,modo:oldModo}) },
        confirmaciones: e.confirmaciones || { referencia:false, mapa:true, rango_fecha:false, agencia_def:true, adelanto:true, dni:true } };
  }
  for(const [k] of AGENCIAS){ e.agencias[k]=blankAg(e.agencias[k]); if(!Array.isArray(e.agencias[k].rangos)) e.agencias[k].rangos=[]; }
  if(!e.agencia_activa) e.agencia_activa="shalom";
  if(!e.confirmaciones) e.confirmaciones={ referencia:false, mapa:true, rango_fecha:false, agencia_def:true, adelanto:true, dni:true };
  c.envio=e; return e;
}
// Config compartido: recompila el contexto IA y refresca el JSON avanzado si está.
function prodSync(){
  const c=st.prod.config;
  c.contexto_producto=compileProductoIA(c, st.prod.tipo||"digital")||undefined;
  const t=$("pConfig"); if(t) t.value=JSON.stringify(st.prod.config||{},null,2);
}
function prodSetC(k,v){ const c=st.prod.config; if(v==null||v==="") delete c[k]; else c[k]=v; prodSync(); }

    <input id="emojiAny" placeholder="Escribe o pega cualquier emoji…" maxlength="8"
      style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 10px;font-size:16px;outline:none;margin-bottom:6px"/>

    <div style="max-height:230px;overflow-y:auto;margin:0 -2px">
      ${EMOJI_CATS.map(c=>`<div style="font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--faint);font-weight:700;padding:8px 4px 3px">${c.n}</div><div style="display:flex;flex-wrap:wrap;gap:1px">${splitEmojis(c.e).map(e=>`<button type="button" data-e="${e}" style="width:32px;height:32px;font-size:19px;padding:0;border:none;background:transparent;cursor:pointer;border-radius:8px;line-height:1">${e}</button>`).join("")}</div>`).join("")}
    </div>
    <button type="button" data-e="" title="Sin emoji" style="margin-top:6px;width:100%;height:30px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;border-radius:8px;font-size:12px">Sin emoji</button>`;
  pop.style.display="none";
  ebtn.onclick=(ev)=>{ ev.stopPropagation(); pop.style.display=pop.style.display==="none"?"flex":"none"; if(pop.style.display==="flex"){ const inp=$("emojiAny"); if(inp){ inp.value=st.prod.emoji||""; inp.focus(); } } };
  pop.onclick=(ev)=>ev.stopPropagation();
  const setEmoji=(v)=>{ st.prod.emoji=(v&&v.trim())||null; ebtn.innerHTML=st.prod.emoji?esc(st.prod.emoji):icon("plus"); };
  pop.querySelectorAll("button[data-e]").forEach(b=> b.onclick=()=>{ setEmoji(b.dataset.e); pop.style.display="none"; });
  const any=$("emojiAny");
  any.oninput=(e)=>setEmoji(e.target.value);
  any.onkeydown=(e)=>{ if(e.key==="Enter"){ e.preventDefault(); pop.style.display="none"; } };
  document.addEventListener("click",()=>{ pop.style.display="none"; },{ once:true });
}

// ── Pestaña ENTREGA: cómo le llega al cliente ──────────────────────
function renderEntrega(){
  const b=$("tabBody");
  const c=st.prod.config=st.prod.config||{};
  const tipo=st.prod.tipo||"digital";
  if(tipo==="digital"){
    b.innerHTML=`
      <p class="hint" style="margin:0 0 14px">Cómo le llega al cliente lo que compró.</p>
      <div class="card">
        <h4 style="display:flex;align-items:center;gap:7px">${icon("link")} Entrega digital</h4>
        <label>Link o archivo de entrega</label>
        <input class="in" id="pLink" value="${esc(c.link_entrega||"")}" placeholder="https://drive.google.com/…"/>
        <div style="font-size:11px;color:var(--faint);margin-top:7px">Se entrega al confirmar el pago. Disponible en tus flujos como <b style="color:var(--brand)">{{link_entrega}}</b>. Si tienes varias opciones con distinta entrega, cada una lleva su propio link en <a href="#" id="goOpc3" style="color:var(--brand)">Opciones de compra →</a>.</div>
      </div>
      <div class="card">
        <h4 style="display:flex;align-items:center;gap:7px">${icon("message")} Cómo se envía</h4>
        <label style="margin-top:0">Mensaje de entrega</label>
        <input class="in" id="pEntMsg" value="${esc(c.entrega_mensaje||"")}" placeholder="¡Pago confirmado! 🎉 Acá tienes tu acceso:"/>
        <div style="font-size:11px;color:var(--faint);margin-top:7px">El saludo que abre la entrega. Cada link puede además tener su propio mensajito (en <b>Opciones de compra</b>).</div>
        <label class="chk" style="margin-top:16px;justify-content:space-between">
          <span style="font-weight:600;font-size:13px">Entregar todo en una sola burbuja</span>
          <span class="sw ${c.entrega_burbuja_unica?'on':''}" id="pEntUna"></span>
        </label>
        <div style="font-size:11px;color:var(--faint);margin-top:7px">Junta el saludo + todos los links en un mismo mensaje. Los <b>archivos adjuntos</b> salen aparte (regla de WhatsApp). Si hay ventas extra “antes”, se entregan junto con el principal.</div>
      </div>
      <div class="card">
        <h4 style="display:flex;align-items:center;gap:7px">${icon("shield")} Validación del pago</h4>
        <div style="font-size:12.5px;color:var(--muted);margin:6px 0 12px;line-height:1.55">Cuándo se entrega este producto tras el pago. Por defecto sigue lo que elegiste para todo el canal en <a href="pagos.html" style="color:var(--brand)">Pagos y atención</a>; acá puedes cambiarlo <b>solo para este producto</b>.</div>
        <select class="in" id="pValPago" style="max-width:320px">
          <option value="" ${!c.validacion_pago?"selected":""}>Usar el default del canal</option>
          <option value="auto" ${c.validacion_pago==="auto"?"selected":""}>⚡ Automático — entrega al toque si el monto cuadra</option>
          <option value="manual" ${c.validacion_pago==="manual"?"selected":""}>👁 Manual — me avisa para aprobarlo yo</option>
        </select>
      </div>`;
    const lk=$("pLink"); if(lk) lk.onchange=(e)=>prodSetC("link_entrega", e.target.value.trim());
    const em=$("pEntMsg"); if(em) em.onchange=(e)=>prodSetC("entrega_mensaje", e.target.value.trim()||undefined);
    const eu=$("pEntUna"); if(eu) eu.onclick=()=>{ const on=!c.entrega_burbuja_unica; c.entrega_burbuja_unica=on; prodSetC("entrega_burbuja_unica", on||undefined); eu.classList.toggle("on", on); };
    const vp=$("pValPago"); if(vp) vp.onchange=(e)=>prodSetC("validacion_pago", e.target.value||undefined);
    const g=$("goOpc3"); if(g) g.onclick=(e)=>{ e.preventDefault(); st.tab="opciones"; renderDetail(); };
    return;
  }
  // Físico: TODA la logística (zonas, agencias, envío gratis, costos, adelanto
  // por defecto) vive en Negocio → Entrega y logística, igual para todos los
  // productos. Acá solo el ADELANTO override, por si ESTE producto necesita otro.
  b.innerHTML=`
    <p class="hint" style="margin:0 0 14px">La entrega física —zonas de Lima, agencias, envío gratis, corte y el <b>adelanto por defecto</b>— se configura una vez en <a href="negocio.html" style="color:var(--brand)">Negocio → Entrega y logística</a> y vale para todos tus productos.</p>
    <div class="card">
      <h4 style="display:flex;align-items:center;gap:7px"><span style="color:var(--green);display:inline-flex">${icon("dollar")}</span> Adelanto de este producto</h4>
      <div style="font-size:12.5px;color:var(--muted);margin:6px 0 12px;line-height:1.55">Solo si <b>este</b> producto pide una seña distinta a la de tu negocio. Si lo dejas <b>vacío</b>, usa el adelanto por defecto de Negocio.</div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="color:var(--muted);font-size:13px">S/</span>
        <input class="in" id="pAdelOv" type="number" min="0" step="0.5" value="${esc(c.adelanto_override??"")}" placeholder="por defecto de Negocio" style="width:150px"/>
        <span id="adelHint" style="font-size:11.5px;color:var(--faint);flex:1;min-width:200px">Disponible en los flujos como <b style="color:var(--brand)">{{adelanto}}</b>.</span>
      </div>
    </div>
    <div class="card">
      <h4 style="display:flex;align-items:center;gap:7px"><span style="color:var(--green);display:inline-flex">${icon("truck")}</span> Envío de este producto</h4>
      <div style="font-size:12.5px;color:var(--muted);margin:6px 0 12px;line-height:1.55">Solo si <b>este</b> producto se cobra distinto al resto (por ejemplo, uno grande donde sí cobras el envío aparte).</div>
      <select class="in" id="pEnvModo" style="max-width:420px">
        <option value="">Como diga mi negocio${c.envio_modo?"":" (actual)"}</option>
        <option value="incluido" ${c.envio_modo==="incluido"?"selected":""}>Incluido en el precio — el cliente no paga envío</option>
        <option value="suma" ${c.envio_modo==="suma"?"selected":""}>Se suma al total — el cliente paga producto + envío</option>
        <option value="agencia" ${c.envio_modo==="agencia"?"selected":""}>Lo paga en la agencia — no pasa por tu caja</option>
      </select>
      <div id="pEnvMontos"></div>
      <div id="envHint" style="font-size:11.5px;color:var(--faint);margin-top:10px"></div>
    </div>`;
  const ov=$("pAdelOv"); if(ov) ov.onchange=(e)=>prodSetC("adelanto_override", e.target.value.trim()===""?undefined:Number(e.target.value));
  const pintarEnvMontos=()=>{
    const box=$("pEnvMontos"); if(!box) return;
    if(c.envio_modo!=="suma"){ box.innerHTML=""; return; }
    box.innerHTML=`
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:12px">
        <label style="margin:0;display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600">Lima
          <span style="color:var(--muted)">S/</span>
          <input class="in" id="pEnvLima" type="number" min="0" step="0.5" placeholder="el de Negocio" value="${esc(c.envio_cobro_lima??"")}" style="width:110px"/></label>
        <label style="margin:0;display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600">Provincia
          <span style="color:var(--muted)">S/</span>
          <input class="in" id="pEnvProv" type="number" min="0" step="0.5" placeholder="el de Negocio" value="${esc(c.envio_cobro_provincia??"")}" style="width:110px"/></label>
        <span style="font-size:11.5px;color:var(--faint);flex:1;min-width:180px">Vacío = usa el monto de Negocio.</span>
      </div>`;
    $("pEnvLima").onchange=(e)=>prodSetC("envio_cobro_lima", e.target.value.trim()===""?undefined:Number(e.target.value));
    $("pEnvProv").onchange=(e)=>prodSetC("envio_cobro_provincia", e.target.value.trim()===""?undefined:Number(e.target.value));
  };
  const em2=$("pEnvModo"); if(em2) em2.onchange=(e)=>{ c.envio_modo=e.target.value||undefined; prodSetC("envio_modo", c.envio_modo); pintarEnvMontos(); };
  pintarEnvMontos();
  // Mostrar el default de Negocio como referencia (carga perezosa).
  supa.from("channels").select("entregas").eq("id",st.channelId).maybeSingle()
    .then(({data})=>{
      const E=data?.entregas||{};
      const def=E.adelanto_default; const h=$("adelHint");
      if(h && def!=null && def!==""){ h.innerHTML=`Por defecto de Negocio: <b>S/ ${esc(def)}</b>. Disponible en los flujos como <b style="color:var(--brand)">{{adelanto}}</b>.`; }
      const eh=$("envHint");
      if(eh){
        const modo=E.envio_modo || (E.envio_gratis!==false?"incluido":"suma");
        const txt={incluido:"incluido en el precio",suma:"se suma al total",agencia:"lo paga en la agencia"}[modo]||modo;
        eh.innerHTML=`Tu negocio hoy dice: <b>${esc(txt)}</b>. <a href="negocio.html" style="color:var(--brand)">Cambiarlo para todos →</a>`;
      }
    }).catch(()=>{});
}

// ── Pestaña CÓMO LO VENDE LA IA: conocimiento del producto ─────────
function renderProductoIA(){
  const b=$("tabBody");
  const c=st.prod.config=st.prod.config||{};
  if(!Array.isArray(c.faq_items)) c.faq_items=parseFaq(c.faq);
  const ia=c.ia=c.ia||{};
  if(!ia.detalle && c.contexto_producto && !ia._migrado){ ia.detalle=c.contexto_producto; ia._migrado=true; }
  if(!Array.isArray(ia.ejemplos)) ia.ejemplos=[];
  if(!Array.isArray(c.ia_multimedia)) c.ia_multimedia=[];
  const P="#a855f7";
  const taField=(k,label,ph,rows)=>`<label>${label}</label><textarea class="in ia-f" data-k="${k}" rows="${rows||2}" style="min-height:${(rows||2)*26+8}px;line-height:1.5;font-family:var(--font);resize:vertical" placeholder="${esc(ph)}">${esc(ia[k]||"")}</textarea>`;
  b.innerHTML=`
    <div class="ia-hd">
      <span class="glyph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2M20 14h2M15 13v2M9 13v2"/><path d="M12 4v4"/><circle cx="12" cy="4" r="1"/></svg></span>
      <div>
        <div class="tt">Cómo lo vende la IA</div>
        <div class="ds">Lo que tu vendedor necesita saber de <b>este</b> producto para venderlo y responder dudas. Todo es opcional — cuanto más, mejor vende. (La personalidad general del vendedor va en <a href="ia.html">IA → Vendedor IA</a>.)</div>
      </div>
    </div>
    <div class="card ia-card">
      <div style="border:1px solid var(--border);border-radius:12px;padding:13px">
        <div style="font-weight:700;font-size:13px;margin-bottom:2px">Cómo vender este producto</div>
        <label>Estilo de venta</label>
        <select class="sel ia-f" data-k="estilo_venta" style="width:100%">
          <option value="" ${!ia.estilo_venta?"selected":""}>— Sin definir —</option>
          ${Object.entries(ESTILOS_VENTA).map(([k,v])=>`<option value="${k}" ${ia.estilo_venta===k?"selected":""}>${esc(v)}</option>`).join("")}
        </select>
        <div style="font-size:11px;color:var(--faint);margin-top:4px">Distinto al <b>tono</b> (sección IA): esto es la estrategia de venta.</div>
        ${taField("proceso","Proceso de venta","Paso a paso de cómo llevar la conversación hasta el cierre…",3)}
        ${taField("tecnicas","Técnicas de venta","Ej. prueba social, garantía, comparativas, bundle…",2)}
      </div>
      <div style="border:1px solid var(--border);border-radius:12px;padding:13px;margin-top:12px">
        <div style="font-weight:700;font-size:13px;margin-bottom:2px">Qué es el producto</div>
        ${taField("resumen","Información resumida (pitch corto)","En 1-2 frases: qué es y por qué conviene.",2)}
        ${taField("detalle","Descripción / detalle","Qué es, qué incluye, para quién es, beneficios, cómo se entrega…",4)}
        ${taField("reglas_producto","Reglas del producto","Ej. stock, tallas, colores, garantía, tiempos…",2)}
        ${taField("limites","Límites (nunca hacer / no prometer)","Ej. no prometer entregas en 24h, no dar descuentos mayores a X…",2)}
      </div>
      <div style="border:1px solid var(--border);border-radius:12px;padding:13px;margin-top:12px">
        <div style="font-weight:700;font-size:13px;margin-bottom:2px">Precio y promociones</div>
        ${taField("reglas_precio","Reglas del precio","Cuándo y cómo se cobra, qué incluye, negociación permitida…",2)}
        <div style="display:flex;gap:9px;align-items:flex-start;border:1px solid var(--border);border-radius:11px;padding:11px 12px;margin:10px 0;font-size:12px;color:var(--muted);line-height:1.55">
          <span style="display:inline-flex;flex:none;color:var(--muted)">${icon("productos")}</span>
          <div>Las <b>ofertas por cantidad</b>, los <b>packs</b> y las <b>versiones</b> se configuran en la pestaña <b>Opciones de compra</b> — ahí cada uno tiene su precio real, y es contra ese precio que se valida el pago. <a href="#" id="goOpciones" style="color:var(--brand)">Ir a Opciones de compra →</a></div>
        </div>
        ${taField("descuentos","Precios con descuento","Cuándo aplicar un descuento para incentivar (ej. si deja en visto, si duda…) y cuánto.",2)}
        ${taField("metodos_pago","Métodos de pago del producto (opcional)","Si lo llenas, TIENE PRIORIDAD sobre los datos de pago generales de la sección IA.",2)}
      </div>
      <div style="border:1px solid var(--border);border-radius:12px;padding:13px;margin-top:12px">
        <div style="font-weight:700;font-size:13px;margin-bottom:2px">Ayudas para responder</div>
        <label>Preguntas frecuentes / objeciones</label>
        <div style="font-size:11px;color:var(--faint);margin-bottom:6px">La duda y su respuesta ideal. La IA responderá con estas.</div>
        <div id="faqList"></div>
        <button class="btn" id="faqAdd" style="margin-top:6px;height:34px">+ Agregar pregunta</button>
        <label>Ejemplos de respuesta</label>
        <div style="font-size:11px;color:var(--faint);margin-bottom:6px">Situación del cliente → cómo responder. Le dan estilo y criterio a la IA.</div>
        <div id="ejList"></div>
        <button class="btn" id="ejAdd" style="margin-top:6px;height:34px">+ Agregar ejemplo</button>
        <div class="row" style="margin-top:14px;align-items:flex-start">
          <div><label style="margin-top:0">Emojis permitidos</label><input class="in" id="pEmojis" value="${esc(c.emojis||"")}" placeholder="👟🔥⚡"/></div>
          <div><label style="margin-top:0">Emojis prohibidos</label><input class="in ia-f" data-k="emojis_prohibidos" value="${esc(ia.emojis_prohibidos||"")}" placeholder="💀🤡 o 'ninguno serio'"/></div>
        </div>
        <label>Multimedia que la IA puede enviar</label>
        <div style="font-size:11px;color:var(--faint);margin-bottom:8px">Sube imágenes, videos o archivos y explica <b>cuándo</b> usarlos. La IA los enviará sola cuando la conversación lo pida (vía <b style="color:${P}">[[media:tag]]</b>).</div>
        <div id="mmList"></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">
          <button class="btn mmAdd" data-k="image" style="height:34px">+ Imagen</button>
          <button class="btn mmAdd" data-k="video" style="height:34px">+ Video</button>
          <button class="btn mmAdd" data-k="document" style="height:34px">+ Archivo</button>
        </div>
      </div>
    </div>`;
  const setC=(k,v)=>prodSetC(k,v);
  const g=$("pEmojis"); if(g) g.oninput=(e)=>setC("emojis", e.target.value.trim());
  b.querySelectorAll(".ia-f").forEach(el=>{ el.oninput=el.onchange=()=>{ const v=el.value; if(v==null||v==="") delete ia[el.dataset.k]; else ia[el.dataset.k]=v; prodSync(); }; });
  const goOp=$("goOpciones"); if(goOp) goOp.onclick=(e)=>{ e.preventDefault(); st.tab="opciones"; renderDetail(); };
  const paintEj=()=>{
    const box=$("ejList"); box.innerHTML="";
    if(!ia.ejemplos.length){ box.innerHTML=`<div style="font-size:12px;color:var(--faint);padding:2px 0">Sin ejemplos.</div>`; }
    ia.ejemplos.forEach((ej,i)=>{
      const el=document.createElement("div"); el.style.cssText="border:1px solid var(--border);border-radius:11px;padding:11px;margin-bottom:8px";
      el.innerHTML=`<div class="row" style="align-items:flex-start"><input class="in ejs" value="${esc(ej.sit||"")}" placeholder="Situación (ej. dice que está caro)"/><button class="iconbtn ejd" style="flex:0 0 auto">${icon("trash")}</button></div>
        <textarea class="in ejr" rows="2" style="margin-top:8px;min-height:52px;line-height:1.5;font-family:var(--font);resize:vertical" placeholder="Cómo responder">${esc(ej.resp||"")}</textarea>`;
      el.querySelector(".ejs").oninput=(e)=>{ ej.sit=e.target.value; prodSync(); };
      el.querySelector(".ejr").oninput=(e)=>{ ej.resp=e.target.value; prodSync(); };
      el.querySelector(".ejd").onclick=()=>{ ia.ejemplos.splice(i,1); prodSync(); paintEj(); };
      box.appendChild(el);
    });
  };
  paintEj();
  $("ejAdd").onclick=()=>{ ia.ejemplos.push({sit:"",resp:""}); paintEj(); };
  const paintMM=()=>{
    const box=$("mmList"); box.innerHTML="";
    if(!c.ia_multimedia.length){ box.innerHTML=`<div style="font-size:12px;color:var(--faint);padding:2px 0">Sin archivos.</div>`; }
    c.ia_multimedia.forEach((m,i)=>{
      const el=document.createElement("div"); el.style.cssText="border:1px solid var(--border);border-radius:11px;padding:11px;margin-bottom:8px;display:flex;gap:11px;align-items:flex-start";
      let prev="";
      if(m.media_kind==="image") prev=`<img src="${esc(m.media_url)}" style="width:64px;height:64px;object-fit:cover;border-radius:8px;flex:none"/>`;
      else if(m.media_kind==="video") prev=`<video src="${esc(m.media_url)}" style="width:64px;height:64px;object-fit:cover;border-radius:8px;flex:none"></video>`;
      else prev=`<div style="width:64px;height:64px;border-radius:8px;flex:none;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--muted)">${icon("file")}</div>`;
      el.innerHTML=`${prev}
        <div style="flex:1;min-width:0">
          <div class="row" style="align-items:center"><div style="flex:0 0 auto;font-size:12px;color:var(--muted)">tag</div>
            <input class="in mmt" style="flex:1" value="${esc(m.tag||"")}" placeholder="ej. catalogo, tallas, demo"/>
            <button class="iconbtn mmd" style="flex:0 0 auto">${icon("trash")}</button></div>
          <textarea class="in mmdesc" rows="2" style="margin-top:8px;min-height:46px;line-height:1.45;font-family:var(--font);resize:vertical" placeholder="¿Cuándo debe enviarlo la IA? (ej. cuando pidan ver el catálogo)">${esc(m.descripcion||"")}</textarea>
          <div style="font-size:10.5px;color:var(--faint);margin-top:4px">${esc(m.filename||"")}</div>
        </div>`;
      el.querySelector(".mmt").oninput=(e)=>{ m.tag=e.target.value.replace(/[^\w-]/g,"").toLowerCase(); prodSync(); };
      el.querySelector(".mmdesc").oninput=(e)=>{ m.descripcion=e.target.value; prodSync(); };
      el.querySelector(".mmd").onclick=()=>{ c.ia_multimedia.splice(i,1); prodSync(); paintMM(); };
      box.appendChild(el);
    });
  };
  paintMM();
  b.querySelectorAll(".mmAdd").forEach(btn=> btn.onclick=()=>pickProdMedia(btn.dataset.k, paintMM, prodSync));
  const paintFaq=()=>{
    const box=$("faqList"); box.innerHTML="";
    if(!c.faq_items.length){ box.innerHTML=`<div style="font-size:12px;color:var(--faint);padding:4px 0">Sin preguntas todavía.</div>`; }
    c.faq_items.forEach((qa,i)=>{
      const el=document.createElement("div"); el.style.cssText="border:1px solid var(--border);border-radius:11px;padding:11px;margin-bottom:8px";
      el.innerHTML=`<div class="row" style="align-items:flex-start"><input class="in fq" value="${esc(qa.q||"")}" placeholder="Pregunta (ej. ¿Hacen envíos a provincia?)"/><button class="iconbtn fdel" style="flex:0 0 auto">${icon("trash")}</button></div>
        <textarea class="in fa" rows="2" style="margin-top:8px;min-height:52px;line-height:1.5;font-family:var(--font);resize:vertical" placeholder="Respuesta ideal">${esc(qa.a||"")}</textarea>`;
      const sync=()=>{ c.faq=compileFaq(c.faq_items); prodSync(); };
      el.querySelector(".fq").oninput=(e)=>{ qa.q=e.target.value; sync(); };
      el.querySelector(".fa").oninput=(e)=>{ qa.a=e.target.value; sync(); };
      el.querySelector(".fdel").onclick=()=>{ c.faq_items.splice(i,1); c.faq=compileFaq(c.faq_items); prodSync(); paintFaq(); };
      box.appendChild(el);
    });
  };
  paintFaq();
  $("faqAdd").onclick=()=>{ c.faq_items.push({q:"",a:""}); paintFaq(); };
}

// ── Pestaña REMARKETING: reenganche por silencio, propio del producto ──
// El motor de remarketing vive en Secuencias (drip por silencio, lo corre el
// scheduler). Acá se ve/gestiona la secuencia de ESTE producto sin salir de su
// ficha; el editor de pasos avanzado sigue en Secuencias.
// Duración ↔ segundos, para el editor simple de pasos.
function remSplitDur(sec){ sec=Number(sec||0); if(sec%86400===0&&sec>=86400)return{val:sec/86400,u:"86400"}; if(sec%3600===0&&sec>=3600)return{val:sec/3600,u:"3600"}; return{val:Math.round(sec/60)||1,u:"60"}; }
function remUid(){ return (crypto.randomUUID?crypto.randomUUID():"v"+Math.random().toString(36).slice(2)); }
// Texto del primer mensaje de un paso (soporta variantes nuevas y {mensaje} viejo).
function remStepText(paso){
  if(paso.mensaje) return String(paso.mensaje);
  const v=(paso.variantes||[])[0]; const bub=(v?.bubbles||[])[0];
  return bub?.text||"";
}

async function renderRemarketing(){
  const b=$("tabBody");
  b.innerHTML=`<p class="hint" style="margin:0 0 14px">Cargando…</p>`;
  const [{ data:seqs, error }, { data:ch }]=await Promise.all([
    supa.from("sequences").select("id,nombre,activo,pasos").eq("channel_id",st.channelId).order("created_at",{ascending:false}),
    supa.from("channels").select("remarketing").eq("id",st.channelId).maybeSingle(),
  ]);
  if(error){ b.innerHTML=`<div class="card"><p class="hint">No se pudieron cargar las secuencias.</p></div>`; return; }
  const list=(seqs||[]);
  const c=st.prod.config=st.prod.config||{};
  const seq=list.find(s=>s.id===c.remarketing_seq_id)||null;
  const rm=(ch?.remarketing && typeof ch.remarketing==="object") ? {...ch.remarketing} : {};
  const opciones=(st.versions||[]).filter(v=>v.precio!=null&&v.precio!=="");

  b.innerHTML=`
    <p class="hint" style="margin:0 0 14px">Reengancha a quien se interesó en <b>${esc(st.prod.nombre)}</b> y no llegó a comprar. Es una serie de mensajes por <b>silencio</b>: cada paso espera un tiempo sin respuesta y manda un mensaje (texto y multimedia). Si el cliente responde, se pausa sola; si compra, sale.</p>

    <div class="card">
      <h4 style="display:flex;align-items:center;gap:7px;margin:0 0 8px">${icon("clock")} Horario de envío <span style="font-size:11px;color:var(--faint);font-weight:400">· aplica a TODO el remarketing del bot</span></h4>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="sw ${rm.activo?'on':''}" id="hrTog"></span>
        <span style="font-size:12.5px">Enviar solo dentro de un horario (hora de Perú)</span>
      </div>
      <div id="hrRange" style="display:${rm.activo?'flex':'none'};align-items:center;gap:10px;flex-wrap:wrap;margin-top:12px">
        <span style="font-size:12.5px;color:var(--muted)">Desde</span>
        <input class="in" id="hrDesde" type="time" value="${esc(rm.desde||'09:00')}" style="width:120px"/>
        <span style="font-size:12.5px;color:var(--muted)">hasta</span>
        <input class="in" id="hrHasta" type="time" value="${esc(rm.hasta||'21:00')}" style="width:120px"/>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-top:12px">
        <button class="btn primary" id="hrSave" style="background:var(--brand,#2b7fff);color:#fff;border:none">Guardar horario</button>
        <span style="font-size:11px;color:var(--faint);flex:1">Apagado = a cualquier hora. Fuera del horario el mensaje no se pierde: espera a la próxima hora permitida.</span>
      </div>
    </div>

    <div class="card">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <h4 style="display:flex;align-items:center;gap:7px;margin:0">${icon("secuencias")} Secuencia de remarketing</h4>
        <span style="flex:1"></span>
        ${seq?`<span style="font-size:12px;color:var(--muted)">${esc(seq.nombre)}</span>`:""}
      </div>
      ${seq?"":`
      <div style="font-size:12.5px;color:var(--muted);margin:10px 0 12px;line-height:1.55">Este producto todavía no tiene remarketing. Crea uno o vincula una secuencia que ya tengas.</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn primary" id="remNew" style="background:var(--brand,#2b7fff);color:#fff;border:none">+ Crear remarketing para este producto</button>
        ${list.length?`<select class="sel" id="pRemSeq" style="min-width:200px"><option value="">Vincular una existente…</option>${list.map(s=>`<option value="${s.id}">${esc(s.nombre||"(sin nombre)")}</option>`).join("")}</select>`:""}
      </div>`}
      <div id="remSteps" style="margin-top:${seq?"6px":"0"}"></div>
      ${seq?`
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;align-items:center">
        <button class="btn" id="remAdd">+ Agregar paso</button>
        <button class="btn primary" id="remSave" style="background:var(--brand,#2b7fff);color:#fff;border:none">Guardar remarketing</button>
        <span style="flex:1"></span>
        <a href="secuencias.html" style="font-size:12px;color:var(--brand)">Ver todas las secuencias →</a>
      </div>
      <div style="font-size:11px;color:var(--faint);margin-top:10px">Desvincular: <a href="#" id="remUnlink" style="color:var(--muted)">quitar el remarketing de este producto</a> (la secuencia no se borra).</div>`:""}
    </div>`;

  // ── Horario (global del canal) ──
  const hrSw=$("hrTog");
  if(hrSw) hrSw.onclick=()=>{ rm.activo=!rm.activo; hrSw.classList.toggle("on",rm.activo); $("hrRange").style.display=rm.activo?"flex":"none"; };
  if($("hrSave")) $("hrSave").onclick=async(e)=>{
    rm.desde=$("hrDesde")?.value||rm.desde; rm.hasta=$("hrHasta")?.value||rm.hasta;
    if(rm.activo && rm.desde && rm.hasta && rm.hasta<=rm.desde){ toast("La hora final debe ser mayor a la inicial",true); return; }
    const btn=e.target; btn.disabled=true; const old=btn.textContent; btn.textContent="Guardando…";
    const { error }=await supa.from("channels").update({ remarketing:rm }).eq("id",st.channelId);
    btn.disabled=false; btn.textContent=old;
    if(error){ toast(/remarketing|column/.test(error.message)?"Falta aplicar la migración 0031":error.message,true); return; }
    toast("Horario guardado ✓");
  };

  if($("remNew")) $("remNew").onclick=async()=>{
    const nombre=`Remarketing · ${st.prod.nombre}`.slice(0,60);
    const { data,error }=await supa.from("sequences").insert({ channel_id:st.channelId, nombre, activo:true, pasos:[] }).select("id").single();
    if(error||!data){ toast("No se pudo crear la secuencia",true); return; }
    c.remarketing_seq_id=data.id; prodSync();
    toast("Remarketing creado ✓ — agrega pasos y guarda");
    renderRemarketing();
  };
  if($("pRemSeq")) $("pRemSeq").onchange=(e)=>{ const v=e.target.value; if(v){ c.remarketing_seq_id=v; prodSync(); renderRemarketing(); } };
  if($("remUnlink")) $("remUnlink").onclick=(e)=>{ e.preventDefault(); delete c.remarketing_seq_id; prodSync(); toast("Desvinculado — recuerda Guardar el producto"); renderRemarketing(); };

  if(!seq) return;
  if(!Array.isArray(seq.pasos)) seq.pasos=[];
  const paintSteps=()=>{
    const box=$("remSteps"); box.innerHTML="";
    if(!seq.pasos.length){ box.innerHTML=`<div style="font-size:12.5px;color:var(--faint);padding:10px 0">Sin pasos todavía. Agrega el primero.</div>`; return; }
    seq.pasos.forEach((paso,i)=>{
      const { val,u }=remSplitDur(paso.umbral_silencio_seg);
      const el=document.createElement("div");
      el.style.cssText="border:1px solid var(--border);border-radius:12px;padding:13px;margin-top:12px";
      el.innerHTML=`
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="width:24px;height:24px;border-radius:50%;background:var(--surface-2);display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);flex:none">${i+1}</span>
          <span style="font-size:12.5px;color:var(--muted)">Si sigue en silencio</span>
          <input class="in rnum" type="number" min="1" value="${val}" style="width:70px;height:34px"/>
          <select class="sel runit" style="height:34px">
            <option value="60" ${u==="60"?"selected":""}>minutos</option>
            <option value="3600" ${u==="3600"?"selected":""}>horas</option>
            <option value="86400" ${u==="86400"?"selected":""}>días</option>
          </select>
          <span style="flex:1"></span>
          <button class="iconbtn rdel" title="Quitar paso" style="flex:none">${icon("trash")}</button>
        </div>
        <div class="remComp"></div>
        <div class="remOfer" style="margin-top:11px;border-top:1px dashed var(--border);padding-top:11px"></div>`;
      const setDur=()=>{ paso.umbral_silencio_seg=Math.max(1,Number(el.querySelector(".rnum").value||1))*Number(el.querySelector(".runit").value); };
      el.querySelector(".rnum").onchange=setDur;
      el.querySelector(".runit").onchange=setDur;
      el.querySelector(".rdel").onclick=async()=>{ if(!await confirmDialog({title:"Quitar paso",message:"¿Eliminar este paso del remarketing?",confirmText:"Eliminar",danger:true})) return; seq.pasos.splice(i,1); paintSteps(); };
      remComposer(el.querySelector(".remComp"), paso);
      remOferta(el.querySelector(".remOfer"), paso, opciones);
      box.appendChild(el);
    });
  };
  paintSteps();
  $("remAdd").onclick=()=>{ seq.pasos.push({ umbral_silencio_seg:86400, rotacion:false, variantes:[remNewVariant(0)] }); paintSteps(); };
  $("remSave").onclick=async(e)=>{
    // Limpia burbujas/variantes vacías antes de guardar (igual que el avanzado).
    seq.pasos.forEach(p=>{
      if(Array.isArray(p.variantes)){
        p.variantes.forEach(v=>{ v.bubbles=limpiaBotones((v.bubbles||[]).filter(bu=> bu.media_url || (bu.text&&bu.text.trim()))); });
        p.variantes=p.variantes.filter(v=> v.bubbles.length);
        if(!p.variantes.length) p.variantes=[remNewVariant(0)];
      }
    });
    const btn=e.target; btn.disabled=true; const old=btn.textContent; btn.textContent="Guardando…";
    const { error }=await supa.from("sequences").update({ pasos:seq.pasos }).eq("id",seq.id);
    btn.disabled=false; btn.textContent=old;
    if(error){ toast(error.message,true); return; }
    toast("Remarketing guardado ✓");
  };
}

// ── Descuento / oferta identificada del paso ───────────────────────
// El paso puede pegarle al cliente una oferta para una opción concreta
// (config.oferta = {version_id, precio, vence_horas}). El motor la lee al validar
// el pago: el {{precio}} sale rebajado y el OCR valida contra ese precio.
function remOferta(box, paso, opciones){
  const on=!!paso.oferta;
  const opts=opciones.map(o=>`<option value="${o.id}" ${paso.oferta?.version_id===o.id?"selected":""}>${esc(o.nombre)} (S/ ${esc(o.precio)})</option>`).join("");
  box.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px">
      <span class="sw ${on?'on':''}" data-oftog></span>
      <span style="font-size:12.5px;font-weight:600">${icon("dollar")} Incluir un descuento (el sistema lo valida al pagar)</span>
    </div>
    ${on?(opciones.length?`
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:11px">
      <select class="in" data-ofopt style="min-width:150px">${opts}</select>
      <span style="font-size:12px;color:var(--muted)">a S/</span>
      <input class="in" data-ofprecio type="number" min="0" step="0.5" value="${esc(paso.oferta.precio??"")}" style="width:100px" placeholder="precio"/>
      <span style="font-size:12px;color:var(--muted)">· vence en</span>
      <input class="in" data-ofvence type="number" min="0" step="1" value="${esc(paso.oferta.vence_horas??48)}" style="width:80px"/>
      <span style="font-size:12px;color:var(--muted)">horas</span>
    </div>
    <div style="font-size:11px;color:var(--faint);margin-top:6px">Usa <b style="color:var(--brand)">{{precio}}</b> en el mensaje: saldrá rebajado. 0 horas = sin caducidad. Al pagar, el bot valida contra este precio (no el de lista).</div>`
    :`<div style="font-size:11.5px;color:var(--amber,#f0a92b);margin-top:9px">Primero crea al menos una opción de compra con precio para poder ofrecer un descuento.</div>`):""}`;
  box.querySelector("[data-oftog]").onclick=()=>{
    if(paso.oferta){ delete paso.oferta; }
    else { paso.oferta={ version_id:(opciones[0]?.id||""), precio:opciones[0]?.precio??"", vence_horas:48 }; }
    remOferta(box,paso,opciones);
  };
  const so=box.querySelector("[data-ofopt]"); if(so) so.onchange=(e)=>{ paso.oferta.version_id=e.target.value; };
  const sp=box.querySelector("[data-ofprecio]"); if(sp) sp.oninput=(e)=>{ paso.oferta.precio=e.target.value===""?"":Number(e.target.value); };
  const sv=box.querySelector("[data-ofvence]"); if(sv) sv.oninput=(e)=>{ paso.oferta.vence_horas=Math.max(0,Number(e.target.value)||0); };
}

// ── Compositor de pasos de remarketing (multimedia + rotación) ─────
// Versión autocontenida (escribe directo a los objetos; re-render solo en cambios
// estructurales, así el texto no pierde foco). Paridad con el editor de Secuencias.
function remNewVariant(idx){ return { id:remUid(), nombre:"Versión "+String.fromCharCode(65+(idx||0)), activo:true, peso:1, bubbles:[{text:""}] }; }
function remAddBtns(){
  return ["text","image","video","audio"].map(k=>`<button class="btn" data-addb="${k}" style="height:30px;padding:0 10px;font-size:12px">+ ${({text:"Texto",image:"Imagen",video:"Video",audio:"Audio"})[k]}</button>`).join("");
}
function remComposer(box, paso){
  if(!Array.isArray(paso.variantes)||!paso.variantes.length){
    const first = paso.mensaje ? [{text:String(paso.mensaje)}] : (Array.isArray(paso.bubbles)&&paso.bubbles.length?paso.bubbles:[{text:""}]);
    paso.variantes=[{ ...remNewVariant(0), bubbles:first }];
  }
  delete paso.mensaje; delete paso.bubbles;
  if(paso.rotacion===undefined) paso.rotacion=false;
  const rot=paso.rotacion===true && paso.variantes.length>0;
  const activeVars=paso.variantes.filter(v=>v.activo!==false);
  const pesoTotal=activeVars.reduce((a,v)=>a+Math.max(0,Number(v.peso??1)),0)||1;
  box.innerHTML=`
    <div style="border:1px solid var(--border);border-radius:11px;background:var(--surface-2);padding:11px 12px;margin-top:10px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <span style="flex:1;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px">${icon("message")} Mensaje del paso</span>
        <span style="font-size:11.5px;color:var(--muted);font-weight:600">Rotar versiones</span>
        <div class="sw ${rot?'on':''}" data-rot title="Enviar una versión distinta cada vez"></div>
      </div>
      <div style="font-size:11px;color:var(--faint);margin-bottom:8px">${rot?"El bot elige una versión por peso cada vez que envía este paso.":"Una o varias burbujas (texto y multimedia). Activa la rotación para variar el copy."}</div>
      <div data-varlist></div>
      ${rot?`<button class="btn" data-addvar style="height:30px;padding:0 10px;font-size:12px;margin-top:10px">+ Agregar versión</button>`:``}
    </div>`;
  box.querySelector("[data-rot]").onclick=()=>{ paso.rotacion=!rot; remComposer(box,paso); };
  const av=box.querySelector("[data-addvar]"); if(av) av.onclick=()=>{ paso.variantes.push(remNewVariant(paso.variantes.length)); remComposer(box,paso); };
  const vl=box.querySelector("[data-varlist]");
  const listv = rot ? paso.variantes : paso.variantes.slice(0,1);
  listv.forEach((v,vi)=>{
    if(!Array.isArray(v.bubbles)||!v.bubbles.length) v.bubbles=[{text:""}];
    const card=document.createElement("div");
    if(rot){
      card.style.cssText="border:1px solid var(--border);border-radius:10px;padding:11px;background:var(--surface);margin-top:9px";
      const share=v.activo!==false?Math.round(Math.max(0,Number(v.peso??1))/pesoTotal*100):0;
      card.innerHTML=`
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:9px">
          <input class="in" data-vname style="flex:1;font-weight:700;height:32px" value="${esc(v.nombre||('Versión '+String.fromCharCode(65+vi)))}"/>
          <span style="font-size:11px;color:var(--muted)">Peso</span>
          <input class="in" data-vpeso type="number" min="0" step="1" style="width:54px;height:32px;text-align:center" value="${Number(v.peso??1)}"/>
          <span style="font-size:11px;color:var(--brand);font-weight:700;min-width:32px">${v.activo!==false?share+'%':'—'}</span>
          <div class="sw ${v.activo!==false?'on':''}" data-vact title="Activar/pausar"></div>
          <button class="iconbtn" data-vdel title="Eliminar versión">${icon("trash")}</button>
        </div>
        <div data-bubbles style="display:flex;flex-direction:column;gap:8px"></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:9px">${remAddBtns()}</div>`;
      card.querySelector("[data-vname]").oninput=(e)=>v.nombre=e.target.value;
      card.querySelector("[data-vpeso]").oninput=(e)=>v.peso=Math.max(0,Number(e.target.value)||0);
      card.querySelector("[data-vact]").onclick=()=>{ v.activo=v.activo===false?true:false; remComposer(box,paso); };
      card.querySelector("[data-vdel]").onclick=async()=>{ if(paso.variantes.length<=1){ toast("Debe quedar al menos una versión",true); return; } if(!await confirmDialog({title:"Eliminar versión",message:"¿Eliminar esta versión?",confirmText:"Eliminar",danger:true})) return; paso.variantes.splice(vi,1); remComposer(box,paso); };
    } else {
      card.innerHTML=`<div data-bubbles style="display:flex;flex-direction:column;gap:8px"></div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:9px">${remAddBtns()}</div>`;
    }
    const bb=card.querySelector("[data-bubbles]");
    v.bubbles.forEach((bub,bi)=> bb.appendChild(remBubble(box,paso,v,bub,bi)));
    card.querySelectorAll("[data-addb]").forEach(btn=> btn.onclick=()=>{
      const k=btn.dataset.addb;
      if(k==="text"){ v.bubbles.push({text:""}); remComposer(box,paso); }
      else remPickMedia(box,paso,v,k);
    });
    vl.appendChild(card);
  });
}
function remBubble(box,paso,v,bub,bi){
  const el=document.createElement("div");
  el.style.cssText="border:1px solid var(--border);border-radius:9px;padding:9px 10px;background:var(--surface)";
  const kind=bub.media_kind||"text";
  const tIco={text:"note",image:"image",video:"video",audio:"mic",document:"file"}[kind]||"note";
  let preview="";
  if(kind==="image") preview=`<img src="${esc(bub.media_url)}" style="max-width:140px;max-height:100px;border-radius:7px;display:block;margin-bottom:7px"/>`;
  else if(kind==="video") preview=`<video src="${esc(bub.media_url)}" style="max-width:180px;max-height:120px;border-radius:7px;display:block;margin-bottom:7px" controls></video>`;
  else if(kind==="audio") preview=`<audio src="${esc(bub.media_url)}" style="height:34px;margin-bottom:7px;display:block" controls></audio>`;
  else if(kind==="document") preview=`<div style="font-size:12px;margin-bottom:7px;display:flex;align-items:center;gap:5px">${icon("file")} ${esc(bub.filename||"documento")}</div>`;
  el.innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span style="display:inline-flex;color:var(--muted)">${icon(tIco)}</span>
      <span style="font-size:11px;color:var(--muted);font-weight:600;flex:1">${kind==="text"?"Texto":kind.charAt(0).toUpperCase()+kind.slice(1)}</span>
      <button class="iconbtn" data-bup title="Subir">▲</button>
      <button class="iconbtn" data-bdown title="Bajar">▼</button>
      <button class="iconbtn" data-bdel title="Quitar">${icon("trash")}</button>
    </div>
    ${preview}
    ${kind==="text"
      ? `<textarea class="in" data-btext rows="2" style="height:auto;min-height:52px;padding:8px 10px;line-height:1.45;font-family:var(--font);resize:vertical" placeholder="Escribe el mensaje… puedes usar {{nombre}}, {{precio}}…">${esc(bub.text||"")}</textarea>${botonesHtml(bub)}`
      : (kind!=="audio"?`<input class="in" data-bcap placeholder="Texto/caption (opcional)" value="${esc(bub.caption||"")}"/>`:``)}`;
  if(kind==="text") wireBotones(el,bub,()=>remComposer(box,paso));
  const tx=el.querySelector("[data-btext]"); if(tx) tx.oninput=(e)=>bub.text=e.target.value;
  const cp=el.querySelector("[data-bcap]"); if(cp) cp.oninput=(e)=>bub.caption=e.target.value;
  el.querySelector("[data-bdel]").onclick=()=>{ v.bubbles.splice(bi,1); if(!v.bubbles.length) v.bubbles.push({text:""}); remComposer(box,paso); };
  el.querySelector("[data-bup]").onclick=()=>{ if(bi===0)return; [v.bubbles[bi-1],v.bubbles[bi]]=[v.bubbles[bi],v.bubbles[bi-1]]; remComposer(box,paso); };
  el.querySelector("[data-bdown]").onclick=()=>{ if(bi>=v.bubbles.length-1)return; [v.bubbles[bi+1],v.bubbles[bi]]=[v.bubbles[bi],v.bubbles[bi+1]]; remComposer(box,paso); };
  return el;
}
function remPickMedia(box,paso,v,kind){
  const accept={image:"image/*",video:"video/*",audio:"audio/*"}[kind]||"*/*";
  const inp=document.createElement("input"); inp.type="file"; inp.accept=accept;
  inp.onchange=async()=>{
    const file=inp.files&&inp.files[0]; if(!file) return;
    toast("Subiendo…");
    try{
      const dataURL=await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
      const { data,error }=await supa.functions.invoke("media-upload",{ body:{ channel_id:st.channelId, filename:file.name, content_type:file.type, data:dataURL } });
      if(error||!data?.url){ toast("No se pudo subir el archivo",true); return; }
      v.bubbles.push({ media_kind:data.kind||kind, media_url:data.url, mime:file.type, filename:file.name, caption:"" });
      toast("Archivo agregado ✓"); remComposer(box,paso);
    }catch(e){ toast("Error al subir",true); }
  };
  inp.click();
}

// Sube un archivo y lo agrega a config.ia_multimedia (multimedia que la IA
// enviará sola). Reusa la Edge Function media-upload igual que pickMedia.
// Sube un archivo y lo agrega a `arr` con un tag único. `tagBase` opcional fija
// el prefijo del tag (ej. "atr_talla" para la multimedia de un atributo).
function pickMediaTo(kind, arr, onDone, syncCfg, tagBase){
  const accept={image:"image/*",video:"video/*",document:"*/*"}[kind]||"*/*";
  const inp=document.createElement("input"); inp.type="file"; inp.accept=accept;
  inp.onchange=async()=>{
    const file=inp.files&&inp.files[0]; if(!file) return;
    toast("Subiendo…");
    try{
      const dataURL=await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
      const { data,error }=await supa.functions.invoke("media-upload",{ body:{ channel_id:st.channelId, filename:file.name, content_type:file.type, data:dataURL } });
      if(error||!data?.url){ toast("No se pudo subir el archivo",true); return; }
      const base=String(tagBase||(file.name||"archivo").replace(/\.[^.]+$/,"")).replace(/[^\w-]/g,"").toLowerCase().slice(0,20)||"archivo";
      let tag=base, n=2; while(arr.some(x=>x.tag===tag)) tag=base+"_"+n++;
      arr.push({ tag, media_kind:data.kind||kind, media_url:data.url, mime:file.type, filename:file.name, descripcion:"" });
      if(syncCfg) syncCfg();
      toast("Archivo agregado ✓"); if(onDone) onDone();
    }catch(e){ toast("Error al subir",true); }
  };
  inp.click();
}
function pickProdMedia(kind, onDone, syncCfg){
  const arr=st.prod.config.ia_multimedia=st.prod.config.ia_multimedia||[];
  pickMediaTo(kind, arr, onDone, syncCfg);
}

// Catálogo de lo ofrecible como extra: toda Opción de compra ACTIVA y CON
// PRECIO del bot (de este producto o de cualquier otro). Lo usan la pestaña de
// Ventas extra y el generador de flujo (que puede correr sin haberla abierto).
async function cargarCatalogoExtras(){
  const { data:prods } = await supa.from("products")
    .select("id,nombre,emoji,tipo,product_versions(id,nombre,precio,activo)")
    .eq("channel_id",st.channelId).order("nombre");
  const cat=[];
  (prods||[]).forEach(p=>(p.product_versions||[]).forEach(v=>{
    if(v.activo!==false && v.precio!=null && v.precio!=="")
      cat.push({ id:v.id, label:`${p.emoji?p.emoji+" ":""}${p.nombre} · ${v.nombre} — S/ ${v.precio}`, precio:v.precio, tipo:p.tipo||"digital" });
  }));
  st.extraCat=cat;
  return cat;
}

// Cadena de ventas extra "ride-along" para pedidos FÍSICOS: el extra NO se cobra
// aparte, se suma al mismo envío (sube el saldo; el adelanto no cambia). Ofrecer
// → si acepta (la IA lee el texto libre, sin botones) → sumar al pedido →
// siguiente; si rechaza o no contesta → se corta la cadena y sale por exitNode.
async function buildRideAlongExtras(N, E, entryNode, exitNode, extras, cat, esperaSeg, baseY){
  let prevExit=entryNode;
  for(let i=0;i<extras.length;i++){
    const x=extras[i];
    const info=cat.find(c=>c.id===x.version_id);
    const precio=info?.precio ?? "";
    const label=info?info.label:`Extra ${i+1}`;
    // Un extra DIGITAL viaja igual ride-along (se cobra junto), pero su link se
    // entrega recién cuando el pedido queda pagado del todo (motor:
    // entregarExtrasDigitales). El bump lleva version_id + digital para saberlo.
    const esDigital=(info?.tipo==="digital");
    const y=baseY + i*300;
    const nOfr=await N("mensaje",`Ofrecer extra ${i+1}`,{ bubbles:[{ text:x.mensaje||`¿Le sumas ${label}? Te lo mando junto 🎁` }] },false,1800,y);
    const nEsp=await N("pregunta",`Esperar respuesta (extra ${i+1})`,{ text:"", timeout_seg:esperaSeg },false,2080,y);
    const nClas=await N("ia",`¿Lo quiere? (extra ${i+1})`,{
      operacion:"clasificar", guardar_en:`extraf_${i+1}_resp`, default:"duda", umbral:0.6,
      que:"Qué dice el cliente sobre sumar el producto adicional a su pedido",
      opciones:[
        { clave:"acepta", label:"Acepta", detalle:"Dice que sí, que se lo sume, lo quiere" },
        { clave:"rechaza", label:"Rechaza", detalle:"Dice que no, que solo lo que pidió, que no le interesa" },
        { clave:"duda", label:"Duda o pregunta", detalle:"Pide más info, no decide todavía" },
      ],
    },false,2360,y);
    const nCond=await N("condicion",`¿Aceptó? (extra ${i+1})`,{
      rutas:[
        { nombre:"Acepta", handle:"ruta:acepta", match:"todas", condiciones:[{op:"campo_igual",campo:`extraf_${i+1}_resp`,valor:"acepta"}] },
        { nombre:"Rechaza", handle:"ruta:rechaza", match:"todas", condiciones:[{op:"campo_igual",campo:`extraf_${i+1}_resp`,valor:"rechaza"}] },
      ],
    },false,2640,y);
    const nAdd=await N("accion",`Sumar extra ${i+1}`,{
      acciones:[
        { tipo:"actualizar_pedido", bump:{ nombre:label, precio:String(precio), sube_saldo:true, ...(esDigital?{ version_id:x.version_id, digital:true }:{}) } },
        { tipo:"notify_admin", una_vez:`extraf_${x.version_id}`, plantilla:"venta_extra",
          datos:{ extra:`${label} (${esDigital?"digital":"físico"}, va en el mismo envío)`, monto:String(precio) } },
      ],
    },false,2920,y);
    const nConfE=await N("mensaje",`Confirmar extra ${i+1}`,{ bubbles:[{ text: esDigital?`¡Listo! Te lo sumo al pedido 🎉 Apenas se complete el pago te mando el acceso.`:`¡Genial! Te lo sumo al pedido 🎉 Lo pagas junto con el resto.` }] },false,3200,y);
    const nResp=await N("ia",`Responder sobre el extra ${i+1}`,{
      operacion:"generar_texto", enviar:true, usar_conocimiento:true, detectar_opcion:false,
      prompt:`El cliente está viendo una oferta para SUMAR ${label} a su pedido (se envía y cobra junto con lo que ya pidió). Responde su duda de forma breve y sin presionar; si quiere, dile que se lo sumas al mismo envío.`,
    },false,2640,y+140);

    await E(prevExit,"continuar",nOfr);
    await E(nOfr,"continuar",nEsp);
    await E(nEsp,"timeout",exitNode);        // no contestó → sigue sin el extra
    await E(nEsp,"continuar",nClas);
    await E(nClas,"exito",nCond);
    await E(nCond,"ruta:rechaza",exitNode);  // corta TODA la cadena
    await E(nCond,"si_no_cumple",nResp);     // duda → responder → escuchar
    await E(nResp,"exito",nEsp);
    await E(nCond,"ruta:acepta",nAdd);
    await E(nAdd,"continuar",nConfE);
    prevExit=nConfE;                          // el siguiente ofrecimiento cuelga de acá
  }
  await E(prevExit,"continuar",exitNode);
}
