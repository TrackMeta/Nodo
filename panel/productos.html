<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script>try{document.documentElement.dataset.theme=localStorage.getItem("nodo.theme")||"dark"}catch(e){}</script>
<title>Nodo · Productos</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png" />
<link rel="stylesheet" href="shell.css" />
<style>
  :root{
    --bg:#0e1116; --surface:#151a21; --surface-2:#1b222c; --border:#232b36;
    --text:#e7ecf2; --muted:#8a97a8; --faint:#5c6675;
    --brand:#2b7fff; --brand-2:#1e6ff0; --brand-bg:#12233f;
    --green:#22c079; --green-bg:#10281d; --amber:#f0a92b; --red:#e2564a;
    --font:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box} html,body{height:100%;margin:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px}
  button{font-family:inherit;cursor:pointer}
  .pcard .c-tt{font-size:16.5px;font-weight:700;letter-spacing:-.2px}
  .tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border)}
  .tab{background:transparent;border:none;color:var(--muted);font-size:14px;font-weight:600;padding:10px 16px;border-bottom:2px solid transparent}
  .tab.active{color:var(--brand);border-bottom-color:var(--brand)}
  label{display:block;font-size:11.5px;color:var(--muted);margin:16px 0 6px;font-weight:700}
  .in,.ta{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:10px 12px;font-size:13.5px;outline:none;font-family:var(--font)}
  .ta{min-height:90px;font-family:monospace;font-size:12px}
  .sel{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);height:40px;padding:0 12px;font-size:13.5px;outline:none}
  .in:focus,.ta:focus{border-color:var(--brand)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
  .card h4{margin:0 0 4px;font-size:14px;font-weight:700}
  .row{display:flex;gap:12px;align-items:center} .row>*{flex:1}
  .chk{display:flex;align-items:center;gap:8px;font-size:13.5px;margin-top:14px}
  .flowrow{display:flex;align-items:center;gap:10px;padding:13px 0;border-bottom:1px solid var(--border)}
  .badge{font-size:10px;padding:3px 10px;border-radius:20px;background:var(--surface-2);border:1px solid var(--border);color:var(--muted);font-weight:700}
  .badge.on{background:var(--green-bg);color:var(--green);border-color:transparent}
  .linkbtn{font-size:12.5px;padding:6px 12px;border:1px solid var(--border);border-radius:9px;color:var(--text);text-decoration:none;font-weight:600}
  .empty{color:var(--faint);text-align:center;padding:40px}
  .btn{height:40px;padding:0 16px;border-radius:11px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:13.5px;font-weight:600}
  .btn.primary{background:var(--brand);border:none;color:#fff} .btn.primary:hover{background:var(--brand-2)}
</style>
</head>
<body>
<div class="nodo-page">
  <div class="nodo-wrap">
    <!-- VISTA TARJETAS -->
    <div id="gridView">
      <div class="nodo-head">
        <div class="grow">
          <h1 class="nodo-title">Productos</h1>
          <p class="nodo-lead">Tu catálogo de productos digitales y físicos. Cada producto define sus versiones, precios, entrega o envío, y los flujos que lo venden.</p>
        </div>
        <div class="nodo-actions">
          <button class="nodo-btn primary" id="addProduct"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg> Nuevo producto</button>
        </div>
      </div>
      <div class="nodo-folders" id="folders"></div>
      <div class="nodo-cards" id="cards"></div>
    </div>
    <!-- VISTA DETALLE -->
    <div id="detailView" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
        <button class="nodo-back" id="backBtn" style="margin-bottom:0"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Volver a productos</button>
        <div style="display:flex;gap:8px">
          <button class="nodo-btn danger" id="delBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg> Eliminar</button>
          <button class="btn primary" id="saveBtn">Guardar cambios</button>
        </div>
      </div>
      <div id="detail" style="margin-top:18px"></div>
    </div>
  </div>
</div>

<script type="module">
import { supa, mountShell, toast } from "./shell.js";
const $ = (id) => document.getElementById(id);
const st = { channelId:null, prod:null, versions:[], tab:"datos", list:[], folder:"__all", localFolders:new Set() };
function esc(s){ return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
const EMOJIS=["📕","💪","🏋️","🥊","🎯","🧠","💰","📈","🚀","🔥","⚡","🎓","🍳","🌱","❤️","✨","📱","🎸","🎨","🐶","⚽","🧘","💊","🛠️","📷"];

async function boot(){
  const { data:{ session } } = await supa.auth.getSession();
  if(!session){ location.href="index.html"; return; }
  const shell=await mountShell({ active:"productos" });
  st.channelId=shell.channelId;
  shell.onChannel(id=>{ st.channelId=id; st.prod=null; showGrid(); loadProducts(); });
  $("addProduct").onclick = createProduct;
  $("saveBtn").onclick = saveProduct;
  $("delBtn").onclick = deleteProduct;
  $("backBtn").onclick = ()=>{ st.prod=null; showGrid(); loadProducts(); };
  await loadProducts();
}
function showGrid(){ $("gridView").style.display=""; $("detailView").style.display="none"; }
function showDetail(){ $("gridView").style.display="none"; $("detailView").style.display=""; window.scrollTo(0,0); }

async function loadProducts(){
  let { data, error } = await supa.from("products").select("id,nombre,con_bifurcacion,config,folder,emoji,tipo").eq("channel_id",st.channelId).order("created_at");
  if(error){ ({ data, error } = await supa.from("products").select("id,nombre,con_bifurcacion,config,folder,emoji").eq("channel_id",st.channelId).order("created_at")); }
  if(error){ ({ data } = await supa.from("products").select("id,nombre,con_bifurcacion,config").eq("channel_id",st.channelId).order("created_at")); }
  st.list=data||[]; renderFolders(); renderCards();
}
function allFolders(){ const s=new Set(st.localFolders); st.list.forEach(x=>{ if(x.folder) s.add(x.folder); }); return [...s].sort(); }
function countIn(v){ if(v==="__all") return st.list.length; if(v==="__none") return st.list.filter(p=>!p.folder).length; return st.list.filter(p=>p.folder===v).length; }
function renderFolders(){
  const isReal=st.folder!=="__all"&&st.folder!=="__none";
  const tabs=[["__all","Todos"],["__none","Sin carpeta"],...allFolders().map(f=>[f,f])];
  $("folders").innerHTML=tabs.map(([v,l])=>`<button class="nodo-folder ${st.folder===v?'on':''}" data-f="${esc(v)}">${v==="__all"||v==="__none"?"":"📁 "}${esc(l)}<span class="cnt">${countIn(v)}</span></button>`).join("")
    +`<button class="nodo-folder add" id="newFolder">+ Carpeta</button>`
    +(isReal?`<button class="nodo-folder" id="delFolder" style="color:var(--red);border-color:transparent">🗑 Eliminar carpeta</button>`:"");
  $("folders").querySelectorAll(".nodo-folder[data-f]").forEach(b=> b.onclick=()=>{ st.folder=b.dataset.f; renderFolders(); renderCards(); });
  $("newFolder").onclick=()=>{ const n=prompt("Nombre de la carpeta:"); if(n&&n.trim()){ st.localFolders.add(n.trim()); st.folder=n.trim(); renderFolders(); renderCards(); } };
  const df=$("delFolder"); if(df) df.onclick=deleteFolder;
}
async function deleteFolder(){
  const f=st.folder; if(f==="__all"||f==="__none") return;
  const n=countIn(f);
  if(!confirm(n?`La carpeta "${f}" tiene ${n} producto(s). Se moverán a "Sin carpeta". ¿Continuar?`:`¿Eliminar la carpeta vacía "${f}"?`)) return;
  if(n){ const { error }=await supa.from("products").update({ folder:null }).eq("channel_id",st.channelId).eq("folder",f); if(error){ toast(error.message,true); return; } }
  st.localFolders.delete(f); st.folder="__all"; toast("Carpeta eliminada ✓"); await loadProducts();
}
function renderCards(){
  let list=st.list;
  if(st.folder==="__none") list=list.filter(p=>!p.folder); else if(st.folder!=="__all") list=list.filter(p=>p.folder===st.folder);
  const box=$("cards");
  if(!st.list.length){
    box.innerHTML=`<div class="nodo-empty" style="grid-column:1/-1"><div class="e-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5M12 22V12"/></svg></div><h3>Aún no hay productos</h3><p>Crea tu primer producto para configurar sus versiones, precios y flujos de venta.</p></div>`;
    return;
  }
  box.innerHTML="";
  list.forEach(p=>{
    const el=document.createElement("div"); el.className="nodo-card pcard";
    const precio=p.config&&p.config.precio?`S/ ${esc(p.config.precio)}`:"";
    const icon = p.emoji ? `<span style="font-size:24px;line-height:1">${esc(p.emoji)}</span>` : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5M12 22V12"/></svg>`;
    el.innerHTML=`
      <div class="c-ic">${icon}</div>
      <div class="c-tt">${esc(p.nombre)}</div>
      <div class="c-sub">${p.tipo==="fisico"?"Producto físico · envíos":(p.con_bifurcacion?"Con versiones (Básica / Premium)":"Versión única")}</div>
      <div class="c-foot"><span class="nodo-pill neutral">${p.tipo==="fisico"?"📦 Físico":"💾 Digital"}</span><span class="nodo-pill neutral">${p.con_bifurcacion?'Multi-versión':'Simple'}</span>${precio?`<span class="nodo-pill neutral">${precio}</span>`:''}${p.folder?`<span class="nodo-pill neutral">📁 ${esc(p.folder)}</span>`:''}</div>`;
    el.onclick=()=>openProduct(p.id); box.appendChild(el);
  });
  const add=document.createElement("div"); add.className="nodo-card new";
  add.innerHTML=`<div class="c-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></div><div class="c-tt" style="font-size:14px;font-weight:700">Nuevo producto</div>`;
  add.onclick=createProduct; box.appendChild(add);
}
async function createProduct(){
  const nombre=prompt("Nombre del producto:"); if(!nombre) return;
  const folder=(st.folder!=="__all"&&st.folder!=="__none")?st.folder:null;
  let { data,error } = await supa.from("products").insert({ channel_id:st.channelId, nombre, folder }).select("id").single();
  if(error && /folder|column/.test(error.message)){ ({ data,error } = await supa.from("products").insert({ channel_id:st.channelId, nombre }).select("id").single()); }
  if(error){ toast(error.message,true); return; }
  await loadProducts(); openProduct(data.id);
}
async function openProduct(id){
  const { data:p } = await supa.from("products").select("*").eq("id",id).maybeSingle();
  const { data:vs } = await supa.from("product_versions").select("*").eq("product_id",id).order("orden");
  st.prod=p; st.versions=vs||[]; st.tab="datos";
  renderDetail(); showDetail();
}
async function deleteProduct(){
  if(!st.prod) return;
  if(!confirm(`¿Eliminar el producto "${st.prod.nombre}"? Se eliminarán también sus versiones. Esta acción no se puede deshacer.`)) return;
  await supa.from("product_versions").delete().eq("product_id",st.prod.id);
  const { error }=await supa.from("products").delete().eq("id",st.prod.id);
  if(error){ toast(error.message,true); return; }
  st.prod=null; toast("Producto eliminado ✓"); showGrid(); await loadProducts();
}

function renderDetail(){
  const d=$("detail"); if(!st.prod) return;
  d.innerHTML=`
    <h1 style="margin:0 0 16px;font-size:23px;font-weight:700;letter-spacing:-.4px">${esc(st.prod.nombre)}</h1>
    <div class="tabs">
      <button class="tab ${st.tab==='datos'?'active':''}" data-t="datos">Datos</button>
      <button class="tab ${st.tab==='flujos'?'active':''}" data-t="flujos">Flujos</button>
    </div>
    <div id="tabBody"></div>`;
  d.querySelectorAll(".tab").forEach(b=> b.onclick=()=>{ st.tab=b.dataset.t; renderDetail(); });
  if(st.tab==="datos") renderDatos(); else renderFlujos();
}

function renderDatos(){
  const b=$("tabBody");
  const folders=allFolders();
  b.innerHTML=`
    <div class="row" style="align-items:flex-start">
      <div style="flex:none"><label style="margin-top:0">Emoji</label>
        <button class="btn" id="emojiBtn" style="width:52px;height:44px;font-size:22px;padding:0">${st.prod.emoji||"➕"}</button>
        <div id="emojiPop" style="display:none;position:absolute;z-index:20;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:8px;box-shadow:0 12px 32px rgba(0,0,0,.35);max-width:280px;flex-wrap:wrap;gap:2px;margin-top:4px"></div>
      </div>
      <div style="flex:1;min-width:180px"><label style="margin-top:0">Nombre del producto</label>
        <input class="in" id="pNombre" value="${esc(st.prod.nombre)}"/></div>
    </div>
    <div style="font-size:11.5px;color:var(--faint);margin-top:6px">El emoji identifica el producto en la Bandeja (al lado de la foto del contacto que entró por él).</div>
    <div class="row" style="align-items:flex-end">
      <div><label>Carpeta</label>
        <select class="sel" id="pFolder" style="width:100%"><option value="">Sin carpeta</option>${folders.map(f=>`<option value="${esc(f)}" ${st.prod.folder===f?"selected":""}>${esc(f)}</option>`).join("")}</select></div>
      <div><label>Tipo de producto</label>
        <select class="sel" id="pTipo" style="width:100%">
          <option value="digital" ${(st.prod.tipo||"digital")==="digital"?"selected":""}>💾 Digital (entrega por link)</option>
          <option value="fisico" ${st.prod.tipo==="fisico"?"selected":""}>📦 Físico (envíos Lima / provincia)</option>
        </select></div>
    </div>
    <div id="envioCard"></div>
    <label class="chk"><input type="checkbox" id="pBif" ${st.prod.con_bifurcacion?"checked":""}/> Con bifurcación (versiones Básica/Premium)</label>
    <div class="card" style="margin-top:16px">
      <h4>🧠 Conocimiento del producto (para la IA)</h4>
      <div style="font-size:12px;color:var(--faint)">Los nodos ✨ IA lo reciben automáticamente al conversar sobre este producto, junto con el "Conocimiento del negocio" de Ajustes → General.</div>
      <label>Descripción / contexto del producto</label>
      <textarea class="in" id="pContexto" rows="5" style="height:auto;min-height:100px;padding:10px 12px;line-height:1.5;font-family:var(--font);resize:vertical" placeholder="Qué es, qué incluye, para quién es, beneficios, precio y versiones, cómo se entrega…">${esc((st.prod.config||{}).contexto_producto||"")}</textarea>
      <label>FAQ / objeciones frecuentes</label>
      <textarea class="in" id="pFaq" rows="5" style="height:auto;min-height:100px;padding:10px 12px;line-height:1.5;font-family:var(--font);resize:vertical" placeholder="P: ¿Cómo lo recibo? R: …&#10;P: ¿Tiene garantía? R: …&#10;Objeción: 'está caro' → responder con el valor y la escalera de precios.">${esc((st.prod.config||{}).faq||"")}</textarea>
    </div>
    <label>Campos fijos (config JSON: precio, datos_pago, links…)</label>
    <textarea class="ta" id="pConfig">${esc(JSON.stringify(st.prod.config||{},null,2))}</textarea>
    <label style="margin-top:22px">Versiones</label>
    <div id="versions"></div>
    <button class="btn" id="addVersion" style="margin-top:10px">+ versión</button>`;
  $("pNombre").oninput=(e)=>st.prod.nombre=e.target.value;
  $("pFolder").onchange=(e)=>st.prod.folder=e.target.value||null;
  const pop=$("emojiPop"), ebtn=$("emojiBtn");
  pop.style.flexDirection="column";
  pop.innerHTML=`
    <input id="emojiAny" placeholder="Escribe o pega cualquier emoji…" maxlength="8"
      style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 10px;font-size:16px;outline:none;margin-bottom:6px"/>
    <div style="font-size:11px;color:var(--faint);margin-bottom:8px">Tip: <b>Win + .</b> (o <b>Ctrl+Cmd+Espacio</b> en Mac) abre el teclado de emojis.</div>
    <div style="display:flex;flex-wrap:wrap;gap:2px">
      ${EMOJIS.map(e=>`<button type="button" data-e="${e}" style="width:34px;height:34px;font-size:20px;padding:0;border:none;background:transparent;cursor:pointer;border-radius:8px">${e}</button>`).join("")}
      <button type="button" data-e="" title="Sin emoji" style="width:34px;height:34px;padding:0;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:8px">✕</button>
    </div>`;
  pop.style.display="none";
  ebtn.onclick=(ev)=>{ ev.stopPropagation(); pop.style.display=pop.style.display==="none"?"flex":"none"; if(pop.style.display==="flex"){ const inp=$("emojiAny"); if(inp){ inp.value=st.prod.emoji||""; inp.focus(); } } };
  pop.onclick=(ev)=>ev.stopPropagation();
  const setEmoji=(v)=>{ st.prod.emoji=(v&&v.trim())||null; ebtn.textContent=st.prod.emoji||"➕"; };
  pop.querySelectorAll("button[data-e]").forEach(b=> b.onclick=()=>{ setEmoji(b.dataset.e); pop.style.display="none"; });
  const any=$("emojiAny");
  any.oninput=(e)=>setEmoji(e.target.value);
  any.onkeydown=(e)=>{ if(e.key==="Enter"){ e.preventDefault(); pop.style.display="none"; } };
  document.addEventListener("click",()=>{ pop.style.display="none"; },{ once:true });
  $("pBif").onchange=(e)=>st.prod.con_bifurcacion=e.target.checked;
  $("pConfig").onchange=(e)=>{ try{ st.prod.config=JSON.parse(e.target.value); $("pContexto").value=st.prod.config.contexto_producto||""; $("pFaq").value=st.prod.config.faq||""; }catch(_){ toast("JSON inválido",true); } };
  const syncCfg=()=>{ const t=$("pConfig"); if(t) t.value=JSON.stringify(st.prod.config||{},null,2); };
  $("pContexto").onchange=(e)=>{ (st.prod.config=st.prod.config||{}).contexto_producto=e.target.value.trim()||undefined; if(!e.target.value.trim()) delete st.prod.config.contexto_producto; syncCfg(); };
  $("pFaq").onchange=(e)=>{ (st.prod.config=st.prod.config||{}).faq=e.target.value.trim()||undefined; if(!e.target.value.trim()) delete st.prod.config.faq; syncCfg(); };
  $("pTipo").onchange=(e)=>{ st.prod.tipo=e.target.value; renderEnvio(); };
  $("addVersion").onclick=()=>{ st.versions.push({ nombre:"Nueva versión", price_list:[], drive_link:"", orden:st.versions.length }); renderVersions(); };
  renderEnvio();
  renderVersions();
}

// ── Config de envío del producto físico (DEFINICION §6-SEPTIES) ────
function renderEnvio(){
  const box=$("envioCard"); if(!box) return;
  if((st.prod.tipo||"digital")!=="fisico"){ box.innerHTML=""; return; }
  const cfg=st.prod.config||(st.prod.config={});
  const e=cfg.envio||(cfg.envio={ adelanto_modo:"fijo", adelanto_valor:20, gratis:true, costo_lima:"", costo_provincia:"", lima_contraentrega:true, agencias:["shalom","olva"], cobro_saldo:"bot" });
  const ag=(a)=>(e.agencias||[]).includes(a);
  box.innerHTML=`
    <div class="card" style="margin-top:16px">
      <h4>📦 Envío y cobro</h4>
      <div style="font-size:12px;color:var(--faint)">Cómo se cobra y despacha este producto. El flujo de venta física lee esta configuración.</div>
      <div class="row" style="margin-top:4px">
        <div><label>Adelanto (provincia)</label>
          <select class="sel" id="eModo" style="width:100%">
            <option value="fijo" ${e.adelanto_modo!=="porcentaje"?"selected":""}>Monto fijo (S/)</option>
            <option value="porcentaje" ${e.adelanto_modo==="porcentaje"?"selected":""}>% del precio</option>
          </select></div>
        <div><label>${e.adelanto_modo==="porcentaje"?"Porcentaje (%)":"Monto (S/)"}</label>
          <input class="in" id="eValor" type="number" step="0.1" value="${esc(e.adelanto_valor??"")}"/></div>
      </div>
      <label class="chk"><input type="checkbox" id="eGratis" ${e.gratis!==false?"checked":""}/> Envío gratis (lo asume el negocio)</label>
      <div class="row" id="eCostos" style="display:${e.gratis!==false?"none":"flex"}">
        <div><label>Costo envío Lima (S/)</label><input class="in" id="eCLima" type="number" step="0.1" value="${esc(e.costo_lima??"")}"/></div>
        <div><label>Costo envío provincia (S/)</label><input class="in" id="eCProv" type="number" step="0.1" value="${esc(e.costo_provincia??"")}"/></div>
      </div>
      <label class="chk"><input type="checkbox" id="eCOD" ${e.lima_contraentrega!==false?"checked":""}/> Lima: 100% contraentrega (sin adelanto)</label>
      <label>Agencias habilitadas (provincia)</label>
      <div class="row" style="justify-content:flex-start;gap:18px">
        <label class="chk" style="margin-top:0;flex:none"><input type="checkbox" id="eShalom" ${ag("shalom")?"checked":""}/> Shalom</label>
        <label class="chk" style="margin-top:0;flex:none"><input type="checkbox" id="eOlva" ${ag("olva")?"checked":""}/> Olva Courier</label>
      </div>
      <label>Cobro del saldo (al llegar a la agencia)</label>
      <select class="sel" id="eCobro" style="min-width:280px">
        <option value="bot" ${e.cobro_saldo!=="humano"?"selected":""}>🤖 Bot — escribe, valida el pago y suelta la clave</option>
        <option value="humano" ${e.cobro_saldo==="humano"?"selected":""}>🙋 Humano — el operador cierra a mano</option>
      </select>
    </div>`;
  const upd=()=>{
    e.adelanto_modo=$("eModo").value; e.adelanto_valor=parseFloat($("eValor").value)||0;
    e.gratis=$("eGratis").checked; e.costo_lima=parseFloat($("eCLima")?.value)||0; e.costo_provincia=parseFloat($("eCProv")?.value)||0;
    e.lima_contraentrega=$("eCOD").checked;
    e.agencias=[["shalom","eShalom"],["olva","eOlva"]].filter(([,id])=>$(id).checked).map(([a])=>a);
    e.cobro_saldo=$("eCobro").value;
  };
  ["eModo","eValor","eGratis","eCLima","eCProv","eCOD","eShalom","eOlva","eCobro"].forEach(id=>{ const n=$(id); if(n) n.onchange=()=>{ upd(); if(id==="eGratis"||id==="eModo") renderEnvio(); }; });
}
function renderVersions(){
  const box=$("versions"); box.innerHTML="";
  st.versions.forEach((v,i)=>{
    const el=document.createElement("div"); el.className="card";
    el.innerHTML=`
      <div class="row">
        <div><label style="margin-top:0">Nombre</label><input class="in vn" value="${esc(v.nombre)}"/></div>
        <div><label style="margin-top:0">Precios (escalera, separados por coma)</label><input class="in vp" value="${esc((v.price_list||[]).join(', '))}"/></div>
      </div>
      <label>Link de entrega (Drive)</label>
      <div class="row"><input class="in vl" value="${esc(v.drive_link||'')}"/><button class="btn vdel" style="flex:0 0 auto">✕</button></div>`;
    el.querySelector(".vn").oninput=(e)=>v.nombre=e.target.value;
    el.querySelector(".vp").oninput=(e)=>v.price_list=e.target.value.split(",").map(x=>parseFloat(x.trim())).filter(x=>!isNaN(x));
    el.querySelector(".vl").oninput=(e)=>v.drive_link=e.target.value;
    el.querySelector(".vdel").onclick=()=>{ if(v.id) v._delete=true; st.versions.splice(i,1); renderVersions(); };
    box.appendChild(el);
  });
}

async function renderFlujos(){
  const b=$("tabBody");
  b.innerHTML=`<div id="flowbox"><div class="empty">Cargando…</div></div>
    <div class="card" style="margin-top:16px">
      <h4>Añadir flujo (copia de un esqueleto)</h4>
      <div class="row" style="margin-top:8px">
        <select class="sel" id="skSel" style="width:100%"></select>
        <input class="in" id="skRole" placeholder="rol (bienvenida, pago…)"/>
        <button class="btn primary" id="skAdd" style="flex:0 0 auto">Clonar</button>
      </div>
      <div style="font-size:12px;color:var(--faint);margin-top:8px">Los esqueletos se crean en el editor (🕸). El clon queda ligado a este producto.</div>
    </div>`;
  const { data:flows } = await supa.from("flows").select("id,nombre,role,estado").eq("product_id",st.prod.id).order("created_at");
  const fb=$("flowbox"); fb.innerHTML="";
  if(!flows||!flows.length){ fb.innerHTML=`<div class="empty" style="padding:24px">Aún no hay flujos. Clona un esqueleto abajo.</div>`; }
  (flows||[]).forEach(f=>{
    const el=document.createElement("div"); el.className="flowrow";
    el.innerHTML=`<div style="flex:1"><div style="font-weight:700;font-size:14px">${esc(f.nombre)}</div><div style="font-size:12px;color:var(--faint)">${esc(f.role||"flujo")}</div></div>
      <span class="badge ${f.estado==='activo'?'on':''}">${f.estado}</span>
      <a class="linkbtn" href="editor.html?flow=${f.id}">Editar 🕸</a>`;
    fb.appendChild(el);
  });
  const { data:sks } = await supa.from("flows").select("id,nombre").eq("channel_id",st.channelId).eq("kind","skeleton").order("nombre");
  const sel=$("skSel"); sel.innerHTML="";
  if(!sks||!sks.length){ const o=document.createElement("option"); o.textContent="(no hay esqueletos — créalos en el editor)"; o.value=""; sel.appendChild(o); }
  (sks||[]).forEach(s=>{ const o=document.createElement("option"); o.value=s.id; o.textContent=s.nombre; sel.appendChild(o); });
  $("skAdd").onclick=async()=>{
    const source=$("skSel").value; const role=$("skRole").value.trim()||"custom";
    if(!source){ toast("No hay esqueleto seleccionado",true); return; }
    const nombre=(sks.find(x=>x.id===source)?.nombre||"Flujo")+" · "+st.prod.nombre;
    const { data,error } = await supa.rpc("clone_flow",{ p_source:source, p_product:st.prod.id, p_role:role, p_nombre:nombre });
    if(error){ toast(error.message,true); return; }
    toast("Flujo clonado ✓"); renderFlujos();
  };
}

async function saveProduct(){
  if(!st.prod){ return; }
  const base={ nombre:st.prod.nombre, con_bifurcacion:st.prod.con_bifurcacion, config:st.prod.config||{}, updated_at:new Date().toISOString() };
  let { error:e1 } = await supa.from("products").update({ ...base, folder:st.prod.folder||null, emoji:st.prod.emoji||null, tipo:st.prod.tipo||"digital" }).eq("id",st.prod.id);
  if(e1 && /tipo|column/.test(e1.message)){ ({ error:e1 } = await supa.from("products").update({ ...base, folder:st.prod.folder||null, emoji:st.prod.emoji||null }).eq("id",st.prod.id)); if(!e1) toast("Guardado (aplica 0022 para el tipo físico)"); }
  if(e1 && /folder|emoji|column/.test(e1.message)){ ({ error:e1 } = await supa.from("products").update(base).eq("id",st.prod.id)); if(!e1) toast("Guardado (aplica 0018 para carpeta/emoji)"); }
  if(e1){ toast(e1.message,true); return; }
  for(let i=0;i<st.versions.length;i++){
    const v=st.versions[i]; v.orden=i; v.product_id=st.prod.id;
    const row={ product_id:st.prod.id, nombre:v.nombre, price_list:v.price_list||[], drive_link:v.drive_link||null, orden:i };
    if(v.id) row.id=v.id;
    const { error } = await supa.from("product_versions").upsert(row);
    if(error){ toast(error.message,true); return; }
  }
  toast("Guardado ✓"); loadProducts();
}
boot();
</script>
