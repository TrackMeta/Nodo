<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script>try{document.documentElement.dataset.theme=localStorage.getItem("nodo.theme")||"dark"}catch(e){}</script>
<title>Nodo · Productos</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png" />
<link rel="stylesheet" href="shell.css" />
<style>
  :root{
    --bg:#0e1116; --surface:#151a21; --surface-2:#1b222c; --border:#232b36;
    --text:#e7ecf2; --muted:#8a97a8; --faint:#5c6675;
    --brand:#2b7fff; --brand-2:#1e6ff0; --brand-bg:#12233f;
    --green:#22c079; --amber:#f0a92b; --red:#e2564a;
    --font:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px}
  button{font-family:inherit;cursor:pointer}
  .app{height:100%;display:flex;flex-direction:column}
  .top{height:52px;flex:none;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px;background:var(--surface)}
  .top a{color:var(--muted);text-decoration:none;font-size:20px}
  .sel{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);height:36px;padding:0 10px;font-size:13px;outline:none}
  .spacer{margin-left:auto}
  .btn{height:36px;padding:0 14px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:13px;font-weight:600}
  .btn.primary{background:var(--brand);border:none;color:#fff}
  .btn.primary:hover{background:var(--brand-2)}
  .main{flex:1;display:flex;min-height:0}
  .list{width:230px;flex:none;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
  .list .hd{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .add{background:var(--brand-bg);color:var(--brand);border:none;border-radius:8px;width:26px;height:26px;font-size:16px}
  .item{padding:11px 12px;border-bottom:1px solid var(--border);cursor:pointer}
  .item:hover{background:var(--surface)}
  .item.active{background:var(--surface-2)}
  .item .n{font-weight:600;font-size:13px}
  .item .m{font-size:11px;color:var(--faint);margin-top:2px}
  .detail{flex:1;min-width:0;overflow-y:auto;padding:20px 24px}
  .tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border)}
  .tab{background:transparent;border:none;color:var(--muted);font-size:13px;font-weight:600;padding:8px 14px;border-bottom:2px solid transparent}
  .tab.active{color:var(--brand);border-bottom-color:var(--brand)}
  label{display:block;font-size:11px;color:var(--muted);margin:14px 0 6px}
  .in,.ta{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 11px;font-size:13px;outline:none;font-family:var(--font)}
  .ta{min-height:90px;font-family:monospace;font-size:12px}
  .in:focus,.ta:focus{border-color:var(--brand)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
  .card h4{margin:0 0 4px;font-size:13px}
  .row{display:flex;gap:10px;align-items:center}
  .row>*{flex:1}
  .chk{display:flex;align-items:center;gap:8px;font-size:13px;margin-top:12px}
  .flowrow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
  .badge{font-size:10px;padding:2px 9px;border-radius:20px;background:var(--surface-2);border:1px solid var(--border);color:var(--muted)}
  .badge.on{background:var(--green-bg);color:var(--green);border-color:transparent}
  .linkbtn{font-size:12px;padding:5px 11px;border:1px solid var(--border);border-radius:8px;color:var(--text);text-decoration:none}
  .empty{color:var(--faint);text-align:center;padding:60px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#10281d;color:var(--green);border:1px solid var(--green);padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;transition:.2s;pointer-events:none;z-index:20}
  .toast.show{opacity:1}
  .toast.err{background:#2c1615;color:var(--red);border-color:var(--red)}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <span style="font-weight:600;font-size:15px">Productos</span>
    <span class="spacer"></span>
    <button class="btn primary" id="saveBtn">Guardar</button>
  </div>
  <div class="main">
    <div class="list">
      <div class="hd"><span>Productos</span><button class="add" id="addProduct" title="Nuevo producto">+</button></div>
      <div id="prodList" style="overflow-y:auto;flex:1"></div>
    </div>
    <div class="detail" id="detail">
      <div class="empty">Elige o crea un producto</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { supa, mountShell, toast } from "./shell.js";
const $ = (id) => document.getElementById(id);
const st = { channelId:null, prod:null, versions:[], tab:"datos" };

function esc(s){ return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

async function boot(){
  const { data:{ session } } = await supa.auth.getSession();
  if(!session){ location.href="index.html"; return; }
  const shell=await mountShell({ active:"productos" });
  st.channelId=shell.channelId;
  shell.onChannel(id=>{ st.channelId=id; st.prod=null; renderDetail(); loadProducts(); });
  await loadProducts();
  $("addProduct").onclick = createProduct;
  $("saveBtn").onclick = saveProduct;
}
async function loadProducts(){
  const { data } = await supa.from("products").select("id,nombre,con_bifurcacion").eq("channel_id",st.channelId).order("created_at");
  const box=$("prodList"); box.innerHTML="";
  (data||[]).forEach(p=>{
    const el=document.createElement("div"); el.className="item"+(st.prod&&st.prod.id===p.id?" active":"");
    el.innerHTML=`<div class="n">${esc(p.nombre)}</div><div class="m">${p.con_bifurcacion?"con versiones":"versión única"}</div>`;
    el.onclick=()=>openProduct(p.id); box.appendChild(el);
  });
}
async function createProduct(){
  const nombre=prompt("Nombre del producto:"); if(!nombre) return;
  const { data,error } = await supa.from("products").insert({ channel_id:st.channelId, nombre }).select("id").single();
  if(error){ toast(error.message,true); return; }
  await loadProducts(); openProduct(data.id);
}
async function openProduct(id){
  const { data:p } = await supa.from("products").select("*").eq("id",id).maybeSingle();
  const { data:vs } = await supa.from("product_versions").select("*").eq("product_id",id).order("orden");
  st.prod=p; st.versions=vs||[]; st.tab="datos";
  await loadProducts(); renderDetail();
}

function renderDetail(){
  const d=$("detail");
  if(!st.prod){ d.innerHTML=`<div class="empty">Elige o crea un producto</div>`; return; }
  d.innerHTML=`
    <div class="tabs">
      <button class="tab ${st.tab==='datos'?'active':''}" data-t="datos">Datos</button>
      <button class="tab ${st.tab==='flujos'?'active':''}" data-t="flujos">Flujos</button>
    </div>
    <div id="tabBody"></div>`;
  d.querySelectorAll(".tab").forEach(b=> b.onclick=()=>{ st.tab=b.dataset.t; renderDetail(); });
  if(st.tab==="datos") renderDatos(); else renderFlujos();
}

function renderDatos(){
  const b=$("tabBody");
  b.innerHTML=`
    <label>Nombre del producto</label>
    <input class="in" id="pNombre" value="${esc(st.prod.nombre)}"/>
    <label class="chk"><input type="checkbox" id="pBif" ${st.prod.con_bifurcacion?"checked":""}/> Con bifurcación (versiones Básica/Premium)</label>
    <label>Campos fijos (config JSON: precio, contexto_producto, datos_pago…)</label>
    <textarea class="ta" id="pConfig">${esc(JSON.stringify(st.prod.config||{},null,2))}</textarea>
    <label style="margin-top:20px">Versiones</label>
    <div id="versions"></div>
    <button class="btn" id="addVersion" style="margin-top:8px">+ versión</button>`;
  $("pNombre").oninput=(e)=>st.prod.nombre=e.target.value;
  $("pBif").onchange=(e)=>st.prod.con_bifurcacion=e.target.checked;
  $("pConfig").onchange=(e)=>{ try{ st.prod.config=JSON.parse(e.target.value); }catch(_){ toast("JSON inválido",true); } };
  $("addVersion").onclick=()=>{ st.versions.push({ nombre:"Nueva versión", price_list:[], drive_link:"", orden:st.versions.length }); renderVersions(); };
  renderVersions();
}
function renderVersions(){
  const box=$("versions"); box.innerHTML="";
  st.versions.forEach((v,i)=>{
    const el=document.createElement("div"); el.className="card";
    el.innerHTML=`
      <div class="row">
        <div><label>Nombre</label><input class="in vn" value="${esc(v.nombre)}"/></div>
        <div><label>Precios (escalera, separados por coma)</label><input class="in vp" value="${esc((v.price_list||[]).join(', '))}"/></div>
      </div>
      <label>Link de entrega (Drive)</label>
      <div class="row"><input class="in vl" value="${esc(v.drive_link||'')}"/><button class="btn vdel" style="flex:0 0 auto">✕</button></div>`;
    el.querySelector(".vn").oninput=(e)=>v.nombre=e.target.value;
    el.querySelector(".vp").oninput=(e)=>v.price_list=e.target.value.split(",").map(x=>parseFloat(x.trim())).filter(x=>!isNaN(x));
    el.querySelector(".vl").oninput=(e)=>v.drive_link=e.target.value;
    el.querySelector(".vdel").onclick=()=>{ if(v.id) v._delete=true; st.versions.splice(i,1); renderVersions(); };
    box.appendChild(el);
  });
}

async function renderFlujos(){
  const b=$("tabBody");
  b.innerHTML=`<div id="flowbox"><div class="empty">Cargando…</div></div>
    <div class="card" style="margin-top:16px">
      <h4>Añadir flujo (copia de un esqueleto)</h4>
      <div class="row" style="margin-top:8px">
        <select class="sel" id="skSel" style="width:100%"></select>
        <input class="in" id="skRole" placeholder="rol (bienvenida, pago…)"/>
        <button class="btn primary" id="skAdd" style="flex:0 0 auto">Clonar</button>
      </div>
      <div style="font-size:11px;color:var(--faint);margin-top:8px">Los esqueletos se crean en el editor (🕸). El clon queda ligado a este producto.</div>
    </div>`;
  // Flujos del producto.
  const { data:flows } = await supa.from("flows").select("id,nombre,role,estado").eq("product_id",st.prod.id).order("created_at");
  const fb=$("flowbox"); fb.innerHTML="";
  if(!flows||!flows.length){ fb.innerHTML=`<div class="empty" style="padding:24px">Aún no hay flujos. Clona un esqueleto abajo.</div>`; }
  (flows||[]).forEach(f=>{
    const el=document.createElement("div"); el.className="flowrow";
    el.innerHTML=`<div style="flex:1"><div style="font-weight:600;font-size:13px">${esc(f.nombre)}</div><div style="font-size:11px;color:var(--faint)">${esc(f.role||"flujo")}</div></div>
      <span class="badge ${f.estado==='activo'?'on':''}">${f.estado}</span>
      <a class="linkbtn" href="editor.html?flow=${f.id}">Editar 🕸</a>`;
    fb.appendChild(el);
  });
  // Esqueletos disponibles.
  const { data:sks } = await supa.from("flows").select("id,nombre").eq("channel_id",st.channelId).eq("kind","skeleton").order("nombre");
  const sel=$("skSel"); sel.innerHTML="";
  if(!sks||!sks.length){ const o=document.createElement("option"); o.textContent="(no hay esqueletos — créalos en el editor)"; o.value=""; sel.appendChild(o); }
  (sks||[]).forEach(s=>{ const o=document.createElement("option"); o.value=s.id; o.textContent=s.nombre; sel.appendChild(o); });
  $("skAdd").onclick=async()=>{
    const source=$("skSel").value; const role=$("skRole").value.trim()||"custom";
    if(!source){ toast("No hay esqueleto seleccionado",true); return; }
    const nombre=(sks.find(x=>x.id===source)?.nombre||"Flujo")+" · "+st.prod.nombre;
    const { data,error } = await supa.rpc("clone_flow",{ p_source:source, p_product:st.prod.id, p_role:role, p_nombre:nombre });
    if(error){ toast(error.message,true); return; }
    toast("Flujo clonado ✓"); renderFlujos();
  };
}

async function saveProduct(){
  if(!st.prod){ return; }
  const { error:e1 } = await supa.from("products").update({
    nombre:st.prod.nombre, con_bifurcacion:st.prod.con_bifurcacion, config:st.prod.config||{},
    updated_at:new Date().toISOString(),
  }).eq("id",st.prod.id);
  if(e1){ toast(e1.message,true); return; }
  // Versiones: upsert las presentes.
  for(let i=0;i<st.versions.length;i++){
    const v=st.versions[i]; v.orden=i; v.product_id=st.prod.id;
    const row={ product_id:st.prod.id, nombre:v.nombre, price_list:v.price_list||[], drive_link:v.drive_link||null, orden:i };
    if(v.id) row.id=v.id;
    const { error } = await supa.from("product_versions").upsert(row);
    if(error){ toast(error.message,true); return; }
  }
  toast("Guardado ✓"); loadProducts();
}

boot();
</script>
</body>
</html>
