      <div style="display:flex;gap:10px;margin-top:8px" id="momBox">
        ${mom("antes","Antes de entregar","Paga → le ofreces el extra → recién ahí entregas. Suele aceptarse más.")}
        ${mom("despues","Después de entregar","Paga → entregas → le ofreces el extra. Más conservador.")}
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:14px">
        <label style="margin:0;font-size:12.5px;font-weight:700">Si no responde, entregar igual a los</label>
        <input class="in" id="exEsp" type="number" min="1" step="1" value="${esc(cfg.extras_espera_min)}" style="width:90px"/>
        <span style="font-size:12.5px;color:var(--muted)">minutos</span>
        <span style="font-size:11.5px;color:var(--faint);flex:1;min-width:220px">
          Nunca se retiene lo que el cliente ya pagó por esperar una venta extra.</span>
      </div>
    </div>
    `}

    <div id="exList"></div>
    <button class="btn" id="exAdd" ${cat.length?"":"disabled"}>+ Venta extra</button>
    ${cat.length?"":`<div style="font-size:12px;color:var(--faint);margin-top:8px">No hay opciones con precio en este bot. Crea primero una opción de compra con precio (en este producto o en otro).</div>`}`;

  b.querySelectorAll(".momopt").forEach(el=> el.onclick=()=>{ cfg.extras_momento=el.dataset.m; renderExtras(); });
  $("exEsp").oninput=(e)=>{ cfg.extras_espera_min=Math.max(1,parseInt(e.target.value,10)||15); };
  const epm=$("exProvMom"); if(epm) epm.onchange=(e)=>{ cfg.extras_prov_momento=e.target.value; };
  $("exAdd").onclick=()=>{ cfg.extras.push({ version_id:cat[0]?.id||"", mensaje:"" }); paintExtras(); };
  paintExtras();
}

function paintExtras(){
  const cfg=st.prod.config; const cat=st.extraCat||[]; const box=$("exList"); if(!box) return;
  box.innerHTML="";
  if(!cfg.extras.length){ box.innerHTML=`<div class="nodo-empty" style="padding:20px">Sin ventas extra. El cliente paga y se le entrega directo.</div>`; return; }
  cfg.extras.forEach((x,i)=>{
    const el=document.createElement("div"); el.className="card";
    el.innerHTML=`
      <div class="row" style="align-items:flex-end;gap:10px">
        <div style="flex:0 0 auto;font-size:12px;color:var(--faint);font-weight:800;margin-bottom:10px">${i+1}º</div>
        <div style="flex:1"><label style="margin-top:0">Qué ofrecer</label>
          <select class="sel exv" style="width:100%">
            ${cat.map(c=>`<option value="${c.id}" ${x.version_id===c.id?"selected":""}>${esc(c.label)}</option>`).join("")}
          </select></div>
        <button class="iconbtn exu" style="flex:0 0 auto;margin-bottom:6px" title="Subir">▲</button>
        <button class="iconbtn exd" style="flex:0 0 auto;margin-bottom:6px" title="Bajar">▼</button>
        <button class="iconbtn exdel" style="flex:0 0 auto;margin-bottom:6px">${icon("trash")}</button>
      </div>
      <label style="margin-top:12px">Mensaje del ofrecimiento</label>
      <textarea class="in exm" rows="3" style="min-height:70px;line-height:1.5;font-family:var(--font);resize:vertical"
        placeholder="Ej. ¡Antes de enviarte todo! 🎁 ¿Le sumas los Planos Premium por solo S/ 49? Te los mando junto con tu curso.">${esc(x.mensaje||"")}</textarea>`;
    el.querySelector(".exv").onchange=(e)=>{ x.version_id=e.target.value; };
    el.querySelector(".exm").oninput=(e)=>{ x.mensaje=e.target.value; };
    el.querySelector(".exdel").onclick=()=>{ cfg.extras.splice(i,1); paintExtras(); };
    el.querySelector(".exu").onclick=()=>{ if(i===0)return; [cfg.extras[i-1],cfg.extras[i]]=[cfg.extras[i],cfg.extras[i-1]]; paintExtras(); };
    el.querySelector(".exd").onclick=()=>{ if(i>=cfg.extras.length-1)return; [cfg.extras[i+1],cfg.extras[i]]=[cfg.extras[i],cfg.extras[i+1]]; paintExtras(); };
    box.appendChild(el);
  });
}

// ═══════════════════════════════════════════════════════════════════
// LA RECETA — las 9 etapas de una venta, en orden, con su estado.
// Es lo que hace que configurar un producto sea "llenar un formulario" en vez
// de "dibujar un flujo": desde acá se ve qué falta y se GENERA el flujo de
// venta solo. El editor visual sigue existiendo para quien quiera meter mano
// (sigue siendo el corazón de la app) — esto solo evita empezar de cero.
// ═══════════════════════════════════════════════════════════════════
async function renderReceta(){
  const b=$("tabBody");
  b.innerHTML=`<div class="empty">Cargando…</div>`;
  const fisico=(st.prod.tipo||"digital")==="fisico";

  // Estado real de cada etapa (se lee de la base, no se asume).
  const { data:flows } = await supa.from("flows").select("id,nombre,role,estado").eq("product_id",st.prod.id);
  const fIni=(flows||[]).find(f=>f.role==="mensajes_iniciales");
  const fVenta=(flows||[]).find(f=>f.role==="venta");
  let trigs=[];
  if(fIni){ const { data:t } = await supa.from("flow_triggers").select("id,tipo,activo").eq("flow_id",fIni.id); trigs=t||[]; }
  const { data:ch } = await supa.from("channels").select("negocio,ocr_config,gsheets,entregas").eq("id",st.channelId).maybeSingle();
  st.receta={ flows:flows||[], fIni, fVenta, trigs, ch:ch||{} };

  const ops=st.versions.filter(v=>v.activo!==false);
  const conPrecio=ops.filter(v=>v.precio!=null&&v.precio!=="");
  const conEntrega=ops.filter(v=>Array.isArray(v.entrega)&&v.entrega.length);
  const metodos=(ch?.ocr_config?.metodos||[]).filter(m=>m&&(m.app||m.numero||m.titular));

  const et=(n,titulo,desc,estado,accion)=>`
    <div class="card" style="display:flex;gap:13px;align-items:flex-start">
      <div style="flex:none;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
        font-size:12px;font-weight:800;background:${estado.ok?'rgba(34,192,121,.14)':estado.warn?'rgba(240,169,43,.14)':'var(--surface-2)'};
        color:${estado.ok?'#22c079':estado.warn?'#f0a92b':'var(--faint)'}">${n}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:13.5px">${titulo}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px;line-height:1.5">${desc}</div>
        <div style="font-size:12px;margin-top:5px;color:${estado.ok?'#22c079':estado.warn?'#f0a92b':'var(--faint)'}">${estado.msg}</div>
      </div>
      ${accion?`<div style="flex:none">${accion}</div>`:""}
    </div>`;
  const go=(t,l)=>`<button class="btn" data-go="${t}" style="height:32px">${l}</button>`;

  b.innerHTML=`
    <div class="card" style="border-color:var(--brand-border)">
      <h4 style="margin-top:0">Cómo se vende este producto</h4>
      <div style="font-size:13px;color:var(--muted);line-height:1.6">
        Las etapas de una venta, en orden. Llena lo que falte y genera el flujo:
        el sistema lo arma solo y puedes seguir editándolo en el editor visual.
      </div>
    </div>
    ${et(1,"Activación","La palabra clave del anuncio (y la IA que entiende variaciones) que arranca el chat.",
      trigs.length?{ok:1,msg:`${trigs.length} disparador(es) configurado(s)`}:{warn:1,msg:"Sin palabras clave: nadie puede iniciar el chat"},
      go("activacion","Configurar"))}
    ${et(2,"Secuencia inicial","Los mensajes con los que arranca el bot (texto, imagen, video, PDF).",
      fIni?{ok:1,msg:"Mensajes iniciales creados"}:{warn:1,msg:"Sin mensajes iniciales"},
      go("activacion","Configurar"))}
    ${et(3,"IA de ventas","Lo que la IA sabe del producto para venderlo y responder dudas.",
      (st.prod.config?.contexto_producto)?{ok:1,msg:"Conocimiento cargado"}:{warn:1,msg:"Sin conocimiento del producto: la IA no sabrá venderlo"},
      go("datos","Configurar"))}
    ${et(4,"Opciones de compra","Versiones, packs y ofertas por cantidad: cada una con su precio.",
      conPrecio.length?{ok:1,msg:`${ops.length} opción(es), ${conPrecio.length} con precio`}:{err:1,msg:"Ninguna opción tiene precio: no se puede validar un pago"},
      go("opciones","Configurar"))}
    ${et(5,"Cobro y validación","Los métodos de pago válidos y las reglas anti-fraude del validador.",
      metodos.length?{ok:1,msg:`${metodos.length} método(s) de pago válidos`}:{warn:1,msg:"Sin métodos de pago en el Validador (sección IA)"},
      `<a class="btn" href="./ia.html" style="height:32px;display:inline-flex;align-items:center">Ir a IA</a>`)}
    ${et(6,"Entrega",fisico?"En físico la entrega es el envío (se configura en Datos).":"Los links/archivos que recibe el cliente al pagar, por opción.",
      fisico?{ok:1,msg:"Producto físico: se despacha, no se entrega por chat"}
        :(conEntrega.length===conPrecio.length&&conPrecio.length?{ok:1,msg:"Todas las opciones tienen entrega"}
          :{err:1,msg:`${conPrecio.length-conEntrega.length} opción(es) con precio pero SIN entrega`}),
      go("opciones","Configurar"))}
    ${et(7,"Ventas extra","Ofrecer algo más una vez que pagó, antes o después de entregar.",
      (st.prod.config?.extras||[]).length
        ? {ok:1,msg:`${st.prod.config.extras.length} extra(s) · se ofrecen ${((st.prod.config.extras_momento||"antes")==="antes")?"antes":"después"} de entregar`}
        : {warn:1,msg:"Sin ventas extra (opcional)"},
      go("extras","Configurar"))}
    ${et(8,"Post-venta","Aviso por Telegram, y la hoja de cálculo que se escribe sola (una fila por pedido, que sigue su estado).",
      st.receta.ch?.gsheets?.connected
        ? {ok:1,msg:`Telegram + Google Sheets · hoja "${fisico?'Lima / Provincia':'Digital'}"`}
        : {warn:1,msg:"Telegram sí; Google Sheets sin conectar (la venta se entrega igual)"},
      `<a class="btn" href="./config.html" style="height:32px;display:inline-flex;align-items:center">Conectar hoja</a>`)}
    ${et(9,"Remarketing","Recuperar al que no compró, con descuentos.",{warn:1,msg:"Fase 3 — todavía no construido"},"")}

    <div class="card" style="margin-top:18px;border-color:var(--brand-border)">
      <h4 style="margin-top:0;display:flex;align-items:center;gap:7px">${icon("node")} Flujo de venta</h4>
      <div id="saludBox"></div>
      <div style="font-size:13px;color:var(--muted);line-height:1.6;margin:10px 0">
        ${fisico
          ? `Genera el flujo completo: la <b>IA vende</b>, detecta a dónde va el pedido <b>sin botones</b> (contra tus zonas
             de Ajustes → Entregas Lima) y <b>toma los datos conversando</b>, sin interrogatorio. En <b>Lima</b> crea el
             pedido apenas tiene los datos; en <b>provincia</b> lo crea, pide el adelanto y lo valida.
             <b>Ahí termina el flujo</b>: despachar, mandar la guía, cobrar el saldo y soltar la clave los operas tú
             desde Pedidos.`
          : `Genera el flujo completo: la <b>IA vende y responde</b>, detecta el comprobante <b>en cualquier momento</b>,
             lo <b>valida contra el precio exacto</b> de la opción elegida y <b>entrega solo</b>. Si el pago no cuadra,
             lo pide de nuevo y la IA sigue atendiendo dudas.`}
      </div>
      <button class="btn primary" id="genFlow">${st.receta.fVenta?"Regenerar flujo de venta":"Generar flujo de venta"}</button>
      ${st.receta.fVenta?`<div style="font-size:12px;color:var(--faint);margin-top:8px">Ya existe "${esc(st.receta.fVenta.nombre)}". Regenerar lo reescribe por completo.</div>`:""}
      ${st.receta.fVenta && st.receta.fVenta.estado!=="activo" ? `
      <div style="margin-top:10px;border:1px solid var(--red,#e2564a);background:rgba(226,86,74,.08);border-radius:11px;padding:10px 12px;font-size:12.5px;line-height:1.55">
        <b style="color:var(--red,#e2564a)">El flujo de venta está en borrador: este producto NO vende.</b>
        El bot manda los mensajes iniciales y se queda callado, porque solo salta a flujos activos.
        <div style="margin-top:8px"><button class="btn" id="activarVenta" style="height:32px">Activarlo ahora</button></div>
      </div>` : ""}
    </div>`;

  b.querySelectorAll("[data-go]").forEach(x=> x.onclick=()=>{ st.tab=x.dataset.go; renderDetail(); });
  renderSalud();
  const g=$("genFlow"); if(g) g.onclick=generarFlujoVenta;
  const av=$("activarVenta");
  if(av) av.onclick=async(e)=>{
    e.target.disabled=true;
    const { error }=await supa.from("flows").update({ estado:"activo" }).eq("id",st.receta.fVenta.id);
    if(error){ toast(error.message,true); e.target.disabled=false; return; }
    toast("Flujo activado ✓ · el producto ya vende");
    st.tab="receta"; renderDetail();
  };
}

// Salud del producto: lo que impediría vender bien. Se avisa ACÁ, antes de
// publicar — no con un cliente a medio comprar.
function renderSalud(){
  const box=$("saludBox"); if(!box) return;
  const fisico=(st.prod.tipo||"digital")==="fisico";
  const ops=st.versions.filter(v=>v.activo!==false);
  const conPrecio=ops.filter(v=>v.precio!=null&&v.precio!=="");
  const errs=[], warns=[];
  if(!ops.length) errs.push("El producto no tiene ninguna opción de compra activa.");
  if(!conPrecio.length) errs.push("Ninguna opción tiene precio: el validador no puede saber cuánto debe pagar el cliente.");
  if(!fisico){
    // Cuenta solo los items con URL: una fila de entrega vacía no entrega nada.
    const sinEntrega=conPrecio.filter(v=>!(Array.isArray(v.entrega)&&v.entrega.some(it=>it&&String(it.url||"").trim())));
    if(sinEntrega.length) errs.push(`Con precio pero sin entrega: ${sinEntrega.map(v=>`"${v.nombre||"—"}"`).join(", ")}. El cliente pagaría y no recibiría nada.`);
  }
  // Físico sin adelanto resoluble: el flujo de provincia manda "confírmalo con
  // un adelanto de *S/ *" — con el monto en blanco. Se ve roto y nadie paga.
  if(fisico){
    const ov=st.prod.config?.adelanto_override;
    const propio=(ov!=null&&String(ov).trim()!=="");
    const viejo=st.prod.config?.envio?.agencias?.shalom?.adelanto_valor;
    const def=st.receta?.ch?.entregas?.adelanto_default;
    const hay = propio || (viejo!=null&&String(viejo).trim()!=="") || (def!=null&&String(def).trim()!=="");
    if(!hay) errs.push("Sin adelanto: el pedido a provincia le pediría <b>“un adelanto de S/ ”</b> con el monto en blanco. Ponlo en Negocio → Entrega, o solo para este producto en su pestaña Entrega.");
  }
  const metodos=(st.receta?.ch?.ocr_config?.metodos||[]).filter(m=>m&&(m.app||m.numero||m.titular));
  if(!metodos.length) warns.push("El Validador de comprobantes no tiene métodos de pago: la IA no podrá verificar a quién le pagaron.");
  if(!st.receta?.trigs?.length) warns.push("Sin palabras clave: nadie puede iniciar el chat de este producto.");
  if(!st.receta?.fIni) warns.push("Sin mensajes iniciales.");
  if(!st.prod.config?.contexto_producto) warns.push("Sin conocimiento del producto: la IA no sabrá qué vender.");
  const line=(t,c,ic)=>`<div style="display:flex;gap:8px;align-items:flex-start;font-size:12.5px;line-height:1.55;margin-bottom:5px">
    <span style="color:${c};display:inline-flex;flex:none">${icon(ic)}</span><div>${t}</div></div>`;
  box.innerHTML = (errs.length||warns.length)
    ? `<div style="border:1px solid ${errs.length?"var(--red)":"#f0a92b"};background:${errs.length?"rgba(239,68,68,.06)":"rgba(240,169,43,.07)"};border-radius:11px;padding:12px">
        <div style="font-weight:700;font-size:12.5px;margin-bottom:7px">${errs.length?"Esto impide vender":"Revisa esto antes de publicar"}</div>
        ${errs.map(e=>line(e,"var(--red)","alert")).join("")}${warns.map(w=>line(w,"#f0a92b","alert")).join("")}
      </div>`
    : `<div style="display:flex;gap:8px;align-items:center;font-size:12.5px;color:#22c079">
        <span style="display:inline-flex">${icon("check")}</span> Todo listo para vender.</div>`;
}

// Genera el flujo de venta DIGITAL desde la receta. Forma del flujo (IA-first,
// que es como Rodrigo vende de verdad — los esqueletos viejos eran guiones
// rígidos con botones):
//
//   [IA vende] → [espera] → ¿mandó imagen?
//                             ├─ sí → [OCR valida] → ¿pago OK?
//                             │                       ├─ sí → [entregar] → [fin]
//                             │                       └─ no → [pedir de nuevo] → [espera]
//                             └─ no → [IA vende]  (bucle: sigue conversando)
//
// El bucle hace que la IA atienda dudas indefinidamente y que el comprobante se
// detecte en cualquier momento (requisitos 3 y 4).
// Genera el flujo de venta de un producto FÍSICO. A diferencia del digital
// (paga → entrega → fin), este termina cuando se CREA EL PEDIDO: despachar,
// mandar la guía, cobrar el saldo y soltar la clave no los hace el flujo, los
// hace Rodrigo con el Copiloto y el Kanban ("no todo puede ser automatizado").
//
//   [IA vende] ← sabe la zona y pesca datos mientras conversa
//        ↓
//   [escucha] → ¿mandó comprobante?
//     ├─ sí → [valida el adelanto] → ok → [pedido: adelanto validado] → fin
//     │                            └→ [pide de nuevo] → escucha
//     └─ no → ¿de dónde es?
//              ├─ Lima      → ¿datos completos? → [crea pedido CONFIRMADO] → fin
//              └─ Provincia → ¿datos completos? → [crea pedido ESPERANDO ADELANTO]
//                                                  → [le pide el adelanto] → escucha
//
// Las guardas de "¿ya tiene pedido?" usan campo_igual contra "" porque el motor
// no tiene un operador "campo no existe"; sin ellas el bucle crearía un pedido
// nuevo por cada mensaje.
async function generarFlujoFisico(flowId, N, E){
  const cfg=st.prod.config||{};
  // OJO con las claves:
  //  · `nombre` NO se puede usar: ctx.nombre ya trae el nombre de WhatsApp del
  //    contacto, así que el extractor creería que ya lo tiene y nunca lo
  //    pediría. A la agencia le llegaría el apodo de WhatsApp y no entregan.
  //  · `sede` lleva validar:"sede" (verificación por CÓDIGO de que no sea la
  //    ciudad). Decírselo en el detalle no alcanza: aun con "NO la ciudad" en
  //    mayúsculas, ante "soy de Trujillo" devuelve sede="trujillo", y como
  //    después no se pisa lo capturado, la sede real se perdía.
  const campos=[
    { clave:"nombre_completo", label:"Nombre y apellido del que recibe", requerido:true },
    { clave:"direccion", label:"Dirección exacta", detalle:"calle y número, o dónde entregar aunque sea impreciso", requerido:true, solo_si_zona:"lima" },
    { clave:"referencia", label:"Referencia", detalle:"algo cerca para ubicarlo", requerido:false, solo_si_zona:"lima" },
    { clave:"dni", label:"DNI", detalle:"8 dígitos, se lo pide la agencia", requerido:true, validar:"dni", solo_si_zona:"provincia" },
    { clave:"sede", label:"Sede de la agencia", detalle:"la oficina EXACTA donde lo va a recoger (ej. «Av. España»), NO la ciudad", requerido:true, validar:"sede", solo_si_zona:"provincia" },
    // VA ÚLTIMO y solo en LIMA: tener los datos NO es lo mismo que querer
    // comprar. En Lima el pedido nace "confirmado" y sale un motorizado, así que
    // un mensaje de consulta bien completo ("¿tienen talla 38? soy Juan Pérez,
    // Av. Larco 100, Miraflores") despachaba un pedido que nadie pidió, y el
    // flete lo pagabas tú. En provincia no hace falta: ahí nada se mueve hasta
    // que pague el adelanto.
    { clave:"confirmo", label:"Confirmación de la compra", requerido:true, solo_si_zona:"lima",
      detalle:"pon «si» SOLO si el cliente dijo claramente que quiere comprarlo o que confirma el pedido " +
              "(«sí, lo quiero», «confirmo», «mándamelo», «ya, envíalo»). " +
              "Preguntar el precio, la talla, si hay stock o si llegan a su zona NO es confirmar: en ese caso OMITE este dato." },
  ];
  // Igual que en el digital: se ESCUCHA primero. A este flujo se llega después
  // de los mensajes iniciales; arrancar vendiendo sería hablar encima del saludo.
  const nVender=await N("ia","La IA vende y toma datos",{
    operacion:"generar_texto", enviar:true, usar_conocimiento:true,
    detectar_opcion:true, detectar_zona:true, campos,
    prompt:"Continúa la conversación de forma natural: responde dudas, explica el valor y guía a la compra. "+
           "Pregúntale a dónde se lo enviamos para saber cómo despacharlo. Pide los datos que falten de a uno, "+
           "sin sonar a formulario. No prometas fechas ni coberturas que el sistema no te haya confirmado.\n"+
           // El adelanto lo fija el negocio y lo pide un mensaje FIJO del flujo,
           // con el monto exacto. Sin esto la IA preguntaba "¿con cuánto te
           // gustaría hacer el adelanto?" y el mensaje siguiente decía "de S/ 20":
           // se contradecía sola y el cliente podía pagar de menos.
           // OJO con la ZONA: el adelanto es SOLO de provincia. Una primera
           // versión de esta instrucción no lo aclaraba y la IA le prometió un
           // adelanto a un cliente de Lima, que paga contraentrega.
           "REGLAS DE COBRO, no las inventes:\n"+
           "· Provincia (envío por agencia): se cobra un ADELANTO cuyo monto lo decide el negocio, NO el cliente. "+
           "Nunca preguntes cuánto quiere adelantar ni negocies la cifra, y no se lo pidas tú: "+
           "apenas estén sus datos, el sistema le manda el monto exacto y los datos de pago.\n"+
           "· Lima (contraentrega): NO hay adelanto ni pago por adelantado. Paga TODO al recibir el pedido. "+
           "Nunca le menciones adelantos, Yape ni datos de pago a alguien de Lima.\n"+
           "Si todavía no sabes de dónde es, no hables de pagos.",
  },false,80,240);
  const nEsperar=await N("pregunta","Escuchar al cliente",{ text:"" },true,380,240);
  const nFin=await N("fin","Fin",{},false,2080,240);

  // OJO: acá NO hay rama de "validar el comprobante del adelanto". Eso lo toma
  // el interceptor `maybeAdelanto` del motor, ANTES del flujo, para que respete
  // el selector Manual/Automático de IA · Pedidos en el momento y no según cómo
  // estaba el día que generaste el flujo. Si estaba acá, aprobaría solo aunque
  // hubieras elegido que te consulte.

  // ── Rama Lima (contraentrega: no hay pago por adelantado) ──
  const nEsLima=await N("condicion","¿Es de Lima?",{
    rutas:[{ nombre:"Lima", handle:"ruta:lima", match:"todas",
             condiciones:[{ op:"campo_igual", campo:"zona_entrega", valor:"lima" }] }],
  },false,660,440);
  const nLimaOk=await N("condicion","¿Datos listos? (Lima)",{
    rutas:[{ nombre:"Crear", handle:"ruta:crear", match:"todas",
             condiciones:[
               { op:"campo_igual", campo:"datos_completos", valor:"si" },
               { op:"campo_igual", campo:"pedido_creado", valor:"" }, // aún sin pedido
             ] }],
  },false,960,440);
  const nCrearLima=await N("accion","Crear pedido Lima",{
    acciones:[
      // `monto` es la BASE: el motor le suma el envío que se cobre. Pero lo que
      // el motorizado tiene que cobrar en la puerta es el TOTAL ({{total_cobrar}}
      // = precio + envío). Con {{precio}} ahí, cobrar envío en Lima significaba
      // regalarlo: el pedido decía 130 y el motorizado cobraba 120.
      { tipo:"crear_pedido", estado:"confirmado", monto:"{{precio}}",
        datos:{ zona:"lima", zona_nombre:"{{zona_nombre}}", direccion:"{{direccion}}", referencia:"{{referencia}}",
                cliente:"{{nombre_completo}}", opcion:"{{opcion}}", saldo:"{{total_cobrar}}", entrega_hoy:"{{entrega_hoy}}" } },
      { tipo:"set_field", key:"pedido_creado", valor:"si" },
      { tipo:"add_tag", valor:"Compra" },
      // El texto vive en el catálogo de avisos (Canales → Avisos de Telegram),
      // no acá: así se puede apagar o reescribir sin regenerar el flujo, y
      // regenerarlo no pisa lo que el operador haya editado.
      { tipo:"notify_admin", plantilla:"pedido_lima" },
    ],
  },false,1240,440);
  const nConfLima=await N("mensaje","Confirmación Lima",{
    // {{cliente}} y no {{nombre}}: acá ya dio su nombre completo para el rótulo,
    // así que usar el del perfil de WhatsApp queda raro.
    bubbles:[{ text:"¡Listo, {{cliente}}! ✅ Tu pedido quedó confirmado.\n\n🛵 Pagas al recibirlo. Te avisamos cuando salga el motorizado." }],
  },false,1520,440);

  // ── Rama Provincia (crea el pedido y recién ahí pide el adelanto) ──
  const nProvOk=await N("condicion","¿Datos listos? (Provincia)",{
    rutas:[{ nombre:"Crear", handle:"ruta:crear", match:"todas",
             condiciones:[
               { op:"campo_igual", campo:"datos_completos", valor:"si" },
               { op:"campo_igual", campo:"zona_entrega", valor:"provincia" },
               { op:"campo_igual", campo:"pedido_creado", valor:"" },
             ] }],
  },false,960,640);
  const nCrearProv=await N("accion","Crear pedido Provincia",{
    acciones:[
      { tipo:"crear_pedido", estado:"esperando_adelanto", monto:"{{precio}}",
        // La ciudad va SEPARADA de la sede: "Av. España" sola no alcanza para
        // despachar (¿la de Trujillo o la de Lima?).
        // El saldo es lo que falta TRAS el adelanto ({{saldo}} = precio − adelanto).
        // Con {{precio}} acá se le cobraba el adelanto dos veces al cliente.
        datos:{ zona:"provincia", ciudad:"{{ciudad}}", sede:"{{sede}}", dni:"{{dni}}", cliente:"{{nombre_completo}}",
                opcion:"{{opcion}}", adelanto:"{{adelanto}}", saldo:"{{saldo}}" } },
      { tipo:"set_field", key:"pedido_creado", valor:"si" },
      { tipo:"notify_admin", plantilla:"pedido_provincia" },
    ],
  },false,1240,640);
  const nPedirAdel=await N("mensaje","Pedir el adelanto",{
    bubbles:[{ text:"¡Perfecto! 🙌 Para despachar tu pedido a la agencia, confírmalo con un adelanto de *S/ {{adelanto}}*.\n\n{{datos_pago}}\n\nCuando lo hagas, mándame la captura y lo verifico al toque." }],
  },false,1520,640);

  // ORDEN CRÍTICO: se escucha → la IA extrae → RECIÉN AHÍ se evalúa si están
  // los datos. Si las condiciones fueran antes del nodo de IA, evaluarían el
  // contexto de ANTES de extraer y el pedido se crearía siempre un mensaje
  // tarde (el cliente da el último dato y no pasa nada hasta que escriba otra
  // vez). No se ve leyendo el código: aparece corriendo la conversación.
  // Sin rama de imagen: el comprobante del adelanto lo intercepta el motor.
  await E(nEsperar,"continuar",nVender);
  await E(nVender,"exito",nEsLima);
  await E(nEsLima,"ruta:lima",nLimaOk);
  await E(nEsLima,"si_no_cumple",nProvOk);
  await E(nLimaOk,"ruta:crear",nCrearLima);
  await E(nLimaOk,"si_no_cumple",nEsperar);     // faltan datos → la IA ya los pidió
  await E(nCrearLima,"continuar",nConfLima);
  await E(nProvOk,"ruta:crear",nCrearProv);
  await E(nProvOk,"si_no_cumple",nEsperar);     // faltan datos o zona desconocida

  // ── Ventas extra "ride-along" (físico) ──
  // El extra no se cobra aparte: se suma al mismo envío (sube el saldo; en Lima
  // sube lo que cobra el motorizado, en provincia lo que cobra la agencia).
  const extras=(Array.isArray(cfg.extras)?cfg.extras:[]).filter(x=>x&&x.version_id);
  const esperaSeg=Math.max(60,(Number(cfg.extras_espera_min)||15)*60);
  const provPost=(cfg.extras_prov_momento||"post")==="post"; // configurable
  if(extras.length && !st.extraCat) await cargarCatalogoExtras();
  const catX=st.extraCat||[];

  // Lima: se ofrece tras confirmar (no hay adelanto que esperar).
  if(extras.length) await buildRideAlongExtras(N,E,nConfLima,nFin,extras,catX,esperaSeg,240);
  else await E(nConfLima,"continuar",nFin);

  // Provincia:
  if(!extras.length){
    await E(nCrearProv,"continuar",nPedirAdel);
    await E(nPedirAdel,"continuar",nEsperar);
  }else if(!provPost){
    // PRE: se ofrece entre crear el pedido y pedir el adelanto (ya sube el saldo).
    await buildRideAlongExtras(N,E,nCrearProv,nPedirAdel,extras,catX,esperaSeg,640);
    await E(nPedirAdel,"continuar",nEsperar);
  }else{
    // POST (recomendado): crear → pedir adelanto → ESPERAR el adelanto en un nodo
    // marcado post_adelanto que VUELVE a sí mismo si el cliente escribe (así el run
    // queda parqueado ahí, confiable). Al validarse el pago (auto o aprobado por
    // ti), el motor reanuda por "post_adelanto" → "¡recibido!" → ofrecimiento.
    await E(nCrearProv,"continuar",nPedirAdel);
    const nEsperarAdel=await N("pregunta","Esperar el adelanto",{ text:"", post_adelanto:true },false,1520,780);
    const nRespAdel=await N("ia","Responder mientras espera el adelanto",{
      operacion:"generar_texto", enviar:true, usar_conocimiento:true, detectar_opcion:false,
      prompt:"El cliente ya tiene su pedido creado y le pediste el adelanto; está por pagarlo. Responde su duda breve (cómo pagar, cuánto es, cuándo llega) sin presionar. NO ofrezcas nada nuevo: solo espera su comprobante.",
    },false,1800,920);
    await E(nPedirAdel,"continuar",nEsperarAdel);
    await E(nEsperarAdel,"continuar",nRespAdel); // escribe (aún no paga)
    await E(nRespAdel,"exito",nEsperarAdel);     // vuelve a esperar → parqueado ahí
    const nRecibido=await N("mensaje","Adelanto recibido",{ bubbles:[{ text:"¡Adelanto recibido! 🎉 Ya empiezo a preparar tu despacho." }] },false,1520,640);
    await E(nEsperarAdel,"post_adelanto",nRecibido); // el motor reanuda por acá al validar
    await buildRideAlongExtras(N,E,nRecibido,nFin,extras,catX,esperaSeg,1040);
  }
}

async function generarFlujoVenta(){
  const ops=st.versions.filter(v=>v.activo!==false && v.precio!=null && v.precio!=="");
  if(!ops.length){ toast("Primero cargá al menos una opción con precio",true); return; }
  const ya=st.receta.fVenta;
  if(!await confirmDialog({
    title: ya?"Regenerar flujo de venta":"Generar flujo de venta",
    message: ya?`Esto REESCRIBE por completo "${esc(ya.nombre)}". Si lo editaste a mano en el editor visual, esos cambios se pierden.`
               :"Se creará el flujo de venta con la IA como vendedora. Después puedes editarlo en el editor visual.",
    confirmText: ya?"Regenerar":"Generar", danger: !!ya })) return;

  toast("Generando…");
  try{
    let flowId=ya?.id;
    if(flowId){
      await supa.from("flow_edges").delete().eq("flow_id",flowId);
      await supa.from("flow_nodes").delete().eq("flow_id",flowId);
      // Al REGENERAR no se toca el estado: si el flujo ya estaba vendiendo, se
      // lo dejaba en borrador y el producto se quedaba mudo sin avisar.
      await supa.from("flows").update({ nombre:`Venta · ${st.prod.nombre}` }).eq("id",flowId);
    }else{
      const { data,error } = await supa.from("flows").insert({
        channel_id:st.channelId, product_id:st.prod.id, nombre:`Venta · ${st.prod.nombre}`,
        // ACTIVO, no borrador: el rotador de mensajes iniciales solo salta a
        // flujos activos, así que un flujo recién generado en borrador hacía que
        // el producto saludara y se quedara MUDO — sin que nada lo dijera. Los
        // mensajes iniciales ya se creaban activos: eran dos mitades del mismo
        // producto con criterios distintos. Lo que impide vender lo avisa
        // "Salud del producto"; el estado no es el lugar para esconderlo.
        role:"venta", kind:"flow", estado:"activo",
        descripcion:`Venta de ${st.prod.nombre} con IA. Generado desde la receta.`,
      }).select("id").single();
      if(error){ toast(error.message,true); return; }
      flowId=data.id;
    }

    const N=async(tipo,nombre,config,es_inicial,x,y)=>{
      const { data,error } = await supa.from("flow_nodes")
        .insert({ flow_id:flowId, tipo, nombre, config, es_inicial:!!es_inicial, pos_x:x, pos_y:y })
        .select("id").single();
      if(error) throw new Error(error.message);
      return data.id;
    };
    const E=async(from,handle,to)=>{
      const { error }=await supa.from("flow_edges")
        .insert({ flow_id:flowId, source_node:from, source_handle:handle, target_node:to });
      if(error) throw new Error(error.message);
    };

    // El físico tiene otra forma: no entrega nada por chat, termina al crear el
    // pedido. Lo demás (despacho, guía, saldo, clave) lo opera un humano.
    if((st.prod.tipo||"digital")==="fisico"){
      await generarFlujoFisico(flowId, N, E);
      await enlazarInicialesConVenta(flowId);
      toast("Flujo de venta generado ✓");
      st.tab="receta"; renderDetail();
      return;
    }

    // El nodo inicial es ESCUCHAR, no vender: a este flujo se llega después de
    // los mensajes iniciales, así que si arrancara vendiendo el bot hablaría
    // encima de su propio saludo (y hasta se respondería sus preguntas). Nadie
    // entra acá por palabra clave: se entra desde el rotador.
    const nVender=await N("ia","La IA vende",{
      operacion:"generar_texto", enviar:true, usar_conocimiento:true, detectar_opcion:true,
      prompt:"Continúa la conversación con el cliente de forma natural. Responde sus dudas, explica el valor del producto, "+
             "maneja sus objeciones y guíalo a la compra. Cuando decida comprar, dile el precio de la opción que eligió y "+
             "pásale los datos de pago ({{datos_pago}}). No inventes precios ni promesas.",
    },false,80,220);
    const nEsperar=await N("pregunta","Escuchar al cliente",{ text:"" },true,380,220);
    const nEsImg=await N("condicion","¿Mandó comprobante?",{
      rutas:[{ nombre:"Es imagen", handle:"ruta:es_imagen", match:"todas",
               condiciones:[{ op:"campo_igual", campo:"last_input_type", valor:"image" }] }],
    },false,660,220);
    // Pide el token (que es lo que mira la Condición, porque las condiciones son
    // por texto) Y el JSON de lo que leyó — el motor lo rescata a
    // {{pago_metodo}}, {{pago_operacion}}… Sin el JSON, ni el aviso ni Sheets
    // podrían decir CON QUÉ pagó.
    const nOcr=await N("ia","Validar el pago",{
      operacion:"analizar_imagen", perfil:"ocr", usar_validador:true, enviar:false, guardar_en:"pago_resultado",
      prompt:"Analiza la imagen adjunta con las reglas del validador. Si el pago es VÁLIDO y por el monto correcto, "+
             "responde exactamente PAGO_OK. Si no, responde PAGO_NO y en una frase el motivo.\n"+
             "En la línea siguiente agrega SIEMPRE un JSON con lo que leíste del comprobante: "+
             '{"banco":"Yape o el banco","operacion":"nº de operación","monto":0,"titular":"a quién le pagó"}',
    },false,960,120);
    const nPagoOk=await N("condicion","¿Pago válido?",{
      rutas:[{ nombre:"Pago OK", handle:"ruta:pago_ok", match:"todas",
               condiciones:[{ op:"campo_contiene", campo:"pago_resultado", valor:"PAGO_OK" }] }],
    },false,1240,120);
    // En digital el nombre es el de WhatsApp ({{nombre}}): no hay extractor ni
    // agencia de por medio, así que no existe {{nombre_completo}}.
    // `una_vez`: si el cliente reenvía el comprobante o el motor reintenta, la
    // venta NO se cuenta ni se avisa dos veces (requisito 6).
    // El pedido se crea también en digital: es lo que alimenta el Dashboard y
    // la fila de la hoja (que es un espejo de `orders`). Sin esto, una venta
    // digital no existía en ningún reporte.
    const nRegistrar=await N("accion","Registrar la venta",{
      acciones:[
        { tipo:"add_tag", valor:"Compra" },
        { tipo:"crear_pedido", una_vez:"venta_{{opcion_id}}", estado:"confirmada", monto:"{{precio}}",
          datos:{ opcion:"{{opcion}}", comprobante:"{{ultima_imagen}}" } },
        { tipo:"notify_admin", una_vez:"aviso_{{opcion_id}}", foto:"{{ultima_imagen}}",
          plantilla:"venta_digital" },
      ],
    },false,1520,120);
    // Sin nodo de Google Sheets a propósito: la hoja es un ESPEJO automático de
    // los pedidos (syncPedidoSheet en el motor), así que se escribe sola al
    // crear el pedido y en cada cambio de estado. Si dependiera de un nodo del
    // flujo, alcanzaría con que alguien lo borre al editar para que dejen de
    // registrarse ventas — y nadie se enteraría hasta fin de mes.
    const nEntregar=await N("accion","Entregar el producto",{
      // Encabezado y estilo de burbuja configurables (pestaña Entrega). incluir_buffer:
      // junta el principal con los extras "antes" que quedaron diferidos (entrega conjunta).
      acciones:[{ tipo:"entregar",
        mensaje:(st.prod.config?.entrega_mensaje||"¡Pago confirmado! 🎉 Acá tienes tu acceso:"),
        una_burbuja:!!st.prod.config?.entrega_burbuja_unica,
        incluir_buffer:true }],
    },false,1800,120);
    const nFin=await N("fin","Fin",{},false,2080,120);
    const nRe=await N("mensaje","Pedir el comprobante de nuevo",{
      // {{pago_resultado_motivo}} y no {{pago_resultado}}: el crudo trae el token
      // PAGO_NO y el JSON que el OCR agrega, y el cliente los estaba viendo.
      bubbles:[{ text:"Mmm, no pude validar ese comprobante 🤔\n\n{{pago_resultado_motivo}}\n\n¿Me lo reenvías? Si tienes alguna duda, dime nomás." }],
    },false,960,340);

    await E(nVender,"exito",nEsperar);
    await E(nEsperar,"continuar",nEsImg);
    await E(nEsImg,"ruta:es_imagen",nOcr);
    await E(nEsImg,"si_no_cumple",nVender);      // bucle: sigue conversando
    await E(nOcr,"exito",nPagoOk);
    await E(nPagoOk,"ruta:pago_ok",nRegistrar);
    await E(nPagoOk,"si_no_cumple",nRe);
    await E(nRe,"continuar",nEsperar);           // vuelve a escuchar
    // Registrar → Sheets → (pase lo que pase) seguir. Las DOS salidas del nodo
    // de Sheets van al mismo lado: sin hoja configurada el nodo falla, y eso no
    // puede dejar sin producto a quien ya pagó.
    // OJO: las aristas de salida de nEntregar y nRegistrar se crean abajo según
    // haya extras y en qué momento. Dos aristas con el MISMO handle desde el
    // mismo nodo harían que nextNode elija una al azar.

    // ── Cadena de ventas extra (order bump) ──
    // "antes"  (Método 2, el que más convierte): paga → se le ofrecen los
    //          extras → recién ahí se entrega todo.
    // "despues": paga → se entrega → se le ofrecen los extras.
    // En AMBOS, si rechaza o no contesta, se entrega lo que ya pagó: nunca se
    // retiene un producto pagado por esperar un upsell.
    const cfg=st.prod.config||{};
    const extras=(Array.isArray(cfg.extras)?cfg.extras:[]).filter(x=>x&&x.version_id);
    const antes=(cfg.extras_momento||"antes")==="antes";
    const esperaSeg=Math.max(60,(Number(cfg.extras_espera_min)||15)*60);
    // El catálogo puede no estar cargado si nunca se abrió la pestaña de extras
    // (se puede generar el flujo directo desde la Receta).
    if(extras.length && !st.extraCat) await cargarCatalogoExtras();

    if(!extras.length){
      await E(nRegistrar,"continuar",nEntregar);
      await E(nEntregar,"continuar",nFin);
    }else{
      // Dónde cae la cadena cuando termina (rechazo, timeout o extras agotados).
      const salida = antes ? nEntregar : nFin;
      const cat=st.extraCat||[];
      const ofrecs=[], entregas=[];
      for(let i=0;i<extras.length;i++){
        const x=extras[i];
        const info=cat.find(c=>c.id===x.version_id);
        const y=520+i*420;
        const precio=info?.precio ?? "";
        const nOfr=await N("mensaje",`Ofrecer extra ${i+1}`,{
          bubbles:[{ text:x.mensaje||`¿Le sumas ${info?info.label:"el extra"}? 🎁` }],
        },false,80,y);
        const nEsp=await N("pregunta",`Esperar respuesta (extra ${i+1})`,{ text:"", timeout_seg:esperaSeg },false,380,y);
        const nImg=await N("condicion",`¿Mandó pago? (extra ${i+1})`,{
          rutas:[{ nombre:"Es imagen", handle:"ruta:es_imagen", match:"todas",
                   condiciones:[{ op:"campo_igual", campo:"last_input_type", valor:"image" }] }],
        },false,660,y);
        const nOcrX=await N("ia",`Validar pago del extra ${i+1}`,{
          operacion:"analizar_imagen", perfil:"ocr", usar_validador:true, enviar:false,
          guardar_en:`pago_extra_${i+1}`, monto_esperado:String(precio),
          _extra_label:(info?info.label:`Extra ${i+1}`),
          prompt:`Analiza la imagen. Si el pago es VÁLIDO y por S/ ${precio}, responde exactamente PAGO_OK. Si no, responde PAGO_NO y el motivo en una frase.`,
        },false,940,y-90);
        const nOkX=await N("condicion",`¿Pago OK? (extra ${i+1})`,{
          rutas:[{ nombre:"Pago OK", handle:"ruta:pago_ok", match:"todas",
                   condiciones:[{ op:"campo_contiene", campo:`pago_extra_${i+1}`, valor:"PAGO_OK" }] }],
        },false,1220,y-90);
        const nDarX=await N("accion",`Entregar extra ${i+1}`,{
          acciones:[
            // Suma el extra al MISMO pedido: alimenta las "ventas extra" del
            // Dashboard y la columna "Valor Producto extra" de la hoja, en la
            // misma fila de la venta principal. (Los extras son del flujo
            // digital: acá el nombre es el de WhatsApp, no hay extractor.)
            { tipo:"actualizar_pedido", bump:{ nombre:(info?info.label:`Extra ${i+1}`), precio:String(precio) } },
            // "antes": se DIFIERE la entrega del extra para mandarla junto con el
            // principal al final. "después": ya se entregó el principal, así que el
            // extra se entrega al toque (respetando el estilo de burbuja del producto).
            (antes
              ? { tipo:"entregar", version_id:x.version_id, diferir:true }
              : { tipo:"entregar", version_id:x.version_id, una_burbuja:!!cfg.entrega_burbuja_unica, mensaje:"¡Listo! 🎉 Acá va tu extra:" }),
            { tipo:"notify_admin", una_vez:`extra_${x.version_id}`, foto:"{{ultima_imagen}}",
              plantilla:"venta_extra", datos:{ extra:(info?info.label:`Extra ${i+1}`), monto:String(precio) } },
          ],
        },false,1500,y-90);
        const nReX=await N("mensaje",`Reintentar pago (extra ${i+1})`,{
          bubbles:[{ text:`No pude validar ese pago 🤔 {{pago_extra_${i+1}_motivo}}\n\n¿Me lo reenvías?` }],
        },false,1220,y+90);
        // Corte inteligente: entiende "no gracias" / "ya tengo" / "dale" sin botones.
        const nClas=await N("ia",`¿Lo quiere? (extra ${i+1})`,{
          operacion:"clasificar", guardar_en:`extra_${i+1}_resp`, default:"duda", umbral:0.6,
          que:"Qué está diciendo el cliente sobre la oferta adicional",
          opciones:[
            { clave:"acepta", label:"Acepta", detalle:"Dice que sí, lo quiere, pregunta cómo pagarlo" },
            { clave:"rechaza", label:"Rechaza", detalle:"Dice que no, que no le interesa, que ya lo tiene, que solo quiere lo que compró" },
            { clave:"duda", label:"Duda o pregunta", detalle:"Pide más información, no decide todavía" },
          ],
        },false,940,y+90);
        const nRech=await N("condicion",`¿Dijo que no? (extra ${i+1})`,{
          rutas:[{ nombre:"Rechaza", handle:"ruta:rechaza", match:"todas",
                   condiciones:[{ op:"campo_igual", campo:`extra_${i+1}_resp`, valor:"rechaza" }] }],
        },false,1220,y+240);
        const nResp=await N("ia",`Responder sobre el extra ${i+1}`,{
          operacion:"generar_texto", enviar:true, usar_conocimiento:true, detectar_opcion:false,
          prompt:`El cliente está viendo una oferta adicional (${info?info.label:"el extra"}). Responde su duda de forma breve `+
                 `y ayúdalo a decidir, sin presionar. Si quiere, pásale los datos de pago ({{datos_pago}}).`,
        },false,1500,y+240);

        primero.push(nOfr);
        await E(nOfr,"continuar",nEsp);
        await E(nEsp,"timeout",salida);          // no contestó → se entrega igual
        await E(nEsp,"continuar",nImg);
        await E(nImg,"ruta:es_imagen",nOcrX);
        await E(nImg,"si_no_cumple",nClas);
        await E(nOcrX,"exito",nOkX);
        await E(nOkX,"ruta:pago_ok",nDarX);
        await E(nOkX,"si_no_cumple",nReX);
        await E(nReX,"continuar",nEsp);
        await E(nClas,"exito",nRech);
        await E(nRech,"ruta:rechaza",salida);    // corte de TODA la cadena
        await E(nRech,"si_no_cumple",nResp);
        await E(nResp,"exito",nEsp);
        ofrecs.push(nOfr); entregas.push(nDarX);
      }
      // Encadenado: pagar un extra lleva al ofrecimiento del siguiente; el
      // último cierra la cadena por la salida.
      for(let i=0;i<entregas.length;i++){
        await E(entregas[i],"continuar", i+1<ofrecs.length ? ofrecs[i+1] : salida);
      }
      // Entrada a la cadena según el momento elegido. Se engancha DESDE Sheets,
      // no desde Registrar: Registrar ya sale hacia Sheets, y dos aristas con
      // el mismo handle harían que nextNode elija una al azar.
      if(antes){
        await E(nRegistrar,"continuar",ofrecs[0]);
        await E(nEntregar,"continuar",nFin);     // la salida de la cadena
      }else{
        await E(nRegistrar,"continuar",nEntregar);
        await E(nEntregar,"continuar",ofrecs[0]); // entregó y ahora ofrece
      }
    }

    await enlazarInicialesConVenta(flowId);
    toast("Flujo de venta generado ✓");
    st.tab="receta"; renderDetail();
  }catch(e){ toast("Error al generar: "+(e.message||e),true); }
}

// Engancha los mensajes iniciales al flujo de venta recién generado.
//
// Nacían con "y después: nada", así que el bot saludaba, terminaba la
// conversación y el siguiente mensaje del cliente ("sí, lo quiero, ¿cómo pago?")
// ya no encontraba flujo: caía al respaldo o al silencio. Las dos piezas se
// creaban bien por separado y nadie las unía — y el desplegable para unirlas
// solo se puede usar DESPUÉS de generar el flujo, así que el orden natural
// dejaba el producto siempre roto.
//
// Solo se toca si está en "nada": si el operador eligió a propósito otro
// destino, no se le pisa.
async function enlazarInicialesConVenta(flowId){
  try{
    const fIni=st.receta?.fIni; if(!fIni) return;
    const { data:nodo } = await supa.from("flow_nodes")
      .select("id,config").eq("flow_id",fIni.id).eq("tipo","rotador").maybeSingle();
    if(!nodo) return;
    const cfg=nodo.config||{};
    const des=cfg.despues||{modo:"nada"};
    if(des.modo==="flujo" && des.flow_id) return;   // ya apunta a algo: respetarlo
    cfg.despues={ modo:"flujo", flow_id:flowId };
    await supa.from("flow_nodes").update({ config:cfg }).eq("id",nodo.id);
  }catch(e){ console.error("[enlazarInicialesConVenta]",e); }
}

// Slug estable para la clave de un atributo → {{clave}}, campo del contacto y
// tag de su multimedia. Debe coincidir con slugAttr() del motor (engine.ts).
function slugAttr(s){ return String(s||"").normalize("NFD").replace(/[̀-ͯ]/g,"").toLowerCase().trim().replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"").slice(0,32); }

  const box=$("opList"); box.innerHTML="";
  if(!st.versions.length){

  }

    const el=document.createElement("div"); el.className="card";
    el.innerHTML=`
      <div class="row" style="align-items:flex-end;gap:10px">
        <div style="flex:1.4"><label style="margin-top:0">Nombre</label>
          <input class="in on" value="${esc(v.nombre||"")}" placeholder="${fisico?"Ej. 1 par · 2 pares · Pack familiar":"Ej. Básico · Premium · Pack completo"}"/></div>
        <div style="flex:0 0 110px"><label style="margin-top:0">Precio</label>
          <input class="in op" type="number" step="0.01" min="0" value="${esc(v.precio??"")}"/></div>
        ${fisico?`<div style="flex:0 0 95px"><label style="margin-top:0">Unidades</label>

      </div>
      <label>Descripción <span style="color:var(--faint);font-weight:400">(para que la IA sepa venderla y reconocerla)</span></label>
      <input class="in odesc" value="${esc(v.descripcion||"")}" placeholder="${fisico?"Ej. Incluye medias y bolso de regalo":"Ej. Incluye las plantillas editables y el bonus"}"/>
      ${fisico ? `
      <div style="margin-top:12px;font-size:11.5px;color:var(--faint);line-height:1.55">
        Este producto se <b>envía</b>, así que no entrega nada por el chat: la venta termina cuando se crea el pedido.
        ¿Quieres regalar algo digital con la compra? Va en <a href="#" class="oGoExtra" style="color:var(--brand)">Ventas extra →</a>,
        que sí lo manda cuando el pedido está pagado del todo.
      </div>`
      : `

        <button class="btn oef" style="height:32px">${icon("file")} Archivo</button>
      </div>`}`;
    el.querySelector(".on").oninput=(e)=>{ v.nombre=e.target.value; };
    el.querySelector(".op").oninput=(e)=>{ v.precio=e.target.value; warnColision(); };
    const oc=el.querySelector(".oc"); if(oc) oc.oninput=(e)=>{ v.cantidad=parseInt(e.target.value,10)||1; };
    el.querySelector(".oa").onchange=(e)=>{ v.activo=e.target.checked; warnColision(); };
    el.querySelector(".odesc").oninput=(e)=>{ v.descripcion=e.target.value; };
    el.querySelector(".odel").onclick=async()=>{
      if(!await confirmDialog({title:"Eliminar opción",message:`¿Eliminar "${esc(v.nombre||"esta opción")}"? Los pedidos ya hechos con ella no se tocan.`,confirmText:"Eliminar",danger:true})) return;
      if(v.id) st.delVersions.push(v.id);
      st.versions.splice(i,1); paintOpciones(fisico);
    };
    // Agrega una fila vacía y pone el cursor en el link. Antes eran DOS ventanas
    // seguidas (primero el link, después el nombre) para una sola acción — y el
    // nombre ya se edita en la propia fila, así que la segunda no aportaba nada.
    // Además, si cancelabas la segunda, la primera quedaba a medias.
    // En físico no hay bloque de entrega (se envía, no se manda por chat): solo
    // el atajo a Ventas extra, que es donde sí vive un regalo digital.
    const oel=el.querySelector(".oel");
    if(oel) oel.onclick=()=>{

    if(el.querySelector(".oe")) paintEntrega(el,v,fisico);
    box.appendChild(el);
  });
  warnColision();
}

function paintEntrega(el,v,fisico){
  const box=el.querySelector(".oe"); box.innerHTML="";
  const items=v.entrega=Array.isArray(v.entrega)?v.entrega:[];
  if(!items.length){ box.innerHTML=`<div style="font-size:12px;color:var(--faint);padding:2px 0">Sin entrega configurada.</div>`; return; }
  items.forEach((it,j)=>{
    const r=document.createElement("div"); r.style.cssText="margin-bottom:10px;padding:8px 9px;border:1px solid var(--border);border-radius:10px";
    r.innerHTML=`<div class="row" style="align-items:center;gap:7px">
        <span style="flex:0 0 auto;color:var(--muted);display:inline-flex">${icon(it.tipo==="archivo"?"file":"link")}</span>
        <input class="in en" style="flex:0 0 170px" value="${esc(it.nombre||"")}" placeholder="Nombre"/>
        <input class="in eu" style="flex:1" value="${esc(it.url||"")}" ${it.tipo==="archivo"?"readonly":`placeholder="Pega el link — Drive, curso, acceso…"`}/>
        <button class="iconbtn edel" style="flex:0 0 auto">${icon("trash")}</button>
      </div>
      <input class="in emsg" style="margin-top:6px" value="${esc(it.mensaje||"")}" placeholder="Mensaje al entregar este ${it.tipo==="archivo"?"archivo":"link"} (opcional) — ej. “Acá está tu curso 🎥”"/>`;
    r.querySelector(".en").oninput=(e)=>{ it.nombre=e.target.value; };
    r.querySelector(".eu").oninput=(e)=>{ it.url=e.target.value; };
    r.querySelector(".emsg").oninput=(e)=>{ it.mensaje=e.target.value; };
    r.querySelector(".edel").onclick=()=>{ items.splice(j,1); paintEntrega(el,v,fisico); };
    box.appendChild(r);
  });
}

// Sube un archivo de entrega (PDF, zip…) y lo agrega a la opción.
function pickEntregaFile(v,onDone){
  const inp=document.createElement("input"); inp.type="file";
  inp.onchange=async()=>{
    const file=inp.files&&inp.files[0]; if(!file) return;
    toast("Subiendo…");
    try{
      const dataURL=await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
      const { data,error }=await supa.functions.invoke("media-upload",{ body:{ channel_id:st.channelId, filename:file.name, content_type:file.type, data:dataURL } });
      if(error||!data?.url){ toast("No se pudo subir el archivo",true); return; }
      v.entrega=Array.isArray(v.entrega)?v.entrega:[];
      v.entrega.push({ tipo:"archivo", url:data.url, nombre:(file.name||"").replace(/\.[^.]+$/,""), filename:file.name, media_kind:data.kind||"document" });
      toast("Archivo agregado ✓"); if(onDone) onDone();
    }catch(e){ toast("Error al subir",true); }
  };
  inp.click();
}

// Si dos opciones ACTIVAS cuestan lo mismo, el monto pagado no alcanza para
// saber cuál eligió el cliente y la IA tendrá que confirmarlo por texto. Se
// avisa acá, al configurar — no en producción con una venta a medias.
function warnColision(){
  const box=$("opWarn"); if(!box) return;
  const act=st.versions.filter(v=>v.activo!==false && v.precio!=="" && v.precio!=null && !isNaN(Number(v.precio)));
  const seen={}, dup=[];
  act.forEach(v=>{ const k=String(Number(v.precio)); if(seen[k] && !dup.includes(k)) dup.push(k); seen[k]=true; });
  box.innerHTML = dup.length ? `
    <div class="card" style="border-color:#f0a92b;background:rgba(240,169,43,.07)">
      <div style="display:flex;gap:10px;align-items:flex-start;font-size:12.5px;line-height:1.6">
        <span style="color:#f0a92b;display:inline-flex;flex:none">${icon("alert")}</span>
        <div>Hay opciones activas con el <b>mismo precio</b> (${dup.map(d=>"S/ "+d).join(", ")}).
        El monto que pague no alcanzará para saber cuál eligió, así que la IA tendrá que
        <b>confirmárselo por texto</b> antes de entregar. Si prefieres que el pago lo resuelva solo,
        dales precios distintos.</div>
      </div>
    </div>` : "";
}

  });

// ═══ Pestaña Activación: COMPOSITOR de mensajes iniciales ═══════════
// "Cómo empieza el chat": disparadores (palabras clave + ad_id) + mensajes
// iniciales con ROTACIÓN de copy (variantes con pesos) + "y después".
// Por debajo = un flujo "Bienvenida" con UN nodo `rotador` (self-contained).
function newVariant(idx){
  return { id:crypto.randomUUID(), nombre:"Variante "+String.fromCharCode(65+(idx||0)), activo:true, peso:1, bubbles:[{text:""}] };
}
async function renderActivacion(){
  const b=$("tabBody");
  b.innerHTML=`<div id="actroot"><div class="empty">Cargando…</div></div>`;
  const root=$("actroot");
  const { data:flow } = await supa.from("flows").select("id,nombre,estado,role")
    .eq("product_id",st.prod.id).eq("role","mensajes_iniciales").eq("kind","flow").maybeSingle();
  st.act={ flow:flow||null, node:null, kw:null, ad:null, others:[] };
  if(!flow){
    root.innerHTML=`<div class="card">
      <h4>${icon("message")}Mensajes iniciales</h4>
      <div style="font-size:13px;color:var(--muted);margin:8px 0 14px;line-height:1.55">Los mensajes con los que arranca el chat cuando el cliente escribe tu palabra clave (o llega desde tu anuncio). Puedes crear <b>varias versiones que el bot rota</b> para variar el copy y reducir el riesgo de baneo.</div>
      <button class="btn primary" id="createWelcome">Crear mensajes iniciales</button>
      <div style="font-size:12px;color:var(--faint);margin-top:10px">Al crearlos aparece acá el campo de <b>palabras clave</b>: se enganchan a estos mensajes, por eso van juntos.</div></div>`;
    $("createWelcome").onclick=createWelcome;
    return;
  }
  const { data:nodes } = await supa.from("flow_nodes").select("id,tipo,config,es_inicial").eq("flow_id",flow.id);
  let node=(nodes||[]).find(n=>n.tipo==="rotador")||(nodes||[]).find(n=>n.es_inicial);
  if(!node){
    const { data:nn } = await supa.from("flow_nodes").insert({ flow_id:flow.id, tipo:"rotador", nombre:"Mensajes iniciales", es_inicial:true, config:{activo:true,variantes:[newVariant(0)],despues:{modo:"nada"}}, pos_x:80, pos_y:80 }).select("id,tipo,config,es_inicial").single();
    node=nn;
  }
  const { data:trigs } = await supa.from("flow_triggers").select("id,tipo,config,activo").eq("flow_id",flow.id);
  const { data:others } = await supa.from("flows").select("id,nombre,estado,role").eq("product_id",st.prod.id).eq("kind","flow").neq("id",flow.id).order("created_at");
  node.config=node.config||{};

  node.config.despues=node.config.despues||{modo:"nada"};
  st.act={ flow, node, kw:(trigs||[]).find(t=>t.tipo==="keyword")||null, ad:(trigs||[]).find(t=>t.tipo==="referral")||null, others:others||[] };
  renderComposer();
}
async function createWelcome(){

// Lee los valores editables del DOM a memoria (antes de re-render o guardar).
function harvest(){
  const cfg=st.act.node.config;
  document.querySelectorAll("#actroot [data-vi]").forEach(vc=>{
    const vi=+vc.dataset.vi; const v=cfg.variantes[vi]; if(!v) return;
    const nm=vc.querySelector(".vname"); if(nm) v.nombre=nm.value;
    const pw=vc.querySelector(".vpeso"); if(pw) v.peso=Math.max(0,Number(pw.value)||0);
    vc.querySelectorAll("[data-bi]").forEach(bc=>{
      const bi=+bc.dataset.bi; const bub=v.bubbles[bi]; if(!bub) return;
      const tx=bc.querySelector(".btext"); if(tx) bub.text=tx.value;
      const cp=bc.querySelector(".bcap"); if(cp) bub.caption=cp.value;
    });
  });
  const des=st.act.node.config.despues;
  const dm=$("actDespues"); if(dm) des.modo=dm.value;
  const df=$("actFlow"); if(df) des.flow_id=df.value||null;
}

function renderBubble(v,vi,bub,bi){
  const el=document.createElement("div"); el.dataset.bi=bi;
  el.style.cssText="border:1px solid var(--border);border-radius:9px;padding:9px 10px;background:var(--surface)";
  const isMedia=!!bub.media_url;
  const kind=bub.media_kind||"text";
  const tIco={text:"note",image:"image",video:"video",audio:"mic",document:"file"}[kind]||"note";
  let preview="";
  if(kind==="image") preview=`<img src="${esc(bub.media_url)}" style="max-width:140px;max-height:100px;border-radius:7px;display:block;margin-bottom:7px"/>`;
  else if(kind==="video") preview=`<video src="${esc(bub.media_url)}" style="max-width:180px;max-height:120px;border-radius:7px;display:block;margin-bottom:7px" controls></video>`;
  else if(kind==="audio") preview=`<audio src="${esc(bub.media_url)}" style="height:34px;margin-bottom:7px;display:block" controls></audio>`;
  else if(kind==="document") preview=`<div style="font-size:12px;margin-bottom:7px;display:flex;align-items:center;gap:5px">${icon("file")} ${esc(bub.filename||"documento")}</div>`;
  el.innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:${isMedia?'8px':'6px'}">
      <span style="display:inline-flex;color:var(--muted)">${icon(tIco)}</span>
      <span style="font-size:11px;color:var(--muted);font-weight:600;flex:1">${kind==="text"?"Texto":kind.charAt(0).toUpperCase()+kind.slice(1)}</span>
      <button class="iconbtn bup" title="Subir">▲</button>
      <button class="iconbtn bdown" title="Bajar">▼</button>
      <button class="iconbtn bdel" title="Quitar">${icon("trash")}</button>
    </div>
    ${preview}
    ${kind==="text"
      ? `<textarea class="in btext" rows="2" style="height:auto;min-height:52px;padding:8px 10px;line-height:1.45;font-family:var(--font);resize:vertical" placeholder="Escribe el mensaje… puedes usar {{nombre}}, {{precio}}…">${esc(bub.text||"")}</textarea>${botonesHtml(bub)}`
      : (kind!=="audio"?`<input class="in bcap" placeholder="Texto/caption (opcional)" value="${esc(bub.caption||"")}"/>`:``)}`;
  if(kind==="text") wireBotones(el,bub,()=>{ harvest(); renderComposer(); });
  el.querySelector(".bdel").onclick=()=>{ harvest(); v.bubbles.splice(bi,1); if(!v.bubbles.length) v.bubbles.push({text:""}); renderComposer(); };
  el.querySelector(".bup").onclick=()=>{ if(bi===0)return; harvest(); [v.bubbles[bi-1],v.bubbles[bi]]=[v.bubbles[bi],v.bubbles[bi-1]]; renderComposer(); };
  el.querySelector(".bdown").onclick=()=>{ if(bi>=v.bubbles.length-1)return; harvest(); [v.bubbles[bi+1],v.bubbles[bi]]=[v.bubbles[bi],v.bubbles[bi+1]]; renderComposer(); };
  return el;
}

function pickMedia(vi,kind){
  const accept={image:"image/*",video:"video/*",audio:"audio/*"}[kind]||"*/*";
  const inp=document.createElement("input"); inp.type="file"; inp.accept=accept;
  inp.onchange=async()=>{
    const file=inp.files&&inp.files[0]; if(!file) return;
    toast("Subiendo…");
    try{
      const dataURL=await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
      const { data,error }=await supa.functions.invoke("media-upload",{ body:{ channel_id:st.channelId, filename:file.name, content_type:file.type, data:dataURL } });
      if(error||!data?.url){ toast("No se pudo subir el archivo",true); return; }
      st.act.node.config.variantes[vi].bubbles.push({ media_kind:data.kind||kind, media_url:data.url, mime:file.type, filename:file.name, caption:"" });
      toast("Archivo agregado ✓"); renderComposer();
    }catch(e){ toast("Error al subir",true); }
  };
  inp.click();
}

// Palabras que arrancan una venta sola. Una clave demasiado común o corta hace
// que el bot salte a vender en medio de una conversación que no venía a eso —
// y eso se descubre tarde, con un cliente real. Se avisa, no se impide: puede
// haber un caso donde de verdad la quieras.
const KW_COMUNES = new Set([
  "hola","buenas","info","informacion","información","precio","precios","cuanto","cuánto",
  "si","sí","no","ok","gracias","ayuda","quiero","comprar","pedido","envio","envío",
  "pago","pagar","activar","hey","alo","aló","buenos dias","buenas tardes","buenas noches",
]);
function avisarKeywords(){
  const box=$("kwAviso"); if(!box) return;
  const modo=($("actMatch")?.value)||"contiene";
  const kws=(($("actKw")?.value)||"").split(",").map(s=>s.trim()).filter(Boolean);
  const avisos=[];
  for(const k of kws){
    const n=k.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");
    if(modo==="exacta") continue;                       // exacta no se dispara sola
    if(KW_COMUNES.has(n) || KW_COMUNES.has(k.toLowerCase()))
      avisos.push(`<b>${esc(k)}</b> es una palabra muy común: un cliente puede escribirla sin querer comprar esto.`);
    else if(n.length<=3)
      avisos.push(`<b>${esc(k)}</b> tiene solo ${n.length} letras: es fácil que aparezca dentro de otra frase.`);
  }
  box.innerHTML = avisos.length
    ? `<div style="margin-top:9px;border:1px solid var(--amber);border-radius:10px;padding:9px 11px;background:rgba(240,169,43,.08)">
         <div style="font-size:12px;font-weight:700;color:var(--amber);margin-bottom:3px">Ojo con estas palabras</div>
         <div style="font-size:11.5px;color:var(--muted);line-height:1.55">${avisos.join("<br>")}
         <div style="margin-top:5px">Si igual la quieres, prueba el modo <b>Exacta</b>: solo dispara si el mensaje es justo esa palabra.</div></div>
       </div>`
    : "";
}

async function saveWelcome(){
  harvest();
  const cfg=st.act.node.config;
  // Limpia burbujas de texto vacías; descarta variantes sin burbujas.
  cfg.variantes.forEach(v=>{ v.bubbles=limpiaBotones((v.bubbles||[]).filter(b=> b.media_url || (b.text&&b.text.trim()))); });
  cfg.variantes=cfg.variantes.filter(v=> v.bubbles.length);
  if(!cfg.variantes.length) cfg.variantes.push(newVariant(0));
  if(cfg.despues.modo==="flujo" && !cfg.despues.flow_id){ toast("Elige a qué flujo continuar",true); return; }
  const { error:eN }=await supa.from("flow_nodes").update({ config:cfg }).eq("id",st.act.node.id);
  if(eN){ toast(eN.message,true); return; }
  // Disparadores
  const kwArr=($("actKw").value||"").split(",").map(s=>s.trim()).filter(Boolean);
  const match=$("actMatch").value;
  await saveTrigger("keyword", "kw", kwArr.length?{keywords:kwArr,match}:null);
  const adArr=($("actAds").value||"").split(",").map(s=>s.trim()).filter(Boolean);
  await saveTrigger("referral", "ad", adArr.length?{ad_ids:adArr}:null);
  toast("Guardado ✓"); renderActivacion();
}
async function saveTrigger(tipo, key, config){
  const existing=st.act[key];
  if(config){
    if(existing){ await supa.from("flow_triggers").update({config}).eq("id",existing.id); }
    else { await supa.from("flow_triggers").insert({ channel_id:st.channelId, flow_id:st.act.flow.id, tipo, config, activo:true }); }
  } else if(existing){ await supa.from("flow_triggers").delete().eq("id",existing.id); }
}

async function saveProduct(){
  if(!st.prod){ return; }
  // Recompila el conocimiento del producto a config.contexto_producto (lo que
  // el motor inyecta) por si se guarda sin haber tocado el formulario.
  if(st.prod.config){
    const c=st.prod.config; c.ia=c.ia||{};
    // MIGRACIÓN DE SEGURIDAD (antes de recompilar): si el conocimiento viejo vive
    // en contexto_producto pero nunca se migró a la ficha nueva (config.ia) —porque
    // no se abrió la pestaña "Cómo lo vende la IA"—, migrarlo AHORA. Sin esto, el
    // recompile de abajo produciría vacío y BORRARÍA el conocimiento (pérdida de
    // datos silenciosa al guardar desde cualquier otra pestaña). Espeja la
    // migración de renderProductoIA.
    if(!c.ia.detalle && c.contexto_producto && !c.ia._migrado){ c.ia.detalle=c.contexto_producto; c.ia._migrado=true; }
    const cx=compileProductoIA(c, st.prod.tipo||"digital");
    if(cx) c.contexto_producto=cx; else delete c.contexto_producto;
    // Atributos: descarta los sin nombre y asegura una clave estable (la usa el
    // motor para {{clave}}, el campo del contacto y el tag de su multimedia).
    if(Array.isArray(c.atributos)){
      c.atributos=c.atributos.filter(a=>a&&String(a.nombre||"").trim());
      const usadas=new Set();
      c.atributos.forEach((a,i)=>{
        let k=slugAttr(a.nombre)||("atributo"+(i+1)); let base=k, n=2;
        while(usadas.has(k)) k=base+"_"+n++;
        usadas.add(k); a.clave=k;
        if(!Array.isArray(a.media)) a.media=[];
      });
    }
  }
  const base={ nombre:st.prod.nombre, config:st.prod.config||{}, updated_at:new Date().toISOString() };
  let { error:e1 } = await supa.from("products").update({ ...base, folder:st.prod.folder||null, emoji:st.prod.emoji||null, tipo:st.prod.tipo||"digital" }).eq("id",st.prod.id);
  if(e1 && /tipo|column/.test(e1.message)){ ({ error:e1 } = await supa.from("products").update({ ...base, folder:st.prod.folder||null, emoji:st.prod.emoji||null }).eq("id",st.prod.id)); if(!e1) toast("Guardado (aplica 0022 para el tipo físico)"); }
  if(e1 && /folder|emoji|column/.test(e1.message)){ ({ error:e1 } = await supa.from("products").update(base).eq("id",st.prod.id)); if(!e1) toast("Guardado (aplica 0018 para carpeta/emoji)"); }
  if(e1){ toast(e1.message,true); return; }
  // ── Opciones de compra (migración 0029) ──
  // Primero las eliminadas: antes se marcaba v._delete pero nunca se borraban
  // de la base, así que "eliminar" no eliminaba nada al recargar.
  for(const id of (st.delVersions||[])){
    const { error } = await supa.from("product_versions").delete().eq("id",id);
    if(error){ toast(error.message,true); return; }
  }
  st.delVersions=[];
  for(let i=0;i<st.versions.length;i++){
    const v=st.versions[i]; v.orden=i; v.product_id=st.prod.id;
    const row={
      product_id:st.prod.id, nombre:v.nombre||"Única", orden:i,
      precio:(v.precio===""||v.precio==null)?null:Number(v.precio),
      cantidad:Number(v.cantidad)||1,
      descripcion:v.descripcion||null,
      // Se descartan las filas de entrega sin link: no entregan nada y harían
      // que "Salud del producto" diera el visto bueno a una opción rota.
      entrega:(Array.isArray(v.entrega)?v.entrega:[]).filter(it=>it&&String(it.url||"").trim()),
      activo:v.activo!==false,
      price_list:v.price_list||[], drive_link:v.drive_link||null, // legado
    };
    if(v.id) row.id=v.id;
    let { data, error } = await supa.from("product_versions").upsert(row).select("id").single();
    if(error && /precio|entrega|descripcion|activo|cantidad|column/.test(error.message)){
      // Resiliente: si 0029 no está aplicada, guarda al menos lo viejo.
      const legacy={ product_id:st.prod.id, nombre:v.nombre||"Única", price_list:v.price_list||[], drive_link:v.drive_link||null, orden:i };
      if(v.id) legacy.id=v.id;
      ({ data, error } = await supa.from("product_versions").upsert(legacy).select("id").single());
      if(!error) toast("Guardado (aplica 0029 para las opciones de compra)");
    }
    if(error){ toast(error.message,true); return; }
    if(!v.id && data) v.id=data.id;
  }
  toast("Guardado ✓"); loadProducts();
}
boot();
</script>
</body>
</html>
