<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script>try{document.documentElement.dataset.theme=localStorage.getItem("nodo.theme")||"dark"}catch(e){}</script>
<title>Nodo · Productos</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png" />
<link rel="stylesheet" href="shell.css" />
<style>
  :root{
    --bg:#0e1116; --surface:#151a21; --surface-2:#1b222c; --border:#232b36;
    --text:#e7ecf2; --muted:#8a97a8; --faint:#5c6675;
    --brand:#2b7fff; --brand-2:#1e6ff0; --brand-bg:#12233f;
    --green:#22c079; --green-bg:#10281d; --amber:#f0a92b; --red:#e2564a;
    --font:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box} html,body{height:100%;margin:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px}
  button{font-family:inherit;cursor:pointer}
  .pcard .c-tt{font-size:16.5px;font-weight:700;letter-spacing:-.2px}
  .tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border)}
  .tab{background:transparent;border:none;color:var(--muted);font-size:14px;font-weight:600;padding:10px 16px;border-bottom:2px solid transparent}
  .tab.active{color:var(--brand);border-bottom-color:var(--brand)}
  label{display:block;font-size:11.5px;color:var(--muted);margin:16px 0 6px;font-weight:700}
  .in,.ta{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:10px 12px;font-size:13.5px;outline:none;font-family:var(--font)}
  .ta{min-height:90px;font-family:monospace;font-size:12px}
  .sel{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);height:40px;padding:0 12px;font-size:13.5px;outline:none}
  .in:focus,.ta:focus{border-color:var(--brand)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
  .card h4{margin:0 0 4px;font-size:14px;font-weight:700}
  .row{display:flex;gap:12px;align-items:center} .row>*{flex:1}
  .chk{display:flex;align-items:center;gap:8px;font-size:13.5px;margin-top:14px}
  .flowrow{display:flex;align-items:center;gap:10px;padding:13px 0;border-bottom:1px solid var(--border)}
  .badge{font-size:10px;padding:3px 10px;border-radius:20px;background:var(--surface-2);border:1px solid var(--border);color:var(--muted);font-weight:700}
  .badge.on{background:var(--green-bg);color:var(--green);border-color:transparent}
  .linkbtn{font-size:12.5px;padding:6px 12px;border:1px solid var(--border);border-radius:9px;color:var(--text);text-decoration:none;font-weight:600;display:inline-flex;align-items:center;gap:5px}
  .ico{width:16px;height:16px;flex:none}
  .linkbtn .ico{width:14px;height:14px}
  #emojiBtn .ico{width:20px;height:20px}
  .nodo-pill .ico{width:12px;height:12px;vertical-align:-1px;margin-right:3px}
  .nodo-folder .ico{width:13px;height:13px;vertical-align:-2px;margin-right:4px}
  h4 .ico{width:15px;height:15px;vertical-align:-2px;margin-right:5px}
  .empty{color:var(--faint);text-align:center;padding:40px}
  .sw{position:relative;width:38px;height:22px;border-radius:20px;background:var(--surface-2);border:1px solid var(--border);flex:none;cursor:pointer;transition:.15s}
  .sw.on{background:var(--green,#22c079);border-color:var(--green,#22c079)}
  .sw::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.15s}
  .sw.on::after{transform:translateX(16px)}
  .iconbtn{width:30px;height:30px;flex:none;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
  .iconbtn:hover{color:var(--text);border-color:var(--brand)}
  .btn{height:40px;padding:0 16px;border-radius:11px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:13.5px;font-weight:600}
  .btn.primary{background:var(--brand);border:none;color:#fff} .btn.primary:hover{background:var(--brand-2)}
</style>
</head>
<body>
<div class="nodo-page">
  <div class="nodo-wrap">
    <!-- VISTA TARJETAS -->
    <div id="gridView">
      <div class="nodo-head">
        <div class="grow">
          <h1 class="nodo-title">Productos</h1>
          <p class="nodo-lead">Tu catálogo de productos digitales y físicos. Cada producto define sus versiones, precios, entrega o envío, y los flujos que lo venden.</p>
        </div>
        <div class="nodo-actions">
          <button class="nodo-btn primary" id="addProduct"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg> Nuevo producto</button>
        </div>
      </div>
      <div class="nodo-folders" id="folders"></div>
      <div class="nodo-cards" id="cards"></div>
    </div>
    <!-- VISTA DETALLE -->
    <div id="detailView" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
        <button class="nodo-back" id="backBtn" style="margin-bottom:0"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Volver a productos</button>
        <div style="display:flex;gap:8px">
          <button class="nodo-btn danger" id="delBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg> Eliminar</button>
          <button class="btn primary" id="saveBtn">Guardar cambios</button>
        </div>
      </div>
      <div id="detail" style="margin-top:18px"></div>
    </div>
  </div>
</div>

<script type="module">
import { supa, mountShell, toast, icon, askText, confirmDialog } from "./shell.js";
const $ = (id) => document.getElementById(id);
const st = { channelId:null, prod:null, versions:[], tab:"datos", list:[], folder:"__all", localFolders:new Set() };
function esc(s){ return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
// Emojis para IDENTIFICAR el producto (se muestran sobre el avatar en la
// Bandeja). El emoji del producto se conserva; el picker ofrece TODOS.
const EMOJI_CATS=[
  { n:"Populares", e:"📕💪🏋️🥊🎯🧠💰📈🚀🔥⚡🎓🍳🌱❤️✨📱🎸🎨🐶⚽🧘💊🛠️📷👟👕👗👠👜🧴🎁📦" },
  { n:"Caras", e:"😀😃😄😁😆😅😂🤣🥲☺️😊😇🙂🙃😉😌😍🥰😘😋😎🥸🤩🥳😏🤔🤗🤭🥺😴🤤🤠🤑🤖😺" },
  { n:"Animales y naturaleza", e:"🐶🐱🐭🐹🐰🦊🐻🐼🐨🐯🦁🐮🐷🐸🐵🐔🐧🐦🦆🦅🦉🐺🐗🐴🦄🐝🦋🐢🐍🐙🦐🦀🐠🐬🐳🦈🐊🐅🦓🦍🐘🐪🦒🐕🐈🌵🌲🌴🌱🌿☘️🍀🎋🍁🍄🌾💐🌷🌹🌺🌸🌼🌻🌞⭐🌟✨⚡🔥🌈☀️❄️💧" },
  { n:"Comida y bebida", e:"🍏🍎🍐🍊🍋🍌🍉🍇🍓🫐🍈🍒🍑🥭🍍🥥🥝🍅🥑🥦🥬🥒🌶️🌽🥕🧄🧅🥔🍠🥐🍞🥨🧀🥚🍳🥞🧇🥓🥩🍗🍖🌭🍔🍟🍕🥪🌮🌯🥗🍝🍜🍲🍣🍱🍙🍚🍤🍢🍡🍧🍨🍦🥧🧁🍰🎂🍮🍭🍬🍫🍿🍩🍪🍯🥛☕🍵🧃🥤🧋🍶🍺🍻🥂🍷🥃🍸🍹" },
  { n:"Actividades y objetos", e:"⚽🏀🏈⚾🎾🏐🏉🎱🏓🏸🏒🏑⛳🏹🎣🥊🥋🎽⛸️🎿🏂🏋️🏄🏊🚴🏆🥇🥈🥉🏅🎖️🎫🎪🤹🎭🎨🎬🎤🎧🎼🎹🥁🎷🎺🎸🎻🎲🎯🎳🎮🕹️🧩♟️📱💻⌨️🖥️🖨️📷📸📹🎥📞☎️📺📻🎙️⏰🔋🔌💡🔦🕯️💸💵💴💶💷💰💳💎⚖️🧰🔧🔨🛠️⚙️🧲🔫💣🔪🗡️🛡️🚬🔮📿🧿⚗️🔭🔬💊💉🩸🩺🌡️🧹🧺🧻🚽🚿🛁🧼🪒🧽🧴🔑🗝️🚪🛋️🛏️🧸🖼️🛍️🛒🎁🎈🎀🎊🎉✉️📩📦📝✏️📏📐✂️📌📍" },
  { n:"Viajes y símbolos", e:"🚗🚕🚙🚌🚎🏎️🚓🚑🚒🚚🚛🚜🛴🚲🛵🏍️🚨✈️🚀🛸🚁⛵🚤🚢⚓⛽🚦🗺️🗿🗽🏰🏯🎡🎢🎠⛲🏖️🏝️🏜️🌋⛰️🏔️🏕️🏠🏡🏢🏬🏥🏦🏨🏪🏫⛪🕌✅❌⭕❗❓💯🔴🟠🟡🟢🔵🟣⚫⚪🟤🔶🔷🔸🔹⭐❤️🧡💛💚💙💜🖤🤍💔♻️⚜️🔱" },
];
function splitEmojis(str){ try{ return [...new Intl.Segmenter("es",{granularity:"grapheme"}).segment(str)].map(s=>s.segment); }catch(_){ return Array.from(str); } }

async function boot(){
  const { data:{ session } } = await supa.auth.getSession();
  if(!session){ location.href="index.html"; return; }
  const shell=await mountShell({ active:"productos" });
  st.channelId=shell.channelId;
  shell.onChannel(id=>{ st.channelId=id; st.prod=null; showGrid(); loadProducts(); });
  $("addProduct").onclick = createProduct;
  $("saveBtn").onclick = saveProduct;
  $("delBtn").onclick = deleteProduct;
  $("backBtn").onclick = ()=>{ st.prod=null; showGrid(); loadProducts(); };
  await loadProducts();
}
function showGrid(){ $("gridView").style.display=""; $("detailView").style.display="none"; }
function showDetail(){ $("gridView").style.display="none"; $("detailView").style.display=""; window.scrollTo(0,0); }

async function loadProducts(){
  // Las opciones de compra son la verdad: si un producto tiene más de una, ES
  // multi-opción. Ya no hace falta un checkbox aparte que lo declare.
  const full="id,nombre,config,folder,emoji,tipo,product_versions(id,precio,activo)";
  let { data, error } = await supa.from("products").select(full).eq("channel_id",st.channelId).order("created_at");
  if(error){ ({ data, error } = await supa.from("products").select("id,nombre,config,folder,emoji,tipo").eq("channel_id",st.channelId).order("created_at")); }
  if(error){ ({ data } = await supa.from("products").select("id,nombre,config").eq("channel_id",st.channelId).order("created_at")); }
  st.list=data||[]; renderFolders(); renderCards();
}
// Opciones activas de un producto (para las tarjetas del grid).
function opcionesDe(p){ return (p.product_versions||[]).filter(v=>v.activo!==false); }
function allFolders(){ const s=new Set(st.localFolders); st.list.forEach(x=>{ if(x.folder) s.add(x.folder); }); return [...s].sort(); }
function countIn(v){ if(v==="__all") return st.list.length; if(v==="__none") return st.list.filter(p=>!p.folder).length; return st.list.filter(p=>p.folder===v).length; }
function renderFolders(){
  const isReal=st.folder!=="__all"&&st.folder!=="__none";
  const tabs=[["__all","Todos"],["__none","Sin carpeta"],...allFolders().map(f=>[f,f])];
  $("folders").innerHTML=tabs.map(([v,l])=>`<button class="nodo-folder ${st.folder===v?'on':''}" data-f="${esc(v)}">${v==="__all"||v==="__none"?"":icon("folder")}${esc(l)}<span class="cnt">${countIn(v)}</span></button>`).join("")
    +`<button class="nodo-folder add" id="newFolder">+ Carpeta</button>`
    +(isReal?`<button class="nodo-folder" id="delFolder" style="color:var(--red);border-color:transparent">${icon("trash")} Eliminar carpeta</button>`:"");
  $("folders").querySelectorAll(".nodo-folder[data-f]").forEach(b=> b.onclick=()=>{ st.folder=b.dataset.f; renderFolders(); renderCards(); });
  $("newFolder").onclick=async()=>{ const n=await askText({title:"Nueva carpeta",label:"Nombre de la carpeta",placeholder:"Ej. Cursos",confirmText:"Crear"}); if(n){ st.localFolders.add(n); st.folder=n; renderFolders(); renderCards(); } };
  const df=$("delFolder"); if(df) df.onclick=deleteFolder;
}
async function deleteFolder(){
  const f=st.folder; if(f==="__all"||f==="__none") return;
  const n=countIn(f);
  if(!await confirmDialog(n?{title:"Eliminar carpeta",message:`La carpeta "${f}" tiene ${n} producto(s). Se moverán a "Sin carpeta".`,confirmText:"Continuar"}:{title:"Eliminar carpeta",message:`¿Eliminar la carpeta vacía "${f}"?`,confirmText:"Eliminar",danger:true})) return;
  if(n){ const { error }=await supa.from("products").update({ folder:null }).eq("channel_id",st.channelId).eq("folder",f); if(error){ toast(error.message,true); return; } }
  st.localFolders.delete(f); st.folder="__all"; toast("Carpeta eliminada ✓"); await loadProducts();
}
function renderCards(){
  let list=st.list;
  if(st.folder==="__none") list=list.filter(p=>!p.folder); else if(st.folder!=="__all") list=list.filter(p=>p.folder===st.folder);
  const box=$("cards");
  if(!st.list.length){
    box.innerHTML=`<div class="nodo-empty" style="grid-column:1/-1"><div class="e-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5M12 22V12"/></svg></div><h3>Aún no hay productos</h3><p>Crea tu primer producto para configurar sus versiones, precios y flujos de venta.</p></div>`;
    return;
  }
  box.innerHTML="";
  list.forEach(p=>{
    const el=document.createElement("div"); el.className="nodo-card pcard";
    // El precio y el nº de opciones salen de las Opciones de compra reales.
    const ops=opcionesDe(p);
    const precios=ops.map(o=>o.precio).filter(x=>x!=null&&x!=="");
    const precio = precios.length>1
      ? `S/ ${Math.min(...precios.map(Number))} – ${Math.max(...precios.map(Number))}`
      : precios.length===1 ? `S/ ${esc(precios[0])}`
      : (p.config&&p.config.precio?`S/ ${esc(p.config.precio)}`:"");
    const multi=ops.length>1;
    const emIc = p.emoji ? `<span style="font-size:24px;line-height:1">${esc(p.emoji)}</span>` : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5M12 22V12"/></svg>`;
    el.innerHTML=`
      <div class="c-ic">${emIc}</div>
      <div class="c-tt">${esc(p.nombre)}</div>
      <div class="c-sub">${p.tipo==="fisico"?"Producto físico · envíos":"Producto digital"}</div>
      <div class="c-foot"><span class="nodo-pill neutral">${p.tipo==="fisico"?icon("box")+"Físico":icon("download")+"Digital"}</span><span class="nodo-pill neutral">${multi?`${ops.length} opciones`:'1 opción'}</span>${precio?`<span class="nodo-pill neutral">${precio}</span>`:''}${p.folder?`<span class="nodo-pill neutral">${icon("folder")}${esc(p.folder)}</span>`:''}</div>`;
    el.onclick=()=>openProduct(p.id); box.appendChild(el);
  });
  const add=document.createElement("div"); add.className="nodo-card new";
  add.innerHTML=`<div class="c-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></div><div class="c-tt" style="font-size:14px;font-weight:700">Nuevo producto</div>`;
  add.onclick=createProduct; box.appendChild(add);
}
async function createProduct(){
  const nombre=await askText({title:"Nuevo producto",label:"Nombre del producto",placeholder:"Ej. Zapatillas Runner",confirmText:"Crear"}); if(!nombre) return;
  const folder=(st.folder!=="__all"&&st.folder!=="__none")?st.folder:null;
  let { data,error } = await supa.from("products").insert({ channel_id:st.channelId, nombre, folder }).select("id").single();
  if(error && /folder|column/.test(error.message)){ ({ data,error } = await supa.from("products").insert({ channel_id:st.channelId, nombre }).select("id").single()); }
  if(error){ toast(error.message,true); return; }
  // Todo producto nace con al menos UNA opción de compra: así el modelo no
  // tiene casos especiales (la migración 0029 hizo lo mismo con los viejos) y
  // un producto simple no obliga a configurar nada extra.
  await supa.from("product_versions")
    .insert({ product_id:data.id, nombre:"Única", orden:0, activo:true, cantidad:1, entrega:[] })
    .then(r=>{ if(r.error) console.warn("[productos] sin opción inicial:", r.error.message); });
  await loadProducts(); openProduct(data.id);
}
async function openProduct(id){
  const { data:p } = await supa.from("products").select("*").eq("id",id).maybeSingle();
  const { data:vs } = await supa.from("product_versions").select("*").eq("product_id",id).order("orden");
  st.prod=p; st.versions=vs||[]; st.delVersions=[]; st.tab="receta";
  renderDetail(); showDetail();
}
async function deleteProduct(){
  if(!st.prod) return;
  if(!await confirmDialog({title:"Eliminar producto",message:`¿Eliminar "${esc(st.prod.nombre)}"? Se eliminarán también sus versiones. Esta acción no se puede deshacer.`,confirmText:"Eliminar",danger:true})) return;
  await supa.from("product_versions").delete().eq("product_id",st.prod.id);
  const { error }=await supa.from("products").delete().eq("id",st.prod.id);
  if(error){ toast(error.message,true); return; }
  st.prod=null; toast("Producto eliminado ✓"); showGrid(); await loadProducts();
}

function renderDetail(){
  const d=$("detail"); if(!st.prod) return;
  d.innerHTML=`
    <h1 style="margin:0 0 16px;font-size:23px;font-weight:700;letter-spacing:-.4px">${esc(st.prod.nombre)}</h1>
    <div class="tabs">
      <button class="tab ${st.tab==='receta'?'active':''}" data-t="receta">Receta</button>
      <button class="tab ${st.tab==='datos'?'active':''}" data-t="datos">Datos</button>
      <button class="tab ${st.tab==='opciones'?'active':''}" data-t="opciones">Opciones de compra</button>
      <button class="tab ${st.tab==='extras'?'active':''}" data-t="extras">Ventas extra</button>
      <button class="tab ${st.tab==='flujos'?'active':''}" data-t="flujos">Flujos</button>
      <button class="tab ${st.tab==='activacion'?'active':''}" data-t="activacion">Activación</button>
    </div>
    <div id="tabBody"></div>`;
  d.querySelectorAll(".tab").forEach(b=> b.onclick=()=>{ st.tab=b.dataset.t; renderDetail(); });
  if(st.tab==="receta") renderReceta();
  else if(st.tab==="datos") renderDatos();
  else if(st.tab==="opciones") renderOpciones();
  else if(st.tab==="extras") renderExtras();
  else if(st.tab==="flujos") renderFlujos();
  else renderActivacion();
}

// FAQ del producto: editor de pares P/R que compila a config.faq (texto que
// lee el motor). Se conserva config.faq_items para poder re-editarlo.
function parseFaq(txt){
  if(!txt||!txt.trim()) return [];
  const items=[]; const re=/P(?:regunta)?\s*:?\s*([\s\S]*?)\s*R(?:espuesta)?\s*:?\s*([\s\S]*?)(?=(?:\n\s*P(?:regunta)?\s*:)|$)/gi;
  let m; while((m=re.exec(txt))){ const q=(m[1]||"").trim(), a=(m[2]||"").trim(); if(q||a) items.push({q,a}); }
  if(!items.length) items.push({q:"", a:txt.trim()});
  return items;
}
function compileFaq(items){ return (items||[]).filter(x=>x&&(x.q||x.a)).map(x=>`P: ${(x.q||"").trim()}\nR: ${(x.a||"").trim()}`).join("\n\n"); }

// ── Conocimiento del producto para la IA ────────────────────────────
// Igual que negocio_form→negocio en ia.html: los campos guiados viven en
// config.ia y se COMPILAN a config.contexto_producto, que es lo que el motor
// ya inyecta en el prompt. Así casi todo el rediseño es solo frontend.
const ESTILOS_VENTA={ consultivo:"Consultivo (entiende antes de ofrecer)", directo:"Directo (va al grano y cierra)", educativo:"Educativo (enseña y genera confianza)", urgencia:"Urgencia / Escasez (motiva a decidir ya)", objeciones:"Basado en objeciones (rebate dudas)" };
const AGENCIAS=[["shalom","Shalom"],["olva","Olva"]];
// Monedas frecuentes en LatAm/US/Europa (código ISO + símbolo + país).
const CURRENCIES=[
  ["PEN","S/","Perú — Sol"],["USD","$","EE. UU. — Dólar"],["MXN","$","México — Peso"],
  ["COP","$","Colombia — Peso"],["ARS","$","Argentina — Peso"],["CLP","$","Chile — Peso"],
  ["BOB","Bs","Bolivia — Boliviano"],["EUR","€","Europa — Euro"],["BRL","R$","Brasil — Real"],
  ["UYU","$U","Uruguay — Peso"],["PYG","₲","Paraguay — Guaraní"],["VES","Bs","Venezuela — Bolívar"],
  ["GTQ","Q","Guatemala — Quetzal"],["CRC","₡","Costa Rica — Colón"],["DOP","RD$","Rep. Dominicana — Peso"],
  ["HNL","L","Honduras — Lempira"],["NIO","C$","Nicaragua — Córdoba"],["PAB","B/.","Panamá — Balboa"],
  ["GBP","£","Reino Unido — Libra"],["CAD","$","Canadá — Dólar"],
];
const MODOS_ENVIO=[
  ["cliente","Envío lo paga el cliente al recibir (según la agencia)"],
  ["gratis","Envío gratis en todos los envíos"],
  ["gratis_desde","Envío gratis desde un monto mínimo"],
  ["fijo","Cobro un monto fijo de envío"],
];
const CONFIRM_COD=[["referencia","Referencia de envío"],["mapa","Mapa de ubicación enviado por el cliente"],["rango_fecha","Confirmación de rango de entrega y fecha"]];
const CONFIRM_AG=[["agencia_def","Agencia de envío definida"],["adelanto","Adelanto de pago"],["dni","DNI / Carné de extranjería"]];

function compileConfirmaciones(c,tipo){
  if(tipo!=="fisico") return "";
  const cf=(c.envio&&c.envio.confirmaciones)||{};
  const on=(arr)=>arr.filter(([k])=>cf[k]).map(([,l])=>"- "+l);
  const cod=on(CONFIRM_COD), ag=on(CONFIRM_AG);
  if(!cod.length&&!ag.length) return "";
  const L=["## Requisitos para confirmar el pedido"];
  if(cod.length) L.push("Para pedidos contraentrega, verifica antes de confirmar:\n"+cod.join("\n"));
  if(ag.length) L.push("Para pedidos por agencia, verifica antes de confirmar:\n"+ag.join("\n"));
  return L.join("\n\n");
}
function compileProductoIA(c,tipo){
  const ia=c.ia||{}; const L=[];
  const add=(t,v)=>{ if(v&&String(v).trim()) L.push(`## ${t}\n${String(v).trim()}`); };
  const cv=[];
  if(ia.estilo_venta&&ESTILOS_VENTA[ia.estilo_venta]) cv.push("Estilo de venta: "+ESTILOS_VENTA[ia.estilo_venta]+".");
  if(ia.proceso&&ia.proceso.trim()) cv.push("Proceso de venta:\n"+ia.proceso.trim());
  if(ia.tecnicas&&ia.tecnicas.trim()) cv.push("Técnicas de venta:\n"+ia.tecnicas.trim());
  if(cv.length) L.push("## Cómo vender este producto\n"+cv.join("\n\n"));
  add("Resumen del producto",ia.resumen);
  add("Descripción / detalle",ia.detalle);
  add("Reglas del producto",ia.reglas_producto);
  add("Límites (nunca hacer / no prometer)",ia.limites);
  add("Reglas del precio",ia.reglas_precio);
  // Las ofertas por cantidad ya NO se compilan acá: son Opciones de compra
  // reales (migración 0029) y el motor le inyecta a la IA el catálogo con sus
  // precios de verdad. Tenerlas en dos lados se contradecía.
  add("Precios con descuento",ia.descuentos);
  add("Formas de pago de este producto (tienen PRIORIDAD sobre las generales)",ia.metodos_pago);
  const ej=(ia.ejemplos||[]).filter(e=>e&&(e.sit||e.resp));
  if(ej.length) L.push("## Ejemplos de respuesta\n"+ej.map(e=>`- Si el cliente ${(e.sit||"").trim()} → responde: ${(e.resp||"").trim()}`).join("\n"));
  if(ia.emojis_prohibidos&&ia.emojis_prohibidos.trim()) L.push("## Emojis prohibidos\nNunca uses estos emojis ni de ese estilo: "+ia.emojis_prohibidos.trim());
  const mm=(c.ia_multimedia||[]).filter(m=>m&&m.media_url);
  if(mm.length) L.push("## Archivos que puedes enviar\nCuando la situación lo pida, envía el archivo escribiendo `[[media:TAG]]` en una línea aparte.\n"+mm.map(m=>`- [[media:${m.tag||"archivo"}]] — ${m.descripcion||m.filename||"archivo"}`).join("\n"));
  const req=compileConfirmaciones(c,tipo); if(req) L.push(req);
  return L.join("\n\n");
}
// Asegura la forma nueva de config.envio (tabs por agencia + confirmaciones),
// migrando desde la forma vieja (checkboxes) sin perder el adelanto anterior.
function normalizeEnvio(c){
  let e=c.envio;
  const blankAg=(over)=>Object.assign({ modo:"cliente", precio_min:"", precio_max:"", monto_fijo:"", gratis_desde:"", adelanto_valor:"", adelanto_moneda:"PEN", adelanto_cond:false, rangos:[] }, over||{});
  if(!e || typeof e!=="object") e={};
  if(!e.agencias || Array.isArray(e.agencias) || !e.agencias.shalom){
    const oldVal=e.adelanto_valor ?? 20;
    const oldModo=e.gratis===false?"cliente":"gratis";
    e={ agencia_activa:"shalom",
        agencias:{ shalom:blankAg({adelanto_valor:oldVal,modo:oldModo}), olva:blankAg({adelanto_valor:oldVal,modo:oldModo}) },
        confirmaciones: e.confirmaciones || { referencia:false, mapa:true, rango_fecha:false, agencia_def:true, adelanto:true, dni:true } };
  }
  for(const [k] of AGENCIAS){ e.agencias[k]=blankAg(e.agencias[k]); if(!Array.isArray(e.agencias[k].rangos)) e.agencias[k].rangos=[]; }
  if(!e.agencia_activa) e.agencia_activa="shalom";
  if(!e.confirmaciones) e.confirmaciones={ referencia:false, mapa:true, rango_fecha:false, agencia_def:true, adelanto:true, dni:true };
  c.envio=e; return e;
}

// Sube un archivo y lo agrega a config.ia_multimedia (multimedia que la IA
// enviará sola). Reusa la Edge Function media-upload igual que pickMedia.
function pickProdMedia(kind, onDone, syncCfg){
  const accept={image:"image/*",video:"video/*",document:"*/*"}[kind]||"*/*";
  const inp=document.createElement("input"); inp.type="file"; inp.accept=accept;
  inp.onchange=async()=>{
    const file=inp.files&&inp.files[0]; if(!file) return;
    toast("Subiendo…");
    try{
      const dataURL=await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
      const { data,error }=await supa.functions.invoke("media-upload",{ body:{ channel_id:st.channelId, filename:file.name, content_type:file.type, data:dataURL } });
      if(error||!data?.url){ toast("No se pudo subir el archivo",true); return; }
      const arr=st.prod.config.ia_multimedia=st.prod.config.ia_multimedia||[];
      const base=(file.name||"archivo").replace(/\.[^.]+$/,"").replace(/[^\w-]/g,"").toLowerCase().slice(0,16)||"archivo";
      let tag=base, n=2; while(arr.some(x=>x.tag===tag)) tag=base+n++;
      arr.push({ tag, media_kind:data.kind||kind, media_url:data.url, mime:file.type, filename:file.name, descripcion:"" });
      if(syncCfg) syncCfg();
      toast("Archivo agregado ✓"); if(onDone) onDone();
    }catch(e){ toast("Error al subir",true); }
  };
  inp.click();
}

// Catálogo de lo ofrecible como extra: toda Opción de compra ACTIVA y CON
// PRECIO del bot (de este producto o de cualquier otro). Lo usan la pestaña de
// Ventas extra y el generador de flujo (que puede correr sin haberla abierto).
async function cargarCatalogoExtras(){
  const { data:prods } = await supa.from("products")
    .select("id,nombre,emoji,product_versions(id,nombre,precio,activo)")
    .eq("channel_id",st.channelId).order("nombre");
  const cat=[];
  (prods||[]).forEach(p=>(p.product_versions||[]).forEach(v=>{
    if(v.activo!==false && v.precio!=null && v.precio!=="")
      cat.push({ id:v.id, label:`${p.emoji?p.emoji+" ":""}${p.nombre} · ${v.nombre} — S/ ${v.precio}`, precio:v.precio });
  }));
  st.extraCat=cat;
  return cat;
}

    el.querySelector(".exv").onchange=(e)=>{ x.version_id=e.target.value; };

// ═══════════════════════════════════════════════════════════════════
// LA RECETA — las 9 etapas de una venta, en orden, con su estado.
// Es lo que hace que configurar un producto sea "llenar un formulario" en vez
// de "dibujar un flujo": desde acá se ve qué falta y se GENERA el flujo de
// venta solo. El editor visual sigue existiendo para quien quiera meter mano
// (sigue siendo el corazón de la app) — esto solo evita empezar de cero.
// ═══════════════════════════════════════════════════════════════════
async function renderReceta(){
  const b=$("tabBody");
  b.innerHTML=`<div class="empty">Cargando…</div>`;
  const fisico=(st.prod.tipo||"digital")==="fisico";

  // Estado real de cada etapa (se lee de la base, no se asume).
  const { data:flows } = await supa.from("flows").select("id,nombre,role,estado").eq("product_id",st.prod.id);
  const fIni=(flows||[]).find(f=>f.role==="mensajes_iniciales");
  const fVenta=(flows||[]).find(f=>f.role==="venta");
  let trigs=[];

    </div>
    ${et(1,"Activación","La palabra clave del anuncio (y la IA que entiende variaciones) que arranca el chat.",
      trigs.length?{ok:1,msg:`${trigs.length} disparador(es) configurado(s)`}:{warn:1,msg:"Sin palabras clave: nadie puede iniciar el chat"},

    ${et(3,"IA de ventas","Lo que la IA sabe del producto para venderlo y responder dudas.",
      (st.prod.config?.contexto_producto)?{ok:1,msg:"Conocimiento cargado"}:{warn:1,msg:"Sin conocimiento del producto: la IA no sabrá venderlo"},

    ${et(4,"Opciones de compra","Versiones, packs y ofertas por cantidad: cada una con su precio.",

    ${et(7,"Ventas extra","Ofrecer algo más una vez que pagó, antes o después de entregar.",
      (st.prod.config?.extras||[]).length
        ? {ok:1,msg:`${st.prod.config.extras.length} extra(s) · se ofrecen ${((st.prod.config.extras_momento||"antes")==="antes")?"antes":"después"} de entregar`}

    <div class="card" style="margin-top:18px;border-color:var(--brand-border)">
      <h4 style="margin-top:0;display:flex;align-items:center;gap:7px">${icon("node")} Flujo de venta</h4>

          : `Genera el flujo completo: la <b>IA vende y responde</b>, detecta el comprobante <b>en cualquier momento</b>,

// Salud del producto: lo que impediría vender bien. Se avisa ACÁ, antes de
// publicar — no con un cliente a medio comprar.
function renderSalud(){
  const box=$("saludBox"); if(!box) return;
  const fisico=(st.prod.tipo||"digital")==="fisico";
  const ops=st.versions.filter(v=>v.activo!==false);
  const conPrecio=ops.filter(v=>v.precio!=null&&v.precio!=="");
  const errs=[], warns=[];
  if(!ops.length) errs.push("El producto no tiene ninguna opción de compra activa.");
  if(!conPrecio.length) errs.push("Ninguna opción tiene precio: el validador no puede saber cuánto debe pagar el cliente.");
  if(!fisico){
    const sinEntrega=conPrecio.filter(v=>!(Array.isArray(v.entrega)&&v.entrega.length));
    if(sinEntrega.length) errs.push(`Con precio pero sin entrega: ${sinEntrega.map(v=>`"${v.nombre||"—"}"`).join(", ")}. El cliente pagaría y no recibiría nada.`);
  }
  const metodos=(st.receta?.ch?.ocr_config?.metodos||[]).filter(m=>m&&(m.app||m.numero||m.titular));
  if(!metodos.length) warns.push("El Validador de comprobantes no tiene métodos de pago: la IA no podrá verificar a quién le pagaron.");
  if(!st.receta?.trigs?.length) warns.push("Sin palabras clave: nadie puede iniciar el chat de este producto.");
  if(!st.receta?.fIni) warns.push("Sin mensajes iniciales.");
  if(!st.prod.config?.contexto_producto) warns.push("Sin conocimiento del producto: la IA no sabrá qué vender.");
  const line=(t,c,ic)=>`<div style="display:flex;gap:8px;align-items:flex-start;font-size:12.5px;line-height:1.55;margin-bottom:5px">
    <span style="color:${c};display:inline-flex;flex:none">${icon(ic)}</span><div>${t}</div></div>`;
  box.innerHTML = (errs.length||warns.length)
    ? `<div style="border:1px solid ${errs.length?"var(--red)":"#f0a92b"};background:${errs.length?"rgba(239,68,68,.06)":"rgba(240,169,43,.07)"};border-radius:11px;padding:12px">
        <div style="font-weight:700;font-size:12.5px;margin-bottom:7px">${errs.length?"Esto impide vender":"Revisá esto antes de publicar"}</div>
        ${errs.map(e=>line(e,"var(--red)","alert")).join("")}${warns.map(w=>line(w,"#f0a92b","alert")).join("")}
      </div>`
    : `<div style="display:flex;gap:8px;align-items:center;font-size:12.5px;color:#22c079">
        <span style="display:inline-flex">${icon("check")}</span> Todo listo para vender.</div>`;
}

// Genera el flujo de venta DIGITAL desde la receta. Forma del flujo (IA-first,
// que es como Rodrigo vende de verdad — los esqueletos viejos eran guiones
// rígidos con botones):
//
//   [IA vende] → [espera] → ¿mandó imagen?
//                             ├─ sí → [OCR valida] → ¿pago OK?
//                             │                       ├─ sí → [entregar] → [fin]
//                             │                       └─ no → [pedir de nuevo] → [espera]
//                             └─ no → [IA vende]  (bucle: sigue conversando)
//
// El bucle hace que la IA atienda dudas indefinidamente y que el comprobante se
// detecte en cualquier momento (requisitos 3 y 4).
// Genera el flujo de venta de un producto FÍSICO. A diferencia del digital
// (paga → entrega → fin), este termina cuando se CREA EL PEDIDO: despachar,
// mandar la guía, cobrar el saldo y soltar la clave no los hace el flujo, los
// hace Rodrigo con el Copiloto y el Kanban ("no todo puede ser automatizado").
//
//   [IA vende] ← sabe la zona y pesca datos mientras conversa
//        ↓
//   [escucha] → ¿mandó comprobante?
//     ├─ sí → [valida el adelanto] → ok → [pedido: adelanto validado] → fin
//     │                            └→ [pide de nuevo] → escucha
//     └─ no → ¿de dónde es?
//              ├─ Lima      → ¿datos completos? → [crea pedido CONFIRMADO] → fin
//              └─ Provincia → ¿datos completos? → [crea pedido ESPERANDO ADELANTO]
//                                                  → [le pide el adelanto] → escucha
//
// Las guardas de "¿ya tiene pedido?" usan campo_igual contra "" porque el motor
// no tiene un operador "campo no existe"; sin ellas el bucle crearía un pedido
// nuevo por cada mensaje.
async function generarFlujoFisico(flowId, N, E){
  const cfg=st.prod.config||{};
  const campos=[
    { clave:"nombre", label:"Nombre y apellido", requerido:true },
    { clave:"direccion", label:"Dirección exacta", detalle:"calle y número, o dónde entregar aunque sea impreciso", requerido:true, solo_si_zona:"lima" },
    { clave:"referencia", label:"Referencia", detalle:"algo cerca para ubicarlo", requerido:false, solo_si_zona:"lima" },
    { clave:"dni", label:"DNI", detalle:"8 dígitos, se lo pide la agencia", requerido:true, validar:"dni", solo_si_zona:"provincia" },
    { clave:"sede", label:"Ciudad y sede de la agencia", detalle:"a qué sede de Shalom lo recoge", requerido:true, solo_si_zona:"provincia" },
  ];
  const nVender=await N("ia","La IA vende y toma datos",{
    operacion:"generar_texto", enviar:true, usar_conocimiento:true,
    detectar_opcion:true, detectar_zona:true, campos,
    prompt:"Continúa la conversación de forma natural: responde dudas, explica el valor y guía a la compra. "+
           "Pregúntale a dónde se lo enviamos para saber cómo despacharlo. Pide los datos que falten de a uno, "+
           "sin sonar a formulario. No prometas fechas ni coberturas que el sistema no te haya confirmado.",
  },true,80,240);
  const nEsperar=await N("pregunta","Escuchar al cliente",{ text:"" },false,380,240);
  const nFin=await N("fin","Fin",{},false,2080,240);

  // OJO: acá NO hay rama de "validar el comprobante del adelanto". Eso lo toma
  // el interceptor `maybeAdelanto` del motor, ANTES del flujo, para que respete
  // el selector Manual/Automático de IA · Pedidos en el momento y no según cómo
  // estaba el día que generaste el flujo. Si estaba acá, aprobaría solo aunque
  // hubieras elegido que te consulte.

  // ── Rama Lima (contraentrega: no hay pago por adelantado) ──
  const nEsLima=await N("condicion","¿Es de Lima?",{
    rutas:[{ nombre:"Lima", handle:"ruta:lima", match:"todas",
             condiciones:[{ op:"campo_igual", campo:"zona_entrega", valor:"lima" }] }],
  },false,660,440);
  const nLimaOk=await N("condicion","¿Datos listos? (Lima)",{
    rutas:[{ nombre:"Crear", handle:"ruta:crear", match:"todas",
             condiciones:[
               { op:"campo_igual", campo:"datos_completos", valor:"si" },
               { op:"campo_igual", campo:"pedido_creado", valor:"" }, // aún sin pedido
             ] }],
  },false,960,440);
  const nCrearLima=await N("accion","Crear pedido Lima",{
    acciones:[
      { tipo:"crear_pedido", estado:"confirmado", monto:"{{precio}}",
        datos:{ zona:"lima", zona_nombre:"{{zona_nombre}}", direccion:"{{direccion}}", referencia:"{{referencia}}",
                cliente:"{{nombre}}", opcion:"{{opcion}}", saldo:"{{precio}}", entrega_hoy:"{{entrega_hoy}}" } },
      { tipo:"set_field", key:"pedido_creado", valor:"si" },
      { tipo:"add_tag", valor:"Compra" },
      { tipo:"notify_admin", mensaje:"🛵 PEDIDO LIMA (contraentrega)\nCliente: {{nombre}} (+{{telefono}})\nZona: {{zona_nombre}} · ¿hoy?: {{entrega_hoy}}\nDirección: {{direccion}}\nRef: {{referencia}}\nOpción: {{opcion}} — cobrar S/ {{precio}}" },
    ],
  },false,1240,440);
  const nConfLima=await N("mensaje","Confirmación Lima",{
    bubbles:[{ text:"¡Listo, {{nombre}}! ✅ Tu pedido quedó confirmado.\n\n🛵 Pagas al recibirlo. Te avisamos cuando salga el motorizado." }],
  },false,1520,440);

  // ── Rama Provincia (crea el pedido y recién ahí pide el adelanto) ──
  const nProvOk=await N("condicion","¿Datos listos? (Provincia)",{
    rutas:[{ nombre:"Crear", handle:"ruta:crear", match:"todas",
             condiciones:[
               { op:"campo_igual", campo:"datos_completos", valor:"si" },
               { op:"campo_igual", campo:"zona_entrega", valor:"provincia" },
               { op:"campo_igual", campo:"pedido_creado", valor:"" },
             ] }],
  },false,960,640);
  const nCrearProv=await N("accion","Crear pedido Provincia",{
    acciones:[
      { tipo:"crear_pedido", estado:"esperando_adelanto", monto:"{{precio}}",
        datos:{ zona:"provincia", sede:"{{sede}}", dni:"{{dni}}", cliente:"{{nombre}}",
                opcion:"{{opcion}}", adelanto:"{{adelanto}}", saldo:"{{precio}}" } },
      { tipo:"set_field", key:"pedido_creado", valor:"si" },
      { tipo:"notify_admin", mensaje:"📦 PEDIDO PROVINCIA por confirmar\nCliente: {{nombre}} (+{{telefono}})\nDNI: {{dni}}\nSede: {{sede}}\nOpción: {{opcion}} — total S/ {{precio}}\nEsperando adelanto de S/ {{adelanto}}" },
    ],
  },false,1240,640);
  const nPedirAdel=await N("mensaje","Pedir el adelanto",{
    bubbles:[{ text:"¡Perfecto! 🙌 Para despachar tu pedido a la agencia, confírmalo con un adelanto de *S/ {{adelanto}}*.\n\n{{datos_pago}}\n\nCuando lo hagas, mándame la captura y lo verifico al toque." }],
  },false,1520,640);

  await E(nVender,"exito",nEsperar);
  // Sin rama de imagen: el comprobante del adelanto lo intercepta el motor
  // antes de llegar acá. Lo que sigue es la conversación de venta.
  await E(nEsperar,"continuar",nEsLima);
  await E(nEsLima,"ruta:lima",nLimaOk);
  await E(nEsLima,"si_no_cumple",nProvOk);
  await E(nLimaOk,"ruta:crear",nCrearLima);
  await E(nLimaOk,"si_no_cumple",nVender);      // le faltan datos → sigue conversando
  await E(nCrearLima,"continuar",nConfLima);
  await E(nConfLima,"continuar",nFin);
  await E(nProvOk,"ruta:crear",nCrearProv);
  await E(nProvOk,"si_no_cumple",nVender);      // faltan datos o zona desconocida
  await E(nCrearProv,"continuar",nPedirAdel);
  await E(nPedirAdel,"continuar",nEsperar);     // ahora espera el comprobante
}

async function generarFlujoVenta(){
  const ops=st.versions.filter(v=>v.activo!==false && v.precio!=null && v.precio!=="");
  if(!ops.length){ toast("Primero cargá al menos una opción con precio",true); return; }
  const ya=st.receta.fVenta;
  if(!await confirmDialog({
    title: ya?"Regenerar flujo de venta":"Generar flujo de venta",
    message: ya?`Esto REESCRIBE por completo "${esc(ya.nombre)}". Si lo editaste a mano en el editor visual, esos cambios se pierden.`
               :"Se creará el flujo de venta con la IA como vendedora. Después podés editarlo en el editor visual.",
    confirmText: ya?"Regenerar":"Generar", danger: !!ya })) return;

  toast("Generando…");
  try{
    let flowId=ya?.id;
    if(flowId){
      await supa.from("flow_edges").delete().eq("flow_id",flowId);
      await supa.from("flow_nodes").delete().eq("flow_id",flowId);
      await supa.from("flows").update({ nombre:`Venta · ${st.prod.nombre}`, estado:"borrador" }).eq("id",flowId);
    }else{
      const { data,error } = await supa.from("flows").insert({
        channel_id:st.channelId, product_id:st.prod.id, nombre:`Venta · ${st.prod.nombre}`,
        role:"venta", kind:"flow", estado:"borrador",
        descripcion:`Venta de ${st.prod.nombre} con IA. Generado desde la receta.`,
      }).select("id").single();
      if(error){ toast(error.message,true); return; }
      flowId=data.id;
    }

    const N=async(tipo,nombre,config,es_inicial,x,y)=>{
      const { data,error } = await supa.from("flow_nodes")
        .insert({ flow_id:flowId, tipo, nombre, config, es_inicial:!!es_inicial, pos_x:x, pos_y:y })
        .select("id").single();
      if(error) throw new Error(error.message);
      return data.id;
    };
    const E=async(from,handle,to)=>{
      const { error }=await supa.from("flow_edges")
        .insert({ flow_id:flowId, source_node:from, source_handle:handle, target_node:to });
      if(error) throw new Error(error.message);
    };

    // El físico tiene otra forma: no entrega nada por chat, termina al crear el
    // pedido. Lo demás (despacho, guía, saldo, clave) lo opera un humano.
    if((st.prod.tipo||"digital")==="fisico"){
      await generarFlujoFisico(flowId, N, E);
      toast("Flujo de venta generado ✓");
      st.tab="receta"; renderDetail();
      return;
    }

    const nVender=await N("ia","La IA vende",{
      operacion:"generar_texto", enviar:true, usar_conocimiento:true, detectar_opcion:true,
      prompt:"Continúa la conversación con el cliente de forma natural. Responde sus dudas, explica el valor del producto, "+
             "maneja sus objeciones y guíalo a la compra. Cuando decida comprar, dile el precio de la opción que eligió y "+
             "pásale los datos de pago ({{datos_pago}}). No inventes precios ni promesas.",
    },true,80,220);
    const nEsperar=await N("pregunta","Escuchar al cliente",{ text:"" },false,380,220);
    const nEsImg=await N("condicion","¿Mandó comprobante?",{
      rutas:[{ nombre:"Es imagen", handle:"ruta:es_imagen", match:"todas",
               condiciones:[{ op:"campo_igual", campo:"last_input_type", valor:"image" }] }],
    },false,660,220);
    const nOcr=await N("ia","Validar el pago",{
      operacion:"analizar_imagen", perfil:"ocr", usar_validador:true, enviar:false, guardar_en:"pago_resultado",
      prompt:"Analiza la imagen adjunta con las reglas del validador. Si el pago es VÁLIDO y por el monto correcto, "+
             "responde exactamente PAGO_OK. Si no, responde PAGO_NO y en una frase el motivo.",
    },false,960,120);
    const nPagoOk=await N("condicion","¿Pago válido?",{
      rutas:[{ nombre:"Pago OK", handle:"ruta:pago_ok", match:"todas",
               condiciones:[{ op:"campo_contiene", campo:"pago_resultado", valor:"PAGO_OK" }] }],
    },false,1240,120);
    const nRegistrar=await N("accion","Registrar la venta",{
      acciones:[
        { tipo:"add_tag", valor:"Compra" },
        { tipo:"notify_admin", mensaje:"💰 VENTA · {{producto_nombre}}\nOpción: {{opcion}}\nCliente: {{nombre}} (+{{telefono}})\nMonto: S/ {{precio}}\nFecha: {{fecha_hora}}", foto:"{{ultima_imagen}}" },
      ],
    },false,1520,120);
    const nEntregar=await N("accion","Entregar el producto",{
      acciones:[{ tipo:"entregar", mensaje:"¡Pago confirmado! 🎉 Acá tienes tu acceso:" }],
    },false,1800,120);
    const nFin=await N("fin","Fin",{},false,2080,120);
    const nRe=await N("mensaje","Pedir el comprobante de nuevo",{
      bubbles:[{ text:"Mmm, no pude validar ese comprobante 🤔\n\n{{pago_resultado}}\n\n¿Me lo reenvías? Si tienes alguna duda, dime nomás." }],
    },false,960,340);

    await E(nVender,"exito",nEsperar);
    await E(nEsperar,"continuar",nEsImg);
    await E(nEsImg,"ruta:es_imagen",nOcr);
    await E(nEsImg,"si_no_cumple",nVender);      // bucle: sigue conversando
    await E(nOcr,"exito",nPagoOk);
    await E(nPagoOk,"ruta:pago_ok",nRegistrar);
    await E(nPagoOk,"si_no_cumple",nRe);
    await E(nRe,"continuar",nEsperar);           // vuelve a escuchar
    // OJO: las aristas de salida de nEntregar y nRegistrar se crean abajo según
    // haya extras y en qué momento. Dos aristas con el MISMO handle desde el
    // mismo nodo harían que nextNode elija una al azar.

    // ── Cadena de ventas extra (order bump) ──
    // "antes"  (Método 2, el que más convierte): paga → se le ofrecen los
    //          extras → recién ahí se entrega todo.
    // "despues": paga → se entrega → se le ofrecen los extras.
    // En AMBOS, si rechaza o no contesta, se entrega lo que ya pagó: nunca se
    // retiene un producto pagado por esperar un upsell.
    const cfg=st.prod.config||{};
    const extras=(Array.isArray(cfg.extras)?cfg.extras:[]).filter(x=>x&&x.version_id);
    const antes=(cfg.extras_momento||"antes")==="antes";
    const esperaSeg=Math.max(60,(Number(cfg.extras_espera_min)||15)*60);
    // El catálogo puede no estar cargado si nunca se abrió la pestaña de extras
    // (se puede generar el flujo directo desde la Receta).
    if(extras.length && !st.extraCat) await cargarCatalogoExtras();

    if(!extras.length){
      await E(nRegistrar,"continuar",nEntregar);
      await E(nEntregar,"continuar",nFin);
    }else{
      // Dónde cae la cadena cuando termina (rechazo, timeout o extras agotados).
      const salida = antes ? nEntregar : nFin;
      const cat=st.extraCat||[];
      const ofrecs=[], entregas=[];
      for(let i=0;i<extras.length;i++){
        const x=extras[i];
        const info=cat.find(c=>c.id===x.version_id);
        const y=520+i*420;
        const precio=info?.precio ?? "";
        const nOfr=await N("mensaje",`Ofrecer extra ${i+1}`,{
          bubbles:[{ text:x.mensaje||`¿Le sumas ${info?info.label:"el extra"}? 🎁` }],
        },false,80,y);
        const nEsp=await N("pregunta",`Esperar respuesta (extra ${i+1})`,{ text:"", timeout_seg:esperaSeg },false,380,y);
        const nImg=await N("condicion",`¿Mandó pago? (extra ${i+1})`,{
          rutas:[{ nombre:"Es imagen", handle:"ruta:es_imagen", match:"todas",
                   condiciones:[{ op:"campo_igual", campo:"last_input_type", valor:"image" }] }],
        },false,660,y);
        const nOcrX=await N("ia",`Validar pago del extra ${i+1}`,{
          operacion:"analizar_imagen", perfil:"ocr", usar_validador:true, enviar:false,
          guardar_en:`pago_extra_${i+1}`, monto_esperado:String(precio),
          prompt:`Analiza la imagen. Si el pago es VÁLIDO y por S/ ${precio}, responde exactamente PAGO_OK. Si no, responde PAGO_NO y el motivo en una frase.`,
        },false,940,y-90);
        const nOkX=await N("condicion",`¿Pago OK? (extra ${i+1})`,{
          rutas:[{ nombre:"Pago OK", handle:"ruta:pago_ok", match:"todas",
                   condiciones:[{ op:"campo_contiene", campo:`pago_extra_${i+1}`, valor:"PAGO_OK" }] }],
        },false,1220,y-90);
        const nDarX=await N("accion",`Entregar extra ${i+1}`,{
          acciones:[
            { tipo:"entregar", version_id:x.version_id, mensaje:"¡Listo! 🎉 Acá va tu extra:" },
            { tipo:"notify_admin", mensaje:`🎁 VENTA EXTRA · ${info?info.label:""}\nCliente: {{nombre}} (+{{telefono}})\nFecha: {{fecha_hora}}`, foto:"{{ultima_imagen}}" },
          ],
        },false,1500,y-90);
        const nReX=await N("mensaje",`Reintentar pago (extra ${i+1})`,{
          bubbles:[{ text:`No pude validar ese pago 🤔 {{pago_extra_${i+1}}}\n\n¿Me lo reenvías?` }],
        },false,1220,y+90);
        // Corte inteligente: entiende "no gracias" / "ya tengo" / "dale" sin botones.
        const nClas=await N("ia",`¿Lo quiere? (extra ${i+1})`,{
          operacion:"clasificar", guardar_en:`extra_${i+1}_resp`, default:"duda", umbral:0.6,
          que:"Qué está diciendo el cliente sobre la oferta adicional",
          opciones:[
            { clave:"acepta", label:"Acepta", detalle:"Dice que sí, lo quiere, pregunta cómo pagarlo" },
            { clave:"rechaza", label:"Rechaza", detalle:"Dice que no, que no le interesa, que ya lo tiene, que solo quiere lo que compró" },
            { clave:"duda", label:"Duda o pregunta", detalle:"Pide más información, no decide todavía" },
          ],
        },false,940,y+90);
        const nRech=await N("condicion",`¿Dijo que no? (extra ${i+1})`,{
          rutas:[{ nombre:"Rechaza", handle:"ruta:rechaza", match:"todas",
                   condiciones:[{ op:"campo_igual", campo:`extra_${i+1}_resp`, valor:"rechaza" }] }],
        },false,1220,y+240);
        const nResp=await N("ia",`Responder sobre el extra ${i+1}`,{
          operacion:"generar_texto", enviar:true, usar_conocimiento:true, detectar_opcion:false,
          prompt:`El cliente está viendo una oferta adicional (${info?info.label:"el extra"}). Responde su duda de forma breve `+
                 `y ayúdalo a decidir, sin presionar. Si quiere, pásale los datos de pago ({{datos_pago}}).`,
        },false,1500,y+240);

        primero.push(nOfr);
        await E(nOfr,"continuar",nEsp);
        await E(nEsp,"timeout",salida);          // no contestó → se entrega igual
        await E(nEsp,"continuar",nImg);
        await E(nImg,"ruta:es_imagen",nOcrX);
        await E(nImg,"si_no_cumple",nClas);
        await E(nOcrX,"exito",nOkX);
        await E(nOkX,"ruta:pago_ok",nDarX);
        await E(nOkX,"si_no_cumple",nReX);
        await E(nReX,"continuar",nEsp);
        await E(nClas,"exito",nRech);
        await E(nRech,"ruta:rechaza",salida);    // corte de TODA la cadena
        await E(nRech,"si_no_cumple",nResp);
        await E(nResp,"exito",nEsp);
        ofrecs.push(nOfr); entregas.push(nDarX);
      }
      // Encadenado: pagar un extra lleva al ofrecimiento del siguiente; el
      // último cierra la cadena por la salida.
      for(let i=0;i<entregas.length;i++){
        await E(entregas[i],"continuar", i+1<ofrecs.length ? ofrecs[i+1] : salida);
      }
      // Entrada a la cadena según el momento elegido.
      if(antes){
        await E(nRegistrar,"continuar",ofrecs[0]);
        await E(nEntregar,"continuar",nFin);     // la salida de la cadena
      }else{
        await E(nRegistrar,"continuar",nEntregar);
        await E(nEntregar,"continuar",ofrecs[0]); // entregó y ahora ofrece
      }
    }

    toast("Flujo de venta generado ✓");
    st.tab="receta"; renderDetail();
  }catch(e){ toast("Error al generar: "+(e.message||e),true); }
}

// ── Opciones de compra ─────────────────────────────────────────────
// UN solo concepto que unifica lo que antes eran tres cosas sueltas:
// "versiones" (Básico/Premium), "packs" y "ofertas por cantidad". Para el
// sistema las tres tienen la misma forma: algo comprable, con nombre, precio y
// algo que entrega. Es lo que la IA detecta del texto libre del cliente y lo
// que el validador de pagos usa como MONTO ESPERADO. Ver migración 0029.
function renderOpciones(){
  const b=$("tabBody");
  const fisico=(st.prod.tipo||"digital")==="fisico";
  const cfg=st.prod.config=st.prod.config||{};
  if(!Array.isArray(cfg.atributos)) cfg.atributos=[];
  b.innerHTML=`
    <div class="card" style="border-color:var(--brand-border)">
      <h4 style="display:flex;align-items:center;gap:7px;margin-top:0">${icon("productos")} Opciones de compra</h4>
      <div style="font-size:13px;color:var(--muted);line-height:1.6">
        Todo lo que el cliente puede comprar de este producto. Las <b>versiones</b> (Básico/Premium),
        los <b>packs</b> y las <b>ofertas por cantidad</b> son lo mismo: una opción con su precio y lo que entrega.
        La IA detecta cuál eligió aunque lo escriba a su manera, y el validador de pagos usa ese precio
        como <b>monto esperado</b>.
      </div>
    </div>
    <div id="opList"></div>
    <div id="opWarn"></div>
    <button class="btn" id="opAdd">+ Opción de compra</button>
    <div class="card" style="margin-top:18px">
      <h4 style="display:flex;align-items:center;gap:7px;margin-top:0">${icon("edit")} Atributos</h4>
      <div style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:12px">
        Detalles que la IA debe capturar pero que <b>no cambian el precio</b> (talla, color…).
        Si algo cambia el precio o lo que se entrega, no es un atributo: es una opción de compra.
      </div>
      <div id="atList"></div>
      <button class="btn" id="atAdd" style="margin-top:8px">+ Atributo</button>
    </div>`;
  paintOpciones(fisico);
  paintAtributos();
  $("opAdd").onclick=()=>{
    st.versions.push({ nombre:"", precio:"", cantidad:1, descripcion:"", entrega:[], activo:true, orden:st.versions.length });
    paintOpciones(fisico);
  };
  $("atAdd").onclick=()=>{ cfg.atributos.push({ nombre:"", obligatorio:true }); paintAtributos(); };
}

function paintOpciones(fisico){
  const box=$("opList"); box.innerHTML="";
  if(!st.versions.length){
    box.innerHTML=`<div class="nodo-empty" style="padding:20px">Sin opciones todavía. Agregá al menos una (si el producto es simple, alcanza con una llamada "Única").</div>`;
  }
  st.versions.forEach((v,i)=>{
    const el=document.createElement("div"); el.className="card";
    el.innerHTML=`
      <div class="row" style="align-items:flex-end;gap:10px">
        <div style="flex:1.4"><label style="margin-top:0">Nombre</label>
          <input class="in on" value="${esc(v.nombre||"")}" placeholder="Ej. Premium · 2 pares · Pack familiar"/></div>
        <div style="flex:0 0 110px"><label style="margin-top:0">Precio</label>
          <input class="in op" type="number" step="0.01" min="0" value="${esc(v.precio??"")}"/></div>
        ${fisico?`<div style="flex:0 0 95px"><label style="margin-top:0">Unidades</label>
          <input class="in oc" type="number" min="1" value="${esc(v.cantidad??1)}"/></div>`:""}
        <label class="chk" style="flex:0 0 auto;margin-bottom:9px"><input type="checkbox" class="oa" ${v.activo!==false?"checked":""}/> Activa</label>
        <button class="iconbtn odel" style="flex:0 0 auto;margin-bottom:6px" title="Eliminar">${icon("trash")}</button>
      </div>
      <label>Descripción <span style="color:var(--faint);font-weight:400">(para que la IA sepa venderla y reconocerla)</span></label>
      <input class="in odesc" value="${esc(v.descripcion||"")}" placeholder="Ej. Incluye los planos y el pack de herramientas"/>
      <label style="margin-top:12px">Qué entrega <span style="color:var(--faint);font-weight:400">(uno o varios links y/o archivos)</span></label>
      <div class="oe" style="margin-top:5px"></div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <button class="btn oel" style="height:32px">${icon("link")} Link</button>
        <button class="btn oef" style="height:32px">${icon("file")} Archivo</button>
      </div>`;
    el.querySelector(".on").oninput=(e)=>{ v.nombre=e.target.value; };
    el.querySelector(".op").oninput=(e)=>{ v.precio=e.target.value; warnColision(); };
    const oc=el.querySelector(".oc"); if(oc) oc.oninput=(e)=>{ v.cantidad=parseInt(e.target.value,10)||1; };
    el.querySelector(".oa").onchange=(e)=>{ v.activo=e.target.checked; warnColision(); };
    el.querySelector(".odesc").oninput=(e)=>{ v.descripcion=e.target.value; };
    el.querySelector(".odel").onclick=async()=>{
      if(!await confirmDialog({title:"Eliminar opción",message:`¿Eliminar "${esc(v.nombre||"esta opción")}"? Los pedidos ya hechos con ella no se tocan.`,confirmText:"Eliminar",danger:true})) return;
      if(v.id) st.delVersions.push(v.id);
      st.versions.splice(i,1); paintOpciones(fisico);
    };
    el.querySelector(".oel").onclick=async()=>{
      const url=await askText({title:"Link de entrega",label:"Pegá el link (Drive, curso, acceso…)",placeholder:"https://…"});
      if(!url) return;
      const nombre=await askText({title:"Nombre del link",label:"¿Cómo se llama? (opcional)",placeholder:"Ej. Curso completo"});
      v.entrega=Array.isArray(v.entrega)?v.entrega:[];
      v.entrega.push({ tipo:"link", url, nombre:nombre||"" });
      paintEntrega(el,v,fisico);
    };
    el.querySelector(".oef").onclick=()=>pickEntregaFile(v,()=>paintEntrega(el,v,fisico));
    paintEntrega(el,v,fisico);
    box.appendChild(el);
  });
  warnColision();
}

function paintEntrega(el,v,fisico){
  const box=el.querySelector(".oe"); box.innerHTML="";
  const items=v.entrega=Array.isArray(v.entrega)?v.entrega:[];
  if(!items.length){ box.innerHTML=`<div style="font-size:12px;color:var(--faint);padding:2px 0">Sin entrega configurada.</div>`; return; }
  items.forEach((it,j)=>{
    const r=document.createElement("div"); r.className="row"; r.style.cssText="align-items:center;margin-bottom:6px;gap:7px";
    r.innerHTML=`<span style="flex:0 0 auto;color:var(--muted);display:inline-flex">${icon(it.tipo==="archivo"?"file":"link")}</span>
      <input class="in en" style="flex:0 0 170px" value="${esc(it.nombre||"")}" placeholder="Nombre"/>
      <input class="in eu" style="flex:1" value="${esc(it.url||"")}" ${it.tipo==="archivo"?"readonly":""}/>
      <button class="iconbtn edel" style="flex:0 0 auto">${icon("trash")}</button>`;
    r.querySelector(".en").oninput=(e)=>{ it.nombre=e.target.value; };
    r.querySelector(".eu").oninput=(e)=>{ it.url=e.target.value; };
    r.querySelector(".edel").onclick=()=>{ items.splice(j,1); paintEntrega(el,v,fisico); };
    box.appendChild(r);
  });
}

// Sube un archivo de entrega (PDF, zip…) y lo agrega a la opción.
function pickEntregaFile(v,onDone){
  const inp=document.createElement("input"); inp.type="file";
  inp.onchange=async()=>{
    const file=inp.files&&inp.files[0]; if(!file) return;
    toast("Subiendo…");
    try{
      const dataURL=await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
      const { data,error }=await supa.functions.invoke("media-upload",{ body:{ channel_id:st.channelId, filename:file.name, content_type:file.type, data:dataURL } });
      if(error||!data?.url){ toast("No se pudo subir el archivo",true); return; }
      v.entrega=Array.isArray(v.entrega)?v.entrega:[];
      v.entrega.push({ tipo:"archivo", url:data.url, nombre:(file.name||"").replace(/\.[^.]+$/,""), filename:file.name, media_kind:data.kind||"document" });
      toast("Archivo agregado ✓"); if(onDone) onDone();
    }catch(e){ toast("Error al subir",true); }
  };
  inp.click();
}

// Si dos opciones ACTIVAS cuestan lo mismo, el monto pagado no alcanza para
// saber cuál eligió el cliente y la IA tendrá que confirmarlo por texto. Se
// avisa acá, al configurar — no en producción con una venta a medias.
function warnColision(){
  const box=$("opWarn"); if(!box) return;
  const act=st.versions.filter(v=>v.activo!==false && v.precio!=="" && v.precio!=null && !isNaN(Number(v.precio)));
  const seen={}, dup=[];
  act.forEach(v=>{ const k=String(Number(v.precio)); if(seen[k] && !dup.includes(k)) dup.push(k); seen[k]=true; });
  box.innerHTML = dup.length ? `
    <div class="card" style="border-color:#f0a92b;background:rgba(240,169,43,.07)">
      <div style="display:flex;gap:10px;align-items:flex-start;font-size:12.5px;line-height:1.6">
        <span style="color:#f0a92b;display:inline-flex;flex:none">${icon("alert")}</span>
        <div>Hay opciones activas con el <b>mismo precio</b> (${dup.map(d=>"S/ "+d).join(", ")}).
        El monto que pague no alcanzará para saber cuál eligió, así que la IA tendrá que
        <b>confirmárselo por texto</b> antes de entregar. Si preferís que el pago lo resuelva solo,
        dales precios distintos.</div>
      </div>
    </div>` : "";
}

function paintAtributos(){
  const cfg=st.prod.config; const box=$("atList"); box.innerHTML="";
  if(!cfg.atributos.length){ box.innerHTML=`<div style="font-size:12px;color:var(--faint);padding:2px 0">Sin atributos.</div>`; }
  cfg.atributos.forEach((a,i)=>{
    const r=document.createElement("div"); r.className="row"; r.style.cssText="align-items:center;margin-bottom:7px;gap:7px";
    r.innerHTML=`<input class="in an" style="flex:1" value="${esc(a.nombre||"")}" placeholder="Ej. Talla, Color"/>
      <label class="chk" style="flex:0 0 auto"><input type="checkbox" class="ao" ${a.obligatorio!==false?"checked":""}/> Obligatorio</label>
      <button class="iconbtn adel" style="flex:0 0 auto">${icon("trash")}</button>`;
    r.querySelector(".an").oninput=(e)=>{ a.nombre=e.target.value; };
    r.querySelector(".ao").onchange=(e)=>{ a.obligatorio=e.target.checked; };
    r.querySelector(".adel").onclick=()=>{ cfg.atributos.splice(i,1); paintAtributos(); };
    box.appendChild(r);
  });
}

// ═══ Pestaña Activación: COMPOSITOR de mensajes iniciales ═══════════
// "Cómo empieza el chat": disparadores (palabras clave + ad_id) + mensajes
// iniciales con ROTACIÓN de copy (variantes con pesos) + "y después".
// Por debajo = un flujo "Bienvenida" con UN nodo `rotador` (self-contained).
function newVariant(idx){
  return { id:crypto.randomUUID(), nombre:"Variante "+String.fromCharCode(65+(idx||0)), activo:true, peso:1, bubbles:[{text:""}] };
}
async function renderActivacion(){
  const b=$("tabBody");
  b.innerHTML=`<div id="actroot"><div class="empty">Cargando…</div></div>`;
  const root=$("actroot");
  const { data:flow } = await supa.from("flows").select("id,nombre,estado,role")
    .eq("product_id",st.prod.id).eq("role","mensajes_iniciales").eq("kind","flow").maybeSingle();
  st.act={ flow:flow||null, node:null, kw:null, ad:null, others:[] };
  if(!flow){
    root.innerHTML=`<div class="card">
      <h4>${icon("message")}Mensajes iniciales</h4>
      <div style="font-size:13px;color:var(--muted);margin:8px 0 14px;line-height:1.55">Los mensajes con los que arranca el chat cuando el cliente escribe tu palabra clave (o llega desde tu anuncio). Podés crear <b>varias versiones que el bot rota</b> para variar el copy y reducir el riesgo de baneo.</div>
      <button class="btn primary" id="createWelcome">Crear mensajes iniciales</button></div>`;
    $("createWelcome").onclick=createWelcome;
    return;
  }
  const { data:nodes } = await supa.from("flow_nodes").select("id,tipo,config,es_inicial").eq("flow_id",flow.id);
  let node=(nodes||[]).find(n=>n.tipo==="rotador")||(nodes||[]).find(n=>n.es_inicial);
  if(!node){
    const { data:nn } = await supa.from("flow_nodes").insert({ flow_id:flow.id, tipo:"rotador", nombre:"Mensajes iniciales", es_inicial:true, config:{activo:true,variantes:[newVariant(0)],despues:{modo:"nada"}}, pos_x:80, pos_y:80 }).select("id,tipo,config,es_inicial").single();
    node=nn;
  }
  const { data:trigs } = await supa.from("flow_triggers").select("id,tipo,config,activo").eq("flow_id",flow.id);
  const { data:others } = await supa.from("flows").select("id,nombre,estado,role").eq("product_id",st.prod.id).eq("kind","flow").neq("id",flow.id).order("created_at");
  node.config=node.config||{};
  if(!Array.isArray(node.config.variantes)) node.config.variantes=[];
  if(!node.config.variantes.length) node.config.variantes.push(newVariant(0));
  if(node.config.activo===undefined) node.config.activo=true;
  node.config.despues=node.config.despues||{modo:"nada"};
  st.act={ flow, node, kw:(trigs||[]).find(t=>t.tipo==="keyword")||null, ad:(trigs||[]).find(t=>t.tipo==="referral")||null, others:others||[] };
  renderComposer();
}
async function createWelcome(){
  const { data:flow, error } = await supa.from("flows").insert({
    channel_id:st.channelId, product_id:st.prod.id, kind:"flow", role:"mensajes_iniciales",
    nombre:"Mensajes iniciales · "+st.prod.nombre, estado:"activo"
  }).select("id").single();
  if(error){ toast(error.message,true); return; }
  await supa.from("flow_nodes").insert({ flow_id:flow.id, tipo:"rotador", nombre:"Mensajes iniciales", es_inicial:true, config:{activo:true,variantes:[newVariant(0)],despues:{modo:"nada"}}, pos_x:80, pos_y:80 });
  toast("Mensajes iniciales creados ✓"); renderActivacion();
}

// Lee los valores editables del DOM a memoria (antes de re-render o guardar).
function harvest(){
  const cfg=st.act.node.config;
  document.querySelectorAll("#actroot [data-vi]").forEach(vc=>{
    const vi=+vc.dataset.vi; const v=cfg.variantes[vi]; if(!v) return;
    const nm=vc.querySelector(".vname"); if(nm) v.nombre=nm.value;
    const pw=vc.querySelector(".vpeso"); if(pw) v.peso=Math.max(0,Number(pw.value)||0);
    vc.querySelectorAll("[data-bi]").forEach(bc=>{
      const bi=+bc.dataset.bi; const bub=v.bubbles[bi]; if(!bub) return;
      const tx=bc.querySelector(".btext"); if(tx) bub.text=tx.value;
      const cp=bc.querySelector(".bcap"); if(cp) bub.caption=cp.value;
    });
  });
  const des=st.act.node.config.despues;
  const dm=$("actDespues"); if(dm) des.modo=dm.value;
  const df=$("actFlow"); if(df) des.flow_id=df.value||null;
}

function renderComposer(){
  const root=$("actroot"); const cfg=st.act.node.config;
  const kws=st.act.kw?(st.act.kw.config?.keywords||[]).join(", "):"";
  const match=st.act.kw?.config?.match||"contiene";
  const ads=st.act.ad?(st.act.ad.config?.ad_ids||[]).join(", "):"";
  const des=cfg.despues||{modo:"nada"};
  const activeVars=cfg.variantes.filter(v=>v.activo!==false);
  const pesoTotal=activeVars.reduce((a,v)=>a+Math.max(0,Number(v.peso??1)),0)||1;
  root.innerHTML=`
    <div class="card">
      <h4>${icon("activity")}Disparadores — cómo se activa</h4>
      <div style="font-size:12px;color:var(--faint);margin:4px 0 12px">Palabras clave (cada anuncio puede traer la suya) y, opcional, los <b>ID de anuncio</b> de Meta que activan este producto sin depender del texto.</div>
      <label style="font-size:11.5px;color:var(--muted);font-weight:600">Palabras / frases clave</label>
      <div class="row" style="margin:6px 0 0">
        <input class="in" id="actKw" style="flex:1;min-width:200px" placeholder="quiero info, precio, cuánto cuesta" value="${esc(kws)}"/>
        <select class="sel" id="actMatch" style="flex:0 0 130px">
          <option value="contiene"${match==="contiene"?" selected":""}>Contiene</option>
          <option value="empieza"${match==="empieza"?" selected":""}>Empieza</option>
          <option value="exacta"${match==="exacta"?" selected":""}>Exacta</option>
        </select>
      </div>
      <label style="font-size:11.5px;color:var(--muted);font-weight:600;display:block;margin-top:12px">ID de anuncio (ad_id) — opcional</label>
      <input class="in" id="actAds" style="margin-top:6px" placeholder="120210000..., 120210111... (separados por coma)" value="${esc(ads)}"/>
    </div>

    <div class="card">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="flex:1"><h4 style="margin:0">${icon("message")}Mensajes iniciales</h4>
          <div style="font-size:12px;color:var(--faint);margin-top:3px">Varias versiones que el bot rota por peso. Cada versión puede tener uno o varios mensajes.</div></div>
        <div style="text-align:right"><div style="font-size:11px;color:var(--muted);font-weight:600;margin-bottom:4px">Rotación</div>
          <div class="sw ${cfg.activo!==false?'on':''}" id="rotSw" title="Activar/desactivar rotación"></div></div>
      </div>
      ${cfg.activo===false?`<div style="font-size:11.5px;color:var(--amber);margin-top:10px">Rotación apagada: se envía siempre la primera versión activa.</div>`:``}
      <div id="varList" style="margin-top:14px;display:flex;flex-direction:column;gap:14px"></div>
      <button class="btn" id="addVar" style="margin-top:14px;background:transparent;border:1px solid var(--border);color:var(--text)">+ Agregar versión</button>
    </div>

    <div class="card">
      <h4>${icon("secuencias")}Y después de los mensajes iniciales</h4>
      <div class="row" style="margin-top:8px">
        <select class="sel" id="actDespues" style="flex:0 0 220px">
          <option value="nada"${des.modo==="nada"?" selected":""}>Nada (solo los mensajes)</option>
          <option value="flujo"${des.modo==="flujo"?" selected":""}>Continuar a un flujo</option>
        </select>
        <select class="sel" id="actFlow" style="flex:1;min-width:180px;${des.modo==="flujo"?"":"display:none"}">
          <option value="">— Elegí el flujo (venta / IA) —</option>
          ${st.act.others.filter(f=>f.estado==="activo").map(f=>`<option value="${f.id}"${des.flow_id===f.id?" selected":""}>${esc(f.nombre)}</option>`).join("")}
        </select>
      </div>
      <div style="font-size:11.5px;color:var(--faint);margin-top:8px">Para "responda la IA", elegí un flujo cuyo primer nodo sea de IA. Los flujos se clonan en la pestaña <b>Flujos</b>.</div>
    </div>

    <div style="display:flex;gap:10px;align-items:center;margin-bottom:20px">
      <button class="btn primary" id="saveWelcome">Guardar mensajes iniciales</button>
      <a class="linkbtn" href="editor.html?flow=${st.act.flow.id}">${icon("flujos")}Abrir en editor visual</a>
    </div>`;

  // Rotación toggle
  $("rotSw").onclick=()=>{ harvest(); cfg.activo=cfg.activo===false?true:false; renderComposer(); };
  $("addVar").onclick=()=>{ harvest(); cfg.variantes.push(newVariant(cfg.variantes.length)); renderComposer(); };
  $("actDespues").onchange=(e)=>{ harvest(); cfg.despues.modo=e.target.value; renderComposer(); };
  $("saveWelcome").onclick=saveWelcome;

  // Variantes
  const vl=$("varList");
  cfg.variantes.forEach((v,vi)=>{
    const share=v.activo!==false?Math.round(Math.max(0,Number(v.peso??1))/pesoTotal*100):0;
    const card=document.createElement("div"); card.dataset.vi=vi;
    card.style.cssText="border:1px solid var(--border);border-radius:12px;padding:14px;background:var(--surface-2,rgba(255,255,255,.02))";
    card.innerHTML=`
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <input class="in vname" style="flex:1;font-weight:700;height:34px" value="${esc(v.nombre||('Variante '+String.fromCharCode(65+vi)))}"/>
        <div style="display:flex;align-items:center;gap:5px"><span style="font-size:11px;color:var(--muted)">Peso</span>
          <input class="in vpeso" type="number" min="0" step="1" style="width:58px;height:34px;text-align:center" value="${Number(v.peso??1)}"/>
          <span style="font-size:11px;color:var(--brand);font-weight:700;min-width:34px">${v.activo!==false?share+'%':'—'}</span></div>
        <div class="sw ${v.activo!==false?'on':''}" data-vact title="Activar/pausar"></div>
        <button class="iconbtn vdelVar" title="Eliminar versión">${icon("trash")}</button>
      </div>
      <div class="bubbles" style="display:flex;flex-direction:column;gap:8px"></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:9px">
        <button class="btn addb" data-k="text" style="height:30px;padding:0 10px;font-size:12px;background:transparent;border:1px solid var(--border);color:var(--text)">+ Texto</button>
        <button class="btn addb" data-k="image" style="height:30px;padding:0 10px;font-size:12px;background:transparent;border:1px solid var(--border);color:var(--text)">+ Imagen</button>
        <button class="btn addb" data-k="video" style="height:30px;padding:0 10px;font-size:12px;background:transparent;border:1px solid var(--border);color:var(--text)">+ Video</button>
        <button class="btn addb" data-k="audio" style="height:30px;padding:0 10px;font-size:12px;background:transparent;border:1px solid var(--border);color:var(--text)">+ Audio</button>
      </div>`;
    // Toggle / peso / delete variante
    card.querySelector("[data-vact]").onclick=()=>{ harvest(); v.activo=v.activo===false?true:false; renderComposer(); };
    card.querySelector(".vdelVar").onclick=async()=>{ if(cfg.variantes.length<=1){ toast("Debe quedar al menos una versión",true); return; } if(!await confirmDialog({title:"Eliminar versión",message:"¿Eliminar esta versión del mensaje?",confirmText:"Eliminar",danger:true}))return; harvest(); cfg.variantes.splice(vi,1); renderComposer(); };
    card.querySelector(".vpeso").oninput=(e)=>{ v.peso=Math.max(0,Number(e.target.value)||0); };
    // Burbujas
    const bb=card.querySelector(".bubbles");
    (v.bubbles||[]).forEach((bub,bi)=> bb.appendChild(renderBubble(v,vi,bub,bi)));
    card.querySelectorAll(".addb").forEach(btn=> btn.onclick=()=>{
      harvest(); const k=btn.dataset.k;
      if(k==="text"){ v.bubbles.push({text:""}); renderComposer(); }
      else pickMedia(vi,k);
    });
    vl.appendChild(card);
  });
}

function renderBubble(v,vi,bub,bi){
  const el=document.createElement("div"); el.dataset.bi=bi;
  el.style.cssText="border:1px solid var(--border);border-radius:9px;padding:9px 10px;background:var(--surface)";
  const isMedia=!!bub.media_url;
  const kind=bub.media_kind||"text";
  const tIco={text:"note",image:"image",video:"video",audio:"mic",document:"file"}[kind]||"note";
  let preview="";
  if(kind==="image") preview=`<img src="${esc(bub.media_url)}" style="max-width:140px;max-height:100px;border-radius:7px;display:block;margin-bottom:7px"/>`;
  else if(kind==="video") preview=`<video src="${esc(bub.media_url)}" style="max-width:180px;max-height:120px;border-radius:7px;display:block;margin-bottom:7px" controls></video>`;
  else if(kind==="audio") preview=`<audio src="${esc(bub.media_url)}" style="height:34px;margin-bottom:7px;display:block" controls></audio>`;
  else if(kind==="document") preview=`<div style="font-size:12px;margin-bottom:7px;display:flex;align-items:center;gap:5px">${icon("file")} ${esc(bub.filename||"documento")}</div>`;
  el.innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:${isMedia?'8px':'6px'}">
      <span style="display:inline-flex;color:var(--muted)">${icon(tIco)}</span>
      <span style="font-size:11px;color:var(--muted);font-weight:600;flex:1">${kind==="text"?"Texto":kind.charAt(0).toUpperCase()+kind.slice(1)}</span>
      <button class="iconbtn bup" title="Subir">▲</button>
      <button class="iconbtn bdown" title="Bajar">▼</button>
      <button class="iconbtn bdel" title="Quitar">${icon("trash")}</button>
    </div>
    ${preview}
    ${kind==="text"
      ? `<textarea class="in btext" rows="2" style="height:auto;min-height:52px;padding:8px 10px;line-height:1.45;font-family:var(--font);resize:vertical" placeholder="Escribe el mensaje… puedes usar {{nombre}}, {{precio}}…">${esc(bub.text||"")}</textarea>`
      : (kind!=="audio"?`<input class="in bcap" placeholder="Texto/caption (opcional)" value="${esc(bub.caption||"")}"/>`:``)}`;
  el.querySelector(".bdel").onclick=()=>{ harvest(); v.bubbles.splice(bi,1); if(!v.bubbles.length) v.bubbles.push({text:""}); renderComposer(); };
  el.querySelector(".bup").onclick=()=>{ if(bi===0)return; harvest(); [v.bubbles[bi-1],v.bubbles[bi]]=[v.bubbles[bi],v.bubbles[bi-1]]; renderComposer(); };
  el.querySelector(".bdown").onclick=()=>{ if(bi>=v.bubbles.length-1)return; harvest(); [v.bubbles[bi+1],v.bubbles[bi]]=[v.bubbles[bi],v.bubbles[bi+1]]; renderComposer(); };
  return el;
}

function pickMedia(vi,kind){
  const accept={image:"image/*",video:"video/*",audio:"audio/*"}[kind]||"*/*";
  const inp=document.createElement("input"); inp.type="file"; inp.accept=accept;
  inp.onchange=async()=>{
    const file=inp.files&&inp.files[0]; if(!file) return;
    toast("Subiendo…");
    try{
      const dataURL=await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
      const { data,error }=await supa.functions.invoke("media-upload",{ body:{ channel_id:st.channelId, filename:file.name, content_type:file.type, data:dataURL } });
      if(error||!data?.url){ toast("No se pudo subir el archivo",true); return; }
      st.act.node.config.variantes[vi].bubbles.push({ media_kind:data.kind||kind, media_url:data.url, mime:file.type, filename:file.name, caption:"" });
      toast("Archivo agregado ✓"); renderComposer();
    }catch(e){ toast("Error al subir",true); }
  };
  inp.click();
}

async function saveWelcome(){
  harvest();
  const cfg=st.act.node.config;
  // Limpia burbujas de texto vacías; descarta variantes sin burbujas.
  cfg.variantes.forEach(v=>{ v.bubbles=(v.bubbles||[]).filter(b=> b.media_url || (b.text&&b.text.trim())); });
  cfg.variantes=cfg.variantes.filter(v=> v.bubbles.length);
  if(!cfg.variantes.length) cfg.variantes.push(newVariant(0));
  if(cfg.despues.modo==="flujo" && !cfg.despues.flow_id){ toast("Elegí a qué flujo continuar",true); return; }
  const { error:eN }=await supa.from("flow_nodes").update({ config:cfg }).eq("id",st.act.node.id);
  if(eN){ toast(eN.message,true); return; }
  // Disparadores
  const kwArr=($("actKw").value||"").split(",").map(s=>s.trim()).filter(Boolean);
  const match=$("actMatch").value;
  await saveTrigger("keyword", "kw", kwArr.length?{keywords:kwArr,match}:null);
  const adArr=($("actAds").value||"").split(",").map(s=>s.trim()).filter(Boolean);
  await saveTrigger("referral", "ad", adArr.length?{ad_ids:adArr}:null);
  toast("Guardado ✓"); renderActivacion();
}
async function saveTrigger(tipo, key, config){
  const existing=st.act[key];
  if(config){
    if(existing){ await supa.from("flow_triggers").update({config}).eq("id",existing.id); }
    else { await supa.from("flow_triggers").insert({ channel_id:st.channelId, flow_id:st.act.flow.id, tipo, config, activo:true }); }
  } else if(existing){ await supa.from("flow_triggers").delete().eq("id",existing.id); }
}

async function saveProduct(){
  if(!st.prod){ return; }
  // Recompila el conocimiento del producto a config.contexto_producto (lo que
  // el motor inyecta) por si se guarda sin haber tocado el formulario.
  if(st.prod.config){ const cx=compileProductoIA(st.prod.config, st.prod.tipo||"digital"); if(cx) st.prod.config.contexto_producto=cx; else delete st.prod.config.contexto_producto; }
  const base={ nombre:st.prod.nombre, config:st.prod.config||{}, updated_at:new Date().toISOString() };
  let { error:e1 } = await supa.from("products").update({ ...base, folder:st.prod.folder||null, emoji:st.prod.emoji||null, tipo:st.prod.tipo||"digital" }).eq("id",st.prod.id);
  if(e1 && /tipo|column/.test(e1.message)){ ({ error:e1 } = await supa.from("products").update({ ...base, folder:st.prod.folder||null, emoji:st.prod.emoji||null }).eq("id",st.prod.id)); if(!e1) toast("Guardado (aplica 0022 para el tipo físico)"); }
  if(e1 && /folder|emoji|column/.test(e1.message)){ ({ error:e1 } = await supa.from("products").update(base).eq("id",st.prod.id)); if(!e1) toast("Guardado (aplica 0018 para carpeta/emoji)"); }
  if(e1){ toast(e1.message,true); return; }
  // ── Opciones de compra (migración 0029) ──
  // Primero las eliminadas: antes se marcaba v._delete pero nunca se borraban
  // de la base, así que "eliminar" no eliminaba nada al recargar.
  for(const id of (st.delVersions||[])){
    const { error } = await supa.from("product_versions").delete().eq("id",id);
    if(error){ toast(error.message,true); return; }
  }
  st.delVersions=[];
  for(let i=0;i<st.versions.length;i++){
    const v=st.versions[i]; v.orden=i; v.product_id=st.prod.id;
    const row={
      product_id:st.prod.id, nombre:v.nombre||"Única", orden:i,
      precio:(v.precio===""||v.precio==null)?null:Number(v.precio),
      cantidad:Number(v.cantidad)||1,
      descripcion:v.descripcion||null,
      entrega:Array.isArray(v.entrega)?v.entrega:[],
      activo:v.activo!==false,
      price_list:v.price_list||[], drive_link:v.drive_link||null, // legado
    };
    if(v.id) row.id=v.id;
    let { data, error } = await supa.from("product_versions").upsert(row).select("id").single();
    if(error && /precio|entrega|descripcion|activo|cantidad|column/.test(error.message)){
      // Resiliente: si 0029 no está aplicada, guarda al menos lo viejo.
      const legacy={ product_id:st.prod.id, nombre:v.nombre||"Única", price_list:v.price_list||[], drive_link:v.drive_link||null, orden:i };
      if(v.id) legacy.id=v.id;
      ({ data, error } = await supa.from("product_versions").upsert(legacy).select("id").single());
      if(!error) toast("Guardado (aplica 0029 para las opciones de compra)");
    }
    if(error){ toast(error.message,true); return; }
    if(!v.id && data) v.id=data.id;
  }
  toast("Guardado ✓"); loadProducts();
}
boot();
</script>
