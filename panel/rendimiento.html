<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script>try{document.documentElement.dataset.theme=localStorage.getItem("nodo.theme")||"dark"}catch(e){}</script>
<title>Nodo · Rendimiento</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png" />
<link rel="stylesheet" href="shell.css" />
<style>
  :root{
    --bg:#0e1116; --surface:#151a21; --surface-2:#1b222c; --border:#232b36; --border-2:#2b3644;
    --text:#e7ecf2; --muted:#8a97a8; --faint:#5c6675;
    --brand:#2b7fff; --brand-2:#1e6ff0; --brand-bg:#12233f;
    --green:#22c079; --green-bg:#10281d; --amber:#f0a92b; --amber-bg:#2c2311; --red:#e2564a; --red-bg:#2c1615;
    --violet:#8b5cf6; --violet-bg:#1e1633;
    --font:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box} html,body{height:100%;margin:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px}
  button{font-family:inherit;cursor:pointer}
  .num{font-variant-numeric:tabular-nums}

  .demopill{display:inline-flex;align-items:center;gap:7px;background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:800;letter-spacing:.3px;white-space:nowrap}
  .demopill .d{width:7px;height:7px;border-radius:50%;background:currentColor}
  .okpill{display:inline-flex;align-items:center;gap:7px;background:var(--green-bg);color:var(--green);border:1px solid var(--green);border-radius:20px;padding:5px 12px;font-size:11.5px;font-weight:700;white-space:nowrap}

  .notice{margin:2px 0 18px;display:flex;gap:11px;align-items:flex-start;background:var(--brand-bg);border:1px solid #2b7fff55;border-radius:13px;padding:12px 15px;font-size:12.5px;line-height:1.5}
  .notice svg{width:17px;height:17px;color:var(--brand);flex:none;margin-top:1px}
  .notice a{color:var(--brand);font-weight:700;text-decoration:none}

  /* Toolbar */
  .toolbar{display:flex;gap:9px 14px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  .tlabel{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);font-weight:700}
  .chips{display:flex;gap:4px;background:var(--surface-2);border:1px solid var(--border);border-radius:11px;padding:3px}
  .chip{border:none;background:none;color:var(--muted);font:inherit;font-size:12.5px;font-weight:600;padding:6px 11px;border-radius:8px;cursor:pointer}
  .chip.on{background:var(--brand);color:#fff;font-weight:700}
  .seg{display:flex;gap:4px;background:var(--surface-2);border:1px solid var(--border);border-radius:11px;padding:3px;margin-left:auto}
  .seg button{border:none;background:none;color:var(--muted);font:inherit;font-size:12.5px;font-weight:700;padding:7px 14px;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
  .seg button.on{background:var(--brand);color:#fff}
  .seg svg{width:14px;height:14px}
  .colbtn{position:relative}
  .colbtn>button{height:34px;padding:0 13px;border-radius:10px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;gap:7px}
  .colbtn>button:hover{border-color:var(--brand)}
  .colbtn svg{width:14px;height:14px}
  .colpop{position:absolute;top:calc(100% + 6px);right:0;z-index:40;width:230px;max-height:320px;overflow:auto;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:6px;box-shadow:0 14px 36px rgba(0,0,0,.45);display:none;flex-direction:column;gap:1px}
  .colpop.show{display:flex}
  .colpop .gl{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--faint);font-weight:800;padding:8px 8px 3px}
  .colpop label{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:7px;font-size:12.5px;font-weight:600;cursor:pointer}
  .colpop label:hover{background:var(--surface-2)}
  .colpop input{accent-color:var(--brand);width:15px;height:15px}

  /* Selector de rango de fechas (estilo Meta Ads) */
  .drpicker{position:relative}
  .drtrigger{height:34px;padding:0 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;gap:8px;white-space:nowrap}
  .drtrigger:hover{border-color:var(--brand)}
  .drtrigger svg{width:14px;height:14px;color:var(--muted);flex:none}
  .drpop{position:absolute;top:calc(100% + 6px);left:0;z-index:50;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:0 18px 48px rgba(0,0,0,.45);display:none}
  .drpop.show{display:flex}
  .drpresets{width:186px;border-right:1px solid var(--border);padding:8px;display:flex;flex-direction:column;gap:1px;max-height:392px;overflow:auto}
  .drpreset{display:flex;align-items:center;gap:10px;text-align:left;background:none;border:none;color:var(--text);font-size:12.5px;font-weight:600;padding:8px 10px;border-radius:8px;cursor:pointer}
  .drpreset:hover{background:var(--surface-2)}
  .drpreset .drrad{width:15px;height:15px;border-radius:50%;border:2px solid var(--border);flex:none}
  .drpreset.on{color:var(--brand)} .drpreset.on .drrad{border-color:var(--brand);box-shadow:inset 0 0 0 3px var(--surface),inset 0 0 0 6px var(--brand)}
  .drright{display:flex;flex-direction:column}
  .drcal{padding:14px 16px}
  .drmonths{display:flex;gap:26px}
  .drmonth{width:224px}
  .drmhead{display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:13px;margin-bottom:8px;text-transform:capitalize}
  .drnav{background:none;border:none;color:var(--muted);cursor:pointer;padding:3px;border-radius:6px;display:inline-flex}
  .drnav:hover{background:var(--surface-2);color:var(--text)} .drnav svg{width:16px;height:16px}
  .drgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
  .drdow{font-size:9.5px;color:var(--faint);text-align:center;font-weight:700;padding:2px 0}
  .drday{height:28px;border:none;background:none;color:var(--text);font-size:12px;border-radius:7px;cursor:pointer;font-variant-numeric:tabular-nums;padding:0}
  .drday:hover{background:var(--surface-2)}
  .drday.muted{visibility:hidden;pointer-events:none}
  .drday.inrange{background:var(--brand-bg);border-radius:0}
  .drday.edge{background:var(--brand);color:#fff;font-weight:700}
  .drday.edge.start{border-radius:7px 0 0 7px} .drday.edge.end{border-radius:0 7px 7px 0}
  .drday.edge.start.end{border-radius:7px}
  .drfoot{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 16px;border-top:1px solid var(--border)}
  .drfoot .lbl{font-size:12.5px;color:var(--text);line-height:1.5}
  .drfoot .acts{display:flex;gap:8px;flex:none}
  .drfoot .btn{height:34px;padding:0 15px;border-radius:9px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-size:12.5px;font-weight:700}
  .drfoot .btn.primary{background:var(--brand);border-color:transparent;color:#fff}
  @media(max-width:720px){ .drpop{position:fixed;left:8px;right:8px;top:auto;overflow:auto;max-height:80vh} .drpop.show{display:block} .drmonths{flex-direction:column;gap:14px} }

  /* KPI strip */
  .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 15px}
  .kpi .k{font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700;display:flex;align-items:center;gap:6px}
  .kpi .kd{width:8px;height:8px;border-radius:2px}
  .kpi .v{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-top:5px}
  .kpi .s{font-size:11px;color:var(--faint);margin-top:2px}

  /* Table */
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
  .scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;min-width:760px}
  thead th{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--faint);font-weight:700;text-align:right;padding:12px 13px;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--surface);position:sticky;top:0}
  thead th:first-child{text-align:left}
  tbody td{padding:11px 13px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap;font-size:13px}
  tbody tr:last-child td{border-bottom:none}
  tbody td:first-child{text-align:left}
  .nm{display:flex;align-items:center;gap:9px}
  .nm .em{font-size:16px}
  .nm .t1{font-weight:600;font-size:13px}
  .tag{font-size:9px;font-weight:800;letter-spacing:.3px;padding:2px 7px;border-radius:11px;flex:none}
  .tag.digital{background:var(--violet-bg);color:var(--violet)}
  .tag.lima{background:var(--brand-bg);color:var(--brand)}
  .tag.provincia{background:var(--amber-bg);color:var(--amber)}
  .tag.fisico{background:var(--green-bg);color:var(--green)}
  tr.camp{background:var(--surface-2)}
  tr.camp td{border-bottom:1px solid var(--border-2);font-weight:700;cursor:pointer}
  tr.camp .t1{font-weight:800}
  .caret{display:inline-flex;width:15px;height:15px;color:var(--muted);transition:transform .15s}
  tr.camp.closed .caret{transform:rotate(-90deg)}
  tr.adset .adname{font-size:11px;text-transform:uppercase;letter-spacing:.4px;font-weight:700;color:var(--muted);padding-left:25px}
  tr.ad td:first-child{padding-left:25px}
  tr.ad{cursor:pointer}
  tr.ad:hover{background:var(--surface-2)}
  tr.ad .drill{opacity:0;color:var(--brand)}
  tr.ad:hover .drill{opacity:1}
  .hide{display:none}
  .money{font-weight:700}
  .pos{color:var(--green)} .neg{color:var(--red)}
  .roas{display:inline-flex;align-items:center;gap:6px;justify-content:flex-end;font-weight:800}
  .roas .rd{width:7px;height:7px;border-radius:50%;background:currentColor}
  .roas.g{color:var(--green)} .roas.a{color:var(--amber)} .roas.r{color:var(--red)}
  tfoot td{padding:12px 13px;border-top:2px solid var(--border-2);font-weight:800;text-align:right;background:var(--surface-2);font-size:13px}
  tfoot td:first-child{text-align:left;text-transform:uppercase;font-size:10.5px;letter-spacing:.5px;color:var(--muted)}

  /* Drill-down */
  .back{display:inline-flex;align-items:center;gap:7px;background:none;border:none;color:var(--brand);font-size:13px;font-weight:700;padding:0;margin-bottom:14px}
  .back svg{width:16px;height:16px}
  .dhd{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:6px}
  .dhd .em{font-size:26px}
  .dhd h2{margin:0;font-size:20px;font-weight:800;letter-spacing:-.3px}
  .dhd .ctx{font-size:12px;color:var(--muted);margin-top:2px}
  .dgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0}
  .chartcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:15px 16px}
  .chartcard h3{margin:0 0 3px;font-size:13px;font-weight:700}
  .chartcard .cs{font-size:11.5px;color:var(--faint);margin-bottom:10px}
  .legend{display:flex;gap:14px;font-size:11px;color:var(--muted);font-weight:600;margin-top:8px}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:-1px}
  svg.chart{width:100%;height:150px;display:block;overflow:visible}
  @media (max-width:760px){ .kpis{grid-template-columns:repeat(2,1fr)} .dgrid{grid-template-columns:1fr} .seg{margin-left:0} }
</style>
</head>
<body>
<div class="nodo-page">
  <div class="nodo-wrap">
    <div class="nodo-head">
      <div class="grow">
        <h1 class="nodo-title">Rendimiento</h1>
        <p class="nodo-lead">El gasto de tus anuncios de Meta cruzado con la venta <b>real</b> de Nodo — tu CPA de confirmación, tu CPA real y tu ganancia neta, por anuncio y por producto. Toca un anuncio para ver su detalle día por día.</p>
      </div>
      <div class="nodo-actions" id="statusSlot"></div>
    </div>

    <div id="noticeSlot"></div>
    <div id="view"></div>
  </div>
</div>

<script type="module">
import { supa, mountShell, icon } from "./shell.js";
import * as O from "./orders.js";
const $=(id)=>document.getElementById(id);
const st={ channelId:null, adAccounts:[], syncError:null, vista:"anuncio", tipo:"all", account:"all", cols:new Set(), sel:null, range:null, rows:[], loaded:false };
function visibleRows(){ return st.rows.filter(r=>(st.tipo==="all"||r.tag===st.tipo) && (st.account==="all"||r.account_id===st.account)); }

const money=(v)=>{ const s=v<0?"-":""; return s+"S/ "+Math.abs(v).toLocaleString("es-PE",{minimumFractionDigits:2,maximumFractionDigits:2}); };
const money0=(v)=>"S/ "+Math.round(v).toLocaleString("es-PE");
const nf=(v,d=0)=>Number(v).toLocaleString("es-PE",{minimumFractionDigits:d,maximumFractionDigits:d});
const pct=(v)=>nf(v*100,2)+"%";
const esc=(s)=>(s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const TAGLBL={digital:"DIGITAL",lima:"LIMA",provincia:"PROVINCIA",fisico:"FÍSICO"};

// ── Datos REALES ────────────────────────────────────────────────────
// El gasto/entrega sale de ads_insights + ads_meta (los baja ads-sync desde
// Meta); las ventas/margen salen de orders atribuidos por shipping.ad_id (ya
// los tiene Nodo). Se cruzan por ad_id. Mientras no haya sincronización, las
// tablas están vacías → la sección muestra su estado vacío.
const ymd=(d)=>{ const x=new Date(d); return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}-${String(x.getDate()).padStart(2,"0")}`; };
async function loadData(){
  st.rows=[]; st.loaded=false;
  const cid=st.channelId; if(!cid){ st.loaded=true; return; }
  const r=st.range||computePreset("30d"); const from=ymd(r.from), to=ymd(r.to);
  let insR={data:[]}, metaR={data:[]}, ordR={data:[]};
  try{ [insR,metaR,ordR]=await Promise.all([
    supa.from("ads_insights").select("ad_id,fecha,gasto,impresiones,alcance,clics,clics_wa").eq("channel_id",cid).gte("fecha",from).lte("fecha",to),
    supa.from("ads_meta").select("ad_id,ad_name,adset_name,campaign_name,account_id").eq("channel_id",cid),
    supa.from("orders").select("estado,amount,order_bumps,currency,shipping,product_id,created_at,product:product_id(nombre,emoji,tipo,config)").eq("channel_id",cid).not("shipping->>ad_id","is",null).gte("created_at",from).lte("created_at",to+"T23:59:59"),
  ]); }catch(_){ st.loaded=true; return; }
  const meta=Object.fromEntries((metaR.data||[]).map(m=>[m.ad_id,m]));
  const byAd={};
  const getRow=(adId)=>{ if(!byAd[adId]){ const m=meta[adId]||{}; byAd[adId]={ ad_id:adId, account_id:m.account_id||null, campaign:m.campaign_name||"— sin campaña —", adset:m.adset_name||"—", name:m.ad_name||("Anuncio "+String(adId).slice(-6)), tag:null, prod:null, prodTag:null, gasto:0,impr:0,alcance:0,clics:0,clicsWA:0,conf:0,ventas:0,ingresos:0,_margen:0,neta:0, daily:{} }; } return byAd[adId]; };
  const day=(row,f)=>{ if(!row.daily[f]) row.daily[f]={gasto:0,impr:0,clics:0,conf:0,ventas:0,ingresos:0}; return row.daily[f]; };
  (insR.data||[]).forEach(i=>{ const row=getRow(i.ad_id); row.gasto+=+i.gasto||0; row.impr+=+i.impresiones||0; row.alcance+=+i.alcance||0; row.clics+=+i.clics||0; row.clicsWA+=+i.clics_wa||0; const d=day(row,i.fecha); d.gasto+=+i.gasto||0; d.impr+=+i.impresiones||0; d.clics+=+i.clics||0; });
  (ordR.data||[]).forEach(o=>{ const adId=o.shipping&&o.shipping.ad_id; if(!adId) return; const row=getRow(adId); const e=O.EST[o.estado]||{}; const esConf=!!e.venta && !e.perdido; const esVenta=e.cobro==="todo"; const tot=O.total(o); const mg=O.margen(o,o.product,1); const f=(o.created_at||"").slice(0,10); const d=day(row,f);
    if(esConf){ row.conf++; d.conf++; }
    if(esVenta){ row.ventas++; row.ingresos+=tot; row._margen+=(mg==null?tot:mg); d.ventas++; d.ingresos+=tot; }
    if(!row.tag){ const z=O.zonaDe(o); row.tag=z==="lima"?"lima":z==="provincia"?"provincia":"digital"; }
    if(!row.prod && o.product){ row.prod=(o.product.emoji?o.product.emoji+" ":"")+(o.product.nombre||""); row.prodTag=o.product.tipo==="fisico"?"fisico":"digital"; }
  });
  Object.values(byAd).forEach(row=>{ row.neta=row._margen-row.gasto; });   // ganancia neta = margen − gasto de ads
  st.rows=Object.values(byAd); st.loaded=true;
}
async function reload(){ await loadData(); render(); }

// Todas las métricas derivadas de una fila de totales.
function metrics(a){
  return {
    gasto:a.gasto, impr:a.impr, alcance:a.alcance, frec:a.alcance?a.impr/a.alcance:0,
    clics:a.clics, ctr:a.impr?a.clics/a.impr:0, cpm:a.impr?a.gasto/a.impr*1000:0, cpc:a.clics?a.gasto/a.clics:0,
    clicsWA:a.clicsWA, conf:a.conf, cpaConf:a.conf?a.gasto/a.conf:0,
    ventas:a.ventas, cpaReal:a.ventas?a.gasto/a.ventas:0, ingresos:a.ingresos,
    neta:a.neta, roas:a.gasto?a.ingresos/a.gasto:0,
  };
}
const sumAds=(arr)=>{ const k=["gasto","impr","alcance","clics","clicsWA","conf","ventas","ingresos","neta"]; const o={}; k.forEach(x=>o[x]=0); arr.forEach(a=>k.forEach(x=>o[x]+=a[x])); return o; };

// Catálogo de columnas: key, label, grupo, cómo se pinta, y si es fija.
const COLS=[
  {k:"gasto",  l:"Gasto",         g:"Inversión", fix:true,  cell:m=>`<td class="num money">${money0(m.gasto)}</td>`},
  {k:"impr",   l:"Impresiones",   g:"Entrega",   cell:m=>`<td class="num">${nf(m.impr)}</td>`},
  {k:"alcance",l:"Alcance",       g:"Entrega",   cell:m=>`<td class="num">${nf(m.alcance)}</td>`},
  {k:"frec",   l:"Frecuencia",    g:"Entrega",   cell:m=>`<td class="num">${nf(m.frec,2)}</td>`},
  {k:"clics",  l:"Clics",         g:"Entrega",   cell:m=>`<td class="num">${nf(m.clics)}</td>`},
  {k:"ctr",    l:"CTR",           g:"Entrega",   cell:m=>`<td class="num">${pct(m.ctr)}</td>`},
  {k:"cpm",    l:"CPM",           g:"Entrega",   cell:m=>`<td class="num">${money(m.cpm)}</td>`},
  {k:"cpc",    l:"CPC",           g:"Entrega",   cell:m=>`<td class="num">${money(m.cpc)}</td>`},
  {k:"clicsWA",l:"Clics a WhatsApp",g:"Entrega", cell:m=>`<td class="num">${nf(m.clicsWA)}</td>`},
  {k:"conf",   l:"Confirmaciones",g:"Ventas",    fix:true,  cell:m=>`<td class="num">${m.conf}</td>`},
  {k:"cpaConf",l:"CPA conf.",     g:"Ventas",    fix:true,  cell:m=>`<td class="num">${money(m.cpaConf)}</td>`},
  {k:"ventas", l:"Ventas reales", g:"Ventas",    fix:true,  cell:m=>`<td class="num">${m.ventas}</td>`},
  {k:"cpaReal",l:"CPA real",      g:"Ventas",    fix:true,  cell:m=>`<td class="num">${money(m.cpaReal)}</td>`},
  {k:"ingresos",l:"Ingresos",     g:"Dinero",    cell:m=>`<td class="num money">${money0(m.ingresos)}</td>`},
  {k:"neta",   l:"Ganancia neta", g:"Dinero",    fix:true,  cell:m=>`<td class="num money ${m.neta<0?'neg':'pos'}">${money(m.neta)}</td>`},
  {k:"roas",   l:"ROAS",          g:"Dinero",    fix:true,  cell:m=>{ const c=m.roas>=2?'g':m.roas>=1?'a':'r'; return `<td class="num"><span class="roas ${c}"><span class="rd"></span>${nf(m.roas,2)}×</span></td>`; }},
];
const DEFAULT_ON=new Set(["gasto","conf","cpaConf","ventas","cpaReal","neta","roas"]);

function visibleCols(){ return COLS.filter(c=>c.fix||st.cols.has(c.k)); }
function headRow(first){ return `<th>${first}</th>`+visibleCols().map(c=>`<th>${c.l}</th>`).join(""); }
function cells(m){ return visibleCols().map(c=>c.cell(m)).join(""); }

function boot(){
  supa.auth.getSession().then(async({data:{session}})=>{
    if(!session){ location.href="index.html"; return; }
    const shell=await mountShell({ active:"rendimiento" });
    st.channelId=shell.channelId;
    st.cols=new Set(DEFAULT_ON); st.range=computePreset("30d");
    shell.onChannel(id=>{ st.channelId=id; st.sel=null; loadAccount(); });
    await loadAccount();
  });
}
async function loadAccount(){

// ── Selector de rango de fechas (estilo Meta Ads) ──────────────────
const DR_DOW=["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
const DR_MES=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
const DR_MESL=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
const d0=(x)=>{ const d=new Date(x); d.setHours(0,0,0,0); return d; };
const dAdd=(x,n)=>{ const d=new Date(x); d.setDate(d.getDate()+n); return d; };
const dSame=(a,b)=>a&&b&&a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
const dFmt=(d)=>`${d.getDate()} ${DR_MES[d.getMonth()]} ${d.getFullYear()}`;
const PRESETS=[
  ["hoy","Hoy",()=>{const t=d0(new Date());return[t,t];}],
  ["ayer","Ayer",()=>{const y=dAdd(d0(new Date()),-1);return[y,y];}],
  ["7d","Últimos 7 días",()=>{const t=d0(new Date());return[dAdd(t,-6),t];}],
  ["14d","Últimos 14 días",()=>{const t=d0(new Date());return[dAdd(t,-13),t];}],
  ["28d","Últimos 28 días",()=>{const t=d0(new Date());return[dAdd(t,-27),t];}],
  ["30d","Últimos 30 días",()=>{const t=d0(new Date());return[dAdd(t,-29),t];}],
  ["semana","Esta semana",()=>{const t=d0(new Date());return[dAdd(t,-((t.getDay()+6)%7)),t];}],
  ["semanaAnt","La semana pasada",()=>{const t=d0(new Date());const lun=dAdd(t,-((t.getDay()+6)%7));return[dAdd(lun,-7),dAdd(lun,-1)];}],
  ["mes","Este mes",()=>{const t=d0(new Date());return[new Date(t.getFullYear(),t.getMonth(),1),t];}],
  ["mesAnt","El mes pasado",()=>{const t=d0(new Date());return[new Date(t.getFullYear(),t.getMonth()-1,1),new Date(t.getFullYear(),t.getMonth(),0)];}],
  ["max","Máximo",()=>{const t=d0(new Date());return[dAdd(t,-364),t];}],
];
function computePreset(key){ const p=PRESETS.find(x=>x[0]===key); const [from,to]=p[2](); return {from,to,preset:key}; }
function rangeLabel(r){ if(!r) return "Últimos 30 días"; if(r.preset){ const p=PRESETS.find(x=>x[0]===r.preset); if(p) return p[1]; } return `${dFmt(r.from)} – ${dFmt(r.to)}`; }
let pk=null;
function openPicker(){
  const a=st.range||computePreset("30d");
  pk={ from:a.from, to:a.to, preset:a.preset||null, focus:new Date(a.to.getFullYear(),a.to.getMonth()-1,1) };
  renderPicker(); $("drPop").classList.add("show");
}
function drCells(y,m){ const first=new Date(y,m,1); const off=(first.getDay()+6)%7; const dim=new Date(y,m+1,0).getDate(); const c=[]; for(let i=0;i<off;i++)c.push(null); for(let d=1;d<=dim;d++)c.push(new Date(y,m,d)); return c; }
function drMonth(y,m,side){
  const nav=side==="l"?`<button class="drnav" data-nav="-1">${icon("chevronLeft")}</button><span>${DR_MESL[m]} ${y}</span><span></span>`
                      :`<span></span><span>${DR_MESL[m]} ${y}</span><button class="drnav" data-nav="1">${icon("chevronRight")}</button>`;
  return `<div class="drmonth"><div class="drmhead">${nav}</div><div class="drgrid">${DR_DOW.map(d=>`<span class="drdow">${d}</span>`).join("")}${drCells(y,m).map(c=>{
    if(!c) return `<span class="drday muted"></span>`;
    const inR=pk.from&&pk.to&&c>=pk.from&&c<=pk.to, isS=dSame(c,pk.from), isE=dSame(c,pk.to);
    const cls="drday"+(inR?" inrange":"")+((isS||isE)?" edge":"")+(isS?" start":"")+(isE?" end":"");
    return `<button class="${cls}" data-ymd="${c.getFullYear()}_${c.getMonth()}_${c.getDate()}">${c.getDate()}</button>`;
  }).join("")}</div></div>`;
}
function renderPicker(){
  const y=pk.focus.getFullYear(), m=pk.focus.getMonth(), ny=m===11?y+1:y, nm=(m+1)%12;
  const pop=$("drPop");
  pop.innerHTML=`
    <div class="drpresets">${PRESETS.map(p=>`<button class="drpreset ${pk.preset===p[0]?'on':''}" data-preset="${p[0]}"><span class="drrad"></span>${p[1]}</button>`).join("")}</div>
    <div class="drright">
      <div class="drcal"><div class="drmonths">${drMonth(y,m,"l")}${drMonth(ny,nm,"r")}</div></div>
      <div class="drfoot"><div class="lbl">${pk.from&&pk.to?`${dFmt(pk.from)} – ${dFmt(pk.to)}`:(pk.from?`${dFmt(pk.from)} – …`:"Elige un rango")}<br><span style="font-size:11px;color:var(--faint)">Las fechas se muestran en la Hora de Lima</span></div>
      <div class="acts"><button class="btn" id="drCancel">Cancelar</button><button class="btn primary" id="drApply">Actualizar</button></div></div>
    </div>`;
  pop.querySelectorAll("[data-preset]").forEach(b=>b.onclick=()=>{ const r=computePreset(b.dataset.preset); pk.from=r.from; pk.to=r.to; pk.preset=r.preset; pk.focus=new Date(r.to.getFullYear(),r.to.getMonth()-1,1); renderPicker(); });
  pop.querySelectorAll("[data-nav]").forEach(b=>b.onclick=()=>{ pk.focus=new Date(pk.focus.getFullYear(),pk.focus.getMonth()+Number(b.dataset.nav),1); renderPicker(); });
  pop.querySelectorAll("[data-ymd]").forEach(b=>b.onclick=()=>{ const [yy,mm,dd]=b.dataset.ymd.split("_").map(Number); const date=new Date(yy,mm,dd); if(!pk.from||(pk.from&&pk.to)){ pk.from=date; pk.to=null; } else { if(date>=pk.from) pk.to=date; else { pk.to=pk.from; pk.from=date; } } pk.preset=null; renderPicker(); });
  $("drCancel").onclick=()=>$("drPop").classList.remove("show");
  $("drApply").onclick=()=>{ if(!pk.from) return; if(!pk.to) pk.to=pk.from; st.range={from:pk.from,to:pk.to,preset:pk.preset}; $("drPop").classList.remove("show"); reload(); };
}

// ── Detalle día por día ────────────────────────────────────────────
// Serie diaria REAL: recorre cada día del periodo y toma lo que ads-sync +
// orders dejaron en row.daily (0 si ese día no hubo nada).
function serieReal(row){
  const r=st.range||computePreset("30d"); const out=[]; let d=new Date(r.from); const end=new Date(r.to);
  let guard=0;
  while(d<=end && guard++<400){ const f=ymd(d); const x=row.daily[f]||{};
    out.push({ fecha:new Date(d), gasto:x.gasto||0, impr:x.impr||0, clics:x.clics||0, conf:x.conf||0, ventas:x.ventas||0, ingresos:x.ingresos||0 });
    d=new Date(d); d.setDate(d.getDate()+1);
  }
  return out;
}
function renderDetail(){
  const a=st.rows[st.sel]; if(!a){ st.sel=null; return render(); }
  const m=metrics(a); const S=serieReal(a);
  const emoji=(a.prod||"").split(" ")[0]||"";
  const v=$("view");
  v.innerHTML=`
    <button class="back" id="back">${icon("chevronLeft")||'‹'} Volver a Rendimiento</button>
    <div class="dhd">
      ${/\p{Emoji}/u.test(emoji)?`<span class="em">${esc(emoji)}</span>`:""}
      <div><h2>${esc(a.name)}</h2><div class="ctx">${esc(a.campaign)} · Conjunto ${esc(a.adset)}${a.tag?` · <span class="tag ${a.tag}">${TAGLBL[a.tag]}</span>`:""}${a.prod?` · ${esc(a.prod)}`:""}</div></div>
      <span class="okpill" style="margin-left:auto">${icon("megaphone")} ${esc(rangeLabel(st.range))}</span>
    </div>
    <div class="kpis">
      ${kpiMini("Gasto",money0(m.gasto),"var(--brand)")}
      ${kpiMini("Ventas reales",m.ventas,"var(--green)")}
      ${kpiMini("CPA real",money(m.cpaReal),"var(--amber)")}
      ${kpiMini("Ganancia neta",money(m.neta),m.neta<0?"var(--red)":"var(--green)")}
      ${kpiMini("ROAS",nf(m.roas,2)+"×","var(--green)")}
    </div>
    <div class="dgrid">
      <div class="chartcard"><h3>Gasto vs. ingresos</h3><div class="cs">barras = gasto del día · línea = ingresos reales</div>${chartBarsLine(S,d=>d.gasto,d=>d.ingresos)}<div class="legend"><span><i style="background:var(--brand)"></i>Gasto</span><span><i style="background:var(--green)"></i>Ingresos</span></div></div>
      <div class="chartcard"><h3>Confirmaciones vs. ventas reales</h3><div class="cs">cuántos se comprometen vs. cuántos pagan de verdad</div>${chartTwoLines(S,d=>d.conf,d=>d.ventas)}<div class="legend"><span><i style="background:var(--amber)"></i>Confirmaciones</span><span><i style="background:var(--green)"></i>Ventas reales</span></div></div>

    </tr></thead><tbody>${S.map(d=>{
      const roas=d.gasto?d.ingresos/d.gasto:0, rc=roas>=2?'g':roas>=1?'a':'r';
      const cpaCell = d.ventas ? money(d.gasto/d.ventas) : '<span style="color:var(--faint)">—</span>';
      const roasCell = d.ventas ? `<span class="roas ${rc}"><span class="rd"></span>${nf(roas,2)}×</span>` : '<span style="color:var(--faint)">—</span>';
      return `<tr><td>${d.fecha.toLocaleDateString("es-PE",{day:"2-digit",month:"short"})}</td><td class="num">${money(d.gasto)}</td><td class="num">${nf(d.impr)}</td><td class="num">${nf(d.clics)}</td><td class="num">${d.conf}</td><td class="num">${d.ventas}</td><td class="num">${cpaCell}</td><td class="num">${money(d.ingresos)}</td><td class="num">${roasCell}</td></tr>`;
    }).join("")}</tbody></table></div></div>`;
  $("back").onclick=()=>{ st.sel=null; render(); };
}
function kpiMini(k,v,c){ return `<div class="kpi"><div class="k"><span class="kd" style="background:${c}"></span>${k}</div><div class="v num">${v}</div></div>`; }

// ── Gráficos SVG (sin librerías) ──
const CW=440, CH=150, PX=6, PB=18;
function xFor(i,n){ return PX + (CW-2*PX) * (n<=1?0.5:i/(n-1)); }
function chartBarsLine(S,fBar,fLine){
  const n=S.length; const maxB=Math.max(...S.map(fBar),1), maxL=Math.max(...S.map(fLine),1);
  const bw=(CW-2*PX)/n*0.6;
  const bars=S.map((d,i)=>{ const h=(CH-PB)*(fBar(d)/maxB); const x=xFor(i,n)-bw/2; return `<rect x="${x.toFixed(1)}" y="${(CH-PB-h).toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="2" fill="var(--brand)" opacity=".85"/>`; }).join("");
  const pts=S.map((d,i)=>`${xFor(i,n).toFixed(1)},${(CH-PB-(CH-PB)*(fLine(d)/maxL)).toFixed(1)}`).join(" ");
  const last=S.length-1, lx=xFor(last,n), ly=CH-PB-(CH-PB)*(fLine(S[last])/maxL);
  return `<svg class="chart" viewBox="0 0 ${CW} ${CH}" preserveAspectRatio="none"><line x1="0" y1="${CH-PB}" x2="${CW}" y2="${CH-PB}" stroke="var(--border)"/>${bars}<polyline points="${pts}" fill="none" stroke="var(--green)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="3.2" fill="var(--green)"/></svg>`;
}
function chartTwoLines(S,fA,fB){
  const n=S.length; const mx=Math.max(...S.map(fA),...S.map(fB),1);
  const line=(f,col)=>{ const pts=S.map((d,i)=>`${xFor(i,n).toFixed(1)},${(CH-PB-(CH-PB)*(f(d)/mx)).toFixed(1)}`).join(" "); const li=S.length-1; return `<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${xFor(li,n).toFixed(1)}" cy="${(CH-PB-(CH-PB)*(f(S[li])/mx)).toFixed(1)}" r="3.2" fill="${col}"/>`; };
  return `<svg class="chart" viewBox="0 0 ${CW} ${CH}" preserveAspectRatio="none"><line x1="0" y1="${CH-PB}" x2="${CW}" y2="${CH-PB}" stroke="var(--border)"/>${line(fA,"var(--amber)")}${line(fB,"var(--green)")}</svg>`;
}

boot();
</script>
