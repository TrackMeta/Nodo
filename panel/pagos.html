<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script>try{document.documentElement.dataset.theme=localStorage.getItem("nodo.theme")||"dark"}catch(e){}</script>
<title>Nodo · Validación de pagos</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png" />
<link rel="stylesheet" href="shell.css" />
<style>
  :root{
    --bg:#0e1116; --surface:#151a21; --surface-2:#1b222c; --border:#232b36;
    --text:#e7ecf2; --muted:#8a97a8; --faint:#5c6675;
    --brand:#2b7fff; --brand-2:#1e6ff0; --brand-bg:#12233f;
    --green:#22c079; --amber:#f0a92b; --red:#e2564a;
    /* Esta pantalla es OPERACIÓN (no IA): el markup copiado usa var(--ia) para
       el resaltado; acá lo mapeamos a azul de marca. */
    --ia:#2b7fff; --ia-2:#1e6ff0; --ia-bg:rgba(43,127,255,.14); --ia-border:rgba(43,127,255,.4);
    --font:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box} html,body{height:100%;margin:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px}
  button{font-family:inherit;cursor:pointer}
  h2{font-size:18px;margin:0 0 4px;font-weight:700;letter-spacing:-.2px}
  .sub{color:var(--muted);font-size:13.5px;margin:0 0 20px;line-height:1.55;max-width:660px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 22px;margin-bottom:16px}
  .card.ia{border-color:var(--ia-border);background:linear-gradient(180deg,var(--ia-bg),transparent 40%),var(--surface)}
  .chd{display:flex;align-items:center;gap:13px;margin-bottom:4px}
  .chd .ico{width:46px;height:46px;border-radius:13px;background:var(--brand-bg);color:var(--brand);display:flex;align-items:center;justify-content:center;flex:none}
  .chd .ico.iaic{background:var(--ia-bg);color:var(--ia)}
  .chd .ico svg{width:22px;height:22px}
  .chd .nm{font-weight:700;font-size:16px;letter-spacing:-.1px}
  .desc{color:var(--muted);font-size:12.5px;margin:12px 0 4px;line-height:1.55}
  label{display:block;font-size:11.5px;color:var(--muted);margin:14px 0 6px;font-weight:700}
  .in{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:11px 13px;font-size:13.5px;outline:none;font-family:var(--font)}
  .in:focus{border-color:var(--brand)}
  .acts{display:flex;gap:8px;margin-top:18px;align-items:center;flex-wrap:wrap}
  .btn{height:40px;padding:0 16px;border-radius:11px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:7px}
  .btn.ia{background:var(--brand);border:none;color:#fff}
  .btn.ia:hover{background:var(--brand-2)}
  .sw{width:44px;height:25px;border-radius:20px;background:var(--surface-2);border:1px solid var(--border);position:relative;transition:.15s;flex:none;cursor:pointer}
  .sw::after{content:"";position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:var(--muted);transition:.15s}
  .sw.on{background:var(--ia-bg);border-color:var(--ia-border)} .sw.on::after{left:20px;background:var(--ia)}
</style>
</head>
<body>
<div class="nodo-page">
  <div class="nodo-wrap" style="--nodo-max:820px">
    <div class="nodo-head">
      <div class="grow">
        <a href="pedidos.html" style="display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:12.5px;text-decoration:none;margin-bottom:6px">← Volver a Pedidos</a>
        <h1 class="nodo-title">Validación de pagos</h1>
        <p class="nodo-lead">Cómo se aprueban los pagos de tus pedidos físicos y los recordatorios del adelanto.</p>
      </div>
    </div>
    <div id="body"></div>
  </div>
</div>

<script type="module">
import { supa, mountShell, toast } from "./shell.js";
const $=(id)=>document.getElementById(id);
const IC={
  clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>',
  truck:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M15 18H9"/><path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.62l-3.48-4.35A1 1 0 0 0 17.52 8H14"/><circle cx="17" cy="18" r="2"/><circle cx="7" cy="18" r="2"/></svg>',
  shield:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg>',
  zap:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg>',
  coins:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/><path d="m16.71 13.88.7.71-2.82 2.82"/></svg>',
};
const st={ channelId:null, channel:{}, pedidos:null };
function esc(s){ return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

// Config GLOBAL del canal (channels.pedidos_config). Los embudos y mensajes por
// etapa se conservan tal cual (se editan/gatean en otro lado); acá solo la
// aprobación (adelanto/saldo), tolerancias y recordatorios.
function defaultPedidos(){
  return {
    embudos:{ mensajeria:true, confirmaciones:true, logistica:true },
    // Digital: por defecto AUTOMÁTICO (así se comportó siempre). El default es
    // del canal; cada producto digital puede sobreescribirlo en su ficha.
    digital:{ validacion:"auto", tolerancia:1 },
    // Pago de más: qué hace el bot si el cliente reclama su vuelto.
    // modo: "tranquilizar" (responde y sigue) | "humano" (traspasa) | "off".
    vuelto:{ modo:"tranquilizar", mensaje:"" },
    adelanto:{ validacion:"manual", tolerancia:1, nudge:{ activo:false, horas:12, mensaje:"" }, vencimiento:{ activo:false, horas:48 } },
    conf:{ msg_cod:"", fecha:false, msg_ag_pago:"", msg_ag:"", instr_cod:"", instr_ag:"" },
    log:{ modo:"manual", tolerancia:1, instr_cod:"", instr_ag:"" },
    // Cuándo el bot deja de responder y te pasa el chat, y qué le dice al cliente
    // (nunca lo deja en el aire). reclamos = escalar ante enojo/disputa.
    humano:{ reclamos:true, horario:{ activo:false, desde:"09:00", hasta:"20:00", dias:{lun:true,mar:true,mie:true,jue:true,vie:true,sab:true,dom:false} }, aviso_dentro:"", aviso_fuera:"" },
  };
}

async function boot(){
  const { data:{session} }=await supa.auth.getSession(); if(!session){ location.href="index.html"; return; }
  const shell=await mountShell({ active:"pedidos" });
  st.channelId=shell.channelId;
  shell.onChannel(id=>{ st.channelId=id; load(); });
  if(st.channelId) await load();
}
async function load(){
  const { data:ch }=await supa.from("channels").select("nombre,pedidos_config").eq("id",st.channelId).maybeSingle();
  st.channel=ch||{};
  render($("body"));
}

function render(b){
  const src = (st.channel.pedidos_config && typeof st.channel.pedidos_config==="object") ? st.channel.pedidos_config : {};
  const D = defaultPedidos();
  const p = {
    embudos:{ ...D.embudos, ...(src.embudos||{}) },
    digital:{ ...D.digital, ...(src.digital||{}) },
    vuelto:(()=>{ const v={ ...D.vuelto, ...(src.vuelto||{}) }; if(!v.modo) v.modo=(v.activo===false?"off":"tranquilizar"); return v; })(),
    conf:{ ...D.conf, ...(src.conf||{}) },
    log:{ ...D.log, ...(src.log||{}) },
    humano:{ ...D.humano, ...(src.humano||{}),
      horario:{ ...D.humano.horario, ...((src.humano||{}).horario||{}),
        dias:{ ...D.humano.horario.dias, ...(((src.humano||{}).horario||{}).dias||{}) } } },
    adelanto:{
      ...D.adelanto, ...(src.adelanto||{}),
      nudge:{ ...D.adelanto.nudge, ...((src.adelanto||{}).nudge||{}) },
      vencimiento:{ ...D.adelanto.vencimiento, ...((src.adelanto||{}).vencimiento||{}) },
    },
  };
  st.pedidos = p;
  const ta=(v,ph,rows)=>`<textarea class="in" rows="${rows||4}" style="min-height:${(rows||4)*24+8}px;line-height:1.5;font-family:var(--font);resize:vertical" placeholder="${esc(ph)}">${esc(v||"")}</textarea>`;
  b.innerHTML=`
    <p class="sub">Quién aprueba los pagos —<b>tú</b> con un toque en el Copiloto, o la <b>IA</b> sola si el monto cuadra. El proceso digital y el físico son distintos, así que cada uno tiene su ajuste.</p>

    <div class="card ia">
      <div class="chd"><span class="ico iaic">${IC.zap}</span><span class="nm">Pagos digitales</span></div>
      <div class="desc">El digital es rápido: el cliente paga y recibe su producto al instante. Esto decide si esa entrega es automática o espera tu visto bueno. Es el <b>default del canal</b>; cada producto digital puede cambiarlo en su ficha.</div>
      <label style="margin-top:6px;font-weight:700;font-size:13px;color:var(--text)">¿Quién aprueba el pago de un producto digital?</label>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:8px" id="digOpts">
        ${[["auto","⚡","Automático: si el monto cuadra, entrega el producto sin consultarme","La IA lee el comprobante y, si el monto coincide, envía el link/archivo al toque. Ante cualquier duda te lo deriva al Copiloto."],
           ["manual","👁","Manual: cuando llegue un comprobante, avísame para aprobarlo yo","La IA lo analiza y te deja su lectura hecha, pero no entrega nada: la tarjeta con la foto te espera en el Copiloto. Al aprobar, el bot entrega y sigue vendiendo."]]
          .map(([v,ic,t,d])=>{ const on=(v==="manual")?(p.digital.validacion==="manual"):(p.digital.validacion!=="manual"); return `
        <div class="digopt" data-modo="${v}" style="border:1.5px solid ${on?'var(--ia)':'var(--border)'};background:${on?'var(--ia-bg)':'transparent'};border-radius:12px;padding:13px 14px;display:flex;gap:12px;align-items:flex-start;cursor:pointer">
          <span class="digdot" style="width:18px;height:18px;border-radius:50%;border:2px solid ${on?'var(--ia)':'var(--border)'};flex:none;margin-top:2px;display:flex;align-items:center;justify-content:center"><span style="width:9px;height:9px;border-radius:50%;background:var(--ia);display:${on?'block':'none'}"></span></span>
          <div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13.5px">${ic} ${t}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5">${d}</div></div>
        </div>`; }).join("")}
      </div>
      <div style="margin-top:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <label style="margin:0;font-size:12.5px;font-weight:700">Tolerancia del monto <span style="color:var(--faint);font-weight:400">(modo automático)</span></label>
        <input class="in" id="pDigTol" type="number" min="0" step="0.5" value="${Number(p.digital.tolerancia ?? 1)}" style="width:110px"/>
        <span style="font-size:11.5px;color:var(--faint);flex:1;min-width:200px">Acepta si pagó al menos el precio menos esta diferencia. Pagar de más siempre se acepta.</span>
      </div>
    </div>

    <div class="card ia">
      <div class="chd"><span class="ico iaic">${IC.coins}</span><span class="nm">Pago de más (vuelto)</span></div>
      <div class="desc">Qué hace el bot cuando el cliente <b>reclama</b> que pagó de más.</div>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:10px" id="vlOpts">
        ${[["tranquilizar","🙌","Tranquilizar y seguir vendiendo","El bot le dice que estás gestionando su vuelto, te avisa por Telegram, y sigue atendiéndolo. Nunca queda en el aire."],
           ["humano","🙋","Pasar a un humano","El bot pausa esa conversación y te la traspasa. Ojo: si no estás disponible, el cliente queda esperando tu respuesta."],
           ["off","🚫","No hacer nada especial","El bot no responde nada específico ni te avisa; lo maneja la IA como cualquier mensaje."]]
          .map(([v,ic,t,d])=>{ const on=p.vuelto.modo===v; return `
        <div class="vlopt" data-modo="${v}" style="border:1.5px solid ${on?'var(--ia)':'var(--border)'};background:${on?'var(--ia-bg)':'transparent'};border-radius:12px;padding:13px 14px;display:flex;gap:12px;align-items:flex-start;cursor:pointer">
          <span class="vldot" style="width:18px;height:18px;border-radius:50%;border:2px solid ${on?'var(--ia)':'var(--border)'};flex:none;margin-top:2px;display:flex;align-items:center;justify-content:center"><span style="width:9px;height:9px;border-radius:50%;background:var(--ia);display:${on?'block':'none'}"></span></span>
          <div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13.5px">${ic} ${t}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5">${d}</div></div>
        </div>`; }).join("")}
      </div>
      <div id="vlMsgWrap" style="display:${p.vuelto.modo==='tranquilizar'?'block':'none'}">
        <label style="margin-top:16px">Mensaje al cliente</label>
        ${ta(p.vuelto.mensaje,"¡No te preocupes! 🙌 Registramos que pagaste de más{{monto}}. Un administrador está gestionando la devolución de tu vuelto y te enviaremos la constancia por aquí en un momentito.",4).replace('class="in"','class="in" id="vlMsg"')}
        <div style="font-size:11px;color:var(--faint);margin-top:6px">Puedes usar <b>{{vuelto}}</b> (el monto, ej. “S/ 20”) o <b>{{monto}}</b> (agrega “ (S/ 20)”). Si lo dejas vacío, usa un mensaje por defecto.</div>
      </div>
    </div>

    <div class="card ia">
      <div class="chd"><span class="ico iaic">${IC.clock}</span><span class="nm">Adelantos de provincia</span></div>
      <div class="desc">El pedido de provincia se crea apenas el cliente te da sus datos, <b>antes de pagar</b>.</div>

      <label style="margin-top:14px;font-weight:700;font-size:13px;color:var(--text)">¿Quién aprueba el adelanto?</label>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:8px" id="adelOpts">
        ${[["manual","👁","Manual: cuando llegue un comprobante, avísame para aprobarlo yo","La IA igual lo analiza y te deja su lectura hecha, pero no aprueba nada: la tarjeta con los datos y la foto te espera en el Copiloto."],
           ["auto","⚡","Automático: si el monto cuadra, valida el adelanto sin consultarme","Ante cualquier duda (monto, fraude o comprobante repetido) te lo deriva igual al Copiloto."]]
          .map(([v,ic,t,d])=>{ const on=(v==="auto")?(p.adelanto.validacion==="auto"):(p.adelanto.validacion!=="auto"); return `
        <div class="adelopt" data-modo="${v}" style="border:1.5px solid ${on?'var(--ia)':'var(--border)'};background:${on?'var(--ia-bg)':'transparent'};border-radius:12px;padding:13px 14px;display:flex;gap:12px;align-items:flex-start;cursor:pointer">
          <span class="adeldot" style="width:18px;height:18px;border-radius:50%;border:2px solid ${on?'var(--ia)':'var(--border)'};flex:none;margin-top:2px;display:flex;align-items:center;justify-content:center"><span style="width:9px;height:9px;border-radius:50%;background:var(--ia);display:${on?'block':'none'}"></span></span>
          <div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13.5px">${ic} ${t}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5">${d}</div></div>
        </div>`; }).join("")}
      </div>
      <div style="margin-top:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <label style="margin:0;font-size:12.5px;font-weight:700">Tolerancia del monto <span style="color:var(--faint);font-weight:400">(modo automático)</span></label>
        <input class="in" id="pAdelTol" type="number" min="0" step="0.5" value="${Number(p.adelanto.tolerancia ?? 1)}" style="width:110px"/>
        <span style="font-size:11.5px;color:var(--faint);flex:1;min-width:200px">Acepta si pagó al menos el adelanto menos esta diferencia. Pagar de más siempre se acepta.</span>
      </div>

      <div style="border-top:1px solid var(--border);margin:18px 0 4px"></div>
      <div class="desc">Si no paga, esto mantiene limpia sola la columna “Esperando adelanto”.
      Con las dos apagadas, el tablero se comporta como antes y lo manejas a mano (el botón <b>Cancelar pedido</b> del menú ⋮ siempre está).</div>

      <div id="pnRow" style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:12px;border:1px solid var(--border);border-radius:11px;padding:11px 12px;cursor:pointer">
        <span style="font-weight:600;font-size:13px">Recordarle si no paga</span>
        <span class="sw ${p.adelanto.nudge.activo?'on':''}" id="pnSw" style="flex:none"></span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:10px">
        <label style="margin:0;font-size:12.5px;font-weight:700">Recordar a las</label>
        <input class="in" id="pnHoras" type="number" min="1" step="1" value="${Number(p.adelanto.nudge.horas ?? 12)}" style="width:90px"/>
        <span style="font-size:12.5px;color:var(--muted)">horas de creado el pedido</span>
      </div>
      <label style="margin-top:12px">Mensaje del recordatorio</label>
      ${ta(p.adelanto.nudge.mensaje,"¡Hola {{nombre}}! 👋 Tu pedido de {{producto_nombre}} sigue reservado.\n\nPara despacharlo solo falta el adelanto de S/ {{adelanto}}. ¿Te ayudo con algo?",4).replace('class="in"','class="in" id="pnMsg"')}

      <div id="pvRow" style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:16px;border:1px solid var(--border);border-radius:11px;padding:11px 12px;cursor:pointer">
        <span><span style="font-weight:600;font-size:13px">Vencer el pedido si no paga</span>
        <div style="font-size:11.5px;color:var(--faint);margin-top:2px">Pasa a “Cancelado” y sale de las columnas activas. No se borra: sigue contando para tus métricas.</div></span>
        <span class="sw ${p.adelanto.vencimiento.activo?'on':''}" id="pvSw" style="flex:none"></span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:10px">
        <label style="margin:0;font-size:12.5px;font-weight:700">Vencer a las</label>
        <input class="in" id="pvHoras" type="number" min="1" step="1" value="${Number(p.adelanto.vencimiento.horas ?? 48)}" style="width:90px"/>
        <span style="font-size:12.5px;color:var(--muted)">horas de creado el pedido</span>
      </div>
    </div>

    <div class="card ia">
      <div class="chd"><span class="ico iaic">${IC.truck}</span><span class="nm">Agente de logística</span></div>
      <div class="desc">Cómo el agente IA verifica los pagos de saldos remanentes para entregar la clave de recojo.</div>
      <label style="margin-top:6px;font-weight:700;font-size:13px;color:var(--text)">¿Cómo quieres que tu IA verifique los pagos para entregar la clave de recojo?</label>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:8px" id="logOpts">
        ${[["manual","👁","Manual: cuando recibas un pago, notifícame para aprobarlo antes de dar la clave","La IA te avisará cuando reciba un comprobante (WhatsApp o Telegram). Una vez lo apruebes, dará la clave de recojo."],
           ["auto","⚡","Automático: si el cliente paga el saldo, no me notifiques y dale su clave automáticamente","La IA analiza el comprobante. Si el monto coincide, entrega la clave secreta sola."]]
          .map(([v,ic,t,d])=>{ const on=(v==="auto")?(p.log.modo==="auto"):(p.log.modo!=="auto"); return `
        <div class="logopt" data-modo="${v}" style="border:1.5px solid ${on?'var(--ia)':'var(--border)'};background:${on?'var(--ia-bg)':'transparent'};border-radius:12px;padding:13px 14px;display:flex;gap:12px;align-items:flex-start;cursor:pointer">
          <span class="logdot" style="width:18px;height:18px;border-radius:50%;border:2px solid ${on?'var(--ia)':'var(--border)'};flex:none;margin-top:2px;display:flex;align-items:center;justify-content:center"><span style="width:9px;height:9px;border-radius:50%;background:var(--ia);display:${on?'block':'none'}"></span></span>
          <div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13.5px">${ic} ${t}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5">${d}</div></div>
        </div>`; }).join("")}
      </div>
      <div style="margin-top:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <label style="margin:0;font-size:12.5px;font-weight:700">Tolerancia del monto <span style="color:var(--faint);font-weight:400">(modo automático)</span></label>
        <input class="in" id="pLogTol" type="number" min="0" step="0.5" value="${Number(p.log.tolerancia ?? 0)}" style="width:110px"/>
        <span style="font-size:11.5px;color:var(--faint);flex:1;min-width:200px">Acepta el pago si es al menos <b>el saldo menos esta diferencia</b>. Pagar de más siempre se acepta. Si no cuadra, va al Copiloto.</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;border:1px solid var(--border);border-radius:11px;padding:10px 12px;margin-top:12px;font-size:12px;color:var(--muted)">${IC.shield} En modo automático, si hay cualquier duda (monto, fraude o comprobante repetido) el pago cae en el <b>Copiloto</b> y te avisamos por <b>Telegram</b>.</div>
    </div>

    <div class="card ia">
      <div class="chd"><span class="ico iaic">🙋</span><span class="nm">Cuándo pasar a un asesor</span></div>
      <div class="desc">El bot atiende <b>toda</b> la conversación por defecto. Solo te pasa el chat en pocos casos y <b>nunca deja al cliente en el aire</b>: le dice que un asesor lo verá (y cuándo, si defines tu horario). El bot ya escala solo cuando el cliente <b>pide una persona</b> o cuando la IA no puede resolverlo.</div>

      <div id="huRecRow" style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px;border:1px solid var(--border);border-radius:11px;padding:11px 12px;cursor:pointer">
        <span><span style="font-weight:600;font-size:13px">Pasar a un asesor si el cliente reclama o está molesto</span>
        <div style="font-size:11.5px;color:var(--faint);margin-top:2px">Ante enojo o disputa fuerte (estafa, denuncia, exige devolución) el bot deja de responder y te lo pasa, para que no discuta por su cuenta. Lo sutil lo sigue detectando la IA.</div></span>
        <span class="sw ${p.humano.reclamos!==false?'on':''}" id="huRecSw" style="flex:none"></span>
      </div>

      <div id="huHorRow" style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:12px;border:1px solid var(--border);border-radius:11px;padding:11px 12px;cursor:pointer">
        <span><span style="font-weight:600;font-size:13px">Definir un horario de atención</span>
        <div style="font-size:11.5px;color:var(--faint);margin-top:2px">Dentro del horario el bot dice “en un momento te atiende un asesor”. Fuera, le dice cuándo vuelves (ej. “mañana a las 9:00 a.m.”), sin dejarlo esperando en silencio. Apagado = siempre “en un momento”.</div></span>
        <span class="sw ${p.humano.horario.activo?'on':''}" id="huHorSw" style="flex:none"></span>
      </div>

      <div id="huHorBox" style="display:${p.humano.horario.activo?'block':'none'}">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:12px">
          <label style="margin:0;font-size:12.5px;font-weight:700">Atiendo de</label>
          <input class="in" id="huDesde" type="time" value="${esc(p.humano.horario.desde||'09:00')}" style="width:120px"/>
          <span style="font-size:12.5px;color:var(--muted)">a</span>
          <input class="in" id="huHasta" type="time" value="${esc(p.humano.horario.hasta||'20:00')}" style="width:120px"/>
          <span style="font-size:12px;color:var(--faint)">hora de Perú</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:12px">
          <label style="margin:0;font-size:12.5px;font-weight:700;margin-right:4px">Días</label>
          ${[["lun","L"],["mar","M"],["mie","X"],["jue","J"],["vie","V"],["sab","S"],["dom","D"]].map(([k,l])=>`<button class="hudia" data-dia="${k}" style="width:34px;height:34px;border-radius:9px;border:1.5px solid ${p.humano.horario.dias[k]!==false?'var(--ia)':'var(--border)'};background:${p.humano.horario.dias[k]!==false?'var(--ia)':'transparent'};color:${p.humano.horario.dias[k]!==false?'#fff':'var(--muted)'};font-weight:700;font-size:12px;cursor:pointer">${l}</button>`).join("")}
        </div>
        <label style="margin-top:14px">Mensaje FUERA de horario <span style="color:var(--faint);font-weight:400">(opcional)</span></label>
        ${ta(p.humano.aviso_fuera,"¡Gracias por escribir! 🙌 Ahora no hay un asesor en línea, pero te responde apenas volvamos. Déjame tu consulta por aquí. 🙏",3).replace('class="in"','class="in" id="huFuera"')}
        <div style="font-size:11px;color:var(--faint);margin-top:6px">Si lo dejas vacío, el bot arma uno solo y le dice la hora exacta en que vuelves.</div>
      </div>

      <label style="margin-top:14px">Mensaje al pasar a un asesor (en horario) <span style="color:var(--faint);font-weight:400">(opcional)</span></label>
      ${ta(p.humano.aviso_dentro,"¡Gracias! 🙌 En un momento te atiende un asesor de nuestro equipo por aquí. 🙂",3).replace('class="in"','class="in" id="huDentro"')}
    </div>

    <div class="acts"><button class="btn ia" id="pedSave">Guardar cambios</button></div>`;
  b.querySelectorAll(".digopt").forEach(opt=> opt.onclick=()=>{
    p.digital.validacion=opt.dataset.modo;
    b.querySelectorAll(".digopt").forEach(o=>{
      const on=o.dataset.modo===p.digital.validacion;
      o.style.borderColor=on?"var(--ia)":"var(--border)";
      o.style.background=on?"var(--ia-bg)":"transparent";
      const dot=o.querySelector(".digdot"); dot.style.borderColor=on?"var(--ia)":"var(--border)"; dot.firstElementChild.style.display=on?"block":"none";
    });
  });
  b.querySelectorAll(".adelopt").forEach(opt=> opt.onclick=()=>{
    p.adelanto.validacion=opt.dataset.modo;
    b.querySelectorAll(".adelopt").forEach(o=>{
      const on=o.dataset.modo===p.adelanto.validacion;
      o.style.borderColor=on?"var(--ia)":"var(--border)";
      o.style.background=on?"var(--ia-bg)":"transparent";
      const dot=o.querySelector(".adeldot"); dot.style.borderColor=on?"var(--ia)":"var(--border)"; dot.firstElementChild.style.display=on?"block":"none";
    });
  });
  b.querySelectorAll(".vlopt").forEach(opt=> opt.onclick=()=>{
    p.vuelto.modo=opt.dataset.modo;
    b.querySelectorAll(".vlopt").forEach(o=>{
      const on=o.dataset.modo===p.vuelto.modo;
      o.style.borderColor=on?"var(--ia)":"var(--border)";
      o.style.background=on?"var(--ia-bg)":"transparent";
      const dot=o.querySelector(".vldot"); dot.style.borderColor=on?"var(--ia)":"var(--border)"; dot.firstElementChild.style.display=on?"block":"none";
    });
    const w=$("vlMsgWrap"); if(w) w.style.display=(p.vuelto.modo==="tranquilizar")?"block":"none";
  });
  $("pnRow").onclick=()=>{ p.adelanto.nudge.activo=!p.adelanto.nudge.activo; $("pnSw").classList.toggle("on",p.adelanto.nudge.activo); };
  $("pvRow").onclick=()=>{ p.adelanto.vencimiento.activo=!p.adelanto.vencimiento.activo; $("pvSw").classList.toggle("on",p.adelanto.vencimiento.activo); };
  b.querySelectorAll(".logopt").forEach(opt=> opt.onclick=()=>{
    p.log.modo=opt.dataset.modo;
    b.querySelectorAll(".logopt").forEach(o=>{
      const on=o.dataset.modo===p.log.modo;
      o.style.borderColor=on?"var(--ia)":"var(--border)";
      o.style.background=on?"var(--ia-bg)":"transparent";
      const dot=o.querySelector(".logdot"); if(dot){ dot.style.borderColor=on?"var(--ia)":"var(--border)"; dot.firstElementChild.style.display=on?"block":"none"; }
    });
  });
  $("huRecRow").onclick=()=>{ p.humano.reclamos=!(p.humano.reclamos!==false); $("huRecSw").classList.toggle("on",p.humano.reclamos!==false); };
  $("huHorRow").onclick=()=>{ p.humano.horario.activo=!p.humano.horario.activo; $("huHorSw").classList.toggle("on",p.humano.horario.activo); const box=$("huHorBox"); if(box) box.style.display=p.humano.horario.activo?"block":"none"; };
  b.querySelectorAll(".hudia").forEach(x=> x.onclick=()=>{
    const k=x.dataset.dia; const on=!(p.humano.horario.dias[k]!==false); p.humano.horario.dias[k]=on;
    x.style.borderColor=on?"var(--ia)":"var(--border)"; x.style.background=on?"var(--ia)":"transparent"; x.style.color=on?"#fff":"var(--muted)";
  });
  $("pedSave").onclick=async(e)=>{
    p.digital.tolerancia=Math.max(0,Number($("pDigTol").value)||0);
    if($("huDesde")) p.humano.horario.desde=$("huDesde").value||"09:00";
    if($("huHasta")) p.humano.horario.hasta=$("huHasta").value||"20:00";
    if($("huDentro")) p.humano.aviso_dentro=$("huDentro").value.trim();
    if($("huFuera")) p.humano.aviso_fuera=$("huFuera").value.trim();
    if($("vlMsg")) p.vuelto.mensaje=$("vlMsg").value.trim();
    p.log.tolerancia=Math.max(0,Number($("pLogTol").value)||0);
    p.adelanto.tolerancia=Math.max(0,Number($("pAdelTol").value)||0);
    p.adelanto.nudge.horas=Math.max(1,parseInt($("pnHoras").value,10)||12);
    p.adelanto.nudge.mensaje=$("pnMsg").value.trim();
    p.adelanto.vencimiento.horas=Math.max(1,parseInt($("pvHoras").value,10)||48);
    if(p.adelanto.nudge.activo && !p.adelanto.nudge.mensaje){ toast("El recordatorio necesita un mensaje",true); return; }
    if(p.adelanto.vencimiento.activo && p.adelanto.nudge.activo && p.adelanto.vencimiento.horas<=p.adelanto.nudge.horas){
      toast("El vencimiento tiene que ser DESPUÉS del recordatorio",true); return;
    }
    const btn=e.target; btn.disabled=true; const old=btn.textContent; btn.textContent="Guardando…";
    const { error }=await supa.from("channels").update({ pedidos_config:p }).eq("id",st.channelId);
    btn.disabled=false; btn.textContent=old;
    if(error){ toast(/pedidos_config|column/.test(error.message)?"Falta aplicar la migración de pedidos_config (0027)":error.message,true); return; }
    st.channel.pedidos_config=p; toast("Validación de pagos guardada ✓");
  };
}

boot();
</script>
</body>
</html>
