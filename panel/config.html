<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script>try{document.documentElement.dataset.theme=localStorage.getItem("nodo.theme")||"dark"}catch(e){}</script>
<title>Nodo · Configuración</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png" />
<link rel="stylesheet" href="shell.css" />
<style>
  :root{
    --bg:#0e1116; --surface:#151a21; --surface-2:#1b222c; --border:#232b36;
    --text:#e7ecf2; --muted:#8a97a8; --faint:#5c6675;
    --brand:#2b7fff; --brand-2:#1e6ff0; --brand-bg:#12233f;
    --green:#22c079; --green-bg:#10281d; --amber:#f0a92b; --red:#e2564a; --red-bg:#2c1615;
    --font:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box} html,body{height:100%;margin:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px}
  button{font-family:inherit;cursor:pointer}
  .tabs{display:flex;gap:2px;margin:24px 0 22px;border-bottom:1px solid var(--border);flex-wrap:wrap}
  .tab{background:transparent;border:none;color:var(--muted);font-size:14px;font-weight:600;padding:11px 4px;margin-right:22px;border-bottom:2px solid transparent;display:inline-flex;align-items:center;gap:8px}
  .tab.active{color:var(--brand);border-bottom-color:var(--brand)}
  .tab svg{width:17px;height:17px}
  .tab img{width:18px;height:18px;border-radius:5px;object-fit:cover}
  h2{font-size:18px;margin:0 0 4px;font-weight:700;letter-spacing:-.2px}
  .sub{color:var(--muted);font-size:13.5px;margin:0 0 20px;line-height:1.55;max-width:640px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 22px;margin-bottom:16px}
  .card.on{border-color:var(--green)}
  .chd{display:flex;align-items:center;gap:13px;margin-bottom:4px}
  .chd .ico{width:46px;height:46px;border-radius:13px;background:var(--brand-bg);color:var(--brand);display:flex;align-items:center;justify-content:center;overflow:hidden;flex:none}
  .chd .ico svg{width:22px;height:22px}
  .chd .ico img{width:100%;height:100%;object-fit:cover}
  .chd .nm{font-weight:700;font-size:16px;letter-spacing:-.1px}
  .badge{font-size:10.5px;padding:3px 10px;border-radius:20px;background:var(--surface-2);border:1px solid var(--border);color:var(--muted);font-weight:700}
  .badge.on{background:var(--green-bg);color:var(--green);border-color:transparent}
  .badge.def{background:var(--brand-bg);color:var(--brand);border-color:transparent}
  .desc{color:var(--muted);font-size:12.5px;margin:12px 0 4px;line-height:1.55}
  label{display:block;font-size:11.5px;color:var(--muted);margin:14px 0 6px;font-weight:700}
  .in{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:11px 13px;font-size:13.5px;outline:none;font-family:var(--font)}
  .in:focus{border-color:var(--brand)}
  .row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
  .row>.f{flex:1;min-width:170px}
  .acts{display:flex;gap:8px;margin-top:18px;align-items:center;flex-wrap:wrap}
  .btn{height:40px;padding:0 16px;border-radius:11px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:13.5px;font-weight:600}
  .btn.primary{background:var(--brand);border:none;color:#fff}
  .btn.primary:hover{background:var(--brand-2)}
  .btn.ghost{color:var(--muted)} .btn.danger{color:var(--red);border-color:transparent}
  /* Google Sheets — pasos guiados */
  .steps{counter-reset:s;margin:4px 0 8px}
  .step{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border)}
  .step:last-child{border-bottom:none}
  .step .num{counter-increment:s;width:28px;height:28px;flex:none;border-radius:50%;background:var(--brand-bg);color:var(--brand);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center}
  .step .num::before{content:counter(s)}
  .step .st-b{flex:1;min-width:0}
  .step .st-t{font-weight:700;font-size:14px;margin-bottom:3px}
  .step .st-d{font-size:12.5px;color:var(--muted);line-height:1.55}
  .copybox{display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:8px 10px;margin-top:8px;font-size:12px;font-family:monospace;word-break:break-all}
  .copybox button{margin-left:auto;flex:none;background:var(--brand-bg);color:var(--brand);border:none;border-radius:7px;padding:5px 10px;font-size:11.5px;font-weight:700}
</style>
</head>
<body>
<div class="nodo-page">
  <div class="nodo-wrap" style="--nodo-max:820px">
    <div class="nodo-head">
      <div class="grow">
        <h1 class="nodo-title">Configuración</h1>
        <p class="nodo-lead">Marca, comportamiento e integraciones de este bot. Cada canal guarda sus propios ajustes.</p>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" data-t="marca" id="tabMarca"></button>
      <button class="tab" data-t="general" id="tabGeneral"></button>
      <button class="tab" data-t="ia" id="tabIa"></button>
      <button class="tab" data-t="pixel" id="tabPixel"></button>
      <button class="tab" data-t="gsheets" id="tabSheets"></button>
      <button class="tab" data-t="apariencia" id="tabApariencia"></button>
    </div>
    <div id="body"></div>
  </div>
</div>

<script type="module">
import { supa, mountShell, toast, getEffects, setEffects } from "./shell.js";
const $ = (id) => document.getElementById(id);
const IC={
  tag:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"/><circle cx="7.5" cy="7.5" r=".5" fill="currentColor"/></svg>',
  spark:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.9 4.2 12 2l2.1 2.2L17 5l-1 3 1 3-2.9.8L12 14l-2.1-2.2L7 11l1-3-1-3z"/><path d="M18 16l.7 2.3L21 19l-2.3.7L18 22l-.7-2.3L15 19l2.3-.7z"/></svg>',
  target:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>',
  sliders:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>',
  sheet:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>',
  monitor:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>',
};
const TIMEZONES=[
  ["America/Lima","Perú (Lima) · UTC-5"],["America/Bogota","Colombia (Bogotá) · UTC-5"],
  ["America/Mexico_City","México (CDMX) · UTC-6"],["America/Santiago","Chile (Santiago) · UTC-3/-4"],
  ["America/Argentina/Buenos_Aires","Argentina (Bs. As.) · UTC-3"],["America/Guayaquil","Ecuador (Guayaquil) · UTC-5"],
  ["America/La_Paz","Bolivia (La Paz) · UTC-4"],["America/Caracas","Venezuela (Caracas) · UTC-4"],
  ["America/Santo_Domingo","Rep. Dominicana · UTC-4"],["America/Guatemala","Guatemala · UTC-6"],
  ["America/New_York","EE. UU. (Este) · UTC-5"],["Europe/Madrid","España (Madrid) · UTC+1"],
];

const LOGO={ claude:"../assets/apps/claude.png", chatgpt:"../assets/apps/chatgpt.png", meta:"../assets/apps/meta.png", sheets:"../assets/apps/sheets.png" };
const PROVIDERS = [
  { id:"anthropic", nm:"Claude (Anthropic)", logo:LOGO.claude, desc:"Muy bueno en razonamiento, redacción y lectura de comprobantes (OCR).",
    keyHint:"sk-ant-...", models:["claude-opus-4-8","claude-sonnet-5","claude-haiku-4-5"] },
  { id:"openai", nm:"ChatGPT (OpenAI)", logo:LOGO.chatgpt, desc:"Modelos GPT de OpenAI.",
    keyHint:"sk-...", models:["gpt-4o","gpt-4o-mini"] },
];
const st = { channelId:null, tab:"marca", iaProvider:null, cfg:{}, channel:{}, secrets:{}, pendingLogo:null };
function esc(s){ return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

async function boot(){
  const { data:{ session } } = await supa.auth.getSession();
  if(!session){ location.href="index.html"; return; }
  $("tabMarca").innerHTML=IC.tag+"<span>Marca del Bot</span>";
  $("tabGeneral").innerHTML=IC.sliders+"<span>General</span>";
  $("tabIa").innerHTML=IC.spark+"<span>Inteligencia Artificial</span>";
  $("tabPixel").innerHTML=`<img src="${LOGO.meta}" alt=""/><span>Pixel de Meta</span>`;
  $("tabSheets").innerHTML=`<img src="${LOGO.sheets}" alt=""/><span>Google Sheets</span>`;
  $("tabApariencia").innerHTML=IC.monitor+"<span>Apariencia</span>";
  document.querySelectorAll(".tab").forEach(b=> b.onclick=()=>{ st.tab=b.dataset.t; document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x===b)); render(); });
  const shell=await mountShell({ active:"config" });
  st.channelId=shell.channelId;
  shell.onChannel(id=>{ st.channelId=id; loadCfg(); });
  if(st.channelId) await loadCfg();
}
async function loadCfg(){
  let { data:ch, error:chErr } = await supa.from("channels")
    .select("nombre,logo_url,ia_provider,pixel_id,page_id,buffer_default_seg,timezone,gsheets").eq("id",st.channelId).maybeSingle();
  if(chErr){ ({ data:ch } = await supa.from("channels").select("nombre,ia_provider,pixel_id,page_id,buffer_default_seg").eq("id",st.channelId).maybeSingle()); }
  st.iaProvider = ch?.ia_provider ?? null; st.channel = ch || {};
  const { data:rows } = await supa.from("channel_ai").select("provider,model,updated_at").eq("channel_id",st.channelId);
  st.cfg = {}; (rows||[]).forEach(r=> st.cfg[r.provider] = { model:r.model, updated_at:r.updated_at });
  st.secrets = {};
  try{ const r=await callFn("channel-config",{ action:"status", channel_id:st.channelId }); st.secrets=r?.secrets||{}; }catch(_){}
  render();
}

function render(){
  const b=$("body");
  if(st.tab==="marca") renderBranding(b);
  else if(st.tab==="general") renderGeneral(b);
  else if(st.tab==="ia") renderIA(b);
  else if(st.tab==="pixel") renderPixel(b);
  else if(st.tab==="apariencia") renderApariencia(b);
  else renderGsheets(b);
}

// ── Apariencia: efectos visuales del panel (preferencia local) ──────
function renderApariencia(b){
  const fx=getEffects();
  const lv=(v,l,d)=>`<button class="btn ${fx.level===v?'primary':''}" data-lv="${v}" style="flex-direction:column;height:auto;padding:11px 16px;align-items:flex-start;gap:2px;min-width:120px"><b style="font-size:13.5px">${l}</b><span style="font-size:11px;color:${fx.level===v?'rgba(255,255,255,.85)':'var(--muted)'};font-weight:500">${d}</span></button>`;
  b.innerHTML=`
    <h2>Apariencia</h2><p class="sub">Efectos visuales del panel. Se guardan en este navegador y aplican al instante — no afectan a otros usuarios.</p>
    <div class="card">
      <div class="chd"><span class="ico">${IC.monitor}</span><span class="nm">Fondo animado — constelación de nodos</span></div>
      <div class="desc">Aurora + una red de <b>nodos con señales que fluyen</b> por las conexiones: el concepto de Nodo (nodos + flujos) llevado al fondo. Se <b>pausa solo</b> cuando cambias de pestaña y respeta el ajuste de “reducir movimiento” del sistema.</div>
      <label>Intensidad</label>
      <div id="fxLevel" style="display:flex;gap:8px;flex-wrap:wrap">
        ${lv("full","Full","Todo el show")}${lv("suave","Suave","Recomendado")}${lv("off","Off","Sin efectos")}
      </div>
      <label style="margin-top:18px">Fluidez (FPS)</label>
      <div id="fxFps" style="display:flex;gap:8px;flex-wrap:wrap">
        ${[30,45,60].map(f=>`<button class="btn ${fx.fps===f?'primary':''}" data-f="${f}" style="min-width:90px">${f} fps</button>`).join("")}
      </div>
      <div class="desc" style="margin-top:14px">Más FPS = más fluido pero un poco más de batería. En reposo el fondo cuesta muy poco y <b>0% cuando la pestaña está oculta</b>. Sugerencia para el día a día: <b>Suave · 60 fps</b>.</div>
    </div>`;
  b.querySelectorAll("#fxLevel .btn").forEach(x=> x.onclick=()=>{ setEffects({ level:x.dataset.lv }); renderApariencia(b); });
  b.querySelectorAll("#fxFps .btn").forEach(x=> x.onclick=()=>{ setEffects({ fps:+x.dataset.f }); renderApariencia(b); });
}

// ── General: retraso de respuesta + zona horaria ────────────────────
function renderGeneral(b){
  const c=st.channel||{};
  const delay = c.buffer_default_seg ?? 4;
  const tz = c.timezone || "America/Lima";
  b.innerHTML=`
    <h2>Ajustes generales</h2><p class="sub">Comportamiento del bot y zona horaria de este canal.</p>
    <div class="card">
      <div class="chd"><span class="ico">${IC.sliders}</span><span class="nm">Retraso de respuesta del bot</span></div>
      <div class="desc">Si el usuario envía varios mensajes seguidos, el bot espera este tiempo y los agrupa en una sola respuesta. <b>0</b> = responde de inmediato. Aplica solo a conversaciones individuales.</div>
      <label>Segundos</label>
      <input class="in" id="g_delay" type="number" min="0" max="60" value="${Number(delay)}" style="max-width:140px"/>
    </div>
    <div class="card">
      <div class="chd"><span class="ico">${IC.target}</span><span class="nm">Zona horaria</span></div>
      <div class="desc">Define cuándo empieza y termina el día para <b>todas las métricas</b>: leads por día, resúmenes, reportes, campañas programadas, automatizaciones y conversiones.</div>
      <label>País / zona horaria</label>
      <select class="in" id="g_tz" style="max-width:340px">${TIMEZONES.map(([v,l])=>`<option value="${v}" ${v===tz?"selected":""}>${l}</option>`).join("")}</select>
    </div>
    <div class="acts"><button class="btn primary" id="saveGeneral">Guardar ajustes</button></div>`;
  $("saveGeneral").onclick=async(e)=>{
    const btn=e.target; btn.disabled=true; const old=btn.textContent; btn.textContent="Guardando…";
    const patch={ buffer_default_seg:Math.max(0,parseInt($("g_delay").value||"0",10)), timezone:$("g_tz").value };
    const { error }=await supa.from("channels").update(patch).eq("id",st.channelId);
    btn.disabled=false; btn.textContent=old;
    if(error){ toast(/timezone|column/.test(error.message)?"Falta aplicar la migración 0014 (timezone)":error.message,true); return; }
    st.channel.buffer_default_seg=patch.buffer_default_seg; st.channel.timezone=patch.timezone; toast("Guardado ✓");
  };
}

// ── Google Sheets (cuenta de servicio) ──────────────────────────────
// Correo de la cuenta de servicio de Nodo: se comparte la hoja con este
// correo (permiso Editor) y listo. No requiere que el usuario pase por la
// pantalla de consentimiento de Google ni cree su propio proyecto en GCP.
const NODO_GS_SERVICE_EMAIL = "nodo-sheets@nodo-crm.iam.gserviceaccount.com";
function sheetIdFrom(v){ const m=(v||"").match(/\/d\/([a-zA-Z0-9-_]+)/); return m?m[1]:(v||"").trim(); }
function renderGsheets(b){
  const g=(st.channel&&st.channel.gsheets)||{};
  const connected=!!g.connected;
  b.innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">
      <img src="${LOGO.sheets}" alt="" style="width:38px;height:38px;border-radius:10px"/>
      <div><h2 style="margin:0">Google Sheets</h2>
        <p class="sub" style="margin:2px 0 0">Registra contactos, ventas y comprobantes en tus hojas directamente desde los flujos.</p></div>
    </div>

    <div class="card ${connected?'on':''}">
      <div class="chd">
        <span class="ico" style="background:transparent;border:1px solid var(--border)"><img src="${LOGO.sheets}" alt=""/></span>
        <div><div class="nm">Conexión de la hoja</div><div class="desc" style="margin:2px 0 0">Sin claves ni JSON — solo compartes la hoja.</div></div>
        <span class="badge ${connected?'on':''}" style="margin-left:auto">${connected?'Conectada':'Sin conectar'}</span>
      </div>

      <div class="steps" style="margin-top:14px">
        <div class="step">
          <div class="num"></div>
          <div class="st-b">
            <div class="st-t">Comparte tu hoja con Nodo</div>
            <div class="st-d">Abre tu hoja en Google Sheets → botón <b>Compartir</b> → pega este correo y dale permiso de <b>Editor</b>. Es la cuenta de servicio de Nodo; con eso puede leer y escribir filas por ti.</div>
            <div class="copybox">${esc(NODO_GS_SERVICE_EMAIL)}<button id="copyEmail">Copiar</button></div>
          </div>
        </div>
        <div class="step">
          <div class="num"></div>
          <div class="st-b">
            <div class="st-t">Pega el enlace de la hoja</div>
            <div class="st-d">Copia la URL desde la barra del navegador (o solo el ID). Nodo la usará por defecto en los nodos de Sheets.</div>
            <input class="in" id="gs_sheet" style="margin-top:8px" value="${esc(g.spreadsheet_url||g.spreadsheet_id||'')}" placeholder="https://docs.google.com/spreadsheets/d/1AbC...def/edit"/>
          </div>
        </div>
        <div class="step">
          <div class="num"></div>
          <div class="st-b">
            <div class="st-t">Nombre de la pestaña (opcional)</div>
            <div class="st-d">La hoja/pestaña donde se agregan las filas. Si lo dejas vacío se usa la primera.</div>
            <input class="in" id="gs_tab" style="margin-top:8px;max-width:280px" value="${esc(g.tab||'')}" placeholder="Ventas"/>
          </div>
        </div>
      </div>

      <div class="acts">
        <button class="btn primary" id="saveGs">${connected?'Guardar cambios':'Conectar hoja'}</button>
        <button class="btn" id="testGs">Probar y escribir fila</button>
        ${connected?`<button class="btn danger" id="discGs" style="margin-left:auto">Desconectar</button>`:""}
      </div>
      <div class="desc" id="gsTestOut" style="margin-top:12px"></div>
    </div>`;
  const cp=$("copyEmail"); if(cp) cp.onclick=()=>{ navigator.clipboard?.writeText(NODO_GS_SERVICE_EMAIL); toast("Correo copiado ✓"); };
  $("saveGs").onclick=async(e)=>{
    const url=$("gs_sheet").value.trim();
    if(!url){ toast("Pega el enlace de tu hoja",true); return; }
    const gs={ connected:true, service_email:NODO_GS_SERVICE_EMAIL, spreadsheet_url:url, spreadsheet_id:sheetIdFrom(url), tab:$("gs_tab").value.trim()||null };
    await saveGsheets(e.target, gs);
  };
  $("testGs").onclick=testGsheets;
  const disc=$("discGs"); if(disc) disc.onclick=(e)=>saveGsheets(e.target,{ connected:false });
}
// Prueba REAL de conexión: pide al backend escribir una fila de prueba en la hoja.
async function testGsheets(e){
  const btn=e.target, out=$("gsTestOut");
  const url=$("gs_sheet").value.trim(); const sid=sheetIdFrom(url);
  if(!sid){ toast("Primero pega el enlace de la hoja",true); return; }
  btn.disabled=true; const old=btn.textContent; btn.textContent="Probando…"; out.innerHTML="";
  try{
    const r=await callFn("gsheets-test",{ channel_id:st.channelId, spreadsheet_id:sid, tab:$("gs_tab").value.trim()||null });
    out.innerHTML=`<span style="color:var(--green)">✓ Conexión correcta.</span> Se escribió una fila de prueba en la hoja${r?.row?` (fila ${r.row})`:""}. Ya puedes borrarla.`;
    toast("Hoja conectada ✓");
  }catch(err){
    const msg=(err&&err.message)||"error";
    if(/not found|404|no encontr|Function not found/i.test(msg)){
      out.innerHTML=`<span style="color:var(--amber)">La comprobación en vivo aún no está desplegada</span> (Edge Function <code>gsheets-test</code>). La configuración quedó guardada; funcionará al habilitar los nodos de Sheets.`;
    } else if(/permission|403|share|comparti/i.test(msg)){
      out.innerHTML=`<span style="color:var(--red)">Sin acceso a la hoja.</span> Verifica que la compartiste con <b>${esc(NODO_GS_SERVICE_EMAIL)}</b> como <b>Editor</b>.`;
    } else {
      out.innerHTML=`<span style="color:var(--red)">No se pudo conectar:</span> ${esc(msg)}`;
    }
  } finally { btn.disabled=false; btn.textContent=old; }
}
async function saveGsheets(btn, gs){
  btn.disabled=true; const old=btn.textContent; btn.textContent="Guardando…";
  const { error }=await supa.from("channels").update({ gsheets:gs }).eq("id",st.channelId);
  btn.disabled=false; btn.textContent=old;
  if(error){ toast(/gsheets|column/.test(error.message)?"Falta aplicar la migración 0014 (gsheets)":error.message,true); return; }
  st.channel.gsheets=gs; toast("Guardado ✓"); render();
}

function renderBranding(b){
  const c=st.channel||{}; const logo=c.logo_url||"../assets/logo-rounded.png";
  b.innerHTML=`
    <h2>Marca del Bot</h2><p class="sub">Nombre y logo que se muestran en el panel para este bot. Si no defines un logo, se usa el de Nodo.</p>
    <div class="card">
      <div class="row" style="align-items:center;gap:16px">
        <img id="brandPrev" src="${esc(logo)}" alt="" style="width:56px;height:56px;border-radius:13px;object-fit:cover;background:var(--surface-2);border:1px solid var(--border)"/>
        <div class="f"><label>Nombre del bot</label><input class="in" id="b_nombre" value="${esc(c.nombre||'')}"/></div>
      </div>
      <label>Logo del bot</label>
      <div class="acts" style="margin-top:0">
        <button class="btn" id="uploadBtn">⬆ Subir desde la PC</button>
        <input type="file" id="logoFile" accept="image/png,image/jpeg,image/webp" hidden/>
        <span class="desc" style="margin:0">o pega una URL abajo</span>
      </div>
      <input class="in" id="b_logo" value="${esc((c.logo_url||'').startsWith('data:')?'':(c.logo_url||''))}" placeholder="https://.../logo.png" style="margin-top:8px"/>
      <div class="acts"><button class="btn primary" id="saveBrand">Guardar marca</button></div>
    </div>`;
  $("b_logo").oninput=(e)=>{ st.pendingLogo=null; $("brandPrev").src=e.target.value.trim()||"../assets/logo-rounded.png"; };
  $("uploadBtn").onclick=()=>$("logoFile").click();
  $("logoFile").onchange=(e)=>handleLogoFile(e.target.files[0]);
  $("saveBrand").onclick=(e)=>saveBrand(e.target);
}
function downscaleImage(file, size=96){
  return new Promise((res,rej)=>{ const img=new Image(); const url=URL.createObjectURL(file);
    img.onload=()=>{ const c=document.createElement("canvas"); c.width=size; c.height=size; const ctx=c.getContext("2d");
      const s=Math.min(size/img.width,size/img.height), w=img.width*s, h=img.height*s;
      ctx.drawImage(img,(size-w)/2,(size-h)/2,w,h); URL.revokeObjectURL(url); res(c.toDataURL("image/png")); };
    img.onerror=()=>{ URL.revokeObjectURL(url); rej(new Error("no se pudo leer la imagen")); }; img.src=url; });
}
async function handleLogoFile(file){
  if(!file) return; if(file.size>4*1024*1024){ toast("Imagen muy grande (máx 4MB)",true); return; }
  try{ const d=await downscaleImage(file,96); st.pendingLogo=d; $("brandPrev").src=d; toast("Imagen cargada — pulsa Guardar marca"); }
  catch(e){ toast(e.message||"error",true); }
}
async function saveBrand(btn){
  const nombre=$("b_nombre").value.trim();
  const logo_url = st.pendingLogo || ($("b_logo").value.trim()||null);
  if(!nombre){ toast("El nombre no puede estar vacío",true); return; }
  btn.disabled=true; const old=btn.textContent; btn.textContent="Guardando…";
  const { error }=await supa.from("channels").update({ nombre, logo_url }).eq("id",st.channelId);
  btn.disabled=false; btn.textContent=old;
  if(error){ toast(error.message.includes("logo_url")?"Falta aplicar la migración 0012 (logo_url)":error.message,true); return; }
  toast("Marca guardada ✓");
  const nl=document.getElementById("nodoLogo"); if(nl) nl.src=logo_url||"../assets/logo-rounded.png";
  const bn=document.getElementById("nodoBrandName"); if(bn) bn.textContent=nombre;
  const opt=document.querySelector(`#nodoBot option[value="${st.channelId}"]`); if(opt) opt.textContent=nombre;
  st.channel.nombre=nombre; st.channel.logo_url=logo_url; st.pendingLogo=null;
}

// ── Inteligencia Artificial ─────────────────────────────────────────
function renderIA(box){
  box.innerHTML=`<h2>Inteligencia Artificial</h2><p class="sub">Cada bot usa su propia cuenta de IA. Pega la API key del proveedor que prefieras y quedará habilitado para los nodos ✨ IA de tus flujos.</p><div id="cards"></div>`;
  const cont=$("cards");
  PROVIDERS.forEach(p=>{
    const cfg=st.cfg[p.id], isDef=st.iaProvider===p.id;
    const card=document.createElement("div"); card.className="card"+(cfg?" on":"");
    const dl=p.models.map(m=>`<option value="${m}">`).join("");
    card.innerHTML=`
      <div class="chd"><span class="ico"><img src="${p.logo}" alt=""/></span>
        <span class="nm">${esc(p.nm)}</span>
        ${cfg?'<span class="badge on">Configurada</span>':'<span class="badge">Sin configurar</span>'}
        ${isDef?'<span class="badge def">Por defecto</span>':''}</div>
      <div class="desc">${esc(p.desc)}</div>
      <label>API key ${cfg?'<span style="color:var(--faint)">(vacía para conservar la actual)</span>':''}</label>
      <input class="in" type="password" id="key_${p.id}" autocomplete="off" placeholder="${cfg?'•••••••• guardada':p.keyHint}"/>
      <label>Modelo por defecto</label>
      <input class="in" id="model_${p.id}" list="dl_${p.id}" value="${esc(cfg?.model||p.models[0])}" placeholder="${esc(p.models[0])}"/>
      <datalist id="dl_${p.id}">${dl}</datalist>
      <div class="acts">
        <button class="btn primary" data-a="save" data-p="${p.id}">Guardar</button>
        <button class="btn" data-a="test" data-p="${p.id}" ${cfg?'':'disabled'}>Probar</button>
        ${!isDef&&cfg?`<button class="btn ghost" data-a="default" data-p="${p.id}">Usar por defecto</button>`:''}
        ${cfg?`<button class="btn danger" data-a="delete" data-p="${p.id}">Eliminar</button>`:''}
      </div>`;
    cont.appendChild(card);
  });
  cont.querySelectorAll("button[data-a]").forEach(b=> b.onclick=()=>onAction(b.dataset.a,b.dataset.p,b));
}

async function saveChannel(btn, fields){
  btn.disabled=true; const old=btn.textContent; btn.textContent="Guardando…";
  try{ await callFn("channel-config",{ action:"save", channel_id:st.channelId, ...fields }); toast("Guardado ✓"); await loadCfg(); }
  catch(e){ toast(e.message||"error",true); }
  finally{ btn.disabled=false; btn.textContent=old; }
}
async function callFn(fn, body){
  const { data, error } = await supa.functions.invoke(fn, { body });
  if(error){ let d=""; try{ d=(await error.context?.json?.())?.detalle||""; }catch{} throw new Error(d||error.message||"error"); }
  return data;
}
async function call(body){
  const { data, error } = await supa.functions.invoke("ai-config", { body });
  if(error){ let d=""; try{ d=(await error.context?.json?.())?.detalle||""; }catch{} throw new Error(d||error.message||"error"); }
  return data;
}
async function onAction(action, provider, btn){
  const key=$("key_"+provider)?.value?.trim()||null;
  const model=$("model_"+provider)?.value?.trim()||null;
  btn.disabled=true; const old=btn.textContent;
  try{
    if(action==="save"){
      if(!key && !st.cfg[provider]){ toast("Pega la API key primero",true); return; }
      await call({ action:"save", channel_id:st.channelId, provider, api_key:key, model, make_default:!st.iaProvider });
      toast("Guardado ✓");
    } else if(action==="test"){
      btn.textContent="Probando…";
      const r=await call({ action:"test", channel_id:st.channelId, provider });
      if(r?.ok) toast("IA responde ✓"); else toast("Falló: "+(r?.detalle||r?.error||""),true); return;
    } else if(action==="default"){ await call({ action:"default", channel_id:st.channelId, provider }); toast("Proveedor por defecto ✓"); }
    else if(action==="delete"){ if(!confirm("¿Eliminar la configuración de "+provider+"?")) return; await call({ action:"delete", channel_id:st.channelId, provider }); toast("Eliminado ✓"); }
    await loadCfg();
  }catch(e){ toast(e.message||"error",true); }
  finally{ btn.disabled=false; btn.textContent=old; }
}
boot();
</script>
