<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script>try{document.documentElement.dataset.theme=localStorage.getItem("nodo.theme")||"dark"}catch(e){}</script>
<title>Nodo · Ajustes</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png" />
<link rel="stylesheet" href="shell.css" />
<style>
  :root{
    --bg:#0e1116; --surface:#151a21; --surface-2:#1b222c; --border:#232b36;
    --text:#e7ecf2; --muted:#8a97a8; --faint:#5c6675;
    --brand:#2b7fff; --brand-2:#1e6ff0; --brand-bg:#12233f;
    --green:#22c079; --green-bg:#10281d; --amber:#f0a92b; --red:#e2564a; --red-bg:#2c1615;
    --font:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box} html,body{height:100%;margin:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px}
  button{font-family:inherit;cursor:pointer}
  .tabs{display:flex;gap:4px;margin:24px 0 22px;border-bottom:1px solid var(--border);flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{background:transparent;border:none;color:var(--muted);font-size:13.5px;font-weight:600;padding:11px 12px;border-bottom:2px solid transparent;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;flex:none}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--brand);border-bottom-color:var(--brand)}
  .tab svg{width:17px;height:17px}
  .tab img{width:18px;height:18px;border-radius:5px;object-fit:cover}
  h2{font-size:18px;margin:0 0 4px;font-weight:700;letter-spacing:-.2px}
  .sub{color:var(--muted);font-size:13.5px;margin:0 0 20px;line-height:1.55;max-width:640px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 22px;margin-bottom:16px}
  .card.on{border-color:var(--green)}
  .chd{display:flex;align-items:center;gap:13px;margin-bottom:4px}
  .chd .ico{width:46px;height:46px;border-radius:13px;background:var(--brand-bg);color:var(--brand);display:flex;align-items:center;justify-content:center;overflow:hidden;flex:none}
  .chd .ico svg{width:22px;height:22px}
  .chd .ico img{width:100%;height:100%;object-fit:cover}
  .chd .nm{font-weight:700;font-size:16px;letter-spacing:-.1px}
  .badge{font-size:10.5px;padding:3px 10px;border-radius:20px;background:var(--surface-2);border:1px solid var(--border);color:var(--muted);font-weight:700}
  .badge.on{background:var(--green-bg);color:var(--green);border-color:transparent}
  .badge.def{background:var(--brand-bg);color:var(--brand);border-color:transparent}
  .desc{color:var(--muted);font-size:12.5px;margin:12px 0 4px;line-height:1.55}
  label{display:block;font-size:11.5px;color:var(--muted);margin:14px 0 6px;font-weight:700}
  .in{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:11px 13px;font-size:13.5px;outline:none;font-family:var(--font)}
  .in:focus{border-color:var(--brand)}
  .row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
  .row>.f{flex:1;min-width:170px}
  .acts{display:flex;gap:8px;margin-top:18px;align-items:center;flex-wrap:wrap}
  .btn{height:40px;padding:0 16px;border-radius:11px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:13.5px;font-weight:600}
  .btn.primary{background:var(--brand);border:none;color:#fff}
  /* Entregas Lima: esta página no tenía switches ni checkboxes propios.
     Prefijo ent- a propósito: una clase genérica como .sw o .chk puede chocar
     con las del cascarón o las de otra página (ya nos pasó con .lbl). */
  .ent-sw{width:38px;height:21px;border-radius:999px;background:var(--border-strong,var(--border));
    position:relative;flex:none;transition:background .18s;cursor:pointer}
  .ent-sw::after{content:"";position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;
    background:#fff;transition:transform .18s}
  .ent-sw.on{background:var(--brand)}
  .ent-sw.on::after{transform:translateX(17px)}
  .ent-chk{display:inline-flex;align-items:center;gap:5px;cursor:pointer;user-select:none;color:var(--muted)}
  .ent-chk input{accent-color:var(--brand);cursor:pointer;margin:0}
  .btn.primary:hover{background:var(--brand-2)}
  .btn.ghost{color:var(--muted)} .btn.danger{color:var(--red);border-color:transparent}
  /* Google Sheets — pasos guiados */
  .steps{counter-reset:s;margin:4px 0 8px}
  .step{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border)}
  .step:last-child{border-bottom:none}
  .step .num{counter-increment:s;width:28px;height:28px;flex:none;border-radius:50%;background:var(--brand-bg);color:var(--brand);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center}
  .step .num::before{content:counter(s)}
  .step .st-b{flex:1;min-width:0}
  .step .st-t{font-weight:700;font-size:14px;margin-bottom:3px}
  .step .st-d{font-size:12.5px;color:var(--muted);line-height:1.55}
  .copybox{display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:8px 10px;margin-top:8px;font-size:12px;font-family:monospace;word-break:break-all}
  .copybox button{margin-left:auto;flex:none;background:var(--brand-bg);color:var(--brand);border:none;border-radius:7px;padding:5px 10px;font-size:11.5px;font-weight:700}
</style>
</head>
<body>
<div class="nodo-page">
  <div class="nodo-wrap" style="--nodo-max:820px">
    <div class="nodo-head">
      <div class="grow">
        <h1 class="nodo-title">Ajustes</h1>
        <p class="nodo-lead">Marca, comportamiento e integraciones de este bot. Cada canal guarda sus propios ajustes.</p>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" data-t="marca" id="tabMarca"></button>
      <button class="tab" data-t="general" id="tabGeneral"></button>
      <button class="tab" data-t="entregas" id="tabEntregas"></button>
      <button class="tab" data-t="pixel" id="tabPixel"></button>
      <button class="tab" data-t="gsheets" id="tabSheets"></button>
      <button class="tab" data-t="apariencia" id="tabApariencia"></button>
    </div>
    <div id="body"></div>
  </div>
</div>

<script type="module">
import { supa, mountShell, toast, icon, confirmDialog, getEffects, setEffects } from "./shell.js";
const $ = (id) => document.getElementById(id);
const IC={
  tag:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"/><circle cx="7.5" cy="7.5" r=".5" fill="currentColor"/></svg>',
  spark:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.9 4.2 12 2l2.1 2.2L17 5l-1 3 1 3-2.9.8L12 14l-2.1-2.2L7 11l1-3-1-3z"/><path d="M18 16l.7 2.3L21 19l-2.3.7L18 22l-.7-2.3L15 19l2.3-.7z"/></svg>',
  target:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>',
  sliders:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>',
  sheet:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>',
  monitor:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>',
};
const TIMEZONES=[
  ["America/Lima","Perú (Lima) · UTC-5"],["America/Bogota","Colombia (Bogotá) · UTC-5"],
  ["America/Mexico_City","México (CDMX) · UTC-6"],["America/Santiago","Chile (Santiago) · UTC-3/-4"],
  ["America/Argentina/Buenos_Aires","Argentina (Bs. As.) · UTC-3"],["America/Guayaquil","Ecuador (Guayaquil) · UTC-5"],
  ["America/La_Paz","Bolivia (La Paz) · UTC-4"],["America/Caracas","Venezuela (Caracas) · UTC-4"],
  ["America/Santo_Domingo","Rep. Dominicana · UTC-4"],["America/Guatemala","Guatemala · UTC-6"],
  ["America/New_York","EE. UU. (Este) · UTC-5"],["Europe/Madrid","España (Madrid) · UTC+1"],
];

const LOGO={ claude:"../assets/apps/claude.png", chatgpt:"../assets/apps/chatgpt.png", meta:"../assets/apps/meta.png", sheets:"../assets/apps/sheets.png" };
const PROVIDERS = [
  { id:"anthropic", nm:"Claude (Anthropic)", logo:LOGO.claude, desc:"Muy bueno en razonamiento, redacción y lectura de comprobantes (OCR).",
    keyHint:"sk-ant-...", models:["claude-opus-4-8","claude-sonnet-5","claude-haiku-4-5"] },
  { id:"openai", nm:"ChatGPT (OpenAI)", logo:LOGO.chatgpt, desc:"Modelos GPT de OpenAI.",
    keyHint:"sk-...", models:["gpt-4o","gpt-4o-mini"] },
];
const st = { channelId:null, tab:"marca", iaProvider:null, cfg:{}, channel:{}, secrets:{}, pendingLogo:null };
function esc(s){ return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

async function boot(){
  const { data:{ session } } = await supa.auth.getSession();
  if(!session){ location.href="index.html"; return; }
  $("tabMarca").innerHTML=IC.tag+"<span>Marca</span>";
  $("tabGeneral").innerHTML=IC.sliders+"<span>General</span>";
  $("tabEntregas").innerHTML=icon("truck")+"<span>Entregas Lima</span>";
  $("tabPixel").innerHTML=`<img src="${LOGO.meta}" alt=""/><span>Pixel de Meta</span>`;
  $("tabSheets").innerHTML=`<img src="${LOGO.sheets}" alt=""/><span>Google Sheets</span>`;
  $("tabApariencia").innerHTML=IC.monitor+"<span>Apariencia</span>";
  document.querySelectorAll(".tab").forEach(b=> b.onclick=()=>{ st.tab=b.dataset.t; document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x===b)); render(); });
  const shell=await mountShell({ active:"config" });
  st.channelId=shell.channelId;
  shell.onChannel(id=>{ st.channelId=id; loadCfg(); });
  // Retorno del login de Google (gsheets-callback redirige con ?gs=...).
  const gsRet=new URLSearchParams(location.search).get("gs");
  if(gsRet){
    st.tab="gsheets"; st.gsMethod="oauth";
    document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x.dataset.t==="gsheets"));
    if(gsRet==="ok") toast("Google conectado ✓ — ahora elige tu hoja");
    else if(gsRet==="sin_refresh") toast("Google no devolvió permiso permanente. Reintenta y acepta todos los permisos.",true);
    else if(gsRet==="expirado") toast("El enlace expiró, vuelve a conectar.",true);
    else toast("No se pudo conectar con Google. Reintenta.",true);
    history.replaceState(null,"",location.pathname);
  }
  if(st.channelId) await loadCfg();
}
async function loadCfg(){
  let { data:ch, error:chErr } = await supa.from("channels")
    .select("nombre,logo_url,ia_provider,pixel_id,page_id,buffer_default_seg,timezone,gsheets,negocio,ia_perfiles,entregas").eq("id",st.channelId).maybeSingle();
  if(chErr){ ({ data:ch, error:chErr } = await supa.from("channels").select("nombre,logo_url,ia_provider,pixel_id,page_id,buffer_default_seg,timezone,gsheets,negocio,ia_perfiles").eq("id",st.channelId).maybeSingle()); }
  if(chErr){ ({ data:ch, error:chErr } = await supa.from("channels").select("nombre,logo_url,ia_provider,pixel_id,page_id,buffer_default_seg,timezone,gsheets").eq("id",st.channelId).maybeSingle()); }
  if(chErr){ ({ data:ch } = await supa.from("channels").select("nombre,ia_provider,pixel_id,page_id,buffer_default_seg").eq("id",st.channelId).maybeSingle()); }
  st.iaProvider = ch?.ia_provider ?? null; st.channel = ch || {};
  const { data:rows } = await supa.from("channel_ai").select("provider,model,updated_at").eq("channel_id",st.channelId);
  st.cfg = {}; (rows||[]).forEach(r=> st.cfg[r.provider] = { model:r.model, updated_at:r.updated_at });
  st.secrets = {};
  try{ const r=await callFn("channel-config",{ action:"status", channel_id:st.channelId }); st.secrets=r?.secrets||{}; }catch(_){}
  render();
}

function render(){
  const b=$("body");
  if(st.tab==="marca") renderBranding(b);
  else if(st.tab==="general") renderGeneral(b);
  else if(st.tab==="entregas") renderEntregas(b);
  else if(st.tab==="pixel") renderPixel(b);
  else if(st.tab==="apariencia") renderApariencia(b);
  else renderGsheets(b);
}

// ═══════════════════════════════════════════════════════════════════
// ENTREGAS LIMA — la lista REAL de entrega del negocio y sus reglas.
// Todo lo que se toca acá lo obedece el CÓDIGO, no la IA: la IA solo interpreta
// qué lugar dijo el cliente; si cubrimos, si llega hoy y si ya pasó la hora de
// corte lo decide el motor contra esto. O sea: destildar una zona la saca de
// Lima de verdad, no "le sugiere" a la IA que no la ofrezca.
// Lo que no está en la lista → Provincia (agencia), automático.
// ═══════════════════════════════════════════════════════════════════
const GRUPOS=[["centro","Lima Centro"],["moderna","Lima Moderna"],["norte","Lima Norte"],
              ["sur","Lima Sur"],["este","Lima Este"],["callao","Callao"]];
const DIAS=[["lun","L"],["mar","M"],["mie","M"],["jue","J"],["vie","V"],["sab","S"]];

function renderEntregas(b){
  const e=st.channel.entregas;
  if(!e || !Array.isArray(e.zonas)){
    b.innerHTML=`<div class="card"><h3>Entregas Lima</h3>
      <p class="sub">Este bot todavía no tiene zonas de entrega cargadas (falta aplicar la migración 0032).</p></div>`;
    return;
  }
  st.ent=JSON.parse(JSON.stringify(e)); // se edita una copia; se guarda al confirmar
  const E=st.ent;
  E.dias=E.dias||{}; E.horario=E.horario||{};
  if(!Array.isArray(E.feriados_fechas)) E.feriados_fechas=[];

  const sw=(on,id)=>`<span class="ent-sw ${on?'on':''}" data-sw="${id}"></span>`;
  const row=(txt,sub,on,id)=>`<div class="erow" data-row="${id}" style="display:flex;align-items:center;justify-content:space-between;
    gap:10px;border:1px solid var(--border);border-radius:11px;padding:11px 12px;cursor:pointer;margin-top:8px">
    <span><span style="font-weight:600;font-size:13px">${txt}</span>
    ${sub?`<div style="font-size:11.5px;color:var(--faint);margin-top:2px">${sub}</div>`:""}</span>${sw(on,id)}</div>`;

  b.innerHTML=`
    <div class="card">
      <h3 style="display:flex;align-items:center;gap:8px">${icon("truck")} Reglas de entrega</h3>
      <p class="sub">Lo que configures acá es una <b>regla</b>: el sistema la calcula y la IA solo la comunica.
      Ella ni siquiera sabe qué hora es — de eso se encarga el motor.</p>
      ${row("Envío gratis","Se le dice al cliente que el envío no cuesta.",E.envio_gratis!==false,"envio_gratis")}
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:14px">
        <label style="margin:0;font-size:12.5px;font-weight:700">Hora de corte para entrega el mismo día</label>
        <input class="in" id="entCorte" type="time" value="${esc(E.corte||"11:00")}" style="width:120px"/>
        <span style="font-size:11.5px;color:var(--faint);flex:1;min-width:200px">
          Si el cliente pide para hoy después de esta hora, se le ofrece mañana.</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:14px">
        <label style="margin:0;font-size:12.5px;font-weight:700;margin-right:4px">Días de reparto</label>
        ${DIAS.map(([k,l])=>`<button class="dbtn ${E.dias[k]!==false?'on':''}" data-dia="${k}"
          style="width:34px;height:34px;border-radius:9px;border:1.5px solid ${E.dias[k]!==false?'var(--brand)':'var(--border)'};
          background:${E.dias[k]!==false?'var(--brand)':'transparent'};color:${E.dias[k]!==false?'#fff':'var(--muted)'};
          font-weight:700;font-size:12px;cursor:pointer">${l}</button>`).join("")}
      </div>
      ${row("Entrego domingos","",E.domingos===true,"domingos")}
      ${row("Entrego feriados","Si está apagado, las fechas de abajo no tienen reparto.",E.feriados===true,"feriados")}
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:14px">
        <label style="margin:0;font-size:12.5px;font-weight:700">Horario de entrega</label>
        <input class="in" id="entDesde" type="time" value="${esc(E.horario.desde||"09:00")}" style="width:120px"/>
        <span style="font-size:12.5px;color:var(--muted)">a</span>
        <input class="in" id="entHasta" type="time" value="${esc(E.horario.hasta||"19:00")}" style="width:120px"/>
      </div>
      <label style="margin-top:16px">Feriados</label>
      <div id="ferList" style="margin-top:4px"></div>
      <button class="btn" id="ferAdd" style="height:32px;margin-top:8px">+ Feriado</button>
    </div>

    <div class="card">
      <h3 style="display:flex;align-items:center;gap:8px">${icon("pin")} Zonas de entrega</h3>
      <p class="sub"><b>Cubro</b> = es Lima (contraentrega). <b>Mismo día</b> = puede llegar hoy si pide antes de la hora de corte.
      Todo lo que <b>no</b> esté acá (o esté destildado) va por <b>agencia a provincia</b>, automático.</p>
      <div id="zonas"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px"><button class="btn primary" id="entSave">Guardar cambios</button></div>`;

  // Toggles de reglas (click en toda la fila).
  b.querySelectorAll(".erow").forEach(r=> r.onclick=()=>{
    const k=r.dataset.row;
    E[k] = k==="envio_gratis" ? !(E[k]!==false) : !(E[k]===true);
    r.querySelector("[data-sw]").classList.toggle("on", k==="envio_gratis" ? E[k]!==false : E[k]===true);
  });
  b.querySelectorAll(".dbtn").forEach(x=> x.onclick=()=>{
    const k=x.dataset.dia; E.dias[k]=!(E.dias[k]!==false); renderEntregas(b);
  });
  $("entCorte").onchange=(ev)=>{ E.corte=ev.target.value; };
  $("entDesde").onchange=(ev)=>{ E.horario.desde=ev.target.value; };
  $("entHasta").onchange=(ev)=>{ E.horario.hasta=ev.target.value; };
  $("ferAdd").onclick=()=>{ E.feriados_fechas.push(""); paintFeriados(); };
  $("entSave").onclick=guardarEntregas;
  paintFeriados();
  paintZonas();
}

function paintFeriados(){
  const E=st.ent, box=$("ferList"); if(!box) return;
  box.innerHTML="";
  if(!E.feriados_fechas.length){ box.innerHTML=`<div style="font-size:12px;color:var(--faint)">Sin feriados cargados.</div>`; return; }
  E.feriados_fechas.forEach((f,i)=>{
    const r=document.createElement("div"); r.style.cssText="display:flex;gap:7px;align-items:center;margin-bottom:6px";
    r.innerHTML=`<input class="in fd" type="date" value="${esc(f||"")}" style="width:170px"/>
      <button class="btn fdel" style="height:32px">${icon("trash")}</button>`;
    r.querySelector(".fd").onchange=(ev)=>{ E.feriados_fechas[i]=ev.target.value; };
    r.querySelector(".fdel").onclick=()=>{ E.feriados_fechas.splice(i,1); paintFeriados(); };
    box.appendChild(r);
  });
}

function paintZonas(){
  const E=st.ent, box=$("zonas"); if(!box) return;
  box.innerHTML="";
  GRUPOS.forEach(([g,label])=>{
    const zs=E.zonas.filter(z=>z.grupo===g);
    if(!zs.length) return;
    const nCub=zs.filter(z=>z.cubro!==false).length, nMd=zs.filter(z=>z.mismo_dia===true).length;
    const sec=document.createElement("div");
    sec.style.cssText="border:1px solid var(--border);border-radius:12px;padding:12px;margin-top:10px";
    sec.innerHTML=`
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap">
        <div style="font-weight:700;font-size:13.5px">${label}
          <span style="color:var(--faint);font-weight:400;font-size:12px">· ${nCub}/${zs.length} cubiertas · ${nMd} con mismo día</span></div>
        <div style="display:flex;gap:6px">

// ── Google Sheets (vía Apps Script — sin claves ni Google Cloud) ─────
// El usuario pega un mini-script en su propia hoja y lo publica como "app
// web"; eso da una URL a la que Nodo hace POST con cada fila. Simple y gratis.
const GS_SCRIPT = `function doPost(e) {
  var data = JSON.parse(e.postData.contents);
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sh = data.hoja ? (ss.getSheetByName(data.hoja) || ss.insertSheet(data.hoja)) : ss.getSheets()[0];
  var fila = data.fila || {}, buscar = data.buscar || {};
  var headers = sh.getLastColumn() > 0 ? sh.getRange(1, 1, 1, sh.getLastColumn()).getValues()[0] : [];
  function col(name) {
    var i = headers.indexOf(name);
    if (i === -1) { headers.push(name); sh.getRange(1, headers.length).setValue(name); i = headers.length - 1; }
    return i;
  }
  if (headers.join('') === '') { headers = Object.keys(buscar).concat(Object.keys(fila)); if (headers.length) sh.getRange(1, 1, 1, headers.length).setValues([headers]); }
  Object.keys(buscar).forEach(col); Object.keys(fila).forEach(col);

  if (data.accion === 'update') {
    var last = sh.getLastRow();
    var rows = last > 1 ? sh.getRange(2, 1, last - 1, headers.length).getValues() : [];
    for (var r = 0; r < rows.length; r++) {
      var match = true;
      for (var b in buscar) { if (String(rows[r][headers.indexOf(b)]) !== String(buscar[b])) { match = false; break; } }
      if (match) {
        Object.keys(fila).forEach(function (k) { sh.getRange(r + 2, headers.indexOf(k) + 1).setValue(fila[k]); });
        return out({ ok: true, updated: r + 2 });
      }
    }
    var merged = {}; for (var x in buscar) merged[x] = buscar[x]; for (var y in fila) merged[y] = fila[y];
    sh.appendRow(headers.map(function (h) { return merged[h] !== undefined ? merged[h] : ''; }));
    return out({ ok: true, appended: true });
  }

  sh.appendRow(headers.map(function (h) { return fila[h] !== undefined ? fila[h] : ''; }));
  return out({ ok: true });
}
function out(o) { return ContentService.createTextOutput(JSON.stringify(o)).setMimeType(ContentService.MimeType.JSON); }`;
function sheetIdFrom(v){ const m=(v||"").match(/\/d\/([a-zA-Z0-9-_]+)/); return m?m[1]:(v||"").trim(); }

function downscaleImage(file, size=96){
  return new Promise((res,rej)=>{ const img=new Image(); const url=URL.createObjectURL(file);
    img.onload=()=>{ const c=document.createElement("canvas"); c.width=size; c.height=size; const ctx=c.getContext("2d");
      const s=Math.min(size/img.width,size/img.height), w=img.width*s, h=img.height*s;
      ctx.drawImage(img,(size-w)/2,(size-h)/2,w,h); URL.revokeObjectURL(url); res(c.toDataURL("image/png")); };
    img.onerror=()=>{ URL.revokeObjectURL(url); rej(new Error("no se pudo leer la imagen")); }; img.src=url; });
}
async function handleLogoFile(file){
  if(!file) return; if(file.size>4*1024*1024){ toast("Imagen muy grande (máx 4MB)",true); return; }
  try{ const d=await downscaleImage(file,96); st.pendingLogo=d; $("brandPrev").src=d; toast("Imagen cargada — pulsa Guardar marca"); }
  catch(e){ toast(e.message||"error",true); }
}

  toast("Marca guardada ✓");
  const nl=document.getElementById("nodoLogo"); if(nl) nl.src=logo_url||"../assets/logo-128.png";
  const bn=document.getElementById("nodoBrandName"); if(bn) bn.textContent=nombre;
  const opt=document.querySelector(`#nodoBot option[value="${st.channelId}"]`); if(opt) opt.textContent=nombre;
  st.channel.nombre=nombre; st.channel.logo_url=logo_url; st.pendingLogo=null;
}

// ── Pixel de Meta (CAPI) ────────────────────────────────────────────
function renderPixel(box){
  const c=st.channel||{}, s=st.secrets||{};
  box.innerHTML=`
    <h2>Conexión del Pixel de Meta</h2>
    <p class="sub">Envío de conversiones a Meta (Conversions API) para optimizar tus campañas de Click-to-WhatsApp: Lead, InitiateCheckout y Purchase.</p>
    <div class="card">
      <div class="chd"><span class="ico"><img src="${LOGO.meta}" alt="Meta"/></span><span class="nm">Pixel / Conversions API</span></div>
      <div class="desc">El Pixel ID y el Page ID identifican tu activo publicitario; el token CAPI autoriza el envío de eventos.</div>
      <div class="row">
        <div class="f"><label>Pixel ID</label><input class="in" id="m_pixel_id" value="${esc(c.pixel_id)}" placeholder="p. ej. 998798536397963"/></div>
        <div class="f"><label>Page ID</label><input class="in" id="m_page_id" value="${esc(c.page_id)}" placeholder="página del anuncio (CTWA)"/></div>
      </div>
      <label>Token CAPI (Conversions API) ${s.capi_token?'<span class="badge on">Configurado</span>':'<span class="badge">Sin configurar</span>'}</label>
      <input class="in" type="password" id="s_capi_token" autocomplete="off" placeholder="${s.capi_token?'•••••••• guardado':'token del pixel (Eventos → Configuración)'}"/>
      <div class="acts"><button class="btn primary" id="savePixel">Guardar Pixel</button></div>
    </div>`;
  $("savePixel").onclick=(e)=>saveChannel(e.target,{ pixel_id:$("m_pixel_id").value, page_id:$("m_page_id").value, capi_token:$("s_capi_token").value||undefined });
}

async function saveChannel(btn, fields){
  btn.disabled=true; const old=btn.textContent; btn.textContent="Guardando…";
  try{ await callFn("channel-config",{ action:"save", channel_id:st.channelId, ...fields }); toast("Guardado ✓"); await loadCfg(); }
  catch(e){ toast(e.message||"error",true); }
  finally{ btn.disabled=false; btn.textContent=old; }
}
async function callFn(fn, body){
  const { data, error } = await supa.functions.invoke(fn, { body });
  if(error){ let d=""; try{ d=(await error.context?.json?.())?.detalle||""; }catch{} throw new Error(d||error.message||"error"); }
  return data;
}
boot();
</script>
