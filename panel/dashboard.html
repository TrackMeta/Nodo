<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nodo · Dashboard</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png" />
<style>
  :root{--bg:#0e1116;--surface:#151a21;--surface-2:#1b222c;--border:#232b36;--text:#e7ecf2;--muted:#8a97a8;--faint:#5c6675;--brand:#2b7fff;--green:#22c079;--amber:#f0a92b;--red:#e2564a;--font:"Inter",system-ui,sans-serif;}
  *{box-sizing:border-box} html,body{height:100%;margin:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px}
  a{color:var(--muted);text-decoration:none}
  .app{height:100%;display:flex;flex-direction:column}
  .top{height:52px;flex:none;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px;background:var(--surface)}
  .top a{font-size:20px}.top a.active{color:var(--brand)}
  .sel{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);height:36px;padding:0 10px;font-size:13px}
  .wrap{flex:1;overflow-y:auto;padding:24px;max-width:1000px;margin:0 auto;width:100%}
  h2{font-size:17px;margin:0 0 18px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px}
  .card .k{font-size:12px;color:var(--muted)} .card .v{font-size:28px;font-weight:700;margin-top:6px}
  .card .v.green{color:var(--green)} .card .v.amber{color:var(--amber)} .card .v.brand{color:var(--brand)}
  .sub{color:var(--muted);font-size:12px;margin:22px 0 10px;text-transform:uppercase;letter-spacing:.4px}
  .stages{display:flex;flex-wrap:wrap;gap:8px}
  .pill{background:var(--surface-2);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:12px}
  .pill b{color:var(--text)}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <a href="index.html" title="Bandeja">💬</a>
    <a href="editor.html" title="Flujos">🕸</a>
    <a href="productos.html" title="Productos">📦</a>
    <a href="secuencias.html" title="Secuencias">🔁</a>
    <a href="plantillas.html" title="Plantillas">📄</a>
    <a href="campanas.html" title="Campañas">📣</a>
    <a href="dashboard.html" class="active" title="Dashboard">📊</a>
    <a href="config.html" title="Configuraciones">⚙️</a>
    <select class="sel" id="channelSel"></select>
  </div>
  <div class="wrap">
    <h2>Resumen del canal</h2>
    <div class="grid" id="cards"></div>
    <div class="sub">Contactos por etapa</div>
    <div class="stages" id="stages"></div>
  </div>
</div>
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
const SUPABASE_URL="https://ahoxdyffbwjlshmdezwi.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFob3hkeWZmYndqbHNobWRlendpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNDU4MTksImV4cCI6MjA5ODYyMTgxOX0.4iY3gl1ZhxILv1kPF8-NYd4a0_MeAZmkyLqxx2BMW-Q";
const supa=createClient(SUPABASE_URL,SUPABASE_ANON_KEY); const $=(id)=>document.getElementById(id);
let channelId=null;
function esc(s){return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
async function boot(){
  const { data:{session} }=await supa.auth.getSession(); if(!session){ location.href="index.html"; return; }
  const { data }=await supa.from("channels").select("id,nombre").eq("activo",true).order("nombre");
  const sel=$("channelSel"); (data||[]).forEach(c=>{const o=document.createElement("option");o.value=c.id;o.textContent=c.nombre;sel.appendChild(o);});
  channelId=(data&&data[0]&&data[0].id); const p=new URLSearchParams(location.search).get("channel"); if(p)channelId=p;
  if(channelId)sel.value=channelId; sel.onchange=()=>{channelId=sel.value;load();}; load();
}
async function load(){
  const { data, error }=await supa.rpc("dashboard_stats",{ p_channel_id:channelId });
  if(error){ $("cards").innerHTML=`<div class="card"><div class="k">Error</div><div class="v">${esc(error.message)}</div></div>`; return; }
  const s=data||{};
  const cards=[
    ["Contactos", s.contactos??0, ""],
    ["Ingresos (compras)", "S/ "+Number(s.ingresos??0).toFixed(2), "green"],
    ["Compras", s.purchases??0, "green"],
    ["Leads", s.leads??0, "brand"],
    ["Mensajes hoy (entrada)", s.mensajes_hoy_in??0, ""],
    ["Mensajes hoy (salida)", s.mensajes_hoy_out??0, ""],
    ["Flujos activos", s.runs_activos??0, "brand"],
    ["En remarketing", s.subs_activas??0, "amber"],
    ["Requieren humano", s.requiere_humano??0, "amber"],
  ];
  $("cards").innerHTML=cards.map(([k,v,cl])=>`<div class="card"><div class="k">${esc(k)}</div><div class="v ${cl}">${esc(v)}</div></div>`).join("");
  const st=s.por_stage||{};
  $("stages").innerHTML=Object.keys(st).length
    ? Object.entries(st).map(([k,v])=>`<span class="pill">${esc(k)} · <b>${v}</b></span>`).join("")
    : `<span class="pill" style="color:var(--faint)">sin datos aún</span>`;
}
boot();
</script>
</body>
</html>
