<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nodo · Plantillas</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png" />
<link rel="stylesheet" href="shell.css" />
<style>
  :root{--bg:#0e1116;--surface:#151a21;--surface-2:#1b222c;--border:#232b36;--text:#e7ecf2;--muted:#8a97a8;--faint:#5c6675;--brand:#2b7fff;--brand-2:#1e6ff0;--green:#22c079;--red:#e2564a;--font:"Inter",system-ui,sans-serif;}
  *{box-sizing:border-box} html,body{height:100%;margin:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px}
  button{font-family:inherit;cursor:pointer}
  .app{height:100%;display:flex;flex-direction:column}
  .top{height:52px;flex:none;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px;background:var(--surface)}
  .top a{color:var(--muted);text-decoration:none;font-size:20px}.top a.active{color:var(--brand)}
  .sel{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);height:36px;padding:0 10px;font-size:13px}
  .spacer{margin-left:auto}
  .btn{height:34px;padding:0 13px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:13px;font-weight:600}
  .btn.primary{background:var(--brand);border:none;color:#fff}.btn.primary:hover{background:var(--brand-2)}
  .btn.danger{color:var(--red);border-color:transparent}
  .main{flex:1;display:flex;min-height:0}
  .list{width:250px;flex:none;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
  .list .hd{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .add{background:#12233f;color:var(--brand);border:none;border-radius:8px;width:26px;height:26px;font-size:16px}
  .item{padding:11px 12px;border-bottom:1px solid var(--border);cursor:pointer}
  .item:hover{background:var(--surface)}.item.active{background:var(--surface-2)}
  .item .n{font-weight:600;font-size:13px}.item .m{font-size:11px;color:var(--faint);margin-top:2px}
  .detail{flex:1;min-width:0;overflow-y:auto;padding:22px 24px;max-width:720px}
  label{display:block;font-size:11px;color:var(--muted);margin:12px 0 6px}
  .in,.ta{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 11px;font-size:13px;outline:none;font-family:var(--font)}
  .ta{min-height:70px}.in:focus,.ta:focus{border-color:var(--brand)}
  .row{display:flex;gap:10px}.row>*{flex:1}
  .chk{display:flex;align-items:center;gap:8px;font-size:13px;margin:12px 0}
  .empty{color:var(--faint);text-align:center;padding:60px}
  .hint{font-size:11px;color:var(--faint);margin-top:6px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#10281d;color:var(--green);border:1px solid var(--green);padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;transition:.2s;pointer-events:none;z-index:20}
  .toast.show{opacity:1}.toast.err{background:#2c1615;color:var(--red);border-color:var(--red)}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <span style="font-weight:600;font-size:15px">Plantillas</span>
    <span class="spacer"></span>
    <button class="btn primary" id="saveBtn">Guardar</button>
  </div>
  <div class="main">
    <div class="list">
      <div class="hd"><span>Plantillas</span><button class="add" id="addTpl" title="Nueva">+</button></div>
      <div id="tplList" style="overflow-y:auto;flex:1"></div>
    </div>
    <div class="detail" id="detail"><div class="empty">Elige o crea una plantilla</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script type="module">
import { supa, mountShell, toast } from "./shell.js";
const $=(id)=>document.getElementById(id);
const st={channelId:null,tpl:null};
function esc(s){return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
async function boot(){
  const { data:{session} }=await supa.auth.getSession(); if(!session){location.href="index.html";return;}
  const shell=await mountShell({ active:"plantillas" });
  st.channelId=shell.channelId;
  shell.onChannel(id=>{ st.channelId=id; st.tpl=null; renderDetail(); loadList(); });
  await loadList();
  $("addTpl").onclick=createTpl; $("saveBtn").onclick=saveTpl;
}
async function loadList(){
  const { data }=await supa.from("wa_templates").select("id,name,language,activa").eq("channel_id",st.channelId).order("created_at");
  const box=$("tplList"); box.innerHTML="";
  (data||[]).forEach(t=>{const el=document.createElement("div");el.className="item"+(st.tpl&&st.tpl.id===t.id?" active":"");
    el.innerHTML=`<div class="n">${esc(t.name)}</div><div class="m">${esc(t.language)} · ${t.activa?"activa":"inactiva"}</div>`;
    el.onclick=()=>openTpl(t.id); box.appendChild(el);});
}
async function createTpl(){
  const name=prompt("Nombre EXACTO de la plantilla en Meta (ej. remarketing_pago):"); if(!name) return;
  const { data,error }=await supa.from("wa_templates").insert({channel_id:st.channelId,name,language:"es",params:[]}).select("id").single();
  if(error){toast(error.message,true);return;} await loadList(); openTpl(data.id);
}
async function openTpl(id){ const { data }=await supa.from("wa_templates").select("*").eq("id",id).maybeSingle(); st.tpl=data; if(!Array.isArray(st.tpl.params))st.tpl.params=[]; await loadList(); renderDetail(); }
function renderDetail(){
  const d=$("detail"); if(!st.tpl){d.innerHTML=`<div class="empty">Elige o crea una plantilla</div>`;return;}
  const t=st.tpl;
  d.innerHTML=`
    <div class="row">
      <div><label>Nombre (en Meta)</label><input class="in" id="f_name" value="${esc(t.name)}"/></div>
      <div><label>Idioma</label><input class="in" id="f_lang" value="${esc(t.language||'es')}" placeholder="es / es_MX / en"/></div>
    </div>
    <label>Categoría</label>
    <select class="in" id="f_cat">
      ${["MARKETING","UTILITY","AUTHENTICATION"].map(x=>`<option ${t.categoria===x?"selected":""}>${x}</option>`).join("")}
    </select>
    <label>Texto del cuerpo (con {{1}}, {{2}}… — solo referencia/vista)</label>
    <textarea class="ta" id="f_body" placeholder="Hola {{1}}, tu {{2}} sigue disponible.">${esc(t.body_preview)}</textarea>
    <label>Variables — una por línea, en orden ({{nombre}}, {{producto}}, texto fijo…)</label>
    <textarea class="ta" id="f_params" placeholder="{{nombre}}&#10;{{producto}}">${esc((t.params||[]).join("\n"))}</textarea>
    <div class="hint">La 1ª línea llena {{1}}, la 2ª {{2}}, etc. Puedes usar variables del contacto o texto fijo.</div>
    <label class="chk"><input type="checkbox" id="f_activa" ${t.activa!==false?"checked":""}/> Plantilla activa</label>
    <button class="btn danger" id="delBtn" style="margin-top:8px">Eliminar</button>`;
  $("delBtn").onclick=deleteTpl;
}
async function saveTpl(){
  if(!st.tpl) return;
  const params=$("f_params").value.split("\n").map(x=>x.trim()).filter(Boolean);
  const { error }=await supa.from("wa_templates").update({
    name:$("f_name").value.trim(), language:$("f_lang").value.trim()||"es",
    categoria:$("f_cat").value, body_preview:$("f_body").value, params,
    activa:$("f_activa").checked,
  }).eq("id",st.tpl.id);
  if(error){toast(error.message,true);return;} toast("Guardado ✓"); await loadList();
}
async function deleteTpl(){
  if(!confirm("¿Eliminar esta plantilla?")) return;
  await supa.from("wa_templates").delete().eq("id",st.tpl.id); st.tpl=null; await loadList(); renderDetail(); toast("Eliminada ✓");
}
boot();
</script>
</body>
</html>
