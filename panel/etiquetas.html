<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nodo · Etiquetas</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png" />
<link rel="stylesheet" href="shell.css" />
<style>
  :root{
    --bg:#0e1116; --surface:#151a21; --surface-2:#1b222c; --border:#232b36;
    --text:#e7ecf2; --muted:#8a97a8; --faint:#5c6675;
    --brand:#2b7fff; --brand-2:#1e6ff0; --brand-bg:#12233f;
    --green:#22c079; --amber:#f0a92b; --red:#e2564a; --red-bg:#2c1615;
    --font:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box} html,body{height:100%;margin:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px}
  button{font-family:inherit;cursor:pointer}
  .app{height:100%;display:flex;flex-direction:column}
  .top{height:52px;flex:none;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px;background:var(--surface)}
  .spacer{margin-left:auto}
  .btn{height:36px;padding:0 14px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:13px;font-weight:600}
  .btn.primary{background:var(--brand);border:none;color:#fff}
  .btn.primary:hover{background:var(--brand-2)}
  .wrap{flex:1;overflow-y:auto;padding:24px;max-width:760px;margin:0 auto;width:100%}
  h2{font-size:17px;margin:0 0 4px} .sub{color:var(--muted);font-size:12.5px;margin:0 0 20px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;gap:12px;align-items:center}
  .dot{width:16px;height:16px;border-radius:50%;flex:none}
  .in{flex:1;height:36px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:0 10px;font-size:13px;outline:none;font-family:inherit}
  .in:focus{border-color:var(--brand)}
  .sel{height:36px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:0 10px;font-size:13px;outline:none}
  .del{background:var(--red-bg);color:var(--red);border:1px solid var(--red);border-radius:8px;height:36px;width:38px;flex:none}
  .empty{color:var(--faint);text-align:center;padding:50px}
  .preview{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
  .chip{display:inline-flex;align-items:center;gap:6px;border-radius:20px;padding:3px 11px;font-size:12px;font-weight:600}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <span style="font-weight:600;font-size:15px">Etiquetas</span>
    <span class="spacer"></span>
    <button class="btn" id="addBtn">+ Nueva etiqueta</button>
    <button class="btn primary" id="saveBtn">Guardar</button>
  </div>
  <div class="wrap">
    <h2>Etiquetas</h2>
    <p class="sub">Segmenta contactos y úsalas en flujos (añadir/quitar etiqueta) y campañas. Se aplican a los contactos desde la bandeja.</p>
    <div class="preview" id="preview"></div>
    <div id="list"><div class="empty">Cargando…</div></div>
  </div>
</div>

<script type="module">
import { supa, mountShell, toast } from "./shell.js";
const $=(id)=>document.getElementById(id);
const st={ channelId:null, tags:[], deleted:[] };
const COLORS={ blue:"#2b7fff", green:"#22c079", amber:"#f0a92b", red:"#e2564a", purple:"#9b6cf0", teal:"#18b7be", pink:"#e264a8", gray:"#8a97a8" };
function esc(s){return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function hex(c){ return COLORS[c]||COLORS.blue; }

async function boot(){
  const { data:{session} }=await supa.auth.getSession(); if(!session){ location.href="index.html"; return; }
  const shell=await mountShell({ active:"etiquetas" });
  st.channelId=shell.channelId;
  shell.onChannel(id=>{ st.channelId=id; load(); });
  $("addBtn").onclick=()=>{ st.tags.push({ _new:true, nombre:"", color:"blue" }); render(); };
  $("saveBtn").onclick=save;
  await load();
}
async function load(){
  st.deleted=[];
  const { data }=await supa.from("tags").select("*").eq("channel_id",st.channelId).order("nombre");
  st.tags=data||[]; render();
}
function render(){
  // Vista previa (chips de color).
  $("preview").innerHTML = st.tags.filter(t=>t.nombre).map(t=>{
    const h=hex(t.color); return `<span class="chip" style="background:${h}22;color:${h};border:1px solid ${h}55">● ${esc(t.nombre)}</span>`;
  }).join("");
  const box=$("list");
  if(!st.tags.length){ box.innerHTML=`<div class="empty">Aún no hay etiquetas. Crea la primera con “+ Nueva etiqueta”.</div>`; return; }
  box.innerHTML="";
  st.tags.forEach((t,i)=>{
    const el=document.createElement("div"); el.className="card";
    el.innerHTML=`
      <span class="dot" style="background:${hex(t.color)}"></span>
      <input class="in nombre" value="${esc(t.nombre)}" placeholder="Nombre de la etiqueta"/>
      <select class="sel color">${Object.keys(COLORS).map(c=>`<option value="${c}" ${t.color===c?"selected":""}>${c}</option>`).join("")}</select>
      <button class="del" title="Eliminar">✕</button>`;
    el.querySelector(".nombre").oninput=(e)=>{ t.nombre=e.target.value; renderPreview(); };
    el.querySelector(".color").onchange=(e)=>{ t.color=e.target.value; render(); };
    el.querySelector(".del").onclick=()=>{ if(t.id) st.deleted.push(t.id); st.tags.splice(i,1); render(); };
    box.appendChild(el);
  });
}
function renderPreview(){
  $("preview").innerHTML = st.tags.filter(t=>t.nombre).map(t=>{
    const h=hex(t.color); return `<span class="chip" style="background:${h}22;color:${h};border:1px solid ${h}55">● ${esc(t.nombre)}</span>`;
  }).join("");
}
async function save(){
  for(const t of st.tags){ if(!t.nombre.trim()){ toast("Cada etiqueta necesita un nombre",true); return; } }
  if(st.deleted.length){ const { error }=await supa.from("tags").delete().in("id",st.deleted); if(error){ toast(error.message,true); return; } }
  const rows=st.tags.map(t=>{ const r={ channel_id:st.channelId, nombre:t.nombre.trim(), color:t.color }; if(t.id) r.id=t.id; return r; });
  if(rows.length){ const { error }=await supa.from("tags").upsert(rows); if(error){ toast(error.message.includes("duplicate")?"Hay nombres repetidos":error.message,true); return; } }
  toast("Guardado ✓"); await load();
}
boot();
</script>
</body>
</html>
