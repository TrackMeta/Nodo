<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script>try{document.documentElement.dataset.theme=localStorage.getItem("nodo.theme")||"dark"}catch(e){}</script>
<title>Nodo · Secuencias</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png" />
<link rel="stylesheet" href="shell.css" />
<style>
  :root{
    --bg:#0e1116; --surface:#151a21; --surface-2:#1b222c; --border:#232b36;
    --text:#e7ecf2; --muted:#8a97a8; --faint:#5c6675;
    --brand:#2b7fff; --brand-2:#1e6ff0; --brand-bg:#12233f;
    --green:#22c079; --green-bg:#10281d; --amber:#f0a92b; --amber-bg:#2c2311; --red:#e2564a; --red-bg:#2c1615;
    --font:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box} html,body{height:100%;margin:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px}
  button{font-family:inherit;cursor:pointer}
  /* Tarjeta de secuencia */
  .qcard .c-top{display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .qcard .c-tt{font-size:16.5px;font-weight:700;letter-spacing:-.2px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .qcard .c-sub{font-size:12.5px;color:var(--muted);margin-bottom:14px}
  .mtl{display:flex;align-items:center;gap:0;margin-top:auto}
  .mtl .md{width:11px;height:11px;border-radius:50%;background:var(--brand);flex:none;box-shadow:0 0 0 3px var(--brand-bg)}
  .mtl .ml{flex:1;height:2px;background:var(--border);min-width:8px}
  .mtl .more{font-size:11px;color:var(--faint);margin-left:8px;font-weight:600;white-space:nowrap}
  .qcard.paused{opacity:.72}
  .qcard .c-foot{margin-top:14px;display:flex;align-items:center;gap:10px;font-size:11.5px;color:var(--faint)}
  /* Detalle / editor */
  .dhead{display:flex;align-items:center;gap:14px;margin-bottom:6px;flex-wrap:wrap}
  .dhead input{flex:1;min-width:220px;height:48px;background:transparent;border:none;border-bottom:2px solid var(--border);color:var(--text);font-size:24px;font-weight:800;letter-spacing:-.5px;outline:none;padding:0}
  .dhead input:focus{border-color:var(--brand)}
  .toggle{display:inline-flex;align-items:center;gap:10px;font-size:13px;font-weight:600;color:var(--muted)}
  .sw{width:44px;height:25px;border-radius:20px;background:var(--surface-2);border:1px solid var(--border);position:relative;transition:.15s;flex:none;cursor:pointer}
  .sw::after{content:"";position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:var(--muted);transition:.15s}
  .sw.on{background:var(--green-bg);border-color:transparent} .sw.on::after{left:20px;background:var(--green)}
  .toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:18px 0 6px}
  .banner{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--brand);border-radius:12px;padding:13px 16px;font-size:13px;color:var(--muted);line-height:1.55;margin:8px 0 24px}
  .banner b{color:var(--text)}
  .editwrap{max-width:720px}
  .tl{position:relative;padding-left:40px}
  .tl::before{content:"";position:absolute;left:15px;top:8px;bottom:30px;width:2px;background:var(--border)}
  .step{position:relative;margin-bottom:16px}
  .dot{position:absolute;left:-40px;top:2px;width:32px;height:32px;border-radius:50%;background:var(--brand-bg);color:var(--brand);border:3px solid var(--bg);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px}
  .scard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px}
  .srow{display:flex;align-items:center;gap:8px}
  .delay{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);font-weight:500}
  label{display:block;font-size:11.5px;color:var(--muted);margin:14px 0 6px;font-weight:700}
  .in,.ta,.sel{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:10px 12px;font-size:13.5px;outline:none;font-family:var(--font)}
  .in,.ta{width:100%} .ta{min-height:64px;resize:vertical} .in:focus,.ta:focus,.sel:focus{border-color:var(--brand)}
  .num{max-width:80px;text-align:center} .unit{min-width:110px}
  .del{background:transparent;border:none;color:var(--faint);margin-left:auto;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:5px}
  .del:hover{color:var(--red)} .del svg{width:14px;height:14px}
  .addstep{border:1.5px dashed var(--border);border-radius:14px;padding:14px;width:100%;color:var(--muted);font-weight:700;background:transparent;font-size:13.5px}
  .addstep:hover{border-color:var(--brand);color:var(--brand)}
  .btn{height:40px;padding:0 16px;border-radius:11px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:6px}
  .btn:hover{border-color:var(--brand)} .btn svg{width:15px;height:15px}
  .btn.primary{background:var(--brand);border:none;color:#fff}.btn.primary:hover{background:var(--brand-2)}
</style>
</head>
<body>
<div class="nodo-page">
  <div class="nodo-wrap">
    <!-- VISTA TARJETAS -->
    <div id="gridView">
      <div class="nodo-head">
        <div class="grow">
          <h1 class="nodo-title">Secuencias</h1>
          <p class="nodo-lead">Series de mensajes automáticos (drip) que reenganchan al cliente tras un tiempo de silencio. Si responde, el temporizador se reinicia solo.</p>
        </div>
        <div class="nodo-actions">
          <button class="nodo-btn primary" id="addSeq"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg> Nueva secuencia</button>
        </div>
      </div>
      <div class="nodo-folders" id="folders"></div>
      <div class="nodo-cards" id="cards"></div>
    </div>
    <!-- VISTA DETALLE -->
    <div id="detailView" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
        <button class="nodo-back" id="backBtn" style="margin-bottom:0"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Volver a secuencias</button>
        <button class="btn primary" id="saveBtn">Guardar cambios</button>
      </div>
      <div id="detail" style="margin-top:18px"></div>
    </div>
  </div>
</div>

<script type="module">
import { supa, mountShell, toast } from "./shell.js";
const $=(id)=>document.getElementById(id);
const st={ channelId:null, seq:null, seqs:[], flows:[], templates:[], folder:"__all", localFolders:new Set() };
const UNITS=[["60","minutos"],["3600","horas"],["86400","días"]];
function esc(s){return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function splitDur(sec){ sec=Number(sec||0); if(sec%86400===0&&sec>=86400)return{val:sec/86400,u:"86400"}; if(sec%3600===0&&sec>=3600)return{val:sec/3600,u:"3600"}; return{val:Math.round(sec/60)||1,u:"60"}; }
function durLabel(sec){ const {val,u}=splitDur(sec); const l={"60":"min","3600":"h","86400":"d"}[u]; return `${val}${l}`; }

async function boot(){
  const { data:{ session } }=await supa.auth.getSession(); if(!session){ location.href="index.html"; return; }
  const shell=await mountShell({ active:"secuencias" });
  st.channelId=shell.channelId;
  shell.onChannel(id=>{ st.channelId=id; st.seq=null; showGrid(); load(); });
  $("addSeq").onclick=createSeq; $("saveBtn").onclick=saveSeq;
  $("backBtn").onclick=()=>{ st.seq=null; showGrid(); load(); };
  await load();
}
function showGrid(){ $("gridView").style.display=""; $("detailView").style.display="none"; }
function showDetail(){ $("gridView").style.display="none"; $("detailView").style.display=""; window.scrollTo(0,0); }

async function load(){
  const [{ data:seqs },{ data:flows },{ data:tpl }]=await Promise.all([
    supa.from("sequences").select("*").eq("channel_id",st.channelId).order("created_at"),
    supa.from("flows").select("id,nombre,role,kind").eq("channel_id",st.channelId).order("nombre"),
    supa.from("wa_templates").select("id,name,language,activa").eq("channel_id",st.channelId).eq("activa",true).order("name"),
  ]);
  st.seqs=seqs||[]; st.flows=flows||[]; st.templates=tpl||[];
  renderFolders(); renderCards();
}
function allFolders(){ const s=new Set(st.localFolders); st.seqs.forEach(x=>{ if(x.folder) s.add(x.folder); }); return [...s].sort(); }
function countIn(v){ if(v==="__all") return st.seqs.length; if(v==="__none") return st.seqs.filter(s=>!s.folder).length; return st.seqs.filter(s=>s.folder===v).length; }
function renderFolders(){
  const tabs=[["__all","Todas"],["__none","Sin carpeta"],...allFolders().map(f=>[f,f])];
  $("folders").innerHTML=tabs.map(([v,l])=>`<button class="nodo-folder ${st.folder===v?'on':''}" data-f="${esc(v)}">${v==="__all"||v==="__none"?"":"📁 "}${esc(l)}<span class="cnt">${countIn(v)}</span></button>`).join("")
    +`<button class="nodo-folder add" id="newFolder">+ Carpeta</button>`;
  $("folders").querySelectorAll(".nodo-folder[data-f]").forEach(b=> b.onclick=()=>{ st.folder=b.dataset.f; renderFolders(); renderCards(); });
  $("newFolder").onclick=()=>{ const n=prompt("Nombre de la carpeta:"); if(n&&n.trim()){ st.localFolders.add(n.trim()); st.folder=n.trim(); renderFolders(); renderCards(); } };
}
function miniTimeline(pasos){
  const p=pasos||[]; if(!p.length) return `<div class="mtl"><span class="more" style="margin:0">Sin pasos aún</span></div>`;
  const show=p.slice(0,4);
  let html=show.map((s,i)=>`${i>0?'<span class="ml"></span>':''}<span class="md" title="${esc(durLabel(s.umbral_silencio_seg))} de silencio"></span>`).join("");
  if(p.length>4) html+=`<span class="ml"></span><span class="more">+${p.length-4}</span>`;
  return `<div class="mtl">${html}</div>`;
}
function renderCards(){
  let list=st.seqs;
  if(st.folder==="__none") list=list.filter(s=>!s.folder); else if(st.folder!=="__all") list=list.filter(s=>s.folder===st.folder);
  const box=$("cards");
  if(!st.seqs.length){
    box.innerHTML=`<div class="nodo-empty" style="grid-column:1/-1"><div class="e-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="m17 2 4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="m7 22-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></svg></div><h3>Aún no hay secuencias</h3><p>Crea tu primera secuencia de reenganche para recuperar clientes que dejaron de responder.</p></div>`;
    return;
  }
  box.innerHTML="";
  // Tarjeta "Nueva"
  const add=document.createElement("div"); add.className="nodo-card new";
  add.innerHTML=`<div class="c-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></div><div class="c-tt" style="font-size:14px;font-weight:700">Nueva secuencia</div>`;
  add.onclick=createSeq;
  if(!list.length){ box.appendChild(add); const e=document.createElement("div"); e.className="nodo-empty"; e.style.gridColumn="1/-1"; e.innerHTML="<p>Sin secuencias en esta vista.</p>"; box.appendChild(e); return; }
  list.forEach(s=>{
    const on=s.activo!==false; const n=(s.pasos||[]).length;
    const el=document.createElement("div"); el.className="nodo-card qcard"+(on?"":" paused");
    el.innerHTML=`
      <div class="c-top"><span class="c-tt">${esc(s.nombre)}</span><span class="nodo-pill ${on?'on':'off'}">${on?'Activa':'Pausada'}</span></div>
      <div class="c-sub">${n} paso${n===1?'':'s'} · reenganche por silencio</div>
      ${miniTimeline(s.pasos)}
      <div class="c-foot">${s.folder?`<span>📁 ${esc(s.folder)}</span>`:'<span>Sin carpeta</span>'}</div>`;
    el.onclick=()=>openSeq(s.id); box.appendChild(el);
  });
  box.appendChild(add);
}
async function createSeq(){
  const nombre=prompt("Nombre de la secuencia (ej. Remarketing pago pendiente):"); if(!nombre) return;
  const folder=(st.folder!=="__all"&&st.folder!=="__none")?st.folder:null;
  const { data,error }=await supa.from("sequences").insert({ channel_id:st.channelId, nombre, pasos:[], folder }).select("id").single();
  if(error){ if(/folder|column/.test(error.message)){ const r=await supa.from("sequences").insert({ channel_id:st.channelId, nombre, pasos:[] }).select("id").single(); if(r.error){toast(r.error.message,true);return;} await load(); return openSeq(r.data.id); } toast(error.message,true); return; }
  await load(); openSeq(data.id);
}
async function openSeq(id){
  const { data }=await supa.from("sequences").select("*").eq("id",id).maybeSingle();
  st.seq=data; if(!Array.isArray(st.seq.pasos)) st.seq.pasos=[];
  renderDetail(); showDetail();
}
function renderDetail(){
  const d=$("detail"); if(!st.seq) return;
  const s=st.seq;
  d.innerHTML=`
    <div class="dhead">
      <input id="s_nombre" value="${esc(s.nombre||"")}" placeholder="Nombre de la secuencia"/>
      <div class="toggle"><span id="s_state">${s.activo!==false?"Activa":"Pausada"}</span><div class="sw ${s.activo!==false?'on':''}" id="s_toggle"></div></div>
    </div>
    <div class="toolbar">
      <div><label style="margin:0 0 4px">Carpeta</label>
        <select class="sel" id="s_folder" style="min-width:240px"><option value="">Sin carpeta</option>${allFolders().map(f=>`<option value="${esc(f)}" ${s.folder===f?"selected":""}>${esc(f)}</option>`).join("")}</select></div>
    </div>
    <div class="banner">Cada paso se dispara tras X tiempo de <b>silencio</b> del cliente (desde su último mensaje). Si el cliente responde, el temporizador se <b>reinicia</b> y la secuencia se pausa mientras hay conversación.</div>
    <div class="editwrap">
      <div class="tl" id="steps"></div>
      <button class="addstep" id="addStep">+ Añadir paso</button>
    </div>`;
  $("s_nombre").oninput=(e)=>s.nombre=e.target.value;
  $("s_folder").onchange=(e)=>s.folder=e.target.value||null;
  $("s_toggle").onclick=()=>{ s.activo=!(s.activo!==false); $("s_toggle").classList.toggle("on",s.activo); $("s_state").textContent=s.activo?"Activa":"Pausada"; };
  const steps=$("steps");
  s.pasos.forEach((p,i)=>steps.appendChild(stepCard(p,i)));
  $("addStep").onclick=()=>{ s.pasos.push({ umbral_silencio_seg:3600, mensaje:"" }); renderDetail(); };
}
function stepCard(paso,i){
  const wrap=document.createElement("div"); wrap.className="step";
  const {val,u}=splitDur(paso.umbral_silencio_seg);
  const mode = paso.template_name ? "plantilla" : (paso.flow_id ? "flow" : "mensaje");
  wrap.innerHTML=`
    <div class="dot">${i+1}</div>
    <div class="scard">
      <div class="srow">
        <div class="delay">Tras <input class="in num" type="number" min="1" value="${val}"/>
          <select class="sel unit">${UNITS.map(([v,l])=>`<option value="${v}" ${v===u?"selected":""}>${l}</option>`).join("")}</select> de silencio</div>
        <button class="del"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>Quitar</button>
      </div>
      <label>Acción</label>
      <select class="sel act" style="width:100%">
        <option value="mensaje" ${mode==="mensaje"?"selected":""}>Enviar un mensaje (dentro de 24h)</option>
        <option value="plantilla" ${mode==="plantilla"?"selected":""}>Enviar una plantilla (fuera de 24h)</option>
        <option value="flow" ${mode==="flow"?"selected":""}>Iniciar un flujo</option>
      </select>
      <div class="body"></div>
    </div>`;
  const num=wrap.querySelector(".num"), unit=wrap.querySelector(".unit");
  const upd=()=>paso.umbral_silencio_seg=Math.max(1,Number(num.value||1))*Number(unit.value);
  num.oninput=upd; unit.onchange=upd;
  wrap.querySelector(".del").onclick=()=>{ st.seq.pasos.splice(i,1); renderDetail(); };
  const as=wrap.querySelector(".act"), body=wrap.querySelector(".body");
  const renderAction=()=>{
    body.innerHTML="";
    if(as.value==="flow"){
      delete paso.mensaje; delete paso.template_name;
      body.innerHTML=`<label>Flujo a iniciar</label><select class="sel fs" style="width:100%"><option value="">— elige —</option>${st.flows.map(f=>`<option value="${f.id}" ${paso.flow_id===f.id?"selected":""}>${esc(f.nombre)}${f.role?" · "+esc(f.role):""}</option>`).join("")}</select>`;
      body.querySelector(".fs").onchange=(e)=>paso.flow_id=e.target.value||undefined;
    } else if(as.value==="plantilla"){
      delete paso.mensaje; delete paso.flow_id;
      body.innerHTML=`<label>Plantilla</label><select class="sel ts" style="width:100%"><option value="">— elige —</option>${st.templates.map(t=>`<option value="${t.name}" data-lang="${esc(t.language)}" ${paso.template_name===t.name?"selected":""}>${esc(t.name)} (${esc(t.language)})</option>`).join("")}</select>
        ${st.templates.length?`<label>Variables (una por línea)</label><textarea class="ta pta">${esc((paso.template_params||[]).join("\n"))}</textarea>`:`<div class="banner" style="margin:8px 0 0">No hay plantillas activas.</div>`}`;
      body.querySelector(".ts").onchange=(e)=>{ paso.template_name=e.target.value||undefined; paso.template_lang=e.target.selectedOptions[0]?.dataset.lang||"es"; };
      const pta=body.querySelector(".pta"); if(pta) pta.oninput=()=>paso.template_params=pta.value.split("\n").map(x=>x.trim()).filter(Boolean);
    } else {
      delete paso.flow_id; delete paso.template_name;
      body.innerHTML=`<label>Mensaje</label><textarea class="ta ms">${esc(paso.mensaje||"")}</textarea>`;
      body.querySelector(".ms").oninput=(e)=>paso.mensaje=e.target.value;
    }
  };
  as.onchange=renderAction; renderAction();
  return wrap;
}
async function saveSeq(){
  if(!st.seq){ toast("No hay secuencia abierta",true); return; }
  const row={ nombre:st.seq.nombre, activo:st.seq.activo!==false, pasos:st.seq.pasos||[], folder:st.seq.folder||null };
  let { error }=await supa.from("sequences").update(row).eq("id",st.seq.id);
  if(error && /folder|column/.test(error.message)){ delete row.folder; ({ error }=await supa.from("sequences").update(row).eq("id",st.seq.id)); if(!error) toast("Guardado (aplica 0016 para carpetas)"); }
  if(error){ toast(error.message,true); return; }
  toast("Guardado ✓"); await load();
}
boot();
</script>
</body>
</html>
