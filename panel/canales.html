<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script>try{document.documentElement.dataset.theme=localStorage.getItem("nodo.theme")||"dark"}catch(e){}</script>
<title>Nodo · Canales</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png" />
<link rel="stylesheet" href="shell.css" />
<style>
  :root{
    --bg:#0e1116; --surface:#151a21; --surface-2:#1b222c; --border:#232b36;
    --text:#e7ecf2; --muted:#8a97a8; --faint:#5c6675;
    --brand:#2b7fff; --brand-2:#1e6ff0; --brand-bg:#12233f;
    --green:#22c079; --green-bg:#10281d; --amber:#f0a92b; --red:#e2564a;
    --font:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box} html,body{height:100%;margin:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px}
  button{font-family:inherit;cursor:pointer}
  .app{height:100%;display:flex;flex-direction:column}
  .top{height:52px;flex:none;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 20px;background:var(--surface)}
  .wrap{flex:1;overflow-y:auto;padding:26px 24px;max-width:780px;margin:0 auto;width:100%}
  h1{font-size:20px;margin:0 0 4px;font-weight:700}
  .lead{color:var(--muted);font-size:13px;margin:0 0 22px;line-height:1.5}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px}
  .chd{display:flex;align-items:center;gap:11px;margin-bottom:4px}
  .chd .ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center}
  .chd .ico svg{width:21px;height:21px}
  .chd .nm{font-weight:700;font-size:15px}
  .chd .st{margin-left:auto;font-size:10px;padding:3px 10px;border-radius:20px;font-weight:600;background:var(--surface-2);border:1px solid var(--border);color:var(--muted)}
  .chd .st.on{background:var(--green-bg);color:var(--green);border-color:transparent}
  .badge{font-size:10px;padding:2px 9px;border-radius:20px;background:var(--surface-2);border:1px solid var(--border);color:var(--muted);font-weight:600}
  .badge.on{background:var(--green-bg);color:var(--green);border-color:transparent}
  .desc{color:var(--faint);font-size:12px;margin:2px 0 14px;line-height:1.5}
  label{display:block;font-size:11px;color:var(--muted);margin:12px 0 6px;font-weight:600}
  .in{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:10px 12px;font-size:13px;outline:none;font-family:var(--font)}
  .in:focus{border-color:var(--brand)}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .row>.f{flex:1;min-width:170px}
  .acts{display:flex;gap:8px;margin-top:16px}
  .btn{height:38px;padding:0 15px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:13px;font-weight:600}
  .btn.primary{background:var(--brand);border:none;color:#fff}
  .btn.primary:hover{background:var(--brand-2)}
  .future{border:1px dashed var(--border);border-radius:14px;padding:18px;color:var(--faint);font-size:12.5px;display:flex;align-items:center;gap:12px}
  .future .ico{width:34px;height:34px;border-radius:10px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--muted)}
</style>
</head>
<body>
<div class="app">
  <div class="top"><span style="font-weight:600;font-size:15px">Canales</span></div>
  <div class="wrap">
    <h1>Canales</h1>
    <p class="lead">Administra las conexiones de este bot con las plataformas de mensajería. Cada bot tiene su propio conjunto de credenciales; cámbialo desde el selector del menú.</p>
    <div id="waCard"></div>
    <div id="tgCard"></div>
    <div class="future">
      <span class="ico">＋</span>
      <div><b style="color:var(--text)">Más canales próximamente</b> — Instagram, Messenger y otros se podrán conectar aquí.</div>
    </div>
  </div>
</div>

<script type="module">
import { supa, mountShell, toast } from "./shell.js";
const $=(id)=>document.getElementById(id);
const st={ channelId:null, channel:{}, secrets:{} };
function esc(s){ return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
const IC={
  wa:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.15-1.7-.84-2-.93-.26-.1-.45-.15-.64.15s-.74.92-.9 1.11c-.17.2-.33.22-.62.08-.3-.15-1.25-.46-2.38-1.47-.88-.78-1.47-1.75-1.64-2.05-.17-.3-.02-.46.13-.6.13-.14.3-.34.44-.5.15-.18.2-.3.3-.5.1-.2.05-.37-.02-.52-.08-.15-.64-1.55-.88-2.12-.23-.55-.47-.48-.64-.49h-.55c-.2 0-.5.07-.76.37-.26.3-1 .98-1 2.38s1.02 2.76 1.17 2.96c.15.2 2.02 3.08 4.9 4.32.68.3 1.22.47 1.63.6.68.22 1.3.19 1.8.11.55-.08 1.7-.7 1.94-1.36.24-.67.24-1.24.17-1.36-.07-.12-.26-.2-.55-.34zM12 2a10 10 0 0 0-8.6 15.06L2 22l5.06-1.33A10 10 0 1 0 12 2z"/></svg>',
  tg:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.9 4.3 18.7 19.4c-.24 1.06-.87 1.32-1.76.82l-4.86-3.58-2.35 2.26c-.26.26-.48.48-.98.48l.35-4.94 9-8.13c.4-.35-.08-.54-.6-.2L6.35 13.1l-4.8-1.5c-1.04-.32-1.06-1.04.22-1.54l18.75-7.23c.87-.32 1.63.2 1.35 1.47z"/></svg>',
};

async function boot(){
  const { data:{session} }=await supa.auth.getSession(); if(!session){ location.href="index.html"; return; }
  const shell=await mountShell({ active:"canales" });
  st.channelId=shell.channelId;
  shell.onChannel(id=>{ st.channelId=id; load(); });
  if(st.channelId) await load();
}
async function load(){
  const { data:ch } = await supa.from("channels").select("phone_number_id,waba_id,verify_token,telegram_chat_ids").eq("id",st.channelId).maybeSingle();
  st.channel=ch||{};
  st.secrets={};
  try{ const r=await callFn("channel-config",{ action:"status", channel_id:st.channelId }); st.secrets=r?.secrets||{}; }catch(_){}
  renderWA(); renderTG();
}
function badge(on){ return on?'<span class="badge on">Configurado</span>':'<span class="badge">Sin configurar</span>'; }
function ph(on,hint){ return on?'•••••••• guardado':hint; }

function renderWA(){
  const c=st.channel||{}, s=st.secrets||{};
  const conn = !!(c.phone_number_id && s.access_token);
  $("waCard").innerHTML=`
    <div class="card">
      <div class="chd"><span class="ico" style="background:#0b3d2e;color:#25d366">${IC.wa}</span><span class="nm">WhatsApp Cloud API</span><span class="st ${conn?'on':''}">${conn?'Conectado':'Sin conectar'}</span></div>
      <div class="desc">Credenciales del número (Meta Developers). El token y el App Secret se guardan cifrados en Vault.</div>
      <div class="row">
        <div class="f"><label>Phone Number ID</label><input class="in" id="w_phone" value="${esc(c.phone_number_id)}" placeholder="123456789012345"/></div>
        <div class="f"><label>WABA ID</label><input class="in" id="w_waba" value="${esc(c.waba_id)}" placeholder="opcional"/></div>
      </div>
      <label>Verify token (webhook)</label>
      <input class="in" id="w_verify" value="${esc(c.verify_token)}" placeholder="una frase secreta que tú eliges"/>
      <label>Access token ${badge(s.access_token)}</label>
      <input class="in" type="password" id="w_token" autocomplete="off" placeholder="${ph(s.access_token,'EAAG...')}"/>
      <label>App Secret ${badge(s.app_secret)}</label>
      <input class="in" type="password" id="w_secret" autocomplete="off" placeholder="${ph(s.app_secret,'firma del webhook')}"/>
      <div class="acts"><button class="btn primary" id="saveWA">Guardar WhatsApp</button></div>
    </div>`;
  $("saveWA").onclick=(e)=>save(e.target,{
    phone_number_id:$("w_phone").value, waba_id:$("w_waba").value, verify_token:$("w_verify").value,
    access_token:$("w_token").value||undefined, app_secret:$("w_secret").value||undefined,
  });
}
function renderTG(){
  const c=st.channel||{}, s=st.secrets||{};
  const chats=(c.telegram_chat_ids||[]).join(", ");
  $("tgCard").innerHTML=`
    <div class="card">
      <div class="chd"><span class="ico" style="background:#12324a;color:#37aee2">${IC.tg}</span><span class="nm">Telegram</span><span class="st ${s.telegram_bot_token?'on':''}">${s.telegram_bot_token?'Conectado':'Sin conectar'}</span></div>
      <div class="desc">Bot que envía avisos a los admins (transferir a humano, ventas). Crea el bot con @BotFather.</div>
      <label>Bot token ${badge(s.telegram_bot_token)}</label>
      <input class="in" type="password" id="t_token" autocomplete="off" placeholder="${ph(s.telegram_bot_token,'123456:ABC-DEF...')}"/>
      <label>Chat IDs (admins, separados por coma)</label>
      <input class="in" id="t_chats" value="${esc(chats)}" placeholder="12345678, 87654321"/>
      <div class="acts"><button class="btn primary" id="saveTG">Guardar Telegram</button></div>`;
  $("saveTG").onclick=(e)=>save(e.target,{ telegram_bot_token:$("t_token").value||undefined, telegram_chat_ids:$("t_chats").value });
}
async function save(btn, fields){
  btn.disabled=true; const old=btn.textContent; btn.textContent="Guardando…";
  try{ await callFn("channel-config",{ action:"save", channel_id:st.channelId, ...fields }); toast("Guardado ✓"); await load(); }
  catch(e){ toast(e.message||"error",true); }
  finally{ btn.disabled=false; btn.textContent=old; }
}
async function callFn(fn, body){
  const { data, error } = await supa.functions.invoke(fn, { body });
  if(error){ let d=""; try{ d=(await error.context?.json?.())?.detalle||""; }catch{} throw new Error(d||error.message||"error"); }
  return data;
}
boot();
</script>
</body>
</html>
