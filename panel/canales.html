<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script>try{document.documentElement.dataset.theme=localStorage.getItem("nodo.theme")||"dark"}catch(e){}</script>
<title>Nodo · Canales</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png" />
<link rel="stylesheet" href="shell.css" />
<style>
  :root{
    --bg:#0e1116; --surface:#151a21; --surface-2:#1b222c; --border:#232b36;
    --text:#e7ecf2; --muted:#8a97a8; --faint:#5c6675;
    --brand:#2b7fff; --brand-2:#1e6ff0; --brand-bg:#12233f;
    --green:#22c079; --green-bg:#10281d; --amber:#f0a92b; --red:#e2564a;
    --font:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box} html,body{height:100%;margin:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px}
  button{font-family:inherit;cursor:pointer}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 22px;margin-bottom:16px}
  .chd{display:flex;align-items:center;gap:14px;margin-bottom:4px}
  .chd .ico{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--surface-2);border:1px solid var(--border);flex:none}
  .chd .ico img{width:100%;height:100%;object-fit:cover}
  .chd .nm{font-weight:700;font-size:17px;letter-spacing:-.2px}
  .chd .sub2{font-size:12.5px;color:var(--muted);margin-top:2px}
  .chd .st{margin-left:auto;font-size:11px;padding:5px 12px;border-radius:20px;font-weight:700;background:var(--surface-2);border:1px solid var(--border);color:var(--muted)}
  .chd .st.on{background:var(--green-bg);color:var(--green);border-color:transparent}
  .badge{font-size:10px;padding:2px 9px;border-radius:20px;background:var(--surface-2);border:1px solid var(--border);color:var(--muted);font-weight:700}
  .badge.on{background:var(--green-bg);color:var(--green);border-color:transparent}
  .desc{color:var(--muted);font-size:12.5px;margin:12px 0 4px;line-height:1.55}
  label{display:block;font-size:11.5px;color:var(--muted);margin:14px 0 6px;font-weight:700}
  .in{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:11px 13px;font-size:13.5px;outline:none;font-family:var(--font)}
  .in:focus{border-color:var(--brand)}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .row>.f{flex:1;min-width:170px}
  .acts{display:flex;gap:8px;margin-top:18px}
  .btn{height:40px;padding:0 16px;border-radius:11px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:13.5px;font-weight:600}
  .btn.primary{background:var(--brand);border:none;color:#fff}
  .btn.primary:hover{background:var(--brand-2)}
  .future{border:1px dashed var(--border);border-radius:16px;padding:20px;color:var(--faint);font-size:13px;display:flex;align-items:center;gap:14px}
  .future .ico{width:44px;height:44px;border-radius:12px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:22px;flex:none}
</style>
</head>
<body>
<div class="nodo-page">
  <div class="nodo-wrap" style="--nodo-max:820px">
    <div class="nodo-head">
      <div class="grow">
        <h1 class="nodo-title">Canales</h1>
        <p class="nodo-lead">Administra las conexiones de este bot con las plataformas de mensajería. Cada bot tiene su propio conjunto de credenciales; cámbialo desde el selector del menú.</p>
      </div>
    </div>
    <div id="waCard" style="margin-top:20px"></div>
    <div id="tgCard"></div>
    <div class="future">
      <span class="ico">＋</span>
      <div><b style="color:var(--text);font-size:14px">Más canales próximamente</b><br>Instagram, Messenger y otros se podrán conectar aquí.</div>
    </div>
  </div>
</div>

<script type="module">
import { supa, mountShell, toast, icon } from "./shell.js";
const $=(id)=>document.getElementById(id);
const st={ channelId:null, channel:{}, secrets:{} };
function esc(s){ return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
const LOGO={ wa:"../assets/apps/whatsapp.png", tg:"../assets/apps/telegram.png" };

async function boot(){
  const { data:{session} }=await supa.auth.getSession(); if(!session){ location.href="index.html"; return; }
  const shell=await mountShell({ active:"canales" });
  st.channelId=shell.channelId;
  shell.onChannel(id=>{ st.channelId=id; load(); });
  if(st.channelId) await load();
}
async function load(){
  const { data:ch } = await supa.from("channels").select("phone_number_id,waba_id,verify_token,telegram_chat_ids").eq("id",st.channelId).maybeSingle();
  st.channel=ch||{};
  st.secrets={};
  try{ const r=await callFn("channel-config",{ action:"status", channel_id:st.channelId }); st.secrets=r?.secrets||{}; }catch(_){}
  renderWA(); renderTG();
}
function badge(on){ return on?'<span class="badge on">Configurado</span>':'<span class="badge">Sin configurar</span>'; }
function ph(on,hint){ return on?'•••••••• guardado':hint; }

function renderWA(){
  const c=st.channel||{}, s=st.secrets||{};
  const conn = !!(c.phone_number_id && s.access_token);
  $("waCard").innerHTML=`
    <div class="card">
      <div class="chd"><span class="ico"><img src="${LOGO.wa}" alt="WhatsApp"/></span>
        <div><div class="nm">WhatsApp Cloud API</div><div class="sub2">Número principal de ventas y atención</div></div>
        <span class="st ${conn?'on':''}">${conn?'Conectado':'Sin conectar'}</span></div>
      <div class="desc">Credenciales del número (Meta Developers). El token y el App Secret se guardan cifrados en Vault.</div>
      <div class="row">
        <div class="f"><label>Phone Number ID</label><input class="in" id="w_phone" value="${esc(c.phone_number_id)}" placeholder="123456789012345"/></div>
        <div class="f"><label>WABA ID</label><input class="in" id="w_waba" value="${esc(c.waba_id)}" placeholder="opcional"/></div>
      </div>
      <label>Verify token (webhook)</label>
      <input class="in" id="w_verify" value="${esc(c.verify_token)}" placeholder="una frase secreta que tú eliges"/>
      <label>Access token ${badge(s.access_token)}</label>
      <input class="in" type="password" id="w_token" autocomplete="off" placeholder="${ph(s.access_token,'EAAG...')}"/>
      <label>App Secret ${badge(s.app_secret)}</label>
      <input class="in" type="password" id="w_secret" autocomplete="off" placeholder="${ph(s.app_secret,'firma del webhook')}"/>
      <div class="acts"><button class="btn primary" id="saveWA">Guardar WhatsApp</button></div>
    </div>`;
  $("saveWA").onclick=(e)=>save(e.target,{
    phone_number_id:$("w_phone").value, waba_id:$("w_waba").value, verify_token:$("w_verify").value,
    access_token:$("w_token").value||undefined, app_secret:$("w_secret").value||undefined,
  });
}
function renderTG(){
  const c=st.channel||{}, s=st.secrets||{};
  const chats=(c.telegram_chat_ids||[]).join(", ");
  $("tgCard").innerHTML=`
    <div class="card">
      <div class="chd"><span class="ico"><img src="${LOGO.tg}" alt="Telegram"/></span>
        <div><div class="nm">Telegram</div><div class="sub2">Avisos de ventas y traspaso a humano</div></div>
        <span class="st ${s.telegram_bot_token?'on':''}">${s.telegram_bot_token?'Conectado':'Sin conectar'}</span></div>
      <div class="desc">Bot que envía avisos a los admins (transferir a humano, ventas). Crea el bot con @BotFather.</div>
      <label>Bot token ${badge(s.telegram_bot_token)}</label>
      <input class="in" type="password" id="t_token" autocomplete="off" placeholder="${ph(s.telegram_bot_token,'123456:ABC-DEF...')}"/>
      <label>Chat IDs (admins, separados por coma)</label>
      <input class="in" id="t_chats" value="${esc(chats)}" placeholder="12345678, 87654321"/>
      <div class="acts"><button class="btn primary" id="saveTG">Guardar Telegram</button></div>`;
  $("saveTG").onclick=(e)=>save(e.target,{ telegram_bot_token:$("t_token").value||undefined, telegram_chat_ids:$("t_chats").value });
}
async function save(btn, fields){
  btn.disabled=true; const old=btn.textContent; btn.textContent="Guardando…";
  try{ await callFn("channel-config",{ action:"save", channel_id:st.channelId, ...fields }); toast("Guardado ✓"); await load(); }
  catch(e){ toast(e.message||"error",true); }
  finally{ btn.disabled=false; btn.textContent=old; }
}
async function callFn(fn, body){
  const { data, error } = await supa.functions.invoke(fn, { body });
  if(error){ let d=""; try{ d=(await error.context?.json?.())?.detalle||""; }catch{} throw new Error(d||error.message||"error"); }
  return data;
}
boot();
</script>
</body>
</html>
