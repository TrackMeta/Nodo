<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script>try{document.documentElement.dataset.theme=localStorage.getItem("nodo.theme")||"dark"}catch(e){}</script>
<title>Nodo · Canales</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png" />
<link rel="stylesheet" href="shell.css" />
<style>
  :root{
    --bg:#0e1116; --surface:#151a21; --surface-2:#1b222c; --border:#232b36;
    --text:#e7ecf2; --muted:#8a97a8; --faint:#5c6675;
    --brand:#2b7fff; --brand-2:#1e6ff0; --brand-bg:#12233f;
    --green:#22c079; --green-bg:#10281d; --amber:#f0a92b; --red:#e2564a;
    --font:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box} html,body{height:100%;margin:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px}
  button{font-family:inherit;cursor:pointer}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 22px;margin-bottom:16px}
  .chd{display:flex;align-items:center;gap:14px;margin-bottom:4px}
  .chd .ico{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--surface-2);border:1px solid var(--border);flex:none}
  .chd .ico img{width:100%;height:100%;object-fit:cover}
  .chd .nm{font-weight:700;font-size:17px;letter-spacing:-.2px}
  .chd .sub2{font-size:12.5px;color:var(--muted);margin-top:2px}
  .chd .st{margin-left:auto;font-size:11px;padding:5px 12px;border-radius:20px;font-weight:700;background:var(--surface-2);border:1px solid var(--border);color:var(--muted)}
  .chd .st.on{background:var(--green-bg);color:var(--green);border-color:transparent}
  .badge{font-size:10px;padding:2px 9px;border-radius:20px;background:var(--surface-2);border:1px solid var(--border);color:var(--muted);font-weight:700}
  .badge.on{background:var(--green-bg);color:var(--green);border-color:transparent}
  .desc{color:var(--muted);font-size:12.5px;margin:12px 0 4px;line-height:1.55}
  label{display:block;font-size:11.5px;color:var(--muted);margin:14px 0 6px;font-weight:700}
  .in{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:11px 13px;font-size:13.5px;outline:none;font-family:var(--font)}
  .in:focus{border-color:var(--brand)}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .row>.f{flex:1;min-width:170px}
  .acts{display:flex;gap:8px;margin-top:18px}
  .btn{height:40px;padding:0 16px;border-radius:11px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:13.5px;font-weight:600}
  .btn.primary{background:var(--brand);border:none;color:#fff}
  .btn.primary:hover{background:var(--brand-2)}
  .future{border:1px dashed var(--border);border-radius:16px;padding:20px;color:var(--faint);font-size:13px;display:flex;align-items:center;gap:14px}
  .future .ico{width:44px;height:44px;border-radius:12px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:22px;flex:none}
</style>
</head>
<body>
<div class="nodo-page">
  <div class="nodo-wrap" style="--nodo-max:820px">
    <div class="nodo-head">
      <div class="grow">
        <h1 class="nodo-title">Canales</h1>
        <p class="nodo-lead">Administra las conexiones de este bot con las plataformas de mensajería. Cada bot tiene su propio conjunto de credenciales; cámbialo desde el selector del menú.</p>
      </div>
    </div>
    <div id="waCard" style="margin-top:20px"></div>
    <div id="tgCard"></div>
    <div class="future">
      <span class="ico">＋</span>
      <div><b style="color:var(--text);font-size:14px">Más canales próximamente</b><br>Instagram, Messenger y otros se podrán conectar aquí.</div>
    </div>
  </div>
</div>

<script type="module">
import { supa, mountShell, toast, icon } from "./shell.js";
const $=(id)=>document.getElementById(id);
const st={ channelId:null, channel:{}, secrets:{} };
function esc(s){ return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
const LOGO={ wa:"../assets/apps/whatsapp.png", tg:"../assets/apps/telegram.png" };

async function boot(){
  const { data:{session} }=await supa.auth.getSession(); if(!session){ location.href="index.html"; return; }
  const shell=await mountShell({ active:"canales" });
  st.channelId=shell.channelId;
  shell.onChannel(id=>{ st.channelId=id; load(); });
  if(st.channelId) await load();
}
async function load(){
  // telegram_webhook_secret dice si el Copiloto de Telegram está activo (migración 0033).
  let { data:ch, error:chErr } = await supa.from("channels")
    .select("phone_number_id,waba_id,verify_token,telegram_chat_ids,telegram_webhook_secret").eq("id",st.channelId).maybeSingle();
  if(chErr){ ({ data:ch } = await supa.from("channels")
    .select("phone_number_id,waba_id,verify_token,telegram_chat_ids").eq("id",st.channelId).maybeSingle()); }
  st.channel=ch||{};
  st.secrets={};
  try{ const r=await callFn("channel-config",{ action:"status", channel_id:st.channelId }); st.secrets=r?.secrets||{}; }catch(_){}
  renderWA(); renderTG();
}
function badge(on){ return on?'<span class="badge on">Configurado</span>':'<span class="badge">Sin configurar</span>'; }
function ph(on,hint){ return on?'•••••••• guardado':hint; }

// Acá no hay nada que un gestor de contraseñas deba tocar: son credenciales de
// Meta, no un login. Y el navegador se equivoca feo — Chrome llegó a rellenar el
// Phone Number ID con el nombre de una empresa guardada ("Square") y el Access
// token con una contraseña cualquiera.
// OJO: `autocomplete="off"` NO alcanza. Chrome lo ignora en los campos que cree
// de contacto y SIEMPRE en los de contraseña; lo único que respeta ahí es
// "new-password". Por eso esto es solo la primera barrera: la red de seguridad
// de verdad es validar el valor antes de guardarlo.
const NOFILL='autocomplete="off" data-lpignore="true" data-form-type="other"';
const NOFILL_PWD='autocomplete="new-password" data-lpignore="true" data-form-type="other"';

function renderWA(){
  const c=st.channel||{}, s=st.secrets||{};
  const conn = !!(c.phone_number_id && s.access_token);
  $("waCard").innerHTML=`
    <div class="card">
      <div class="chd"><span class="ico"><img src="${LOGO.wa}" alt="WhatsApp"/></span>
        <div><div class="nm">WhatsApp Cloud API</div><div class="sub2">Número principal de ventas y atención</div></div>
        <span class="st ${conn?'on':''}">${conn?'Conectado':'Sin conectar'}</span></div>
      <div class="desc">Credenciales del número (Meta Developers). El token y el App Secret se guardan cifrados en Vault.</div>
      <div class="row">
        <div class="f"><label>Phone Number ID</label><input class="in" id="w_phone" ${NOFILL} value="${esc(c.phone_number_id)}" placeholder="123456789012345"/></div>
        <div class="f"><label>WABA ID</label><input class="in" id="w_waba" ${NOFILL} value="${esc(c.waba_id)}" placeholder="opcional"/></div>
      </div>
      <label>Verify token (webhook)</label>
      <input class="in" id="w_verify" ${NOFILL} value="${esc(c.verify_token)}" placeholder="una frase secreta que tú eliges"/>
      <label>Access token ${badge(s.access_token)}</label>
      <input class="in" type="password" id="w_token" ${NOFILL_PWD} placeholder="${ph(s.access_token,'EAAG...')}"/>
      <label>App Secret ${badge(s.app_secret)}</label>
      <input class="in" type="password" id="w_secret" ${NOFILL_PWD} placeholder="${ph(s.app_secret,'firma del webhook')}"/>
      <div class="acts"><button class="btn primary" id="saveWA">Guardar WhatsApp</button></div>
    </div>`;
  // Se recuerda lo que vino del servidor para mandar SOLO lo que toques: si se
  // mandara siempre, un campo que el navegador rellenó (o que quedó vacío) se
  // guardaría igual — y en el backend un "" se convierte en null, o sea que te
  // BORRA la credencial que ya tenías.
  const orig={ phone_number_id:c.phone_number_id??"", waba_id:c.waba_id??"", verify_token:c.verify_token??"" };
  $("saveWA").onclick=(e)=>{
    const body={};
    for(const [k,id] of [["phone_number_id","w_phone"],["waba_id","w_waba"],["verify_token","w_verify"]]){
      const v=$(id).value.trim();
      if(v!==String(orig[k]).trim()) body[k]=v;
    }
    // El Phone Number ID y el WABA ID de Meta son numéricos. Es la red de
    // seguridad real: Chrome llegó a rellenar el Phone Number ID con el nombre
    // de una empresa guardada ("Square") y eso, guardado, rompe el canal sin
    // ningún aviso. Verificar por código, no confiar en el navegador.
    for(const [k,label] of [["phone_number_id","Phone Number ID"],["waba_id","WABA ID"]]){
      if(body[k] && !/^\d{5,}$/.test(body[k])){
        toast(`El ${label} debe ser solo números — llegó "${body[k]}". ¿Lo rellenó el navegador?`,true);
        return;
      }
    }
    const tok=$("w_token").value.trim(), sec=$("w_secret").value.trim();
    if(tok) body.access_token=tok;
    if(sec) body.app_secret=sec;
    if(!Object.keys(body).length){ toast("No cambiaste nada"); return; }
    save(e.target, body);
  };
}
function renderTG(){
  const c=st.channel||{}, s=st.secrets||{};
  const chats=(c.telegram_chat_ids||[]).join(", ");
  const copiloto=!!c.telegram_webhook_secret;
  $("tgCard").innerHTML=`
    <div class="card">
      <div class="chd"><span class="ico"><img src="${LOGO.tg}" alt="Telegram"/></span>
        <div><div class="nm">Telegram</div><div class="sub2">Avisos y Copiloto en el celular</div></div>
        <span class="st ${s.telegram_bot_token?'on':''}">${s.telegram_bot_token?'Conectado':'Sin conectar'}</span></div>
      <div class="desc">Bot que te avisa y por el que puedes <b>aprobar pagos desde el celular</b>. Crea el bot con @BotFather.</div>
      <div style="font-weight:700;font-size:13px;margin-top:14px">1 · El bot</div>
      <label>Bot token ${badge(s.telegram_bot_token)}</label>
      <input class="in" type="password" id="t_token" ${NOFILL_PWD} placeholder="${ph(s.telegram_bot_token,'123456:ABC-DEF...')}"/>
      <div class="acts"><button class="btn primary" id="saveTG">Guardar token</button></div>

      <div style="border-top:1px solid var(--border);margin:16px 0 12px"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
        <div style="flex:1;min-width:220px">
          <div style="font-weight:700;font-size:13px">2 · Copiloto en Telegram ${copiloto?'<span class="st on" style="margin-left:6px">Activo</span>':''}</div>
          <div class="desc" style="margin:4px 0 0">Agrega botones a los avisos para que apruebes el adelanto o sueltes la clave sin abrir el panel.
          ${copiloto?'':'Necesita el bot token de arriba.'}</div>
        </div>
        <button class="btn" id="tgHook" ${s.telegram_bot_token?'':'disabled'}>${copiloto?'Reconectar':'Activar Copiloto'}</button>
      </div>

      <div style="border-top:1px solid var(--border);margin:16px 0 12px"></div>
      <div style="font-weight:700;font-size:13px">3 · Quién puede aprobar</div>
      <div class="desc" style="margin:4px 0 10px">Solo estos chats pueden aprobar pagos desde Telegram. Si el tuyo no está acá, los botones no te van a funcionar.</div>
      <div style="display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap">
        <input class="in" id="t_chats" ${NOFILL} value="${esc(chats)}" placeholder="Sin nadie vinculado todavía" style="flex:1;min-width:200px"/>
        <button class="btn" id="tgPair" ${copiloto?'':'disabled'}>${icon("sparkles")} Detectar mi chat ID</button>
      </div>
      <div id="pairBox"></div>
      <div class="acts"><button class="btn" id="saveChats">Guardar chats</button></div>`;
  $("saveTG").onclick=(e)=>save(e.target,{ telegram_bot_token:$("t_token").value||undefined });
  $("saveChats").onclick=(e)=>save(e.target,{ telegram_chat_ids:$("t_chats").value });
  const hk=$("tgHook");
  if(hk) hk.onclick=async(e)=>{
    const b=e.target; b.disabled=true; const old=b.textContent; b.textContent="Conectando…";
    try{ await callFn("channel-config",{ action:"telegram_connect", channel_id:st.channelId });
      toast("Copiloto de Telegram activo ✓"); await load(); }
    catch(err){ toast(err.message||"No se pudo conectar",true); b.disabled=false; b.textContent=old; }
  };
  const pr=$("tgPair");
  if(pr) pr.onclick=()=>vincularTelegram();
}

// Vinculación por código: el panel muestra un código, tú se lo mandas al bot
// y el bot te reconoce. Se hace así y no "guardando al primero que escriba"
// porque eso convertiría en admin a cualquier desconocido que encuentre el bot.
async function vincularTelegram(){
  const box=$("pairBox");
  box.innerHTML=`<div style="font-size:12.5px;color:var(--muted);padding:10px 0">Generando código…</div>`;
  let r;
  try{ r=await callFn("channel-config",{ action:"telegram_pair_start", channel_id:st.channelId }); }
  catch(e){ box.innerHTML=""; toast(e.message||"No se pudo generar el código",true); return; }

  const fin=new Date(r.vence).getTime();
  box.innerHTML=`
    <div style="border:1.5px solid var(--brand);background:var(--brand-bg,rgba(43,127,255,.08));border-radius:12px;padding:14px;margin-top:10px">
      <div style="font-size:12.5px;color:var(--muted);line-height:1.6">Abrí tu bot en Telegram y <b>mandale este código</b>:</div>
      <div style="font-size:30px;font-weight:800;letter-spacing:5px;margin:10px 0;font-variant-numeric:tabular-nums">${esc(r.codigo)}</div>
      <div style="font-size:12px;color:var(--faint)" id="pairTime"></div>
      <div style="font-size:12px;color:var(--muted);margin-top:8px">Apenas lo mandes, tu chat queda vinculado solo — no tienes que copiar nada.</div>
    </div>`;

  // Espera a que el webhook lo vincule. Se corta solo al vencer el código.
  clearInterval(st.pairTimer);
  st.pairTimer=setInterval(async()=>{
    const queda=Math.max(0,Math.round((fin-Date.now())/1000));
    const t=$("pairTime");
    if(t) t.textContent=queda?`El código vence en ${Math.floor(queda/60)}:${String(queda%60).padStart(2,"0")}`:"El código venció — tocá Detectar de nuevo.";
    if(!queda){ clearInterval(st.pairTimer); return; }
    const { data } = await supa.from("channels").select("telegram_chat_ids,telegram_pair").eq("id",st.channelId).maybeSingle();
    if(data && !data.telegram_pair){ // el webhook lo consumió → quedó vinculado
      clearInterval(st.pairTimer);
      toast("Telegram vinculado ✓");
      await load();
    }
  },2000);
  // Si te vas de la página, no dejar el temporizador colgado.
  if(st.leaveHooked!==true){ st.leaveHooked=true; window.addEventListener("beforeunload",()=>clearInterval(st.pairTimer)); }
}
async function save(btn, fields){
  btn.disabled=true; const old=btn.textContent; btn.textContent="Guardando…";
  try{ await callFn("channel-config",{ action:"save", channel_id:st.channelId, ...fields }); toast("Guardado ✓"); await load(); }
  catch(e){ toast(e.message||"error",true); }
  finally{ btn.disabled=false; btn.textContent=old; }
}
async function callFn(fn, body){
  const { data, error } = await supa.functions.invoke(fn, { body });
  if(error){ let d=""; try{ d=(await error.context?.json?.())?.detalle||""; }catch{} throw new Error(d||error.message||"error"); }
  return data;
}
boot();
</script>
</body>
</html>
